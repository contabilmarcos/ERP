
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ERP Local - Fiscal e Cadastros</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --canvas: #f6f7f9;
      --surface: #ffffff;
      --surface-2: #fbfbfc;
      --surface-3: #f3f4f6;
      --sidebar: #fbfbfc;
      --ink: #1c1e22;
      --ink-2: #5b616b;
      --ink-3: #888e98;
      --border: #e9ebef;
      --border-2: #dfe2e7;
      --accent: #4f46e5;
      --accent-hover: #4338ca;
      --accent-soft: #eef0fe;
      --accent-soft-2: #e4e6fd;
      --accent-ink: #3f37c9;
      --success: #0f9d76;
      --success-soft: #e6f6f0;
      --warning: #b4780a;
      --warning-soft: #fbf3e2;
      --danger: #d4494b;
      --danger-soft: #fbecec;
      --shadow-xs: 0 1px 2px rgba(20, 23, 28, 0.04);
      --shadow-sm: 0 1px 2px rgba(20, 23, 28, 0.04), 0 1px 3px rgba(20, 23, 28, 0.05);
      --shadow-md: 0 8px 24px rgba(20, 23, 28, 0.10);
      --radius-xl: 14px;
      --radius-lg: 12px;
      --radius-md: 10px;
      --radius-sm: 8px;
      --mono: "IBM Plex Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--canvas);
      color: var(--ink);
      font-family: "Inter", system-ui, -apple-system, sans-serif;
      font-size: 14px;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    button, input, select, textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    ::selection {
      background: var(--accent-soft-2);
    }

    :focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .app-shell {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 258px 1fr;
    }

    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      background: var(--sidebar);
      border-right: 1px solid var(--border);
      padding: 18px 12px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      z-index: 20;
    }

    .brand {
      display: flex;
      gap: 11px;
      align-items: center;
      padding: 8px 8px 2px;
    }

    .brand-mark {
      width: 34px;
      height: 34px;
      border-radius: 9px;
      display: grid;
      place-items: center;
      background: var(--accent);
      color: #ffffff;
      font-family: var(--mono);
      font-weight: 600;
      font-size: 0.68rem;
      letter-spacing: 0.03em;
      box-shadow: var(--shadow-xs);
    }

    .brand h1 {
      margin: 0;
      font-size: 0.92rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      line-height: 1.2;
      color: var(--ink);
    }

    .brand p {
      margin: 2px 0 0;
      color: var(--ink-3);
      font-size: 0.75rem;
    }

    .menu-section-label {
      margin: 0 8px 4px;
      color: var(--ink-3);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-size: 0.68rem;
      font-weight: 600;
    }

    .menu {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .nav-button {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 10px;
      border: 1px solid transparent;
      padding: 8px 10px;
      border-radius: 8px;
      background: transparent;
      color: var(--ink-2);
      text-align: left;
      transition: background 0.14s ease, color 0.14s ease, border-color 0.14s ease;
    }

    .nav-button:hover,
    .nav-button:focus-visible {
      background: var(--surface-3);
      color: var(--ink);
      outline: none;
    }

    .nav-button.active {
      background: var(--surface);
      color: var(--ink);
      border-color: var(--border);
      box-shadow: var(--shadow-xs);
    }

    .nav-icon {
      width: 7px;
      height: 7px;
      border-radius: 2px;
      background: var(--ink-3);
      flex-shrink: 0;
      transition: background 0.14s ease;
    }

    .nav-button:hover .nav-icon {
      background: var(--ink-2);
    }

    .nav-button.active .nav-icon {
      background: var(--accent);
    }

    .nav-title {
      font-weight: 500;
      font-size: 0.86rem;
    }

    .nav-subtitle {
      display: block;
      margin-top: 1px;
      color: var(--ink-3);
      font-size: 0.72rem;
      font-weight: 400;
    }

    .sidebar-foot {
      margin-top: auto;
      background: var(--surface-3);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 13px;
    }

    .sidebar-foot strong {
      display: block;
      margin-bottom: 5px;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--ink);
    }

    .sidebar-foot p {
      margin: 0;
      color: var(--ink-3);
      font-size: 0.75rem;
      line-height: 1.55;
    }

    .sidebar-foot code,
    .subtle-panel code {
      font-family: var(--mono);
      font-size: 0.72rem;
      background: var(--surface);
      padding: 1px 5px;
      border-radius: 4px;
      border: 1px solid var(--border);
    }

    .content-area {
      padding: 22px;
      min-width: 0;
    }

    .page-frame {
      min-height: calc(100vh - 44px);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .title-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .title-mark {
      width: 38px;
      height: 38px;
      display: grid;
      place-items: center;
      border-radius: var(--radius-md);
      background: var(--surface-3);
      color: var(--ink-2);
      border: 1px solid var(--border);
      font-family: var(--mono);
      font-weight: 600;
      font-size: 0.7rem;
      letter-spacing: 0.02em;
    }

    .page-title {
      margin: 0;
      font-size: 1.15rem;
      line-height: 1.25;
      font-weight: 600;
      letter-spacing: -0.015em;
      color: var(--ink);
    }

    .page-subtitle {
      margin: 3px 0 0;
      color: var(--ink-2);
      font-size: 0.82rem;
      line-height: 1.45;
    }

    .topbar-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .icon-button,
    .ghost-button,
    .primary-button,
    .danger-button,
    .secondary-button {
      border: 1px solid transparent;
      border-radius: var(--radius-sm);
      transition: background 0.14s ease, box-shadow 0.14s ease, border-color 0.14s ease, transform 0.06s ease;
    }

    .icon-button {
      width: 38px;
      height: 38px;
      background: var(--surface);
      border-color: var(--border-2);
      color: var(--ink);
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
    }

    .ghost-button,
    .primary-button,
    .danger-button,
    .secondary-button {
      padding: 8px 13px;
      font-weight: 500;
      font-size: 0.83rem;
    }

    .ghost-button {
      background: var(--surface);
      border-color: var(--border-2);
      color: var(--ink);
    }

    .ghost-button:hover {
      background: var(--surface-3);
    }

    .secondary-button {
      background: var(--accent-soft);
      color: var(--accent-ink);
      border-color: transparent;
    }

    .secondary-button:hover {
      background: var(--accent-soft-2);
    }

    .primary-button {
      background: var(--accent);
      color: #ffffff;
      border-color: var(--accent);
      box-shadow: var(--shadow-xs);
    }

    .primary-button:hover {
      background: var(--accent-hover);
      border-color: var(--accent-hover);
    }

    .danger-button {
      background: var(--danger-soft);
      color: var(--danger);
      border-color: transparent;
    }

    .danger-button:hover {
      background: #f7dede;
    }

    .ghost-button:active,
    .primary-button:active,
    .danger-button:active,
    .secondary-button:active,
    .icon-button:active {
      transform: translateY(1px);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      box-shadow: none;
    }

    .page-content {
      padding: 22px 24px 26px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .hero-panel,
    .card,
    .table-card,
    .empty-card,
    .stats-card,
    .notice-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-xs);
    }

    .hero-panel {
      padding: 26px;
      display: grid;
      grid-template-columns: 1.5fr 1fr;
      gap: 22px;
    }

    .hero-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 5px 11px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent-ink);
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.01em;
    }

    .hero-eyebrow::before {
      content: "";
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
    }

    .hero-panel h2 {
      margin: 14px 0 8px;
      font-size: 1.5rem;
      line-height: 1.2;
      font-weight: 600;
      letter-spacing: -0.025em;
      color: var(--ink);
    }

    .hero-panel p {
      margin: 0;
      color: var(--ink-2);
      line-height: 1.6;
      font-size: 0.88rem;
    }

    .hero-actions {
      margin-top: 18px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .hero-stack {
      display: grid;
      gap: 12px;
      align-content: start;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(158px, 1fr));
      gap: 12px;
    }

    .stats-card {
      padding: 16px;
    }

    .stats-card small {
      color: var(--ink-3);
      font-weight: 500;
      letter-spacing: 0.01em;
      font-size: 0.76rem;
    }

    .stats-card strong {
      display: block;
      margin-top: 8px;
      font-size: 1.65rem;
      line-height: 1;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--ink);
    }

    .stats-card span {
      display: block;
      margin-top: 8px;
      color: var(--ink-3);
      font-size: 0.78rem;
      line-height: 1.4;
    }

    .card {
      padding: 20px;
    }

    .notice-card {
      padding: 16px;
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }

    .notice-icon {
      width: 34px;
      height: 34px;
      border-radius: 9px;
      display: grid;
      place-items: center;
      background: var(--surface-3);
      border: 1px solid var(--border);
      font-family: var(--mono);
      font-weight: 600;
      font-size: 0.68rem;
      color: var(--ink-2);
      flex-shrink: 0;
    }

    .notice-card strong {
      display: block;
      margin-bottom: 3px;
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--ink);
    }

    .notice-card p {
      margin: 0;
      color: var(--ink-2);
      line-height: 1.55;
      font-size: 0.83rem;
    }

    .section-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .section-head h3,
    .section-head h4 {
      margin: 0;
      font-size: 0.98rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--ink);
    }

    .section-head p {
      margin: 4px 0 0;
      color: var(--ink-2);
      font-size: 0.82rem;
      line-height: 1.5;
    }

    .layout-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1.25fr);
      gap: 16px;
      align-items: start;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .form-grid.single-column {
      grid-template-columns: 1fr;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    .field label {
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--ink);
    }

    .field-hint {
      margin: -1px 0 0;
      color: var(--ink-3);
      font-size: 0.73rem;
    }

    .field input,
    .field select,
    .field textarea {
      width: 100%;
      border: 1px solid var(--border-2);
      background: var(--surface);
      color: var(--ink);
      border-radius: var(--radius-sm);
      padding: 9px 11px;
      min-height: 38px;
      font-size: 0.86rem;
      transition: border-color 0.14s ease, box-shadow 0.14s ease;
    }

    .field input::placeholder,
    .field textarea::placeholder {
      color: var(--ink-3);
    }

    .field textarea {
      resize: vertical;
      min-height: 92px;
      line-height: 1.5;
    }

    .field input:focus,
    .field select:focus,
    .field textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    .field-readonly {
      display: flex;
      align-items: center;
      min-height: 38px;
      padding: 9px 11px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--surface-3);
      color: var(--ink-2);
      font-weight: 500;
      font-size: 0.84rem;
    }

    .field-readonly.compact {
      min-height: 34px;
      padding: 7px 10px;
      font-size: 0.82rem;
    }

    .form-actions,
    .inline-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    .inline-actions {
      margin-top: 0;
      align-items: center;
    }

    .table-card {
      overflow: hidden;
    }

    .table-toolbar {
      padding: 16px 18px;
      display: flex;
      gap: 12px;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      border-bottom: 1px solid var(--border);
    }

    .table-toolbar h4 {
      margin: 0;
      font-size: 0.92rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--ink);
    }

    .search-input {
      width: min(100%, 320px);
      min-height: 38px;
      border: 1px solid var(--border-2);
      border-radius: var(--radius-sm);
      background: var(--surface);
      padding: 0 12px;
      font-size: 0.85rem;
      color: var(--ink);
      transition: border-color 0.14s ease, box-shadow 0.14s ease;
    }

    .search-input::placeholder {
      color: var(--ink-3);
    }

    .search-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    .table-scroll {
      overflow: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 680px;
    }

    th,
    td {
      padding: 11px 16px;
      text-align: left;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }

    th {
      font-size: 0.7rem;
      color: var(--ink-3);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 600;
      background: var(--surface-2);
      white-space: nowrap;
    }

    td {
      font-size: 0.85rem;
      color: var(--ink);
    }

    td strong {
      font-weight: 600;
    }

    tbody tr {
      transition: background 0.12s ease;
    }

    tbody tr:hover {
      background: var(--surface-2);
    }

    tbody tr:last-child td {
      border-bottom: none;
    }

    .table-muted {
      color: var(--ink-3);
      font-size: 0.78rem;
      line-height: 1.45;
    }

    .table-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .action-chip {
      border: 1px solid var(--border-2);
      background: var(--surface);
      color: var(--ink-2);
      border-radius: 7px;
      padding: 5px 10px;
      font-size: 0.78rem;
      font-weight: 500;
      transition: background 0.12s ease, border-color 0.12s ease, color 0.12s ease;
    }

    .action-chip:hover {
      background: var(--surface-3);
      color: var(--ink);
    }

    .action-chip.danger {
      color: var(--danger);
    }

    .action-chip.danger:hover {
      background: var(--danger-soft);
      border-color: transparent;
    }

    .badge-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      border-radius: 6px;
      padding: 3px 8px;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.01em;
      background: var(--surface-3);
      color: var(--ink-2);
      border: 1px solid var(--border);
    }

    .badge.positive {
      background: var(--success-soft);
      color: var(--success);
      border-color: transparent;
    }

    .badge.warning {
      background: var(--warning-soft);
      color: var(--warning);
      border-color: transparent;
    }

    .badge.danger {
      background: var(--danger-soft);
      color: var(--danger);
      border-color: transparent;
    }

    .account-preview-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-top: 12px;
    }

    .account-tree-preview {
      margin-top: 14px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .account-tree-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      border-radius: var(--radius-sm);
      background: var(--surface);
      border: 1px solid var(--border);
    }

    .account-tree-item.current {
      background: var(--accent-soft);
      border-color: transparent;
    }

    .account-tree-item .mono {
      color: var(--ink-3);
      font-size: 0.8rem;
    }

    .account-tree-item.current .mono {
      color: var(--accent-ink);
    }

    .account-tree-item strong {
      font-size: 0.83rem;
      font-weight: 500;
    }

    .inline-note {
      margin-top: 10px;
      padding: 9px 12px;
      border-radius: var(--radius-sm);
      font-size: 0.8rem;
      font-weight: 500;
    }

    .inline-note.warning {
      background: var(--warning-soft);
      color: var(--warning);
    }

    .inline-note.danger {
      background: var(--danger-soft);
      color: var(--danger);
    }

    .chart-account-row.synthetic {
      background: var(--surface-2);
    }

    .chart-account-row.synthetic:hover {
      background: var(--surface-3);
    }

    .chart-account-name {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 22px;
    }

    .chart-account-name strong {
      font-size: 0.85rem;
      font-weight: 600;
    }

    .account-indent-guide {
      display: inline-block;
      width: 14px;
      height: 2px;
      border-radius: 2px;
      background: var(--border-2);
      flex-shrink: 0;
    }

    .account-meta {
      margin-top: 7px;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .empty-card {
      padding: 28px;
      text-align: center;
    }

    .empty-card strong {
      display: block;
      font-size: 0.92rem;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--ink);
    }

    .empty-card p {
      margin: 0 auto;
      max-width: 520px;
      color: var(--ink-2);
      line-height: 1.6;
      font-size: 0.84rem;
    }

    .empty-card .inline-actions {
      justify-content: center;
      margin-top: 16px;
    }

    .split-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .trial-balance-split {
      display: grid;
      grid-template-columns: minmax(0, 1.6fr) minmax(280px, 360px);
      gap: 16px;
      flex: 1;
      min-height: 0;
    }

    .trial-balance-split .table-card {
      min-height: 0;
    }

    .ledger-panel {
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: auto;
      overscroll-behavior: contain;
    }

    .ledger-summary {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin: 4px 0 12px;
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      background: var(--surface);
      border: 1px solid var(--border);
    }

    .ledger-summary strong {

    .total-card {

    .status-highlight {

    .status-highlight::before {

    .status-highlight.ok {

    .status-highlight.warn {

    .toast-stack {

    .toast {

    .toast .notice-icon {

      height: 28px;
      font-size: 0.62rem;
    }

    .toast strong {
      display: block;
      margin-bottom: 2px;
      font-size: 0.84rem;
      font-weight: 600;
      color: var(--ink);
    }

    }

    .toast.success .notice-icon {
      background: var(--success-soft);

      border-color: transparent;
    }

    .toast.error .notice-icon {
      background: var(--danger-soft);
      color: var(--danger);
      border-color: transparent;
    }

    @keyframes toast-in {
      from { opacity: 0; transform: translateY(-6px); }
      to { opacity: 1; transform: none; }
    }

    .cloud-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 11px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface);
      font-size: 0.76rem;
      font-weight: 600;
      white-space: nowrap;
      color: var(--ink-2);
    }

    .cloud-chip.ok {
      color: var(--success);
      background: var(--success-soft);
      border-color: transparent;
    }

    .cloud-chip.syncing {
      color: var(--warning);
      background: var(--warning-soft);
      border-color: transparent;
    }

    .cloud-chip.error {
      color: var(--danger);
      background: var(--danger-soft);
      border-color: transparent;
    }

    .cloud-chip.offline {
      color: var(--ink-3);
      background: var(--surface-3);
      border-color: transparent;

    .overlay {

      position: fixed;
      inset: 0;

      inset: 0;

      align-items: center;
      justify-content: center;

    }

    .modal-backdrop {
      position: absolute;
      inset: 0;
      border: none;
      padding: 0;
      background: rgba(20, 23, 28, 0.42);
      backdrop-filter: blur(3px);
    }

    .modal-shell.fullscreen {
      width: 100vw;
      height: 100vh;
      max-height: 100vh;
      border-radius: 0;
      border: none;
    }

    .modal-shell {
      position: relative;
      z-index: 1;
      width: min(1120px, 100%);
      height: min(92vh, 940px);
      max-height: min(92vh, 940px);

    .modal-header {

      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-wrap: wrap;
    }

    .modal-title {
      margin: 0;
      font-size: 1.02rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--ink);
    }

    .modal-subtitle {
      margin: 4px 0 0;

      font-size: 0.82rem;
      line-height: 1.5;
    }

    .modal-body {

      overflow: auto;
      overscroll-behavior: contain;
      min-height: 0;
      background: var(--canvas);
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .modal-body .table-card {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    .modal-body .table-scroll {
      flex: 1;
      min-height: 0;
      overflow: auto;
      overscroll-behavior: contain;
    }

    .modal-tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .modal-tab {
      border: 1px solid var(--border-2);
      background: var(--surface);
      color: var(--ink-2);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 0.82rem;
      font-weight: 500;
      transition: background 0.14s ease, color 0.14s ease, border-color 0.14s ease;
    }

    .modal-tab:hover {
      background: var(--surface-3);
      color: var(--ink);
    }

    .modal-tab.active {
      background: var(--accent-soft);
      color: var(--accent-ink);
      border-color: transparent;
    }


    .option-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
    }

    .option-card {
      padding: 20px;
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
      background: var(--surface);
      box-shadow: var(--shadow-xs);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .option-card h3 {
      margin: 0;
      font-size: 0.98rem;
      font-weight: 600;
      color: var(--ink);
    }

    .option-card p {
      margin: 0;
      color: var(--ink-2);
      font-size: 0.83rem;
      line-height: 1.55;
    }

    .option-card small {
      color: var(--ink-3);
      font-size: 0.76rem;
    }

    .checkbox-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 10px;
    }

    .checkbox-item {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 40px;
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--surface);
    }

    .checkbox-item input {
      width: 16px;
      height: 16px;
      margin: 0;
      accent-color: var(--accent);
    }

    .checkbox-item span {
      color: var(--ink);
      font-size: 0.83rem;
      font-weight: 500;
    }

    .tree-toggle {
      width: 28px;
      height: 28px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 7px;
      border: 1px solid var(--border-2);
      background: var(--surface);
      color: var(--ink-2);
      padding: 0;
      margin-right: 8px;
      flex-shrink: 0;
    }

    .tree-toggle:hover {
      background: var(--surface-3);
      color: var(--ink);
    }

    .tree-toggle.placeholder {
      visibility: hidden;
    }

    .tree-account-line {
      display: flex;
      align-items: center;
      min-height: 28px;
    }

    .tree-account-indent {
      display: inline-block;
      width: 18px;
      flex-shrink: 0;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .summary-card {
      padding: 16px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
      background: var(--surface-2);
    }

    .summary-card span {
      display: block;
      color: var(--ink-3);
      font-size: 0.76rem;
      font-weight: 500;
    }

    .summary-card strong {
      display: block;
      margin-top: 7px;
      color: var(--ink);
      font-size: 0.9rem;
      font-weight: 600;
    }

    .summary-card p {
      margin: 8px 0 0;
      color: var(--ink-2);
      font-size: 0.8rem;
      line-height: 1.5;
    }

    .text-right {
      text-align: right;
    }

    .mono {
      font-family: var(--mono);
      font-variant-numeric: tabular-nums;
      font-feature-settings: "tnum";
      letter-spacing: -0.01em;
    }

    @media (max-width: 1180px) {
      .layout-grid,
      .hero-panel,
      .split-grid,
      .totals-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 960px) {
      .app-shell {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: fixed;
        left: 0;
        top: 0;
        transform: translateX(-102%);
        transition: transform 0.22s ease;
        width: min(84vw, 300px);
        box-shadow: var(--shadow-md);
      }

      .sidebar.open {
        transform: translateX(0);
      }

      .overlay.show {
        display: block;
      }

      .content-area {
        padding: 12px;
      }

      .modal-overlay {
        padding: 14px;
      }

      .modal-shell {
        max-height: calc(100vh - 28px);
      }

      .icon-button {
        display: inline-flex;
      }

      .topbar,
      .page-content {
        padding-left: 18px;
        padding-right: 18px;
      }
    }

    @media (max-width: 680px) {
      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .topbar-actions {
        width: 100%;
        justify-content: flex-start;
      }

      .form-grid,
      .split-grid,
      .stats-grid,
      .totals-grid,
      .account-preview-grid {
        grid-template-columns: 1fr;
      }

      .page-title {
        font-size: 1.05rem;
      }

      .summary-grid {
        grid-template-columns: 1fr;
      }

      .hero-panel h2 {
        font-size: 1.3rem;
      }

      table {
        min-width: 600px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        animation-duration: 0.001ms !important;
        transition-duration: 0.001ms !important;
      }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    (() => {
      const STORAGE_KEYS = {
        costCenters: "erp_cost_centers",
        suppliers: "erp_suppliers",
        financialNatures: "erp_financial_natures",
        chartAccounts: "erp_chart_accounts",
        items: "erp_items",
        invoices: "erp_invoices",
        accountingEntries: "erp_accounting_entries",
        documentTypes: "erp_document_types",
        accountingEvents: "erp_accounting_events",
        settlementEvents: "erp_settlement_events",
        settlements: "erp_settlements"
      };
      const CLOUD_CONFIG_STORAGE_KEY = "erp_cloud_sync_config";
      const CLOUD_LAST_MODIFIED_STORAGE_KEY = "erp_cloud_last_modified";

      const CODE_CONFIG = {
        costCenters: { prefix: "CC", digits: 4 },
        suppliers: { prefix: "FOR", digits: 4 },
        financialNatures: { prefix: "NAT", digits: 4 },
        items: { prefix: "ITE", digits: 4 },
        invoices: { prefix: "NF", digits: 6 },
        accountingEntries: { prefix: "LC", digits: 6 },
        documentTypes: { prefix: "DOC", digits: 4 },
        accountingEvents: { prefix: "EVC", digits: 4 },
        settlementEvents: { prefix: "EVB", digits: 4 },
        settlements: { prefix: "BX", digits: 6 }
      };

      const CHART_ACCOUNT_GROUP_LABELS = {
        "1": "Ativo",
        "2": "Passivo",
        "3": "Patrimônio Líquido",
        "4": "Receitas",
        "5": "Custos",
        "6": "Despesas",
        "7": "Resultado / Apuração"
      };

      const CHART_ACCOUNT_BALANCE_DEFAULTS = {
        "1": "Devedora",
        "2": "Credora",
        "3": "Credora",
        "4": "Credora",
        "5": "Devedora",
        "6": "Devedora",
        "7": "Credora"
      };

      const CHART_ACCOUNT_CODE_PATTERNS = [
        { level: 1, regex: /^\d$/ },
        { level: 2, regex: /^\d\.\d$/ },
        { level: 3, regex: /^\d\.\d\.\d{2}$/ },
        { level: 4, regex: /^\d\.\d\.\d{2}\.\d{2}$/ },
        { level: 5, regex: /^\d\.\d\.\d{2}\.\d{2}\.\d{3}$/ }
      ];

      const VIEW_META = {
        dashboard: {
          icon: "DB",
          title: "Painel inicial",
          subtitle: "Acompanhe o estado do ERP e comece seus cadastros a partir de uma base totalmente vazia."
        },
        settings: {
          icon: "CF",
          title: "Configurações do sistema",
          subtitle: "Organize parametrizações futuras e mantenha os centros de custo com controle local."
        },
        suppliers: {
          icon: "FO",
          title: "Cadastro de fornecedores",
          subtitle: "Gerencie os fornecedores que serão utilizados no lançamento das notas fiscais."
        },
        chartAccounts: {
          icon: "CT",
          title: "Contas contábeis",
          subtitle: "Monte a base contábil que sustenta naturezas financeiras, itens e lançamentos fiscais."
        },
        financialNatures: {
          icon: "NF",
          title: "Natureza financeira",
          subtitle: "Cadastre naturezas obrigatoriamente vinculadas às contas contábeis."
        },
        items: {
          icon: "IT",
          title: "Cadastro de itens",
          subtitle: "Mantenha os itens utilizados nas notas fiscais com vínculo direto à natureza financeira."
        },
        accountingEntries: {
          icon: "CB",
          title: "Módulo contábil",
          subtitle: "Registre lançamentos contábeis e emita balancete por período e centro de custo."
        },
        fiscal: {
          icon: "FI",
          title: "Módulo fiscal",
          subtitle: "Lance notas fiscais de serviço ou produto com itens, vínculo contábil e parcelas financeiras."
        },
        financeiro: {
          icon: "FN",
          title: "Módulo financeiro",
          subtitle: "Acompanhe as parcelas lançadas e registre baixas com data, conta e valor."
        }
      };

      const state = {
        data: {
          costCenters: [],
          suppliers: [],
          financialNatures: [],
          chartAccounts: [],
          items: [],
          invoices: [],
          accountingEntries: [],
          documentTypes: [],
          accountingEvents: [],
          settlementEvents: [],
          settlements: []
        },
        ui: {
          activeView: "dashboard",
          sidebarOpen: false,
          search: {
            costCenters: "",
            suppliers: "",
            chartAccounts: "",
            financialNatures: "",
            items: "",
            invoices: "",
            accountingEntries: "",
            documentTypes: "",
            accountingEvents: "",
            settlementEvents: "",
            financeiro: ""
          },
          cloudDraft: createEmptyCloudDraft(),
          chartAccountFormDraft: createEmptyChartAccountDraft(),
          chartAccountsModalOpen: false,
          chartAccountTreeCollapsed: {},
          financialNatureFormDraft: createEmptyFinancialNatureDraft(),
          itemNaturePreviewId: "",
          itemFormDraft: createEmptyItemDraft(),
          accountingEntryDraft: createEmptyAccountingEntryDraft(),
          accountingEntryFilters: createEmptyAccountingEntryFilters(),
          accountingPanel: "menu",
          accountingEntriesModalOpen: false,
          accountingEntryFormModalOpen: false,
          trialBalanceFilters: createEmptyTrialBalanceFilters(),
          trialBalanceModalOpen: false,
          trialBalanceReportModalOpen: false,
          trialBalanceSelectedAccountId: "",
          settingsPanel: "costCenters",
          documentTypeFormDraft: createEmptyDocumentTypeDraft(),
          accountingEventFormDraft: createEmptyAccountingEventDraft(),
          settlementEventFormDraft: createEmptySettlementEventDraft(),
          eventEntriesModalOpen: false,
          payableEntriesModalOpen: false,
          settlementModalOpen: false,
          settlementTarget: null,
          settlementFormDraft: createEmptySettlementDraft(),
          editing: {
            costCenterId: null,
            supplierId: null,
            chartAccountId: null,
            financialNatureId: null,
            itemId: null,
            accountingEntryId: null,
            documentTypeId: null,
            accountingEventId: null,
            settlementEventId: null
          },
          invoiceDraft: createEmptyInvoiceDraft(),
          invoiceModalOpen: false,
          activeInvoiceTab: "dados",
          toasts: []
        }
      };

      function createEmptyInvoiceDraft(invoice) {
        if (invoice) {
          return {
            id: invoice.id,
            code: invoice.code,
            type: invoice.type,
            kind: invoice.kind || "invoice",
            documentNumber: invoice.documentNumber || "",
            costCenterId: invoice.costCenterId || "",
            supplierId: invoice.supplierId,
            issueDate: invoice.issueDate,
            description: invoice.description,
            items: Array.isArray(invoice.items) ? invoice.items.map((item) => ({ ...item })) : [],
            installments: Array.isArray(invoice.installments) ? invoice.installments.map((installment) => ({ ...installment })) : [],
            lineForm: {
              itemId: "",
              quantity: 1,
              unitPrice: ""
            },
            installmentForm: {
              installmentNumber: (invoice.installments?.length || 0) + 1,
              dueDate: "",
              amount: "",
              paymentMethod: "",
              status: "Em aberto"
            }
          };
        }

        return {
          id: null,
          code: "",
          type: "Nota de serviço",
          kind: "invoice",
          documentNumber: "",
          costCenterId: "",
          supplierId: "",
          issueDate: getToday(),
          description: "",
          items: [],
          installments: [],
          lineForm: {
            itemId: "",
            quantity: 1,
            unitPrice: ""
          },
          installmentForm: {
            installmentNumber: 1,
            dueDate: "",
            amount: "",
            paymentMethod: "",
            status: "Em aberto"
          }
        };
      }

      function createEmptyDocumentTypeDraft(record) {
        return {
          id: record?.id || "",
          name: record?.name || "",
          status: record?.isActive === false ? "Inativo" : "Ativo"
        };
      }

      function createEmptyAccountingEventDraft(record) {
        return {
          id: record?.id || "",
          documentTypeId: record?.documentTypeId || "",
          creditAccountId: record?.creditAccountId || "",
          description: record?.description || "",
          status: record?.isActive === false ? "Inativo" : "Ativo"
        };
      }

      function createEmptySettlementEventDraft(record) {
        return {
          id: record?.id || "",
          documentTypeId: record?.documentTypeId || "",
          debitAccountId: record?.debitAccountId || "",
          description: record?.description || "",
          status: record?.isActive === false ? "Inativo" : "Ativo"
        };
      }

      function createEmptySettlementDraft() {
        return {
          settlementDate: getToday(),
          payingAccountId: "",
          amount: ""
        };
      }

      function createEmptyAccountingEntryDraft(entry) {
        return {
          id: entry?.id || "",
          code: entry?.code || "",
          entryDate: entry?.entryDate || getToday(),
          description: entry?.description || "",
          costCenterId: entry?.costCenterId || "",
          debitAccountId: entry?.debitAccountId || "",
          creditAccountId: entry?.creditAccountId || "",
          amount: entry?.amount != null ? String(entry.amount) : ""
        };
      }

      function createEmptyAccountingEntryFilters() {
        return {
          startDate: "",
          endDate: "",
          amount: "",
          description: ""
        };
      }

      function createEmptyTrialBalanceFilters() {
        return {
          startDate: "",
          endDate: "",
          costCenterId: "all",
          showPreviousBalance: true,
          showDebit: true,
          showCredit: true,
          showMovement: true,
          showBalance: true,
          submitted: false
        };
      }

      function createEmptyChartAccountDraft(account) {
        return {
          id: account?.id || "",
          code: account?.code || "",
          name: account?.name || "",
          type: account?.type || "Sintética",
          balanceNature: account?.balanceNature || "Devedora",
          status: account?.isActive === false ? "Inativa" : "Ativa"
        };
      }

      function createEmptyCloudDraft(config) {
        return {
          apiKey: config?.apiKey || "",
          binId: config?.binId || ""
        };
      }

      function createEmptyFinancialNatureDraft(nature) {
        return {
          id: nature?.id || "",
          name: nature?.name || "",
          chartAccountId: nature?.chartAccountId || ""
        };
      }

      function createEmptyItemDraft(item) {
        return {
          id: item?.id || "",
          name: item?.name || "",
          description: item?.description || "",
          financialNatureId: item?.financialNatureId || ""
        };
      }

      function initialize() {
        loadCollections();
        CLOUD.init();
        bindGlobalEvents();
        renderApp();
        CLOUD.syncIfNewer(true);
      }

      function loadCollections() {
        Object.keys(STORAGE_KEYS).forEach((key) => {
          state.data[key] = readCollection(STORAGE_KEYS[key]);
        });
        migrateCollections();
      }

      function migrateCollections() {
        const migratedAccounts = migrateChartAccounts(state.data.chartAccounts);
        state.data.chartAccounts = migratedAccounts;
        persistCollection("chartAccounts");

        migrateDocumentTypes();
        migrateInvoices();
      }

      function migrateDocumentTypes() {
        if (!Array.isArray(state.data.documentTypes)) {
          state.data.documentTypes = [];
        }
        const defaultNames = ["Nota de serviço", "Nota de produto"];
        let changed = false;
        defaultNames.forEach((name) => {
          const exists = state.data.documentTypes.some((record) => record.name === name);
          if (!exists) {
            state.data.documentTypes.push({
              id: generateId(),
              code: generateCode("documentTypes"),
              name,
              isActive: true,
              createdAt: new Date().toISOString(),
              updatedAt: new Date().toISOString()
            });
            changed = true;
          }
        });
        if (changed) {
          persistCollection("documentTypes");
        }
      }

      function migrateInvoices() {
        if (!Array.isArray(state.data.invoices) || !state.data.invoices.length) {
          return;
        }
        let changed = false;
        state.data.invoices = state.data.invoices.map((invoice) => {
          if (invoice.kind && invoice.documentNumber !== undefined && invoice.costCenterId !== undefined) {
            return invoice;
          }
          changed = true;
          return {
            ...invoice,
            kind: invoice.kind || "invoice",
            documentNumber: invoice.documentNumber || "",
            costCenterId: invoice.costCenterId || ""
          };
        });
        if (changed) {
          persistCollection("invoices");
        }
      }

      function readCollection(storageKey) {
        try {
          const raw = localStorage.getItem(storageKey);
          if (!raw) {
            return [];
          }
          const parsed = JSON.parse(raw);
          return Array.isArray(parsed) ? parsed : [];
        } catch (error) {
          console.error("Falha ao ler localStorage:", error);
          return [];
        }
      }

      function persistCollection(collectionKey) {
        localStorage.setItem(STORAGE_KEYS[collectionKey], JSON.stringify(state.data[collectionKey]));
      }

      function persistAllCollections() {
        Object.keys(STORAGE_KEYS).forEach((key) => {
          persistCollection(key);
        });
      }

      function getDataSnapshot() {
        return {
          costCenters: [...state.data.costCenters],
          suppliers: [...state.data.suppliers],
          financialNatures: [...state.data.financialNatures],
          chartAccounts: [...state.data.chartAccounts],
          items: [...state.data.items],
          invoices: [...state.data.invoices],
          accountingEntries: [...state.data.accountingEntries],
          documentTypes: [...state.data.documentTypes],
          accountingEvents: [...state.data.accountingEvents],
          settlementEvents: [...state.data.settlementEvents],
          settlements: [...state.data.settlements]
        };
      }

      function getLastCloudModified() {
        return parseInt(localStorage.getItem(CLOUD_LAST_MODIFIED_STORAGE_KEY) || "0", 10);
      }

      function setLastCloudModified(value) {
        localStorage.setItem(CLOUD_LAST_MODIFIED_STORAGE_KEY, String(value || 0));
      }

      function saveCollection(collectionKey, records) {
        state.data[collectionKey] = records;
        persistCollection(collectionKey);
        CLOUD.schedulePush(getDataSnapshot());
      }

      // Aplica um snapshot remoto/local completo sem acionar o ciclo de autosave.
      function applyDataSnapshot(snapshot, options = {}) {
        Object.keys(STORAGE_KEYS).forEach((key) => {
          state.data[key] = Array.isArray(snapshot?.[key]) ? snapshot[key] : [];
        });
        migrateCollections();
        persistAllCollections();
        if (options.lastModified) {
          setLastCloudModified(options.lastModified);
        }
      }

      const CLOUD = {
        apiKey: null,
        binId: null,
        status: "offline",
        syncTimer: null,
        syncing: false,

        init() {
          try {
            const stored = localStorage.getItem(CLOUD_CONFIG_STORAGE_KEY);
            if (!stored) {
              state.ui.cloudDraft = createEmptyCloudDraft();
              return;
            }
            const config = JSON.parse(stored);
            this.apiKey = clean(config.apiKey);
            this.binId = clean(config.binId);
            state.ui.cloudDraft = createEmptyCloudDraft(config);
            this.status = this.isConfigured() ? "ok" : "offline";
          } catch (error) {
            console.error("Falha ao carregar configuração de nuvem:", error);
            state.ui.cloudDraft = createEmptyCloudDraft();
            this.status = "error";
          }
        },

        isConfigured() {
          return Boolean(this.apiKey && this.binId);
        },

        saveConfig(apiKey, binId) {
          this.apiKey = clean(apiKey);
          this.binId = clean(binId);
          localStorage.setItem(CLOUD_CONFIG_STORAGE_KEY, JSON.stringify({ apiKey: this.apiKey, binId: this.binId }));
          state.ui.cloudDraft = createEmptyCloudDraft({ apiKey: this.apiKey, binId: this.binId });
          this.status = this.isConfigured() ? "ok" : "offline";
        },

        clearConfig() {
          this.apiKey = null;
          this.binId = null;
          this.status = "offline";
          localStorage.removeItem(CLOUD_CONFIG_STORAGE_KEY);
          state.ui.cloudDraft = createEmptyCloudDraft();
        },

        async push(snapshot) {
          if (!this.isConfigured() || this.syncing) {
            return false;
          }
          this.syncing = true;
          this.status = "syncing";
          renderApp();
          try {
            const ts = Date.now();
            const payload = { ...snapshot, lastModified: ts };
            const response = await fetch(`https://api.jsonbin.io/v3/b/${this.binId}`, {
              method: "PUT",
              headers: {
                "Content-Type": "application/json",
                "X-Master-Key": this.apiKey,
                "X-Bin-Versioning": "false"
              },
              body: JSON.stringify(payload)
            });
            if (!response.ok) {
              throw new Error(`HTTP ${response.status}`);
            }
            setLastCloudModified(ts);
            this.status = "ok";
            renderApp();
            return true;
          } catch (error) {
            this.status = "error";
            console.error("Erro ao enviar dados para JSONBin:", error);
            renderApp();
            throw error;
          } finally {
            this.syncing = false;
          }
        },

        async pull() {
          if (!this.isConfigured()) {
            return null;
          }
          const response = await fetch(`https://api.jsonbin.io/v3/b/${this.binId}/latest`, {
            headers: {
              "X-Master-Key": this.apiKey
            }
          });
          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }
          const json = await response.json();
          return json.record || null;
        },

        async syncIfNewer(silent = false) {
          if (!this.isConfigured()) {
            this.status = "offline";
            renderApp();
            return false;
          }

          this.status = "syncing";
          renderApp();

          try {
            const remote = await this.pull();
            const hasKnownData = remote && Object.keys(STORAGE_KEYS).some((key) => Array.isArray(remote[key]));
            if (!hasKnownData) {
              this.status = "ok";
              renderApp();
              return false;
            }

            const localTs = getLastCloudModified();
            const remoteTs = parseInt(remote.lastModified || "0", 10);

            if (remoteTs > localTs) {
              applyDataSnapshot(remote, { lastModified: remoteTs });
              this.status = "ok";
              renderApp();
              if (!silent) {
                notify("success", "Sincronização", "Os dados mais novos da nuvem foram aplicados ao ERP.");
              }
              return true;
            }

            this.status = "ok";
            renderApp();
            if (!silent) {
              notify("success", "Sincronização", "A cópia local já está atualizada em relação à nuvem.");
            }
            return false;
          } catch (error) {
            this.status = "error";
            console.error("Erro ao sincronizar dados do JSONBin:", error);
            renderApp();
            if (!silent) {
              notify("error", "Sincronização", "Não foi possível verificar os dados na nuvem.");
            }
            return false;
          }
        },

        schedulePush(snapshot) {
          if (!this.isConfigured()) {
            return;
          }
          clearTimeout(this.syncTimer);
          this.syncTimer = window.setTimeout(() => {
            this.push(snapshot).catch(() => {});
          }, 1500);
        }
      };

      function bindGlobalEvents() {
        document.addEventListener("click", handleClick);
        document.addEventListener("submit", handleSubmit);
        document.addEventListener("input", handleInputOrChange);
        document.addEventListener("change", handleInputOrChange);
      }

            renderApp();
            break;

            if (!CLOUD.isConfigured()) {
              notify("error", "Sincronização", "Informe a Master Key e o Bin ID antes de sincronizar.");
              break;
            }
            CLOUD.push(getDataSnapshot())
              .then(() => notify("success", "Sincronização", "Dados enviados para a nuvem com sucesso."))
              .catch(() => notify("error", "Sincronização", "Falha ao enviar os dados para o JSONBin."));
            break;
          case "cloud-pull-now":
            if (!CLOUD.isConfigured()) {
              notify("error", "Sincronização", "Informe a Master Key e o Bin ID antes de buscar dados.");
              break;
            }
            CLOUD.syncIfNewer(false);
            break;
          case "delete-financial-nature":
            deleteFinancialNature(id);
            break;
          case "delete-item":
            deleteItem(id);
            break;
          case "delete-accounting-entry":

            break;

            break;

          case "remove-installment":
            removeInstallment(id);
            break;
          default:
            break;
        }

      function handleSubmit(event) {
        const form = event.target;
        if (!(form instanceof HTMLFormElement)) {
          return;
        }

        const formType = form.dataset.form;
        if (!formType) {
          return;
        }

        event.preventDefault();

        switch (formType) {
          case "cost-center":
            submitCostCenter(new FormData(form));
            break;
          case "supplier":
            submitSupplier(new FormData(form));
            break;
          case "chart-account":
            submitChartAccount(new FormData(form));
            break;
          case "financial-nature":
            submitFinancialNature(new FormData(form));
            break;
          case "item":
            submitItem(new FormData(form));
            break;
          case "accounting-entry":
            submitAccountingEntry(new FormData(form));
            break;
          case "trial-balance":
            submitTrialBalance(new FormData(form));
            break;
          case "invoice":
            submitInvoice(new FormData(form));
            break;
          case "invoice-line":
            submitInvoiceLine(new FormData(form));
            break;
          case "invoice-installment":
            submitInstallment(new FormData(form));
            break;
          case "document-type":
            submitDocumentType(new FormData(form));
            break;
          case "accounting-event":
            submitAccountingEvent(new FormData(form));
            break;
          case "settlement-event":
            submitSettlementEvent(new FormData(form));
            break;
          case "settlement":
            submitSettlement(new FormData(form));
            break;
          case "cloud-config":
            submitCloudConfig(new FormData(form));
            break;
          default:
            break;
        }
      }

      function handleInputOrChange(event) {
        const target = event.target;
        if (!(target instanceof HTMLElement)) {
          return;
        }

        const searchKey = target.dataset.search;
        if (searchKey) {
          state.ui.search[searchKey] = target.value || "";
          renderApp();
          return;
        }

        const form = target.closest("form");
        if (!(form instanceof HTMLFormElement)) {
          return;
        }

        const formType = form.dataset.form;
        const fieldName = target.name;
        if (!fieldName) {
          return;
        }

        if (formType === "invoice") {
          state.ui.invoiceDraft[fieldName] = target.value;
        }

        if (formType === "invoice-line") {
          state.ui.invoiceDraft.lineForm[fieldName] = target.value;
          if (fieldName === "itemId") {
            renderApp();
          }
        }

        if (formType === "invoice-installment") {
          state.ui.invoiceDraft.installmentForm[fieldName] = target.value;
        }

        if (formType === "item") {
          state.ui.itemFormDraft[fieldName] = target.value;
          if (fieldName === "financialNatureId") {
            state.ui.itemNaturePreviewId = target.value;
            renderApp();
          }
        }

        if (formType === "accounting-entry") {
          state.ui.accountingEntryDraft[fieldName] = target.value;
          if (fieldName === "costCenterId" || fieldName === "debitAccountId" || fieldName === "creditAccountId") {
            renderApp();
          }
        }

        if (formType === "accounting-entry-filters") {
          state.ui.accountingEntryFilters[fieldName] = target.value;
          renderApp();
        }

        if (formType === "trial-balance") {
          const nextValue = target instanceof HTMLInputElement && target.type === "checkbox" ? target.checked : target.value;
          state.ui.trialBalanceFilters[fieldName] = nextValue;
          state.ui.trialBalanceFilters.submitted = false;
          renderApp();
        }

        if (formType === "cloud-config") {
          state.ui.cloudDraft[fieldName] = target.value;
        }

        if (formType === "chart-account") {
          state.ui.chartAccountFormDraft[fieldName] = target.value;
          syncChartAccountPreview();
        }

        if (formType === "financial-nature") {

      function submitInvoice(formData) {
        const draft = state.ui.invoiceDraft;
        draft.type = clean(formData.get("type")) || draft.type || "Nota de serviço";
        draft.documentNumber = clean(formData.get("documentNumber"));
        draft.costCenterId = clean(formData.get("costCenterId"));
        draft.supplierId = clean(formData.get("supplierId"));
        draft.issueDate = clean(formData.get("issueDate"));
        draft.description = clean(formData.get("description"));

        const isLancamento = draft.kind === "lancamento";
        const noun = isLancamento ? "Lançamento" : "Nota fiscal";

        if (!isLancamento && (!draft.supplierId || !getSupplierById(draft.supplierId))) {
          notify("error", noun, "Selecione um fornecedor válido.");
          return;
        }

        if (draft.supplierId && !getSupplierById(draft.supplierId)) {
          notify("error", noun, "Fornecedor selecionado é inválido.");
          return;
        }

        if (!draft.issueDate) {
          notify("error", noun, "Informe a data de emissão.");
          return;
        }

        if (draft.costCenterId && !getCostCenterById(draft.costCenterId)) {
          notify("error", noun, "Selecione um centro de custo válido.");
          return;
        }

        if (draft.items.length === 0) {
          notify("error", noun, `Adicione pelo menos um item ${isLancamento ? "ao lançamento" : "à nota fiscal"}.`);
          return;
        }

        if (draft.installments.length === 0) {
          notify("error", noun, "Adicione pelo menos uma parcela financeira.");
          return;
        }

        const invalidLine = draft.items.find((line) => {
          const account = getChartAccountById(line.chartAccountId);
          return !account || !isChartAccountAvailableForLinks(account);
        });

        if (invalidLine) {
          notify("error", noun, "Existe item com conta contábil inativa, inválida ou não analítica.");
          return;
        }

        const totals = getInvoiceTotals(draft);
        if (Math.abs(totals.totalItemsAmount - totals.totalInstallmentsAmount) > 0.009) {
          notify("error", noun, "O total das parcelas precisa ser igual ao total dos itens para salvar o registro.");
          return;
        }

        const existing = state.data.invoices.find((invoice) => invoice.id === draft.id);
        const record = {
          id: existing?.id || generateId(),
          code: existing?.code || generateCode("invoices"),
          type: draft.type,
          kind: draft.kind || "invoice",
          documentNumber: draft.documentNumber,
          costCenterId: draft.costCenterId,
          supplierId: draft.supplierId,
          issueDate: draft.issueDate,
          description: draft.description,
          items: draft.items.map((item) => ({ ...item })),
          installments: draft.installments.map((installment) => ({ ...installment })),
          totalItemsAmount: totals.totalItemsAmount,
          totalInstallmentsAmount: totals.totalInstallmentsAmount,
          createdAt: existing?.createdAt || new Date().toISOString(),
          updatedAt: new Date().toISOString()
        };

        upsertRecord("invoices", record);
        syncAccountingEventEntries(record);
        state.ui.invoiceDraft = createEmptyInvoiceDraft();
        state.ui.invoiceModalOpen = false;
        state.ui.activeInvoiceTab = "dados";
        notify("success", noun, existing ? "Registro atualizado com sucesso." : `${noun} lançado(a) com sucesso.`);
        renderApp();
      }

      function syncAccountingEventEntries(invoice) {
        const prefix = `auto-event-${invoice.id}-`;
        const currentLineIds = new Set(invoice.items.map((line) => line.id));

        let entries = state.data.accountingEntries.filter((entry) => {
          if (!entry.id.startsWith(prefix)) {
            return true;
          }
          return currentLineIds.has(entry.id.slice(prefix.length));
        });

        const documentType = getDocumentTypeByName(invoice.type);
        const event = documentType ? getAccountingEventByDocumentTypeId(documentType.id) : null;

        if (event && invoice.costCenterId) {
          invoice.items.forEach((line) => {
            const id = prefix + line.id;
            const record = {
              id,
              code: id,
              entryDate: invoice.issueDate,
              description: `${documentType.name} ${invoice.documentNumber || invoice.code} - ${line.itemName}`,
              costCenterId: invoice.costCenterId,
              debitAccountId: line.chartAccountId,
              creditAccountId: event.creditAccountId,
              amount: line.totalPrice,
              origin: "accounting-event",
              sourceInvoiceId: invoice.id,
              createdAt: new Date().toISOString(),
              updatedAt: new Date().toISOString()
            };
            const idx = entries.findIndex((entry) => entry.id === id);
            if (idx >= 0) {
              entries[idx] = record;
            } else {
              entries.push(record);
            }
          });
        }

        saveCollection("accountingEntries", entries);
      }

      function removeInvoiceGeneratedEntries(invoiceId) {
        const eventPrefix = `auto-event-${invoiceId}-`;
        const remainingEntries = state.data.accountingEntries.filter((entry) => {
          if (entry.id.startsWith(eventPrefix)) {
            return false;
          }
          if (entry.origin === "settlement-event" && entry.sourceInvoiceId === invoiceId) {
            return false;
          }
          return true;
        });
        saveCollection("accountingEntries", remainingEntries);
        saveCollection("settlements", state.data.settlements.filter((record) => record.invoiceId !== invoiceId));
      }

      function generateSettlementAccountingEntry(settlement, invoice) {
        const id = `auto-settlement-${settlement.id}`;
        let entries = state.data.accountingEntries.filter((entry) => entry.id !== id);

        const documentType = getDocumentTypeByName(invoice.type);
        const event = documentType ? getSettlementEventByDocumentTypeId(documentType.id) : null;

        if (event && invoice.costCenterId) {
          const installment = invoice.installments.find((item) => item.id === settlement.installmentId);
          entries.push({
            id,
            code: id,
            entryDate: settlement.settlementDate,
            description: `Baixa - ${documentType.name} ${invoice.documentNumber || invoice.code}${installment ? ` - parcela ${installment.installmentNumber}` : ""}`,
            costCenterId: invoice.costCenterId,
            debitAccountId: event.debitAccountId,
            creditAccountId: settlement.payingAccountId,
            amount: settlement.amount,
            origin: "settlement-event",
            sourceInvoiceId: invoice.id,
            sourceSettlementId: settlement.id,
            createdAt: new Date().toISOString(),
            updatedAt: new Date().toISOString()
          });
          saveCollection("accountingEntries", entries);
          return true;
        }

        saveCollection("accountingEntries", entries);
        return false;
      }

      function submitSettlement(formData) {
        const target = state.ui.settlementTarget;
        if (!target) {
          notify("error", "Baixa", "Nenhuma parcela selecionada para baixa.");
          return;
        }

        const invoice = state.data.invoices.find((record) => record.id === target.invoiceId);
        const installment = invoice?.installments.find((item) => item.id === target.installmentId);

        if (!invoice || !installment) {
          notify("error", "Baixa", "Parcela não encontrada.");
          return;
        }

        const settlementDate = clean(formData.get("settlementDate"));
        const payingAccountId = clean(formData.get("payingAccountId"));
        const amount = Number(clean(formData.get("amount")) || 0);

        const payingAccount = getChartAccountById(payingAccountId);
        if (!payingAccount || !isChartAccountAvailableForLinks(payingAccount)) {
          notify("error", "Baixa", "Selecione uma conta analítica, ativa e válida para a baixa.");
          return;
        }

        if (!settlementDate) {
          notify("error", "Baixa", "Informe a data da baixa.");
          return;
        }

        const alreadySettled = getInstallmentSettledAmount(invoice.id, installment.id);
        const remaining = roundCurrency(installment.amount - alreadySettled);

        if (!amount || amount <= 0) {
          notify("error", "Baixa", "Informe um valor de baixa maior que zero.");
          return;
        }

        if (amount - remaining > 0.009) {
          notify("error", "Baixa", `O valor da baixa não pode ultrapassar o saldo em aberto de ${formatCurrency(remaining)}.`);
          return;
        }

        const settlement = {
          id: generateId(),
          code: generateCode("settlements"),
          invoiceId: invoice.id,
          installmentId: installment.id,
          settlementDate,
          payingAccountId,
          amount: roundCurrency(amount),
          createdAt: new Date().toISOString(),
          updatedAt: new Date().toISOString()
        };

        saveCollection("settlements", [settlement, ...state.data.settlements]);
        const generated = generateSettlementAccountingEntry(settlement, invoice);

        state.ui.settlementModalOpen = false;
        state.ui.settlementTarget = null;
        state.ui.settlementFormDraft = createEmptySettlementDraft();

        notify(
          "success",
          "Baixa",
          generated
            ? "Baixa registrada e lançamento contábil gerado com sucesso."
            : "Baixa registrada. Cadastre um evento de baixa para esse tipo de documento e informe o centro de custo para gerar o lançamento contábil automaticamente."
        );
        renderApp();
      }

      function upsertRecord(collectionKey, record) {
        const existingIndex = state.data[collectionKey].findIndex((item) => item.id === record.id);
        const nextCollection = [...state.data[collectionKey]];

        if (existingIndex >= 0) {
          nextCollection[existingIndex] = record;
        } else {
          nextCollection.unshift(record);
        }

        saveCollection(collectionKey, collectionKey === "chartAccounts" ? sortAccountsByCode(nextCollection) : nextCollection);
      }

      function generateCode(collectionKey) {
        const config = CODE_CONFIG[collectionKey];
        const max = state.data[collectionKey].reduce((highest, record) => {
          const number = extractNumericCode(record.code, config.prefix);
          return number > highest ? number : highest;
        }, 0);
        return config.prefix + String(max + 1).padStart(config.digits, "0");
      }

      function extractNumericCode(code, prefix) {
        if (!code || typeof code !== "string" || !code.startsWith(prefix)) {
          return 0;
        }
        const digits = Number(code.slice(prefix.length));
        return Number.isFinite(digits) ? digits : 0;
      }

        return "id-" + Date.now() + "-" + Math.random().toString(16).slice(2);
      }

      function getTrialBalanceEntries(filters) {
        return state.data.accountingEntries.filter((entry) => {
          const matchesDate = (!filters.startDate || entry.entryDate >= filters.startDate)
            && (!filters.endDate || entry.entryDate <= filters.endDate);

      function getTrialBalanceVisibleColumns(filters) {
        const columns = [];
        if (filters.showPreviousBalance) {
          columns.push({ key: "previousBalance", label: "Saldo anterior", formatter: formatSignedCurrency });
        }
        if (filters.showDebit) {
          columns.push({ key: "debit", label: "Débito", formatter: formatCurrency });
        }
        if (filters.showCredit) {
          columns.push({ key: "credit", label: "Crédito", formatter: formatCurrency });
        }
        if (filters.showMovement) {
          columns.push({ key: "movement", label: "Movimento", formatter: formatSignedCurrency });
        }
        if (filters.showBalance) {
          columns.push({ key: "balance", label: "Saldo", formatter: formatSignedCurrency });
        }
        return columns;
      }

      function getTrialBalanceReport(filters) {
        const beforeEntries = state.data.accountingEntries.filter((entry) => {
          const matchesDate = !filters.startDate || entry.entryDate < filters.startDate;
          const matchesCostCenter = filters.costCenterId === "all" || entry.costCenterId === filters.costCenterId;
          return matchesDate && matchesCostCenter;
        });
        const periodEntries = getTrialBalanceEntries(filters);
        const rowsByAccount = new Map();

        function ensureAccountRow(accountId) {
          if (!rowsByAccount.has(accountId)) {
            rowsByAccount.set(accountId, {
              previousBalance: 0,
              debit: 0,
              credit: 0,
              hasDirectMovement: false
            });
          }
          return rowsByAccount.get(accountId);
        }

        function applyToAccountAndAncestors(accountId, field, amount, markDirect = false) {
          let account = getChartAccountById(accountId);
          while (account) {
            const row = ensureAccountRow(account.id);
            row[field] = roundCurrency(row[field] + amount);
            if (markDirect && account.id === accountId) {
              row.hasDirectMovement = true;
            }
            account = account.parentCode ? getChartAccountByCode(account.parentCode) : null;
          }
        }

        beforeEntries.forEach((entry) => {
          const amount = roundCurrency(Number(entry.amount || 0));
          if (amount <= 0) {
            return;
          }
          applyToAccountAndAncestors(entry.debitAccountId, "previousBalance", amount, true);
          applyToAccountAndAncestors(entry.creditAccountId, "previousBalance", -amount, true);
        });

        periodEntries.forEach((entry) => {
          const amount = roundCurrency(Number(entry.amount || 0));
          if (amount <= 0) {
            return;
          }
          applyToAccountAndAncestors(entry.debitAccountId, "debit", amount, true);
          applyToAccountAndAncestors(entry.creditAccountId, "credit", amount, true);
        });

        const rows = sortAccountsByCode(
          Array.from(rowsByAccount.keys()).map((accountId) => {
            const account = getChartAccountById(accountId);
            if (!account) {
              return null;
            }
            const movement = rowsByAccount.get(accountId);
            const previousBalance = roundCurrency(movement.previousBalance);
            const debit = roundCurrency(movement.debit);
            const credit = roundCurrency(movement.credit);
            const netMovement = roundCurrency(debit - credit);
            const balance = roundCurrency(previousBalance + netMovement);
            const syntheticFromMovement = isSyntheticAccount(account) && (Math.abs(previousBalance) > 0.009 || Math.abs(debit) > 0.009 || Math.abs(credit) > 0.009);
            return {
              account,
              previousBalance,
              debit,
              credit,
              movement: netMovement,
              balance,
              code: account.code,
              normalizedCode: account.normalizedCode,
              level: account.level,
              name: account.name,
              includeInReport: movement.hasDirectMovement || syntheticFromMovement
            };
          }).filter((row) => row && row.includeInReport)
        );

        const analyticalRows = rows.filter((row) => isAnalyticalAccount(row.account));
        const totals = analyticalRows.reduce((acc, row) => ({
          previousBalance: roundCurrency(acc.previousBalance + row.previousBalance),
          debit: roundCurrency(acc.debit + row.debit),
          credit: roundCurrency(acc.credit + row.credit),
          movement: roundCurrency(acc.movement + row.movement),
          balance: roundCurrency(acc.balance + row.balance)
        }), {
          previousBalance: 0,
          debit: 0,
          credit: 0,
          movement: 0,
          balance: 0
        });

        return {
          rows,
          totals,
          entries: periodEntries
        };
      }

      function getItemById(id) {

        return state.data.items.find((record) => record.id === id) || null;
      }

      function getToday() {
        return new Date().toISOString().slice(0, 10);
      }

      function clean(value) {
        return String(value ?? "").trim();
      }

      // Normaliza o código para comparações e ordenação, removendo os separadores.
      function normalizeAccountCode(code) {
        return clean(code).replace(/\D/g, "");
      }

      // Aplica a máscara contábil em códigos válidos ou parcialmente válidos do plano.
      function formatAccountCode(code) {
        const normalized = normalizeAccountCode(code);
        const cleaned = clean(code).replace(/[^\d.]/g, "");
        const segmentsByLength = {
          1: [1],
          2: [1, 1],
          4: [1, 1, 2],
          6: [1, 1, 2, 2],
          9: [1, 1, 2, 2, 3]
        };
        const segmentLengths = segmentsByLength[normalized.length];

        if (!segmentLengths) {
          return cleaned;
        }

        let cursor = 0;
        return segmentLengths.map((size) => {
          const value = normalized.slice(cursor, cursor + size);
          cursor += size;
          return value;
        }).join(".");
      }

      function isValidChartAccountCode(code) {
        return CHART_ACCOUNT_CODE_PATTERNS.some((pattern) => pattern.regex.test(code));
      }

      function getAccountLevel(code) {
        const formattedCode = formatAccountCode(code);
        const pattern = CHART_ACCOUNT_CODE_PATTERNS.find((item) => item.regex.test(formattedCode));
        return pattern ? pattern.level : 0;
      }

      function getParentAccountCode(code) {
        const formattedCode = formatAccountCode(code);
        const level = getAccountLevel(formattedCode);
        if (level <= 1) {
          return "";
        }
        return formattedCode.split(".").slice(0, level - 1).join(".");
      }

      function getAccountGroup(code) {
        const digit = clean(code).charAt(0);
        return CHART_ACCOUNT_GROUP_LABELS[digit] || "Grupo não identificado";
      }

      function sortAccountsByCode(accounts) {
        return [...accounts].sort((left, right) => {
          const leftCode = (left.normalizedCode || normalizeAccountCode(left.code)).padEnd(9, "0");
          const rightCode = (right.normalizedCode || normalizeAccountCode(right.code)).padEnd(9, "0");
          return leftCode.localeCompare(rightCode) || (left.level || 0) - (right.level || 0) || left.name.localeCompare(right.name);
        });
      }

      function isAnalyticalAccount(account) {
        return account?.type === "Analítica";
      }

      function isSyntheticAccount(account) {
        return account?.type === "Sintética";
      }

      function getAccountChildren(account) {
        return state.data.chartAccounts.filter((record) => record.parentCode === account.code);
      }

      function accountHasChildren(account) {
        return getAccountChildren(account).length > 0;
      }

      function getChartAccountAncestors(account) {
        const ancestors = [];
        let current = account;
        while (current?.parentCode) {
          const parent = getChartAccountByCode(current.parentCode);
          if (!parent) {
            break;
          }
          ancestors.push(parent);
          current = parent;
        }
        return ancestors;
      }

      function getChartAccountTreeRows(searchTerm = "") {
        const records = sortAccountsByCode(state.data.chartAccounts);
        const grouped = new Map();
        records.forEach((record) => {
          const key = record.parentCode || "root";
          if (!grouped.has(key)) {
            grouped.set(key, []);
          }
          grouped.get(key).push(record);
        });

        const term = (searchTerm || "").toLowerCase().trim();
        const visibleIds = new Set();
        if (term) {
          records.forEach((record) => {
            const haystack = `${record.code} ${record.normalizedCode || ""} ${record.name} ${record.type} ${record.group} ${record.balanceNature} ${record.isActive ? "ativa" : "inativa"}`.toLowerCase();
            if (haystack.includes(term)) {
              visibleIds.add(record.id);
              getChartAccountAncestors(record).forEach((ancestor) => visibleIds.add(ancestor.id));
            }
          });
        }

        const rows = [];
        function walk(parentCode = "", depth = 0) {
          const children = grouped.get(parentCode || "root") || [];
          children.forEach((record) => {
            if (term && !visibleIds.has(record.id)) {
              return;
            }
            const hasChildren = Boolean((grouped.get(record.code) || []).length);
            rows.push({
              ...record,
              treeDepth: depth,
              treeHasChildren: hasChildren
            });
            if (term || !state.ui.chartAccountTreeCollapsed[record.id]) {
              walk(record.code, depth + 1);
            }
          });
        }

        walk();
        return rows;
      }

      function getChartAccountLinkSummary(account) {
        const linkedNatures = state.data.financialNatures.filter((nature) => nature.chartAccountId === account.id);
        const linkedItems = state.data.items.filter((item) => linkedNatures.some((nature) => nature.id === item.financialNatureId));
        const linkedInvoices = state.data.invoices.filter((invoice) => invoice.items.some((item) => item.chartAccountId === account.id));
        return {
          natures: linkedNatures,
          items: linkedItems,
          invoices: linkedInvoices
        };
      }

      function isChartAccountAvailableForLinks(account) {
        return Boolean(account && isAnalyticalAccount(account) && account.isActive !== false && !account.requiresCodeAdjustment);
      }

      function getSelectableChartAccounts() {
        return sortAccountsByCode(state.data.chartAccounts.filter((account) => isChartAccountAvailableForLinks(account)));
      }

      function getFinancialNatureLinkedAccount(nature) {
        if (!nature) {
          return null;
        }
        return getChartAccountById(nature.chartAccountId);
      }

      function isFinancialNatureAvailableForLinks(nature) {
        return isChartAccountAvailableForLinks(getFinancialNatureLinkedAccount(nature));
      }

      function getSelectableFinancialNatures() {
        return state.data.financialNatures.filter((nature) => isFinancialNatureAvailableForLinks(nature));

      function getSelectableItems() {

          return Boolean(nature && isFinancialNatureAvailableForLinks(nature));
        });
