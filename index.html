      function submitInvoice(formData) {
        const draft = state.ui.invoiceDraft;
        draft.type = clean(formData.get("type")) || draft.type || "Nota de serviço";
        draft.documentNumber = clean(formData.get("documentNumber"));
        draft.costCenterId = clean(formData.get("costCenterId"));
        draft.supplierId = clean(formData.get("supplierId"));
        draft.issueDate = clean(formData.get("issueDate"));
        draft.description = clean(formData.get("description"));

        const isLancamento = draft.kind === "lancamento";
        const noun = isLancamento ? "Lançamento" : "Nota fiscal";

        if (!isLancamento && (!draft.supplierId || !getSupplierById(draft.supplierId))) {
          notify("error", noun, "Selecione um fornecedor válido.");
          return;
        }

        if (draft.supplierId && !getSupplierById(draft.supplierId)) {
          notify("error", noun, "Fornecedor selecionado é inválido.");
          return;
        }

        if (!draft.issueDate) {
          notify("error", noun, "Informe a data de emissão.");
          return;
        }

        if (draft.costCenterId && !getCostCenterById(draft.costCenterId)) {
          notify("error", noun, "Selecione um centro de custo válido.");
          return;
        }

        if (draft.items.length === 0) {
          notify("error", noun, `Adicione pelo menos um item ${isLancamento ? "ao lançamento" : "à nota fiscal"}.`);
          return;
        }

        if (draft.installments.length === 0) {
          notify("error", noun, "Adicione pelo menos uma parcela financeira.");
          return;
        }

        const invalidLine = draft.items.find((line) => {
          const account = getChartAccountById(line.chartAccountId);
          return !account || !isChartAccountAvailableForLinks(account);
        });

        if (invalidLine) {
          notify("error", noun, "Existe item com conta contábil inativa, inválida ou não analítica.");
          return;
        }

        const totals = getInvoiceTotals(draft);
        if (Math.abs(totals.totalItemsAmount - totals.totalInstallmentsAmount) > 0.009) {
          notify("error", noun, "O total das parcelas precisa ser igual ao total dos itens para salvar o registro.");
          return;
        }

        const existing = state.data.invoices.find((invoice) => invoice.id === draft.id);
        const record = {
          id: existing?.id || generateId(),
          code: existing?.code || generateCode("invoices"),
          type: draft.type,
          kind: draft.kind || "invoice",
          documentNumber: draft.documentNumber,
          costCenterId: draft.costCenterId,
          supplierId: draft.supplierId,
          issueDate: draft.issueDate,
          description: draft.description,
          items: draft.items.map((item) => ({ ...item })),
          installments: draft.installments.map((installment) => ({ ...installment })),

          totalPrice: roundCurrency(quantity * unitPrice),

      function syncAccountingEventEntries(invoice) {
        const prefix = `auto-event-${invoice.id}-`;
        const currentLineIds = new Set(invoice.items.map((line) => line.id));

        let entries = state.data.accountingEntries.filter((entry) => {
          if (!entry.id.startsWith(prefix)) {
            return true;
          }
          return currentLineIds.has(entry.id.slice(prefix.length));
        });

        const documentType = getDocumentTypeByName(invoice.type);
        const event = documentType ? getAccountingEventByDocumentTypeId(documentType.id) : null;

        if (event && invoice.costCenterId) {
          invoice.items.forEach((line) => {
            const id = prefix + line.id;
            const record = {
              id,
              code: id,
              entryDate: invoice.issueDate,
              description: `${documentType.name} ${invoice.documentNumber || invoice.code} - ${line.itemName}`,
              costCenterId: invoice.costCenterId,
              debitAccountId: line.chartAccountId,
              creditAccountId: event.creditAccountId,
              amount: line.totalPrice,
              origin: "accounting-event",
              sourceInvoiceId: invoice.id,
              createdAt: new Date().toISOString(),
              updatedAt: new Date().toISOString()
            };
            const idx = entries.findIndex((entry) => entry.id === id);
            if (idx >= 0) {
              entries[idx] = record;
            } else {
              entries.push(record);
            }
          });
        }

        saveCollection("accountingEntries", entries);
      }

      function removeInvoiceGeneratedEntries(invoiceId) {
        const eventPrefix = `auto-event-${invoiceId}-`;
        const remainingEntries = state.data.accountingEntries.filter((entry) => {
          if (entry.id.startsWith(eventPrefix)) {
            return false;
          }
          if (entry.origin === "settlement-event" && entry.sourceInvoiceId === invoiceId) {
            return false;
          }
          return true;
        });
        saveCollection("accountingEntries", remainingEntries);
        saveCollection("settlements", state.data.settlements.filter((record) => record.invoiceId !== invoiceId));
      }

      function generateSettlementAccountingEntry(settlement, invoice) {
        const id = `auto-settlement-${settlement.id}`;
        let entries = state.data.accountingEntries.filter((entry) => entry.id !== id);

        const documentType = getDocumentTypeByName(invoice.type);
        const event = documentType ? getSettlementEventByDocumentTypeId(documentType.id) : null;

        if (event && invoice.costCenterId) {
          const installment = invoice.installments.find((item) => item.id === settlement.installmentId);
          entries.push({
            id,
            code: id,
            entryDate: settlement.settlementDate,
            description: `Baixa - ${documentType.name} ${invoice.documentNumber || invoice.code}${installment ? ` - parcela ${installment.installmentNumber}` : ""}`,
            costCenterId: invoice.costCenterId,
            debitAccountId: event.debitAccountId,
            creditAccountId: settlement.payingAccountId,
            amount: settlement.amount,
            origin: "settlement-event",
            sourceInvoiceId: invoice.id,
            sourceSettlementId: settlement.id,
            createdAt: new Date().toISOString(),
            updatedAt: new Date().toISOString()
          });
          saveCollection("accountingEntries", entries);
          return true;
        }

        saveCollection("accountingEntries", entries);
        return false;
      }

      function getPayrollTitlePayableAccountId(payrollTitle) {
        if (!payrollTitle) return "";
        if (payrollTitle.payableAccountId) return payrollTitle.payableAccountId;

        if (payrollTitle.eventId) {
          const runItem = state.data.payrollRunItems.find((item) => item.runId === payrollTitle.runId && item.eventId === payrollTitle.eventId && item.employeeId === payrollTitle.employeeId);
          const mapping = runItem ? getPayrollMappingForItem(runItem) : null;
          if (mapping?.creditAccountId) return mapping.creditAccountId;
          const event = getPayrollEventById(payrollTitle.eventId);
          if (event?.creditAccountId) return event.creditAccountId;
        }

        const params = getActivePayrollParameters(payrollTitle.competence);
        if ((payrollTitle.description || "").toLowerCase().includes("salário líquido")) {
          return params?.salaryPayableAccountId || "";
        }
        return params?.chargesPayableAccountId || params?.salaryPayableAccountId || "";
      }

      function generatePayrollSettlementAccountingEntry(settlement, payrollTitle) {
        const id = `auto-payroll-payable-${settlement.id}`;
        let entries = state.data.accountingEntries.filter((entry) => entry.id !== id);
        const payableAccountId = getPayrollTitlePayableAccountId(payrollTitle);
        const payableAccount = getChartAccountById(payableAccountId);
        const payingAccount = getChartAccountById(settlement.payingAccountId);
        const run = getPayrollRunById(payrollTitle.runId);
        const employee = getPayrollEmployeeById(payrollTitle.employeeId);
        const costCenterId = payrollTitle.costCenterId || employee?.costCenterId || "";

        if (payableAccount && isChartAccountAvailableForLinks(payableAccount) && payingAccount && isChartAccountAvailableForLinks(payingAccount)) {
          entries.push({
            id,
            code: id,
            entryDate: settlement.settlementDate,
            description: `Baixa - ${payrollTitle.description || "Título financeiro da folha"}`,
            costCenterId,
            debitAccountId: payableAccountId,
            creditAccountId: settlement.payingAccountId,
            amount: settlement.amount,
            origin: "settlement-event",
            batchName: "Lançamentos a Pagar",
            sourcePayrollRunId: payrollTitle.runId,
            sourcePayrollRunCode: run?.code || payrollTitle.competence || "Folha",
            sourcePayrollTitleId: payrollTitle.id,
            sourcePayrollTitleCode: payrollTitle.code,
            sourceSettlementId: settlement.id,
            competence: payrollTitle.competence,
            createdAt: new Date().toISOString(),
            updatedAt: new Date().toISOString()
          });
          saveCollection("accountingEntries", entries);
          return true;
        }

        saveCollection("accountingEntries", entries);
        return false;
      }

      function submitSettlement(formData) {
        const target = state.ui.settlementTarget;
        if (!target) {
          notify("error", "Baixa", "Nenhuma parcela selecionada para baixa.");
          return;
        }

        const settlementDate = clean(formData.get("settlementDate"));
        const payingAccountId = clean(formData.get("payingAccountId"));
        const amount = Number(clean(formData.get("amount")) || 0);

        const payingAccount = getChartAccountById(payingAccountId);
        if (!payingAccount || !isChartAccountAvailableForLinks(payingAccount)) {
          notify("error", "Baixa", "Selecione uma conta analítica, ativa e válida para a baixa.");
          return;
        }

        if (!settlementDate) {
          notify("error", "Baixa", "Informe a data da baixa.");
          return;
        }

        if (!amount || amount <= 0) {
          notify("error", "Baixa", "Informe um valor de baixa maior que zero.");
          return;
        }

        if (target.type === "payroll") {
          const payrollTitle = state.data.payrollFinancialEntries.find((record) => record.id === target.payrollTitleId);
          if (!payrollTitle) {
            notify("error", "Baixa", "Título financeiro da folha não encontrado.");
            return;
          }

          const alreadySettled = getPayrollTitleSettledAmount(payrollTitle.id);
          const remaining = roundCurrency(toDecimal(payrollTitle.amount) - alreadySettled);
          if (amount - remaining > 0.009) {
            notify("error", "Baixa", `O valor da baixa não pode ultrapassar o saldo em aberto de ${formatCurrency(remaining)}.`);
            return;
          }

          const settlement = {
            id: generateId(),
            code: generateCode("settlements"),
            payrollFinancialEntryId: payrollTitle.id,
            settlementDate,
            payingAccountId,
            amount: roundCurrency(amount),
            createdAt: new Date().toISOString(),
            updatedAt: new Date().toISOString()
          };

          const nextSettlements = [settlement, ...state.data.settlements];
          saveCollection("settlements", nextSettlements);
          const generated = generatePayrollSettlementAccountingEntry(settlement, payrollTitle);

          const newSettled = roundCurrency(alreadySettled + amount);
          const nextStatus = roundCurrency(toDecimal(payrollTitle.amount) - newSettled) <= 0.009 ? "Quitada" : "Parcial";
          upsertRecord("payrollFinancialEntries", {
            ...payrollTitle,
            payableAccountId: payrollTitle.payableAccountId || getPayrollTitlePayableAccountId(payrollTitle),
            status: nextStatus,
            paidAmount: newSettled,
            remainingAmount: Math.max(0, roundCurrency(toDecimal(payrollTitle.amount) - newSettled)),
            lastSettlementDate: settlementDate,
            payingAccountId,
            updatedAt: payrollNow()
          });

          state.ui.settlementModalOpen = false;
          state.ui.settlementTarget = null;
          state.ui.settlementFormDraft = createEmptySettlementDraft();

          notify(
            "success",
            "Baixa",
            generated
              ? "Título financeiro da folha baixado e lançamento enviado para Contábil > Lançamentos a Pagar."
              : "Título financeiro da folha baixado. Configure a conta a pagar da folha para gerar o lançamento em Contábil > Lançamentos a Pagar."
          );
          renderApp();
          return;
        }

        const invoice = state.data.invoices.find((record) => record.id === target.invoiceId);
        const installment = invoice?.installments.find((item) => item.id === target.installmentId);

        if (!invoice || !installment) {
          notify("error", "Baixa", "Parcela não encontrada.");
          return;
        }

        const alreadySettled = getInstallmentSettledAmount(invoice.id, installment.id);
        const remaining = roundCurrency(installment.amount - alreadySettled);

        if (amount - remaining > 0.009) {
          notify("error", "Baixa", `O valor da baixa não pode ultrapassar o saldo em aberto de ${formatCurrency(remaining)}.`);
          return;
        }

        const settlement = {
          id: generateId(),
          code: generateCode("settlements"),
          invoiceId: invoice.id,
          installmentId: installment.id,
          settlementDate,
          payingAccountId,
          amount: roundCurrency(amount),
          createdAt: new Date().toISOString(),
          updatedAt: new Date().toISOString()
        };

        saveCollection("settlements", [settlement, ...state.data.settlements]);
        const generated = generateSettlementAccountingEntry(settlement, invoice);

        state.ui.settlementModalOpen = false;
        state.ui.settlementTarget = null;
        state.ui.settlementFormDraft = createEmptySettlementDraft();

        notify(
          "success",
          "Baixa",
          generated
            ? "Baixa registrada e lançamento contábil gerado com sucesso."
            : "Baixa registrada. Cadastre um evento de baixa para esse tipo de documento e informe o centro de custo para gerar o lançamento contábil automaticamente."
        );
        renderApp();
      }

      function undoInvoiceSettlement(invoiceId, installmentId) {
        const invoice = state.data.invoices.find((record) => record.id === invoiceId);
        const installment = invoice?.installments.find((item) => item.id === installmentId);
        if (!invoice || !installment) {
          notify("error", "Desfazer baixa", "Parcela não encontrada.");

          return;
        }

        removeAccountingEntriesBySettlementId(settlement.id);
        notify("success", "Desfazer baixa", `Baixa da parcela ${installment.installmentNumber} desfeita com sucesso.`);
        renderApp();
      }

      function undoPayrollSettlement(payrollTitleId) {
        const payrollTitle = state.data.payrollFinancialEntries.find((record) => record.id === payrollTitleId);

          notify("error", "Desfazer baixa", "Título financeiro da folha não encontrado.");

          .sort((a, b) => String(b.createdAt || "").localeCompare(String(a.createdAt || "")))[0];

      function getFilteredAccountingEntries() {
        const filters = state.ui.accountingEntryFilters;
        return state.data.accountingEntries.filter((record) => {
          const matchesStartDate = !filters.startDate || record.entryDate >= filters.startDate;
          const matchesEndDate = !filters.endDate || record.entryDate <= filters.endDate;
          const matchesAmount = !filters.amount || roundCurrency(record.amount) === roundCurrency(filters.amount);
          const matchesDescription = !filters.description || (record.description || "").toLowerCase().includes(filters.description.toLowerCase().trim());
          return matchesStartDate && matchesEndDate && matchesAmount && matchesDescription;
        });
      }

      function getTrialBalanceEntries(filters) {
        return state.data.accountingEntries.filter((entry) => {
          const matchesDate = (!filters.startDate || entry.entryDate >= filters.startDate)
            && (!filters.endDate || entry.entryDate <= filters.endDate);
          const matchesCostCenter = filters.costCenterId === "all" || entry.costCenterId === filters.costCenterId;
          return matchesDate && matchesCostCenter;
        });
      }

      function getTrialBalanceVisibleColumns(filters) {
        const columns = [];
        if (filters.showPreviousBalance) {
          columns.push({ key: "previousBalance", label: "Saldo anterior", formatter: formatSignedCurrency });
        }
        if (filters.showDebit) {
          columns.push({ key: "debit", label: "Débito", formatter: formatCurrency });
        }
        if (filters.showCredit) {
          columns.push({ key: "credit", label: "Crédito", formatter: formatCurrency });
        }
        if (filters.showMovement) {
          columns.push({ key: "movement", label: "Movimento", formatter: formatSignedCurrency });
        }
        if (filters.showBalance) {
          columns.push({ key: "balance", label: "Saldo", formatter: formatSignedCurrency });
        }
        return columns;
      }

      function getTrialBalanceReport(filters) {
        const beforeEntries = state.data.accountingEntries.filter((entry) => {
          const matchesDate = !filters.startDate || entry.entryDate < filters.startDate;
          const matchesCostCenter = filters.costCenterId === "all" || entry.costCenterId === filters.costCenterId;
          return matchesDate && matchesCostCenter;
        });
        const periodEntries = getTrialBalanceEntries(filters);
        const rowsByAccount = new Map();

        function ensureAccountRow(accountId) {
          if (!rowsByAccount.has(accountId)) {
            rowsByAccount.set(accountId, {
              previousBalance: 0,
              debit: 0,
              credit: 0,
              hasDirectMovement: false
            });
          }
          return rowsByAccount.get(accountId);
        }

        function applyToAccountAndAncestors(accountId, field, amount, markDirect = false) {
          let account = getChartAccountById(accountId);
          while (account) {
            const row = ensureAccountRow(account.id);
            row[field] = roundCurrency(row[field] + amount);
            if (markDirect && account.id === accountId) {
              row.hasDirectMovement = true;
            }
            account = account.parentCode ? getChartAccountByCode(account.parentCode) : null;
          }
        }

        beforeEntries.forEach((entry) => {
          const amount = roundCurrency(Number(entry.amount || 0));
          if (amount <= 0) {
            return;
          }
          applyToAccountAndAncestors(entry.debitAccountId, "previousBalance", amount, true);
          applyToAccountAndAncestors(entry.creditAccountId, "previousBalance", -amount, true);
        });

        periodEntries.forEach((entry) => {
          const amount = roundCurrency(Number(entry.amount || 0));
          if (amount <= 0) {
            return;
          }
          applyToAccountAndAncestors(entry.debitAccountId, "debit", amount, true);
          applyToAccountAndAncestors(entry.creditAccountId, "credit", amount, true);
        });

        const rows = sortAccountsByCode(
          Array.from(rowsByAccount.keys()).map((accountId) => {
            const account = getChartAccountById(accountId);
            if (!account) {
              return null;
            }
            const movement = rowsByAccount.get(accountId);
            const previousBalance = roundCurrency(movement.previousBalance);
            const debit = roundCurrency(movement.debit);
            const credit = roundCurrency(movement.credit);
            const netMovement = roundCurrency(debit - credit);
            const balance = roundCurrency(previousBalance + netMovement);
            const syntheticFromMovement = isSyntheticAccount(account) && (Math.abs(previousBalance) > 0.009 || Math.abs(debit) > 0.009 || Math.abs(credit) > 0.009);
            return {
              account,
              previousBalance,
              debit,
              credit,
              movement: netMovement,
              balance,
              code: account.code,
              normalizedCode: account.normalizedCode,
              level: account.level,
              name: account.name,
              includeInReport: movement.hasDirectMovement || syntheticFromMovement
            };
          }).filter((row) => row && row.includeInReport)
        );

        const analyticalRows = rows.filter((row) => isAnalyticalAccount(row.account));
        const totals = analyticalRows.reduce((acc, row) => ({
          previousBalance: roundCurrency(acc.previousBalance + row.previousBalance),
          debit: roundCurrency(acc.debit + row.debit),
          credit: roundCurrency(acc.credit + row.credit),
          movement: roundCurrency(acc.movement + row.movement),
          balance: roundCurrency(acc.balance + row.balance)
        }), {
          previousBalance: 0,
          debit: 0,
          credit: 0,
          movement: 0,
          balance: 0
        });

        return {
          rows,
          totals,
          entries: periodEntries
        };
      }

      function generateCode(collectionKey) {
        const config = CODE_CONFIG[collectionKey];
        if (!config) {
          return String(collectionKey || "REG").slice(0, 3).toUpperCase() + "-" + Date.now();
        }
        const collection = Array.isArray(state.data[collectionKey]) ? state.data[collectionKey] : [];
        const max = collection.reduce((highest, record) => {
          const number = extractNumericCode(record.code, config.prefix);
          return number > highest ? number : highest;
        }, 0);
        return config.prefix + String(max + 1).padStart(config.digits, "0");
      }

      function extractNumericCode(code, prefix) {
        if (!code || typeof code !== "string" || !code.startsWith(prefix)) {
          return 0;
        }
        const digits = Number(code.slice(prefix.length));
        return Number.isFinite(digits) ? digits : 0;
      }

      function generateId() {
        if (window.crypto && typeof window.crypto.randomUUID === "function") {
          return window.crypto.randomUUID();
        }
        return "id-" + Date.now() + "-" + Math.random().toString(16).slice(2);
      }

      function getChartAccountById(id) {
        return state.data.chartAccounts.find((record) => record.id === id) || null;
      }

      function getChartAccountByCode(code) {
        const formattedCode = formatAccountCode(code);
        return state.data.chartAccounts.find((record) => record.code === formattedCode) || null;
      }

      function getFinancialNatureById(id) {

      }

      function getSupplierById(id) {

      }

      function getDocumentTypeById(id) {

      function getToday() {
        return new Date().toISOString().slice(0, 10);
      }

      function clean(value) {
        return String(value ?? "").trim();
      }

      // Normaliza o código para comparações e ordenação, removendo os separadores.
      function normalizeAccountCode(code) {
        return clean(code).replace(/\D/g, "");
      }

      // Aplica a máscara contábil em códigos válidos ou parcialmente válidos do plano.
      function formatAccountCode(code) {
        const normalized = normalizeAccountCode(code);
        const cleaned = clean(code).replace(/[^\d.]/g, "");
        const segmentsByLength = {
          1: [1],
          2: [1, 1],
          4: [1, 1, 2],
          6: [1, 1, 2, 2],
          9: [1, 1, 2, 2, 3]
        };
        const segmentLengths = segmentsByLength[normalized.length];

        if (!segmentLengths) {
          return cleaned;
        }

        let cursor = 0;
        return segmentLengths.map((size) => {
          const value = normalized.slice(cursor, cursor + size);
          cursor += size;
          return value;
        }).join(".");
      }

      function isValidChartAccountCode(code) {
        return CHART_ACCOUNT_CODE_PATTERNS.some((pattern) => pattern.regex.test(code));
      }

      function getAccountLevel(code) {
        const formattedCode = formatAccountCode(code);
        const pattern = CHART_ACCOUNT_CODE_PATTERNS.find((item) => item.regex.test(formattedCode));
        return pattern ? pattern.level : 0;
      }

      function getParentAccountCode(code) {
        const formattedCode = formatAccountCode(code);
        const level = getAccountLevel(formattedCode);
        if (level <= 1) {
          return "";
        }
        return formattedCode.split(".").slice(0, level - 1).join(".");
      }

      function getChildSegmentLength(level) {
        const map = {
          2: 1,
          3: 2,
          4: 2,
          5: 3
        };
        return map[level] || 0;
      }

      function getNextChildChartAccountCode(parentAccount) {
        if (!parentAccount || !isSyntheticAccount(parentAccount)) {
          return "";
        }

        const childLevel = getAccountLevel(parentAccount.code) + 1;
        const segmentLength = getChildSegmentLength(childLevel);
        if (!segmentLength) {
          return "";
        }

        const children = state.data.chartAccounts.filter((account) => account.parentCode === parentAccount.code);
        const maxSegment = children.reduce((highest, child) => {
          const segment = formatAccountCode(child.code).split(".")[childLevel - 1] || "";
          const numeric = Number(segment);
          return Number.isFinite(numeric) && numeric > highest ? numeric : highest;
        }, 0);

        const nextNumeric = maxSegment + 1;
        const nextSegment = String(nextNumeric).padStart(segmentLength, "0");
        if (nextSegment.length > segmentLength) {
          return "";
        }

        return `${parentAccount.code}.${nextSegment}`;
      }

      function openChartAccountChildModal(parentAccount) {
        const suggestedCode = getNextChildChartAccountCode(parentAccount);
        if (!suggestedCode) {
          notify("error", "Plano de contas", "Esse grupo já atingiu o limite de códigos filhos disponíveis dentro da máscara atual.");
          return;
        }

        state.ui.chartAccountChildParentId = parentAccount.id;
        state.ui.chartAccountChildDraft = createChildChartAccountDraft(parentAccount, suggestedCode);
        state.ui.chartAccountChildModalOpen = true;
        renderApp();
      }

      function getNextChildFinancialNatureCode(parentNature) {
        if (!parentNature || parentNature.type !== "Sintética") {
          return "";
        }

        const parentCode = clean(parentNature.code);
        const childLevel = parentCode.split(".").length + 1;
        const segmentLength = childLevel === 2 ? 2 : 3;
        const directChildren = state.data.financialNatures.filter((nature) => {
          const natureCode = clean(nature.code);
          const natureParentCode = clean(nature.parentCode)
            || (natureCode.includes(".") ? natureCode.split(".").slice(0, -1).join(".") : "");
          return natureParentCode === parentCode;
        });
        const maxSegment = directChildren.reduce((highest, child) => {
          const segment = clean(child.code).split(".").pop() || "";
          const numeric = Number(segment);
          return Number.isFinite(numeric) && numeric > highest ? numeric : highest;
        }, 0);
        const nextSegment = String(maxSegment + 1).padStart(segmentLength, "0");
        if (nextSegment.length > segmentLength) {
          return "";
        }
        return `${parentCode}.${nextSegment}`;
      }

      function openFinancialNatureChildModal(parentNature) {
        const suggestedCode = getNextChildFinancialNatureCode(parentNature);
        if (!suggestedCode) {
          notify("error", "Plano de naturezas", "Essa natureza sintética já atingiu o limite de códigos filhos disponíveis.");
          return;
        }

        state.ui.editing.financialNatureId = null;
        state.ui.financialNatureFormDraft = createEmptyFinancialNatureDraft();
        state.ui.financialNatureFormDraft.code = suggestedCode;
        state.ui.financialNatureFormDraft.type = "Analítica";
        state.ui.financialNatureFormDraft.status = "Ativa";
        state.ui.financialNatureModalOpen = true;
        renderApp();
      }

      function closeChartAccountChildModal(shouldRender = true) {
        state.ui.chartAccountChildModalOpen = false;
        state.ui.chartAccountChildParentId = "";
        state.ui.chartAccountChildDraft = createEmptyChartAccountDraft();
        if (shouldRender) {
          renderApp();
        }
      }

      function getAccountGroup(code) {
        const digit = clean(code).charAt(0);
        return CHART_ACCOUNT_GROUP_LABELS[digit] || "Grupo não identificado";
      }

      function sortAccountsByCode(accounts) {
        return [...accounts].sort((left, right) => {
          const leftCode = (left.normalizedCode || normalizeAccountCode(left.code)).padEnd(9, "0");
          const rightCode = (right.normalizedCode || normalizeAccountCode(right.code)).padEnd(9, "0");
          return leftCode.localeCompare(rightCode) || (left.level || 0) - (right.level || 0) || left.name.localeCompare(right.name);
        });
      }

      function isAnalyticalAccount(account) {
        return account?.type === "Analítica";
      }

      function isSyntheticAccount(account) {
        return account?.type === "Sintética";
      }

      function getAccountChildren(account) {
        return state.data.chartAccounts.filter((record) => record.parentCode === account.code);
      }

      function accountHasChildren(account) {
        return getAccountChildren(account).length > 0;
      }

      function getChartAccountAncestors(account) {
        const ancestors = [];
        let current = account;
        while (current?.parentCode) {
          const parent = getChartAccountByCode(current.parentCode);
          if (!parent) {
            break;
          }
          ancestors.push(parent);
          current = parent;
        }
        return ancestors;
      }

      function getChartAccountTreeRows(searchTerm = "") {
        const records = sortAccountsByCode(state.data.chartAccounts);
        const grouped = new Map();
        records.forEach((record) => {
          const key = record.parentCode || "root";
          if (!grouped.has(key)) {
            grouped.set(key, []);
          }
          grouped.get(key).push(record);
        });

        const term = (searchTerm || "").toLowerCase().trim();
        const visibleIds = new Set();
        if (term) {
          records.forEach((record) => {
            const haystack = `${record.code} ${record.normalizedCode || ""} ${record.name} ${record.type} ${record.group} ${record.balanceNature} ${record.isActive ? "ativa" : "inativa"}`.toLowerCase();
            if (haystack.includes(term)) {
              visibleIds.add(record.id);
              getChartAccountAncestors(record).forEach((ancestor) => visibleIds.add(ancestor.id));
            }
          });
        }

        const rows = [];
        function walk(parentCode = "", depth = 0) {
          const children = grouped.get(parentCode || "root") || [];
          children.forEach((record) => {
            if (term && !visibleIds.has(record.id)) {
              return;
            }
            const hasChildren = Boolean((grouped.get(record.code) || []).length);
            rows.push({
              ...record,
              treeDepth: depth,
              treeHasChildren: hasChildren
            });
            if (term || !state.ui.chartAccountTreeCollapsed[record.id]) {
              walk(record.code, depth + 1);
            }
          });
        }

        walk();
        return rows;
      }

      function getChartAccountLinkSummary(account) {
        const linkedNatures = state.data.financialNatures.filter((nature) => (nature.accountMappings || []).some((mapping) => mapping.debitAccountId === account.id || mapping.creditAccountId === account.id || mapping.chartAccountId === account.id));
        const linkedItems = state.data.items.filter((item) => linkedNatures.some((nature) => nature.id === item.financialNatureId));
        const linkedInvoices = state.data.invoices.filter((invoice) => invoice.items.some((item) => item.chartAccountId === account.id));
        return {
          natures: linkedNatures,
          items: linkedItems,
          invoices: linkedInvoices
        };
      }

      function isChartAccountAvailableForLinks(account) {
        return Boolean(account && isAnalyticalAccount(account) && account.isActive !== false && !account.requiresCodeAdjustment);
      }

      function getSelectableChartAccounts() {
        return sortAccountsByCode(state.data.chartAccounts.filter((account) => isChartAccountAvailableForLinks(account)));
      }

      // Retorna a contabilização padrão (sem centro de custo) da natureza, se existir.
      function getFinancialNatureDefaultAccount(nature) {
        if (!nature) {
          return null;
        }
        const mappings = Array.isArray(nature.accountMappings) ? nature.accountMappings : [];
        const fallback = mappings.find((mapping) => !mapping.costCenterId);
        return fallback ? getChartAccountById(fallback.debitAccountId || fallback.chartAccountId) : null;
      }

      // Resolve a conta contábil de débito de uma natureza financeira para um centro de custo específico:
      // usa a contabilização exata daquele centro de custo e, se não existir, cai para a contabilização padrão.
      function getFinancialNatureAccountForCostCenter(nature, costCenterId) {
        if (!nature) {
          return null;
        }
        const mappings = Array.isArray(nature.accountMappings) ? nature.accountMappings : [];
        const exact = costCenterId ? mappings.find((mapping) => mapping.costCenterId === costCenterId) : null;
        if (exact) {
          return getChartAccountById(exact.debitAccountId || exact.chartAccountId);
        }
        return getFinancialNatureDefaultAccount(nature);
      }

      function isFinancialNatureAvailableForLinks(nature) {
        return Boolean(nature && nature.type !== "Sintética" && nature.isActive !== false);
      }

      function getSelectableFinancialNatures() {
        return state.data.financialNatures
          .filter((nature) => isFinancialNatureAvailableForLinks(nature))
          .sort((a, b) => String(a.code || "").localeCompare(String(b.code || ""), "pt-BR", { numeric: true }));
      }

      function getSelectableItems() {
        return state.data.items.filter((item) => {
          const nature = getFinancialNatureById(item.financialNatureId);
          return Boolean(nature && isFinancialNatureAvailableForLinks(nature));
        });
      }

      // Valida a estrutura mínima do plano de contas para preservar hierarquia e vínculos contábeis.
      function validateChartAccount(record) {
        const errors = [];
        const code = formatAccountCode(record.code);
        const normalizedCode = normalizeAccountCode(code);
        const level = getAccountLevel(code);
        const group = getAccountGroup(code);
        const parentCode = getParentAccountCode(code);
        const duplicate = state.data.chartAccounts.find((account) => account.id !== record.id && account.normalizedCode === normalizedCode);
        const parentAccount = parentCode ? getChartAccountByCode(parentCode) : null;
        const currentRecord = record.id ? getChartAccountById(record.id) : null;
        const siblingChildren = state.data.chartAccounts.filter((account) => account.id !== record.id && account.parentCode === code);

        if (!isValidChartAccountCode(code)) {
          errors.push("O código da conta deve seguir a máscara 9.9.99.99.999, usando apenas números e pontos.");
        }

        if (!CHART_ACCOUNT_GROUP_LABELS[code.charAt(0)]) {
          errors.push("O primeiro dígito do código deve identificar um grupo contábil válido entre 1 e 7.");
        }

        if (duplicate) {
          errors.push("Já existe uma conta contábil com esse código normalizado.");
        }

        if (level > 1 && !parentAccount) {
          errors.push("Toda conta abaixo do nível 1 precisa possuir uma conta pai existente.");
        }

        if (parentAccount && isAnalyticalAccount(parentAccount)) {
          errors.push("Não é permitido cadastrar conta filha abaixo de uma conta analítica.");
        }

        if (!["Sintética", "Analítica"].includes(record.type)) {
          errors.push("Selecione um tipo de conta válido.");
        }

        if (!["Devedora", "Credora"].includes(record.balanceNature)) {
          errors.push("Selecione uma natureza do saldo válida.");
        }

        if (record.type === "Analítica" && siblingChildren.length > 0) {
          errors.push("Contas analíticas não podem possuir contas filhas.");
        }

        if (currentRecord && currentRecord.code !== code && accountHasChildren(currentRecord)) {
          errors.push("Não é possível alterar o código de uma conta que já possui contas filhas.");
        }

        if (currentRecord && currentRecord.type !== record.type) {
          const links = getChartAccountLinkSummary(currentRecord);
          if (record.type === "Sintética" && (links.natures.length || links.items.length || links.invoices.length)) {
            errors.push("Não é possível transformar a conta em sintética porque ela já possui vínculos de lançamento.");
          }
          if (record.type === "Analítica" && accountHasChildren(currentRecord)) {
            errors.push("Não é possível transformar a conta em analítica porque ela já possui contas filhas.");
          }
        }

        return {
          valid: errors.length === 0,
          errors,
          record: {
            code,
            normalizedCode,
            level,
            parentCode,
            group
          }
        };
      }

      function normalizeReducedCode(value) {
        const digits = String(value ?? "").replace(/\D/g, "");
        if (!digits) return "";
        const numeric = parseInt(digits, 10);
        return Number.isFinite(numeric) && numeric > 0 ? String(numeric) : "";
      }

      function getChartAccountByReducedCode(value, scope = {}) {
        const reducedCode = normalizeReducedCode(value);
        if (!reducedCode) return null;
        return state.data.chartAccounts.find((account) => {
          if (normalizeReducedCode(account.reducedCode) !== reducedCode) return false;
          if (scope.companyName && account.companyName && account.companyName !== scope.companyName) return false;
          if (scope.branchName && account.branchName && account.branchName !== scope.branchName) return false;
          if (scope.planName && account.planName && account.planName !== scope.planName) return false;
          return true;
        }) || null;
      }

      function generateNextReducedCode() {
        const maxCode = state.data.chartAccounts.reduce((max, account) => {
          const numeric = parseInt(normalizeReducedCode(account.reducedCode), 10);
          return Number.isFinite(numeric) && numeric > max ? numeric : max;
        }, 0);
        return String(maxCode + 1);
      }

      function migrateChartAccounts(accounts) {
        const migrated = sortAccountsByCode(accounts.map((account) => migrateChartAccountRecord(account)));
        const used = new Set();
        let nextReducedCode = 1;
        migrated.forEach((account) => {
          let reducedCode = normalizeReducedCode(account.reducedCode);
          if (!reducedCode || used.has(reducedCode)) {
            while (used.has(String(nextReducedCode))) nextReducedCode += 1;
            reducedCode = String(nextReducedCode);
          }
          account.reducedCode = reducedCode;
          account.companyName = account.companyName || "Empresa Principal";
          account.branchName = account.branchName || "Matriz";
          account.planName = account.planName || "Plano Padrão";
          used.add(reducedCode);
          nextReducedCode = Math.max(nextReducedCode, parseInt(reducedCode, 10) + 1);
        });
        return migrated;
      }

      function migrateChartAccountRecord(account) {
        const formattedCode = formatAccountCode(account.code);
        const validCode = isValidChartAccountCode(formattedCode);
        const level = getAccountLevel(formattedCode);
        const linkedSummary = getChartAccountLinkSummary({
          id: account.id,
          code: account.code
        });
        const linked = linkedSummary.natures.length || linkedSummary.items.length || linkedSummary.invoices.length;
        const groupDigit = clean(account.code).charAt(0);
        const defaultBalanceNature = CHART_ACCOUNT_BALANCE_DEFAULTS[groupDigit] || "Devedora";
        const resolvedType = ["Sintética", "Analítica"].includes(account.type)
          ? account.type
          : linked || level === 5
            ? "Analítica"
            : "Sintética";

        return {
          ...account,
          code: validCode ? formattedCode : clean(account.code),
          normalizedCode: normalizeAccountCode(account.code),
          name: account.name || "",
          reducedCode: normalizeReducedCode(account.reducedCode),
          companyName: account.companyName || "Empresa Principal",
          branchName: account.branchName || "Matriz",
          planName: account.planName || "Plano Padrão",
          type: resolvedType,
          level,
          parentCode: validCode ? getParentAccountCode(formattedCode) : "",
          group: getAccountGroup(account.code),
          balanceNature: ["Devedora", "Credora"].includes(account.balanceNature) ? account.balanceNature : defaultBalanceNature,
          isActive: typeof account.isActive === "boolean" ? account.isActive : true,
          requiresCodeAdjustment: !validCode,
          adjustmentMessage: validCode ? "" : "Código fora da nova máscara contábil. Ajuste recomendado para análise futura.",
          createdAt: account.createdAt || new Date().toISOString(),
          updatedAt: account.updatedAt || new Date().toISOString()
        };
      }

      function getDefaultChartAccountsSeed() {
        return [
          { code: "1", name: "Ativo", type: "Sintética", balanceNature: "Devedora" },
          { code: "1.1", name: "Ativo Circulante", type: "Sintética", balanceNature: "Devedora" },
          { code: "1.1.01", name: "Disponibilidades", type: "Sintética", balanceNature: "Devedora" },
          { code: "1.1.01.01", name: "Caixa e equivalentes", type: "Sintética", balanceNature: "Devedora" },
          { code: "1.1.01.01.001", name: "Caixa Geral", type: "Analítica", balanceNature: "Devedora" },
          { code: "2", name: "Passivo", type: "Sintética", balanceNature: "Credora" },
          { code: "2.1", name: "Passivo Circulante", type: "Sintética", balanceNature: "Credora" },
          { code: "3", name: "Patrimônio Líquido", type: "Sintética", balanceNature: "Credora" },
          { code: "4", name: "Receitas", type: "Sintética", balanceNature: "Credora" },
          { code: "5", name: "Custos", type: "Sintética", balanceNature: "Devedora" },
          { code: "6", name: "Despesas", type: "Sintética", balanceNature: "Devedora" }
        ];
      }

      function loadDefaultChartAccounts() {
        const existingNormalizedCodes = new Set(state.data.chartAccounts.map((account) => account.normalizedCode));
        const virtualAccounts = [...state.data.chartAccounts];
        const additions = [];

        getDefaultChartAccountsSeed().forEach((seed) => {
          const formattedCode = formatAccountCode(seed.code);
          const normalizedCode = normalizeAccountCode(formattedCode);
          if (existingNormalizedCodes.has(normalizedCode)) {
            return;
          }

          const parentCode = getParentAccountCode(formattedCode);
          if (parentCode && !virtualAccounts.some((account) => account.code === parentCode)) {
            return;
          }

          const record = {
            id: generateId(),
            code: formattedCode,
            normalizedCode,
            name: seed.name,
            reducedCode: String(virtualAccounts.reduce((max, account) => Math.max(max, parseInt(normalizeReducedCode(account.reducedCode), 10) || 0), 0) + 1),
            companyName: "Empresa Principal",
            branchName: "Matriz",
            planName: "Plano Padrão",
            type: seed.type,
            level: getAccountLevel(formattedCode),
            parentCode,
            group: getAccountGroup(formattedCode),
            balanceNature: seed.balanceNature,
            isActive: true,
            requiresCodeAdjustment: false,
            adjustmentMessage: "",
            createdAt: new Date().toISOString(),
            updatedAt: new Date().toISOString()
          };

          additions.push(record);
          virtualAccounts.push(record);
          existingNormalizedCodes.add(normalizedCode);
        });

        if (!additions.length) {
          notify("error", "Plano de contas", "A base inicial já foi carregada ou possui códigos equivalentes cadastrados.");
          return;
        }

        saveCollection("chartAccounts", sortAccountsByCode([...state.data.chartAccounts, ...additions]));
        notify("success", "Plano de contas", `${additions.length} conta(s) de exemplo foram adicionadas ao plano.`);
        renderApp();
      }

      function getChartAccountPreviewData(accountDraft) {
        const formattedCode = formatAccountCode(accountDraft.code);
        const normalizedCode = normalizeAccountCode(formattedCode);
        const level = getAccountLevel(formattedCode);
        const parentCode = getParentAccountCode(formattedCode);
        const group = getAccountGroup(formattedCode || accountDraft.code);
        const isValid = isValidChartAccountCode(formattedCode);
        const parentAccount = parentCode ? getChartAccountByCode(parentCode) : null;
        const previewCodes = isValid
          ? formattedCode.split(".").map((_, index, parts) => parts.slice(0, index + 1).join("."))
          : [];

        return {
          code: formattedCode,
          normalizedCode,
          level,
          parentCode,
          group,
          isValid,
          parentAccount,
          previewCodes
        };
      }

      function syncChartAccountPreview(containerId = "chart-account-preview", draft = state.ui.chartAccountFormDraft) {
        const previewContainer = document.getElementById(containerId);

      function roundCurrency(value) {
        return Math.round((Number(value) + Number.EPSILON) * 100) / 100;
      }

      function formatCurrency(value) {
        return new Intl.NumberFormat("pt-BR", {
          style: "currency",
          currency: "BRL"
        }).format(Number(value || 0));
      }

      function formatPercent(value) {
        const numericValue = Number(value || 0);
        return `${new Intl.NumberFormat("pt-BR", { minimumFractionDigits: 2, maximumFractionDigits: 4 }).format(numericValue)}%`;
      }

      function formatSignedCurrency(value) {
        const numericValue = Number(value || 0);
        if (numericValue < 0) {
          return "-" + formatCurrency(Math.abs(numericValue));
        }
        return formatCurrency(numericValue);
      }

      function formatDate(value) {
        if (!value) {
          return "-";
        }
        const date = new Date(value + "T00:00:00");
        if (Number.isNaN(date.getTime())) {
          return value;
        }
        return new Intl.DateTimeFormat("pt-BR").format(date);
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function filterRecords(records, searchTerm, builder) {
        const term = (searchTerm || "").toLowerCase().trim();
        if (!term) {
          return records;
        }
        return records.filter((record) => builder(record).toLowerCase().includes(term));
      }

      function getInvoiceTotals(invoice) {
        const totalItemsAmount = roundCurrency(invoice.items.reduce((sum, item) => sum + Number(item.totalPrice || 0), 0));
        const totalInstallmentsAmount = roundCurrency(invoice.installments.reduce((sum, installment) => sum + Number(installment.amount || 0), 0));
        const difference = roundCurrency(totalItemsAmount - totalInstallmentsAmount);
        return { totalItemsAmount, totalInstallmentsAmount, difference };
      }

      function getInvoiceStatusClass(difference) {
        return Math.abs(difference) <= 0.009 ? "ok" : "warn";
      }

      function notify(type, title, message) {
        const toast = {
          id: generateId(),
          type,
          title,
          message
        };
        state.ui.toasts = [...state.ui.toasts, toast];
        renderApp();
        window.setTimeout(() => {
          state.ui.toasts = state.ui.toasts.filter((item) => item.id !== toast.id);
          renderApp();
        }, 3200);
      }

      function getActiveEditRecord(collectionKey, id) {
        return state.data[collectionKey].find((record) => record.id === id) || null;
      }

      function getCloudStatusMeta() {
        if (!CLOUD.isConfigured()) {
          return { className: "offline", label: "So local", detail: "Nuvem desativada" };
        }
        if (CLOUD.status === "syncing") {
          return { className: "syncing", label: "Sincronizando", detail: "JSONBin em andamento" };
        }
        if (CLOUD.status === "error") {
          return { className: "error", label: "Erro na nuvem", detail: "Verifique credenciais ou conexao" };
        }
        return { className: "ok", label: "Nuvem conectada", detail: "JSONBin ativo" };
      }

      function renderCloudStatusChip() {
        const meta = getCloudStatusMeta();
        return `<span class="cloud-chip ${meta.className}" title="${escapeHtml(meta.detail)}">☁ ${escapeHtml(meta.label)}</span>`;
      }

      let lockedScrollY = 0;

      function applyModalScrollLock(shouldLock) {
        const alreadyLocked = document.body.dataset.scrollLocked === "true";
        if (shouldLock && !alreadyLocked) {
          lockedScrollY = window.scrollY || window.pageYOffset || 0;
          document.body.dataset.scrollLocked = "true";
          document.body.style.position = "fixed";
          document.body.style.top = `-${lockedScrollY}px`;
          document.body.style.left = "0";
          document.body.style.right = "0";
          document.body.style.width = "100%";
          document.body.style.overflow = "hidden";
        } else if (!shouldLock && alreadyLocked) {
          document.body.dataset.scrollLocked = "false";
          document.body.style.position = "";
          document.body.style.top = "";
          document.body.style.left = "";
          document.body.style.right = "";
          document.body.style.width = "";
          document.body.style.overflow = "";
          window.scrollTo(0, lockedScrollY);
        }
      }


      let accountLookupSearchTimer = null;

      function getAccountLookupSelectByKey(key) {
        return [...document.querySelectorAll("select[data-account-lookup-key]")].find((select) => select.dataset.accountLookupKey === key) || null;
      }

      function getAccountLookupScope(select) {
        const form = select?.closest("form");
        const read = (name) => clean(form?.querySelector(`[name="${name}"]`)?.value || "");
        return {
          companyName: read("companyName"),
          branchName: read("branchName"),
          planName: read("planName") || read("chartPlanName")
        };
      }

      function validateAccountForLookup(account, scope = {}) {
        if (!account) return "Conta contábil não encontrada.";
        if (account.isActive === false) return "A conta selecionada está inativa e não pode ser utilizada.";
        if (!isAnalyticalAccount(account)) return "A conta selecionada é sintética. Utilize uma conta analítica para lançamentos e vínculos contábeis.";
        if (account.requiresCodeAdjustment) return "A conta selecionada possui código estrutural pendente de ajuste.";
        if (scope.companyName && account.companyName && account.companyName !== scope.companyName) return `A conta pertence à empresa ${account.companyName}.`;
        if (scope.branchName && account.branchName && account.branchName !== scope.branchName) return `A conta pertence à filial ${account.branchName}.`;
        if (scope.planName && account.planName && account.planName !== scope.planName) return `A conta pertence ao plano ${account.planName}.`;
        return "";
      }

      function accountLookupFieldLabel(select) {
        const label = select.closest(".field")?.querySelector("label");
        if (label?.textContent?.trim()) return label.textContent.trim();
        const map = {
          debitAccountId: "Conta débito",
          creditAccountId: "Conta crédito",
          payingAccountId: "Conta de pagamento",
          chartAccountId: "Conta contábil",
          salaryPayableAccountId: "Conta de salários a pagar",
          chargesPayableAccountId: "Conta de encargos a recolher"
        };
        return map[select.name] || "Conta contábil";
      }

      function enhanceAccountLookupFields(root = document) {
        const selects = [...root.querySelectorAll('select[name*="AccountId"]')].filter((select) => !select.dataset.accountLookupEnhanced);
        const counters = {};
        selects.forEach((select) => {
          const formType = select.closest("form")?.dataset.form || "global";
          const base = `${formType}::${select.name}`;
          counters[base] = (counters[base] || 0) + 1;
          const key = `${base}::${counters[base]}`;
          const selectId = select.id || `account-native-${Math.random().toString(36).slice(2, 9)}`;
          select.id = selectId;
          select.dataset.accountLookupEnhanced = "true";
          select.dataset.accountLookupKey = key;
          select.classList.add("account-lookup-native");
          select.tabIndex = -1;
          const account = getChartAccountById(select.value);
          const reducedCode = normalizeReducedCode(account?.reducedCode);
          const inputId = `${selectId}-reduced`;
          const disabled = select.disabled ? "disabled" : "";
          const firstOptionText = select.options?.[0]?.textContent?.trim().toLocaleLowerCase("pt-BR") || "";
          const optionalMarker = ["opcional", "todas", "todos", "nenhuma", "sem conta"].some((marker) => firstOptionText.includes(marker));
          const inferredRequired = select.required || !optionalMarker;
          select.required = false;
          select.dataset.accountRequired = inferredRequired ? "true" : "false";
          const required = inferredRequired ? "true" : "false";
          const description = account
            ? `<strong>${escapeHtml(account.code)}</strong> — ${escapeHtml(account.name)}`
            : "Nenhuma conta selecionada.";
          select.insertAdjacentHTML("afterend", `
            <div class="account-lookup-component" data-account-component-key="${escapeHtml(key)}">
              <div class="account-lookup-row">
                <input id="${escapeHtml(inputId)}" class="account-lookup-code" inputmode="numeric" autocomplete="off"
                  data-account-reduced-input="true" data-key="${escapeHtml(key)}" data-required="${required}"
                  value="${escapeHtml(reducedCode)}" placeholder="Código reduzido" ${disabled}>
                <button class="account-lookup-button" type="button" data-action="open-account-lookup" data-key="${escapeHtml(key)}"
                  title="Pesquisar no plano de contas" aria-label="Pesquisar conta contábil" ${disabled}>⋯</button>
              </div>
              <div class="account-lookup-description" data-account-description="${escapeHtml(key)}">${description}</div>
              <div class="account-lookup-error" data-account-error="${escapeHtml(key)}" aria-live="polite"></div>
            </div>
          `);
          const label = select.closest(".field")?.querySelector(`label[for="${selectId}"]`) || select.closest(".field")?.querySelector("label");
          if (label) label.htmlFor = inputId;
        });
        if (state.ui.accountLookupFocusNextKey) {
          const key = state.ui.accountLookupFocusNextKey;
          state.ui.accountLookupFocusNextKey = "";
          window.setTimeout(() => focusNextAfterAccountField(key), 0);
        }
      }

      function setAccountLookupFieldMessage(key, message = "", invalid = false) {
        const component = [...document.querySelectorAll("[data-account-component-key]")].find((node) => node.dataset.accountComponentKey === key);
        const input = component?.querySelector("[data-account-reduced-input]");
        const error = component?.querySelector("[data-account-error]");
        if (input) input.classList.toggle("invalid", Boolean(invalid));
        if (error) error.textContent = message;
      }

      function handleAccountReducedCodeInput(input) {
        const key = input.dataset.key || "";
        const select = getAccountLookupSelectByKey(key);
        if (!select) return;
        const selected = getChartAccountById(select.value);
        if (normalizeReducedCode(input.value) !== normalizeReducedCode(selected?.reducedCode)) {
          select.value = "";
          const description = [...document.querySelectorAll("[data-account-description]")].find((node) => node.dataset.accountDescription === key);
          if (description) description.textContent = input.value ? "Código alterado. Aguardando validação..." : "Nenhuma conta selecionada.";
          setAccountLookupFieldMessage(key, "", false);
        }
      }

      function resolveAccountReducedCodeInput(input, moveNext = false) {
        const key = input.dataset.key || "";
        const select = getAccountLookupSelectByKey(key);
        if (!select) return false;
        const reducedCode = normalizeReducedCode(input.value);
        const required = input.dataset.required === "true";
        if (!reducedCode) {
          select.value = "";
          input.value = "";
          setAccountLookupFieldMessage(key, required ? "Informe uma conta contábil." : "", required);
          select.dispatchEvent(new Event("change", { bubbles: true }));
          return !required;
        }
        const scope = getAccountLookupScope(select);
        const account = getChartAccountByReducedCode(reducedCode, scope);
        const validation = validateAccountForLookup(account, scope);
        if (validation) {
          select.value = "";
          setAccountLookupFieldMessage(key, validation, true);
          notify("error", "Conta contábil", validation);
          select.dispatchEvent(new Event("change", { bubbles: true }));
          return false;
        }
        input.value = normalizeReducedCode(account.reducedCode);
        select.value = account.id;
        const description = [...document.querySelectorAll("[data-account-description]")].find((node) => node.dataset.accountDescription === key);
        if (description) description.innerHTML = `<strong>${escapeHtml(account.code)}</strong> — ${escapeHtml(account.name)}`;
        state.ui.accountLookupFocusNextKey = moveNext ? key : "";
        setAccountLookupFieldMessage(key, "", false);
        select.dispatchEvent(new Event("change", { bubbles: true }));
        return true;
      }

      function handleAccountLookupFocusOut(event) {
        const input = event.target.closest?.("[data-account-reduced-input]");
        if (!input) return;
        const component = input.closest("[data-account-component-key]");
        if (event.relatedTarget && component?.contains(event.relatedTarget)) return;
        resolveAccountReducedCodeInput(input, false);
      }

      function handleAccountLookupKeyDown(event) {
        const input = event.target.closest?.("[data-account-reduced-input]");
        if (input && event.key === "Enter") {
          event.preventDefault();
          resolveAccountReducedCodeInput(input, true);
          return;
        }
        if (event.target.dataset?.accountLookupFilter && event.key === "Enter") {
          event.preventDefault();
          state.ui.accountLookup.page = 1;
          refreshAccountLookupModal();
          return;
        }
        const row = event.target.closest?.("[data-account-lookup-row]");
        if (row && event.key === "Enter") {
          event.preventDefault();
          state.ui.accountLookup.selectedId = row.dataset.id || "";
          confirmAccountLookupSelection();
          return;
        }
        if (state.ui.accountLookup.open && event.key === "Escape") {
          event.preventDefault();
          closeAccountLookup();
        }
      }

      function handleAccountLookupDoubleClick(event) {
        const row = event.target.closest?.("[data-account-lookup-row]");
        if (!row) return;
        state.ui.accountLookup.selectedId = row.dataset.id || "";
        confirmAccountLookupSelection();
      }

      function openAccountLookup(key) {
        const select = getAccountLookupSelectByKey(key);
        if (!select) {
          notify("error", "Plano de contas", "Não foi possível identificar o campo de origem.");
          return;
        }
        state.ui.accountLookup = {
          open: true,
          targetKey: key,
          label: accountLookupFieldLabel(select),
          selectedId: select.value || "",
          page: 1,
          pageSize: 20,
          sortField: "reducedCode",
          sortDirection: "asc",
          filters: { reducedCode: "", code: "", description: "", nature: "", type: "", status: "" },
          scope: getAccountLookupScope(select)
        };
        renderApp();
      }

      function closeAccountLookup() {
        const key = state.ui.accountLookup.targetKey;
        state.ui.accountLookup.open = false;
        renderApp();
        window.setTimeout(() => {
          const component = [...document.querySelectorAll("[data-account-component-key]")].find((node) => node.dataset.accountComponentKey === key);
          component?.querySelector("[data-account-reduced-input]")?.focus();
        }, 0);
      }

      function normalizedAccountSearchTerm(value) {
        return clean(value).replace(/%/g, "").toLocaleLowerCase("pt-BR");
      }

      function getAccountLookupFilteredAccounts() {
        const lookup = state.ui.accountLookup;
        const filters = lookup.filters || {};
        const reduced = normalizedAccountSearchTerm(filters.reducedCode);
        const code = normalizedAccountSearchTerm(filters.code);
        const description = normalizedAccountSearchTerm(filters.description);
        let records = state.data.chartAccounts.filter((account) => {
          const scope = lookup.scope || {};
          if (scope.companyName && account.companyName && account.companyName !== scope.companyName) return false;
          if (scope.branchName && account.branchName && account.branchName !== scope.branchName) return false;
          if (scope.planName && account.planName && account.planName !== scope.planName) return false;
          return (!reduced || normalizeReducedCode(account.reducedCode).includes(reduced))
            && (!code || String(account.code || "").toLocaleLowerCase("pt-BR").includes(code))
            && (!description || String(account.name || "").toLocaleLowerCase("pt-BR").includes(description))
            && (!filters.nature || account.balanceNature === filters.nature)
            && (!filters.type || account.type === filters.type)
            && (!filters.status || (filters.status === "Ativa" ? account.isActive !== false : account.isActive === false));
        });
        const field = lookup.sortField || "reducedCode";
        const direction = lookup.sortDirection === "desc" ? -1 : 1;
        records.sort((a, b) => {
          if (field === "reducedCode") return direction * ((parseInt(normalizeReducedCode(a.reducedCode), 10) || 0) - (parseInt(normalizeReducedCode(b.reducedCode), 10) || 0));
          const left = field === "description" ? a.name : field === "nature" ? a.balanceNature : field === "status" ? (a.isActive === false ? "Inativa" : "Ativa") : a[field];
          const right = field === "description" ? b.name : field === "nature" ? b.balanceNature : field === "status" ? (b.isActive === false ? "Inativa" : "Ativa") : b[field];
          return direction * String(left || "").localeCompare(String(right || ""), "pt-BR", { numeric: true });
        });
        return records;
      }

      function setAccountLookupSort(field) {
        if (state.ui.accountLookup.sortField === field) {
          state.ui.accountLookup.sortDirection = state.ui.accountLookup.sortDirection === "asc" ? "desc" : "asc";
        } else {
          state.ui.accountLookup.sortField = field;
          state.ui.accountLookup.sortDirection = "asc";
        }
        refreshAccountLookupModal();
      }

      function accountLookupSortIndicator(field) {
        if (state.ui.accountLookup.sortField !== field) return "↕";
        return state.ui.accountLookup.sortDirection === "asc" ? "↑" : "↓";
      }

      function renderAccountLookupResults() {
        const lookup = state.ui.accountLookup;
        const records = getAccountLookupFilteredAccounts();
        const pageSize = lookup.pageSize || 20;
        const totalPages = Math.max(1, Math.ceil(records.length / pageSize));
        lookup.page = Math.min(Math.max(1, lookup.page || 1), totalPages);
        const start = (lookup.page - 1) * pageSize;
        const pageRecords = records.slice(start, start + pageSize);
        const pages = [];
        const from = Math.max(1, lookup.page - 2);
        const to = Math.min(totalPages, lookup.page + 2);
        for (let page = from; page <= to; page += 1) pages.push(page);
        return `
          <div class="account-picker-results">
            <div class="table-scroll">
              <table class="account-picker-table">
                <thead><tr>
                  <th><button type="button" data-action="account-lookup-sort" data-sort="reducedCode">Código reduzido ${accountLookupSortIndicator("reducedCode")}</button></th>
                  <th><button type="button" data-action="account-lookup-sort" data-sort="code">Código contábil ${accountLookupSortIndicator("code")}</button></th>
                  <th><button type="button" data-action="account-lookup-sort" data-sort="description">Descrição ${accountLookupSortIndicator("description")}</button></th>
                  <th><button type="button" data-action="account-lookup-sort" data-sort="nature">Natureza ${accountLookupSortIndicator("nature")}</button></th>
                  <th><button type="button" data-action="account-lookup-sort" data-sort="type">Tipo ${accountLookupSortIndicator("type")}</button></th>
                  <th><button type="button" data-action="account-lookup-sort" data-sort="status">Status ${accountLookupSortIndicator("status")}</button></th>
                </tr></thead>
                <tbody>
                  ${pageRecords.length ? pageRecords.map((account) => {
                    const blocked = Boolean(validateAccountForLookup(account, lookup.scope));
                    return `<tr tabindex="0" class="${lookup.selectedId === account.id ? "selected" : ""} ${blocked ? "blocked" : ""}"
                      data-action="account-lookup-row" data-account-lookup-row="true" data-id="${escapeHtml(account.id)}">
                      <td class="account-picker-code-cell">${escapeHtml(normalizeReducedCode(account.reducedCode) || "-")}</td>
                      <td class="mono">${escapeHtml(account.code || "-")}</td>
                      <td><strong>${escapeHtml(account.name || "-")}</strong>${blocked ? `<div class="table-muted">${escapeHtml(validateAccountForLookup(account, lookup.scope))}</div>` : ""}</td>
                      <td>${escapeHtml(account.balanceNature || "-")}</td>
                      <td>${escapeHtml(account.type || "-")}</td>
                      <td>${renderStatusBadge(account.isActive === false ? "Inativa" : "Ativa")}</td>
                    </tr>`;
                  }).join("") : `<tr><td colspan="6"><div class="empty-card"><strong>Nenhuma conta encontrada.</strong><p>Altere os filtros ou use % para listar todas as contas disponíveis neste plano.</p></div></td></tr>`}
                </tbody>
              </table>
            </div>
          </div>
          <div class="account-picker-pagination">
            <div class="account-picker-summary">${records.length ? `${start + 1}–${Math.min(start + pageSize, records.length)} de ${records.length} conta(s)` : "0 contas"}</div>
            <div class="page-buttons">
              <button class="ghost-button" type="button" data-action="account-lookup-page" data-page="${lookup.page - 1}" ${lookup.page <= 1 ? "disabled" : ""}>Anterior</button>
              ${pages.map((page) => `<button class="${page === lookup.page ? "secondary-button" : "ghost-button"}" type="button" data-action="account-lookup-page" data-page="${page}">${page}</button>`).join("")}
              <button class="ghost-button" type="button" data-action="account-lookup-page" data-page="${lookup.page + 1}" ${lookup.page >= totalPages ? "disabled" : ""}>Próxima</button>
            </div>
          </div>
        `;
      }

      function renderAccountLookupModal() {
        const lookup = state.ui.accountLookup;
        if (!lookup.open) return "";
        const filters = lookup.filters || {};

      function confirmAccountLookupSelection() {
        const lookup = state.ui.accountLookup;
        const account = getChartAccountById(lookup.selectedId);
        const validation = validateAccountForLookup(account, lookup.scope || {});
        if (validation) {
          notify("error", "Plano de contas", validation || "Selecione uma conta válida.");
          return;
        }
        const select = getAccountLookupSelectByKey(lookup.targetKey);
        if (!select) {
          notify("error", "Plano de contas", "O campo de origem não está mais disponível.");
          return;
        }
        const key = lookup.targetKey;
        state.ui.accountLookup.open = false;
        state.ui.accountLookupFocusNextKey = key;
        select.value = account.id;
        select.dispatchEvent(new Event("change", { bubbles: true }));
        renderApp();
      }

      function focusNextAfterAccountField(key) {
        const component = [...document.querySelectorAll("[data-account-component-key]")].find((node) => node.dataset.accountComponentKey === key);
        const form = component?.closest("form");
        if (!component || !form) return;
        const controls = [...form.querySelectorAll('input:not([type="hidden"]):not([disabled]), select:not([disabled]):not(.account-lookup-native), textarea:not([disabled]), button:not([disabled])')];
        const currentInput = component.querySelector("[data-account-reduced-input]");
        const currentIndex = controls.indexOf(currentInput);
        const next = controls.slice(currentIndex + 1).find((control) => !component.contains(control));
        next?.focus();
      }

                            <tr>

      function renderFinancialNatureModal() {
        const editing = getActiveEditRecord("financialNatures", state.ui.editing.financialNatureId);

        const selectableAccounts = getSelectableChartAccounts();
        const draftMappings = natureDraft.accountMappings || [];
        return `
          <div class="modal-overlay"><button class="modal-backdrop" type="button" data-action="close-financial-nature-modal" aria-label="Fechar modal"></button>
            <div class="modal-shell" role="dialog" aria-modal="true" aria-labelledby="financial-nature-modal-title">
              <div class="modal-header"><div><h3 class="modal-title" id="financial-nature-modal-title">${editing ? "Editar natureza financeira" : "Nova natureza financeira"}</h3><p class="modal-subtitle">Cadastro hierárquico no padrão do plano de contas, com contabilização opcional.</p></div><button class="ghost-button" type="button" data-action="close-financial-nature-modal">Fechar</button></div>
              <div class="modal-body">
                <form data-form="financial-nature" autocomplete="off">
                  <input type="hidden" name="id" value="${escapeHtml(natureDraft.id || editing?.id || "")}">
                  <div class="form-grid">
                    <div class="field"><label for="financial-nature-code-modal">Código da natureza</label><input id="financial-nature-code-modal" name="code" value="${escapeHtml(natureDraft.code || "")}" placeholder="Ex.: 1.01.001" required><span class="field-hint">Use números separados por pontos para formar a hierarquia.</span></div>
                    <div class="field"><label for="financial-nature-name-modal">Nome da natureza financeira</label><input id="financial-nature-name-modal" name="name" maxlength="160" value="${escapeHtml(natureDraft.name || "")}" placeholder="Ex.: Receitas de serviços" required></div>
                    <div class="field"><label for="financial-nature-type-modal">Tipo</label><select id="financial-nature-type-modal" name="type"><option value="Sintética" ${natureDraft.type === "Sintética" ? "selected" : ""}>Sintética</option><option value="Analítica" ${natureDraft.type !== "Sintética" ? "selected" : ""}>Analítica</option></select></div>
                    <div class="field"><label for="financial-nature-status-modal">Status</label><select id="financial-nature-status-modal" name="status"><option value="Ativa" ${natureDraft.status !== "Inativa" ? "selected" : ""}>Ativa</option><option value="Inativa" ${natureDraft.status === "Inativa" ? "selected" : ""}>Inativa</option></select></div>
                  </div>
                  <div class="form-actions"><button class="primary-button" type="submit">${editing ? "Salvar alterações" : "Cadastrar natureza financeira"}</button></div>
                </form>
                <div class="financeiro-legacy-subpanel"><strong>Adicionar contabilização</strong><p>Débito e crédito não são obrigatórios no cadastro da natureza. Ao adicionar uma linha, informe pelo menos uma das contas; o centro de custo em branco cria a regra padrão.</p>
                  <form data-form="financial-nature-mapping" autocomplete="off" style="margin-top:12px;"><div class="form-grid">
                    <div class="field"><label for="financial-nature-debit-modal">Conta de débito</label><select id="financial-nature-debit-modal" name="debitAccountId"><option value="">Não informar</option>${selectableAccounts.map((account) => `<option value="${escapeHtml(account.id)}" ${natureDraft.mappingForm.debitAccountId === account.id ? "selected" : ""}>${escapeHtml(account.code)} - ${escapeHtml(account.name)}</option>`).join("")}</select></div>
                    <div class="field"><label for="financial-nature-credit-modal">Conta de crédito</label><select id="financial-nature-credit-modal" name="creditAccountId"><option value="">Não informar</option>${selectableAccounts.map((account) => `<option value="${escapeHtml(account.id)}" ${natureDraft.mappingForm.creditAccountId === account.id ? "selected" : ""}>${escapeHtml(account.code)} - ${escapeHtml(account.name)}</option>`).join("")}</select></div>
                    <div class="field"><label for="financial-nature-cost-center-modal">Centro de custo</label><select id="financial-nature-cost-center-modal" name="costCenterId"><option value="">Todos os centros de custo (padrão)</option>${state.data.costCenters.map((record) => `<option value="${escapeHtml(record.id)}" ${natureDraft.mappingForm.costCenterId === record.id ? "selected" : ""}>${escapeHtml(record.code)} - ${escapeHtml(record.name)}</option>`).join("")}</select></div>
                  </div><div class="form-actions"><button class="secondary-button" type="submit">Adicionar contabilização</button></div></form>
                </div>
                ${draftMappings.length ? `<div class="financeiro-legacy-table-wrap" style="margin-top:16px;"><table class="financeiro-legacy-table"><thead><tr><th>Débito</th><th>Crédito</th><th>Centro de custo</th><th>Ações</th></tr></thead><tbody>${draftMappings.map((mapping) => {
                  const debit = mapping.debitAccountId ? getChartAccountById(mapping.debitAccountId) : null;
                  const credit = mapping.creditAccountId ? getChartAccountById(mapping.creditAccountId) : null;
                  const costCenter = mapping.costCenterId ? getCostCenterById(mapping.costCenterId) : null;
                  return `<tr><td>${debit ? `${escapeHtml(debit.code)} - ${escapeHtml(debit.name)}` : '<span class="table-muted">Não informada</span>'}</td><td>${credit ? `${escapeHtml(credit.code)} - ${escapeHtml(credit.name)}` : '<span class="table-muted">Não informada</span>'}</td><td>${costCenter ? escapeHtml(`${costCenter.code} - ${costCenter.name}`) : '<span class="badge">Todos (padrão)</span>'}</td><td><button class="action-chip danger" type="button" data-action="remove-financial-nature-mapping" data-id="${escapeHtml(mapping.id)}">Remover</button></td></tr>`;
                }).join("")}</tbody></table></div>` : `<div class="empty-card" style="margin-top:16px;"><strong>Contabilização não informada.</strong><p>Isso não impede o cadastro da natureza. Você pode configurar débito e crédito posteriormente.</p></div>`}
              </div>
            </div>
          </div>`;
      }

      function renderItemModal() {
        const editing = getActiveEditRecord("items", state.ui.editing.itemId);

        const selectableNatures = getSelectableFinancialNatures();
        const canCreate = selectableNatures.length > 0;
        const selectedNatureId = state.ui.itemNaturePreviewId || itemDraft.financialNatureId || editing?.financialNatureId || "";
