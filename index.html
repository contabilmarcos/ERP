<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ERP Local - Fiscal e Cadastros</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --canvas: #f6f7f9;
      --surface: #ffffff;
      --surface-2: #fbfbfc;
      --surface-3: #f3f4f6;
      --sidebar: #fbfbfc;
      --ink: #1c1e22;
      --ink-2: #5b616b;
      --ink-3: #888e98;
      --border: #e9ebef;
      --border-2: #dfe2e7;
      --accent: #4f46e5;
      --accent-hover: #4338ca;
      --accent-soft: #eef0fe;
      --accent-soft-2: #e4e6fd;
      --accent-ink: #3f37c9;
      --success: #0f9d76;
      --success-soft: #e6f6f0;
      --warning: #b4780a;
      --warning-soft: #fbf3e2;
      --danger: #d4494b;
      --danger-soft: #fbecec;
      --shadow-xs: 0 1px 2px rgba(20, 23, 28, 0.04);
      --shadow-sm: 0 1px 2px rgba(20, 23, 28, 0.04), 0 1px 3px rgba(20, 23, 28, 0.05);
      --shadow-md: 0 8px 24px rgba(20, 23, 28, 0.10);
      --radius-xl: 14px;
      --radius-lg: 12px;
      --radius-md: 10px;
      --radius-sm: 8px;
      --mono: "IBM Plex Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--canvas);
      color: var(--ink);
      font-family: "Inter", system-ui, -apple-system, sans-serif;
      font-size: 14px;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    button, input, select, textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    ::selection {
      background: var(--accent-soft-2);
    }

    :focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .app-shell {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 258px 1fr;
    }

    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      background: var(--sidebar);
      border-right: 1px solid var(--border);
      padding: 18px 12px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      z-index: 20;
    }

    .brand {
      display: flex;
      gap: 11px;
      align-items: center;
      padding: 8px 8px 2px;
    }

    .brand-mark {
      width: 34px;
      height: 34px;
      border-radius: 9px;
      display: grid;
      place-items: center;
      background: var(--accent);
      color: #ffffff;
      font-family: var(--mono);
      font-weight: 600;
      font-size: 0.68rem;
      letter-spacing: 0.03em;
      box-shadow: var(--shadow-xs);
    }

    .brand h1 {
      margin: 0;
      font-size: 0.92rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      line-height: 1.2;
      color: var(--ink);
    }

    .brand p {
      margin: 2px 0 0;
      color: var(--ink-3);
      font-size: 0.75rem;
    }

    .menu-section-label {
      margin: 0 8px 4px;
      color: var(--ink-3);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-size: 0.68rem;
      font-weight: 600;
    }

    .menu {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .nav-button {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 10px;
      border: 1px solid transparent;
      padding: 8px 10px;
      border-radius: 8px;
      background: transparent;
      color: var(--ink-2);
      text-align: left;
      transition: background 0.14s ease, color 0.14s ease, border-color 0.14s ease;
    }

    .nav-button:hover,
    .nav-button:focus-visible {
      background: var(--surface-3);
      color: var(--ink);
      outline: none;
    }

    .nav-button.active {
      background: var(--surface);
      color: var(--ink);
      border-color: var(--border);
      box-shadow: var(--shadow-xs);
    }

    .nav-icon {
      width: 7px;
      height: 7px;
      border-radius: 2px;
      background: var(--ink-3);
      flex-shrink: 0;
      transition: background 0.14s ease;
    }

    .nav-button:hover .nav-icon {
      background: var(--ink-2);
    }

    .nav-button.active .nav-icon {
      background: var(--accent);
    }

    .nav-title {
      font-weight: 500;
      font-size: 0.86rem;
    }

    .nav-subtitle {
      display: block;
      margin-top: 1px;
      color: var(--ink-3);
      font-size: 0.72rem;
      font-weight: 400;
    }

    .sidebar-foot {
      margin-top: auto;
      background: var(--surface-3);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 13px;
    }

    .sidebar-foot strong {
      display: block;
      margin-bottom: 5px;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--ink);
    }

    .sidebar-foot p {
      margin: 0;
      color: var(--ink-3);
      font-size: 0.75rem;
      line-height: 1.55;
    }

    .sidebar-foot code,
    .subtle-panel code {
      font-family: var(--mono);
      font-size: 0.72rem;
      background: var(--surface);
      padding: 1px 5px;
      border-radius: 4px;
      border: 1px solid var(--border);
    }

    .content-area {
      padding: 22px;
      min-width: 0;
    }

    .page-frame {
      min-height: calc(100vh - 44px);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .title-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .title-mark {
      width: 38px;
      height: 38px;
      display: grid;
      place-items: center;
      border-radius: var(--radius-md);
      background: var(--surface-3);
      color: var(--ink-2);
      border: 1px solid var(--border);
      font-family: var(--mono);
      font-weight: 600;
      font-size: 0.7rem;
      letter-spacing: 0.02em;
    }

    .page-title {
      margin: 0;
      font-size: 1.15rem;
      line-height: 1.25;
      font-weight: 600;
      letter-spacing: -0.015em;
      color: var(--ink);
    }

    .page-subtitle {
      margin: 3px 0 0;
      color: var(--ink-2);
      font-size: 0.82rem;
      line-height: 1.45;
    }

    .topbar-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .icon-button,
    .ghost-button,
    .primary-button,
    .danger-button,
    .secondary-button {
      border: 1px solid transparent;
      border-radius: var(--radius-sm);
      transition: background 0.14s ease, box-shadow 0.14s ease, border-color 0.14s ease, transform 0.06s ease;
    }

    .icon-button {
      width: 38px;
      height: 38px;
      background: var(--surface);
      border-color: var(--border-2);
      color: var(--ink);
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
    }

    .ghost-button,
    .primary-button,
    .danger-button,
    .secondary-button {
      padding: 8px 13px;
      font-weight: 500;
      font-size: 0.83rem;
    }

    .ghost-button {
      background: var(--surface);
      border-color: var(--border-2);
      color: var(--ink);
    }

    .ghost-button:hover {
      background: var(--surface-3);
    }

    .secondary-button {
      background: var(--accent-soft);
      color: var(--accent-ink);
      border-color: transparent;
    }

    .secondary-button:hover {
      background: var(--accent-soft-2);
    }

    .primary-button {
      background: var(--accent);
      color: #ffffff;
      border-color: var(--accent);
      box-shadow: var(--shadow-xs);
    }

    .primary-button:hover {
      background: var(--accent-hover);
      border-color: var(--accent-hover);
    }

    .danger-button {
      background: var(--danger-soft);
      color: var(--danger);
      border-color: transparent;
    }

    .danger-button:hover {
      background: #f7dede;
    }

    .ghost-button:active,
    .primary-button:active,
    .danger-button:active,
    .secondary-button:active,
    .icon-button:active {
      transform: translateY(1px);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      box-shadow: none;
    }

    .page-content {
      padding: 22px 24px 26px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .hero-panel,
    .card,
    .table-card,
    .empty-card,
    .stats-card,
    .notice-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-xs);
    }

    .hero-panel {
      padding: 26px;
      display: grid;
      grid-template-columns: 1.5fr 1fr;
      gap: 22px;
    }

    .hero-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 5px 11px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent-ink);
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.01em;
    }

    .hero-eyebrow::before {
      content: "";
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
    }

    .hero-panel h2 {
      margin: 14px 0 8px;
      font-size: 1.5rem;
      line-height: 1.2;
      font-weight: 600;
      letter-spacing: -0.025em;
      color: var(--ink);
    }

    .hero-panel p {
      margin: 0;
      color: var(--ink-2);
      line-height: 1.6;
      font-size: 0.88rem;
    }

    .hero-actions {
      margin-top: 18px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .hero-stack {
      display: grid;
      gap: 12px;
      align-content: start;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(158px, 1fr));
      gap: 12px;
    }

    .stats-card {
      padding: 16px;
    }

    .stats-card small {
      color: var(--ink-3);
      font-weight: 500;
      letter-spacing: 0.01em;
      font-size: 0.76rem;
    }

    .stats-card strong {
      display: block;
      margin-top: 8px;
      font-size: 1.65rem;
      line-height: 1;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--ink);
    }

    .stats-card span {
      display: block;
      margin-top: 8px;
      color: var(--ink-3);
      font-size: 0.78rem;
      line-height: 1.4;
    }

    .card {
      padding: 20px;
    }

    .notice-card {
      padding: 16px;
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }

    .notice-icon {
      width: 34px;
      height: 34px;
      border-radius: 9px;
      display: grid;
      place-items: center;
      background: var(--surface-3);
      border: 1px solid var(--border);
      font-family: var(--mono);
      font-weight: 600;
      font-size: 0.68rem;
      color: var(--ink-2);
      flex-shrink: 0;
    }

    .notice-card strong {
      display: block;
      margin-bottom: 3px;
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--ink);
    }

    .notice-card p {
      margin: 0;
      color: var(--ink-2);
      line-height: 1.55;
      font-size: 0.83rem;
    }

    .section-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .section-head h3,
    .section-head h4 {
      margin: 0;
      font-size: 0.98rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--ink);
    }

    .section-head p {
      margin: 4px 0 0;
      color: var(--ink-2);
      font-size: 0.82rem;
      line-height: 1.5;
    }

    .layout-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1.25fr);
      gap: 16px;
      align-items: start;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .form-grid.single-column {
      grid-template-columns: 1fr;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    .field label {
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--ink);
    }

    .field-hint {
      margin: -1px 0 0;
      color: var(--ink-3);
      font-size: 0.73rem;
    }

    .field input,
    .field select,
    .field textarea {
      width: 100%;
      border: 1px solid var(--border-2);
      background: var(--surface);
      color: var(--ink);
      border-radius: var(--radius-sm);
      padding: 9px 11px;
      min-height: 38px;
      font-size: 0.86rem;
      transition: border-color 0.14s ease, box-shadow 0.14s ease;
    }

    .field input::placeholder,
    .field textarea::placeholder {
      color: var(--ink-3);
    }

    .field textarea {
      resize: vertical;
      min-height: 92px;
      line-height: 1.5;
    }

    .field input:focus,
    .field select:focus,
    .field textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    .field-readonly {
      display: flex;
      align-items: center;
      min-height: 38px;
      padding: 9px 11px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--surface-3);
      color: var(--ink-2);
      font-weight: 500;
      font-size: 0.84rem;
    }

    .field-readonly.compact {
      min-height: 34px;
      padding: 7px 10px;
      font-size: 0.82rem;
    }

    .form-actions,
    .inline-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    .inline-actions {
      margin-top: 0;
      align-items: center;
    }

    .table-card {
      overflow: hidden;
    }

    .table-toolbar {
      padding: 16px 18px;
      display: flex;
      gap: 12px;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      border-bottom: 1px solid var(--border);
    }

    .table-toolbar h4 {
      margin: 0;
      font-size: 0.92rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--ink);
    }

    .search-input {
      width: min(100%, 320px);
      min-height: 38px;
      border: 1px solid var(--border-2);
      border-radius: var(--radius-sm);
      background: var(--surface);
      padding: 0 12px;
      font-size: 0.85rem;
      color: var(--ink);
      transition: border-color 0.14s ease, box-shadow 0.14s ease;
    }

    .search-input::placeholder {
      color: var(--ink-3);
    }

    .search-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    .table-scroll {
      overflow: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 680px;
    }

    th,
    td {
      padding: 11px 16px;
      text-align: left;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }

    th {
      font-size: 0.7rem;
      color: var(--ink-3);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 600;
      background: var(--surface-2);
      white-space: nowrap;
    }

    td {
      font-size: 0.85rem;
      color: var(--ink);
    }

    td strong {
      font-weight: 600;
    }

    tbody tr {
      transition: background 0.12s ease;
    }

    tbody tr:hover {
      background: var(--surface-2);
    }

    tbody tr:last-child td {
      border-bottom: none;
    }

    .table-muted {
      color: var(--ink-3);
      font-size: 0.78rem;
      line-height: 1.45;
    }

    .table-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .action-chip {
      border: 1px solid var(--border-2);
      background: var(--surface);
      color: var(--ink-2);
      border-radius: 7px;
      padding: 5px 10px;
      font-size: 0.78rem;
      font-weight: 500;
      transition: background 0.12s ease, border-color 0.12s ease, color 0.12s ease;
    }

    .action-chip:hover {
      background: var(--surface-3);
      color: var(--ink);
    }

    .action-chip.danger {
      color: var(--danger);
    }

    .action-chip.danger:hover {
      background: var(--danger-soft);
      border-color: transparent;
    }

    .badge-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      border-radius: 6px;
      padding: 3px 8px;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.01em;
      background: var(--surface-3);
      color: var(--ink-2);
      border: 1px solid var(--border);
    }

    .badge.positive {
      background: var(--success-soft);
      color: var(--success);
      border-color: transparent;
    }

    .badge.warning {
      background: var(--warning-soft);
      color: var(--warning);
      border-color: transparent;
    }

    .badge.danger {
      background: var(--danger-soft);
      color: var(--danger);
      border-color: transparent;
    }

    .account-preview-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-top: 12px;
    }

    .account-tree-preview {
      margin-top: 14px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .account-tree-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      border-radius: var(--radius-sm);
      background: var(--surface);
      border: 1px solid var(--border);
    }

    .account-tree-item.current {
      background: var(--accent-soft);
      border-color: transparent;
    }

    .account-tree-item .mono {
      color: var(--ink-3);
      font-size: 0.8rem;
    }

    .account-tree-item.current .mono {
      color: var(--accent-ink);
    }

    .account-tree-item strong {
      font-size: 0.83rem;
      font-weight: 500;
    }

    .inline-note {
      margin-top: 10px;
      padding: 9px 12px;
      border-radius: var(--radius-sm);
      font-size: 0.8rem;
      font-weight: 500;
    }

    .inline-note.warning {
      background: var(--warning-soft);
      color: var(--warning);
    }

    .inline-note.danger {
      background: var(--danger-soft);
      color: var(--danger);
    }

    .chart-account-row.synthetic {
      background: var(--surface-2);
    }

    .chart-account-row.synthetic:hover {
      background: var(--surface-3);
    }

    .chart-blueprint-card {
      background: linear-gradient(180deg, #fcfdff 0%, #f6f9fc 100%);
      border-color: #d9e4ef;
    }

    .chart-blueprint-toolbar {
      gap: 14px;
      align-items: flex-end;
    }

    .chart-blueprint-sheet {
      border: 1px solid #d2dcea;
      background: #ffffff;
      border-radius: 16px;
      padding: 14px;
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.8);
    }

    .chart-blueprint-title {
      width: min(540px, 100%);
      margin: 0 auto 14px;
      padding: 7px 14px;
      border: 1px solid #8b98a8;
      text-align: center;
      font-weight: 700;
      letter-spacing: 0.02em;
      font-size: 0.78rem;
      background: #ffffff;
      color: #0f1720;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    .chart-blueprint-list {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .chart-blueprint-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      padding: 5px 8px;
      border-radius: 10px;
      border: 1px solid transparent;
    }

    .chart-blueprint-row.synthetic {
      background: #cfe0f3;
      border-color: #c2d6eb;
    }

    .chart-blueprint-row.analytical {
      background: #ffffff;
      border-color: #edf2f7;
    }

    .chart-blueprint-row.inactive {
      opacity: 0.72;
    }

    .chart-blueprint-main {
      min-width: 0;
      display: grid;
      grid-template-columns: minmax(110px, 150px) minmax(0, 1fr);
      gap: 10px;
      align-items: center;
    }

    .chart-blueprint-code {
      color: #18324a;
      font-size: 0.74rem;
      font-weight: 600;
      white-space: nowrap;
    }

    .chart-blueprint-row.analytical .chart-blueprint-code {
      color: #4c5a68;
      font-weight: 500;
    }

    .chart-blueprint-content {
      min-width: 0;
    }

    .chart-blueprint-row .tree-account-line {
      min-height: 22px;
    }

    .chart-blueprint-row .tree-toggle {
      width: 18px;
      height: 18px;
      margin-right: 5px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.88);
      border-color: rgba(46, 73, 97, 0.18);
      font-size: 0.66rem;
    }

    .chart-blueprint-row.analytical .tree-toggle {
      background: #f8fafc;
    }

    .chart-blueprint-text {
      min-width: 0;
    }

    .chart-blueprint-name {
      display: block;
      color: #0f1720;
      font-size: 0.78rem;
      font-weight: 600;
      line-height: 1.15;
    }

    .chart-blueprint-row.synthetic .chart-blueprint-name {
      font-weight: 700;
    }

    .chart-blueprint-row .table-muted {
      margin-top: 3px;
      font-size: 0.66rem;
    }

    .chart-blueprint-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 6px;
      flex-wrap: wrap;
      padding-left: 8px;
    }

    .chart-blueprint-actions .action-chip {
      padding: 4px 7px;
      font-size: 0.68rem;
    }

    .blueprint-icon-button {
      width: 24px;
      height: 24px;
      border-radius: 999px;
      border: 1px solid rgba(26, 43, 60, 0.14);
      background: #ffffff;
      color: #17324c;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 0.86rem;
      font-weight: 600;
      line-height: 1;
      padding: 0;
      box-shadow: 0 1px 2px rgba(15, 23, 32, 0.08);
    }

    .blueprint-icon-button:hover {
      background: #f3f7fb;
    }

    .blueprint-icon-button.add {
      color: #204d7a;
    }

    .chart-account-name {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 22px;
    }

    .chart-account-name strong {
      font-size: 0.85rem;
      font-weight: 600;
    }

    .account-indent-guide {
      display: inline-block;
      width: 14px;
      height: 2px;
      border-radius: 2px;
      background: var(--border-2);
      flex-shrink: 0;
    }

    .account-meta {
      margin-top: 7px;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .empty-card {
      padding: 28px;
      text-align: center;
    }

    .empty-card strong {
      display: block;
      font-size: 0.92rem;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--ink);
    }

    .empty-card p {
      margin: 0 auto;
      max-width: 520px;
      color: var(--ink-2);
      line-height: 1.6;
      font-size: 0.84rem;
    }

    .empty-card .inline-actions {
      justify-content: center;
      margin-top: 16px;
    }

    .split-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .trial-balance-split {
      display: grid;
      grid-template-columns: minmax(0, 1.6fr) minmax(280px, 360px);
      gap: 16px;
      flex: 1;
      min-height: 0;
    }

    .trial-balance-split .table-card {
      min-height: 0;
    }

    .ledger-panel {
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: auto;
      overscroll-behavior: contain;
    }

    .ledger-summary {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin: 4px 0 12px;
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      background: var(--surface);
      border: 1px solid var(--border);
    }

    .ledger-summary strong {
      display: block;
      font-family: var(--mono);
      font-size: 0.86rem;
      margin-top: 2px;
    }

    .ledger-entries-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .ledger-entry {
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: 0.82rem;
    }

    .ledger-entry-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .ledger-entry-amounts {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 2px;
    }

    tr.selectable-row {
      cursor: pointer;
    }

    tr.selectable-row:hover {
      background: var(--accent-soft);
    }

    tr.selectable-row.selected {
      background: var(--accent-soft-2);
    }

    @media (max-width: 860px) {
      .trial-balance-split {
        grid-template-columns: 1fr;
      }
    }

    .subtle-panel {
      padding: 16px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
      background: var(--surface-2);
    }

    .subtle-panel h4 {
      margin: 0 0 8px;
      font-size: 0.86rem;
      font-weight: 600;
      color: var(--ink);
    }

    .subtle-panel p,
    .subtle-panel li {
      color: var(--ink-2);
      font-size: 0.83rem;
      line-height: 1.55;
    }

    .subtle-list {
      margin: 0;
      padding-left: 18px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .totals-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .total-card {
      padding: 16px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
      background: var(--surface-2);
    }

    .total-card span {
      color: var(--ink-3);
      font-size: 0.76rem;
      font-weight: 500;
      letter-spacing: 0;
    }

    .total-card strong {
      display: block;
      margin-top: 8px;
      font-size: 1.3rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--ink);
    }

    .total-card small {
      display: block;
      margin-top: 8px;
      color: var(--ink-3);
      line-height: 1.45;
      font-size: 0.76rem;
    }

    .status-highlight {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 12px;
      border-radius: var(--radius-sm);
      font-size: 0.82rem;
      font-weight: 600;
    }

    .status-highlight::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: currentColor;
    }

    .status-highlight.ok {
      background: var(--success-soft);
      color: var(--success);
    }

    .status-highlight.warn {
      background: var(--warning-soft);
      color: var(--warning);
    }

    .toast-stack {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 60;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none;
    }

    .toast {
      min-width: 262px;
      max-width: 342px;
      padding: 12px 14px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
      background: var(--surface);
      box-shadow: var(--shadow-md);
      display: flex;
      gap: 10px;
      align-items: flex-start;
      pointer-events: auto;
      animation: toast-in 0.18s ease;
    }

    .toast .notice-icon {
      width: 28px;
      height: 28px;
      font-size: 0.62rem;
    }

    .toast strong {
      display: block;
      margin-bottom: 2px;
      font-size: 0.84rem;
      font-weight: 600;
      color: var(--ink);
    }

    .toast p {
      margin: 0;
      color: var(--ink-2);
      font-size: 0.79rem;
      line-height: 1.45;
    }

    .toast.success .notice-icon {
      background: var(--success-soft);
      color: var(--success);
      border-color: transparent;
    }

    .toast.error .notice-icon {
      background: var(--danger-soft);
      color: var(--danger);
      border-color: transparent;
    }

    @keyframes toast-in {
      from { opacity: 0; transform: translateY(-6px); }
      to { opacity: 1; transform: none; }
    }

    .cloud-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 11px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface);
      font-size: 0.76rem;
      font-weight: 600;
      white-space: nowrap;
      color: var(--ink-2);
    }

    .cloud-chip.ok {
      color: var(--success);
      background: var(--success-soft);
      border-color: transparent;
    }

    .cloud-chip.syncing {
      color: var(--warning);
      background: var(--warning-soft);
      border-color: transparent;
    }

    .cloud-chip.error {
      color: var(--danger);
      background: var(--danger-soft);
      border-color: transparent;
    }

    .cloud-chip.offline {
      color: var(--ink-3);
      background: var(--surface-3);
      border-color: transparent;
    }

    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(20, 23, 28, 0.32);
      backdrop-filter: blur(2px);
      z-index: 18;
    }


    .modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 70;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .modal-overlay.stacked {
      z-index: 74;
    }

    .modal-backdrop {
      position: absolute;
      inset: 0;
      border: none;
      padding: 0;
      background: rgba(20, 23, 28, 0.42);
      backdrop-filter: blur(3px);
    }

    .modal-shell.fullscreen {
      width: 100vw;
      height: 100vh;
      max-height: 100vh;
      border-radius: 0;
      border: none;
    }

    .modal-shell {
      position: relative;
      z-index: 1;
      width: min(1120px, 100%);
      height: min(92vh, 940px);
      max-height: min(92vh, 940px);
      display: flex;
      flex-direction: column;
      border-radius: 18px;
      border: 1px solid var(--border);
      background: var(--surface);
      box-shadow: var(--shadow-md);
      overflow: hidden;
    }

    .modal-header {
      padding: 18px 20px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-wrap: wrap;
    }

    .modal-title {
      margin: 0;
      font-size: 1.02rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--ink);
    }

    .modal-subtitle {
      margin: 4px 0 0;
      color: var(--ink-2);
      font-size: 0.82rem;
      line-height: 1.5;
    }

    .modal-body {
      padding: 20px;
      overflow: auto;
      overscroll-behavior: contain;
      min-height: 0;
      background: var(--canvas);
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .modal-body .table-card {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    .modal-body .table-scroll {
      flex: 1;
      min-height: 0;
      overflow: auto;
      overscroll-behavior: contain;
    }

    .modal-tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .modal-tab {
      border: 1px solid var(--border-2);
      background: var(--surface);
      color: var(--ink-2);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 0.82rem;
      font-weight: 500;
      transition: background 0.14s ease, color 0.14s ease, border-color 0.14s ease;
    }

    .modal-tab:hover {
      background: var(--surface-3);
      color: var(--ink);
    }

    .modal-tab.active {
      background: var(--accent-soft);
      color: var(--accent-ink);
      border-color: transparent;
    }


    .option-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
    }

    .option-card {
      padding: 20px;
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
      background: var(--surface);
      box-shadow: var(--shadow-xs);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .option-card h3 {
      margin: 0;
      font-size: 0.98rem;
      font-weight: 600;
      color: var(--ink);
    }

    .option-card p {
      margin: 0;
      color: var(--ink-2);
      font-size: 0.83rem;
      line-height: 1.55;
    }

    .option-card small {
      color: var(--ink-3);
      font-size: 0.76rem;
    }

    .checkbox-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 10px;
    }

    .checkbox-item {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 40px;
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--surface);
    }

    .checkbox-item input {
      width: 16px;
      height: 16px;
      margin: 0;
      accent-color: var(--accent);
    }

    .checkbox-item span {
      color: var(--ink);
      font-size: 0.83rem;
      font-weight: 500;
    }

    .tree-toggle {
      width: 28px;
      height: 28px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 7px;
      border: 1px solid var(--border-2);
      background: var(--surface);
      color: var(--ink-2);
      padding: 0;
      margin-right: 8px;
      flex-shrink: 0;
    }

    .tree-toggle:hover {
      background: var(--surface-3);
      color: var(--ink);
    }

    .tree-toggle.placeholder {
      visibility: hidden;
    }

    .tree-account-line {
      display: flex;
      align-items: center;
      min-height: 28px;
    }

    .quick-chart-account-modal {
      width: min(780px, 100%);
      height: auto;
      max-height: min(92vh, 860px);
    }

    .quick-chart-account-header {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 18px;
    }

    .quick-chart-account-context {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .quick-chart-account-context .field-readonly {
      min-height: 42px;
      display: flex;
      align-items: center;
    }

    .tree-account-indent {
      display: inline-block;
      width: 18px;
      flex-shrink: 0;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .summary-card {
      padding: 16px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
      background: var(--surface-2);
    }

    .summary-card span {
      display: block;
      color: var(--ink-3);
      font-size: 0.76rem;
      font-weight: 500;
    }

    .summary-card strong {
      display: block;
      margin-top: 7px;
      color: var(--ink);
      font-size: 0.9rem;
      font-weight: 600;
    }

    .summary-card p {
      margin: 8px 0 0;
      color: var(--ink-2);
      font-size: 0.8rem;
      line-height: 1.5;
    }

    .text-right {
      text-align: right;
    }

    .mono {
      font-family: var(--mono);
      font-variant-numeric: tabular-nums;
      font-feature-settings: "tnum";
      letter-spacing: -0.01em;
    }

    @media (max-width: 1180px) {
      .layout-grid,
      .hero-panel,
      .split-grid,
      .totals-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 960px) {
      .app-shell {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: fixed;
        left: 0;
        top: 0;
        transform: translateX(-102%);
        transition: transform 0.22s ease;
        width: min(84vw, 300px);
        box-shadow: var(--shadow-md);
      }

      .sidebar.open {
        transform: translateX(0);
      }

      .overlay.show {
        display: block;
      }

      .content-area {
        padding: 12px;
      }

      .modal-overlay {
        padding: 14px;
      }

      .modal-shell {
        max-height: calc(100vh - 28px);
      }

      .icon-button {
        display: inline-flex;
      }

      .topbar,
      .page-content {
        padding-left: 18px;
        padding-right: 18px;
      }
    }

    @media (max-width: 680px) {
      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .topbar-actions {
        width: 100%;
        justify-content: flex-start;
      }

      .form-grid,
      .split-grid,
      .stats-grid,
      .totals-grid,
      .account-preview-grid {
        grid-template-columns: 1fr;
      }

      .page-title {
        font-size: 1.05rem;
      }

      .summary-grid {
        grid-template-columns: 1fr;
      }

      .hero-panel h2 {
        font-size: 1.3rem;
      }

      table {
        min-width: 600px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        animation-duration: 0.001ms !important;
        transition-duration: 0.001ms !important;
      }
    }


    /* =========================================================
       Camada visual ERP corporativo
       - Mantém a estrutura e as regras do sistema.
       - Ajusta apenas aparência, hierarquia visual e organização.
       - Referência estética: ERP web moderno, sem uso de marca/logotipo.
       ========================================================= */
    :root {
      --canvas: #f3f5f8;
      --surface: #ffffff;
      --surface-2: #f8fafc;
      --surface-3: #eef2f6;
      --sidebar: #202936;
      --sidebar-2: #18212b;
      --sidebar-muted: #95a1b2;
      --sidebar-text: #e7edf5;
      --ink: #1f2933;
      --ink-2: #56616f;
      --ink-3: #8a96a6;
      --border: #e1e6ee;
      --border-2: #cfd7e2;
      --accent: #b42318;
      --accent-hover: #971b12;
      --accent-soft: #fff0ed;
      --accent-soft-2: #ffdcd6;
      --accent-ink: #8f1b13;
      --support-blue: #1d4ed8;
      --support-blue-soft: #edf4ff;
      --success: #0b7d62;
      --success-soft: #e8f6f1;
      --warning: #a26705;
      --warning-soft: #fff5df;
      --danger: #b42318;
      --danger-soft: #fff0ed;
      --shadow-xs: 0 1px 2px rgba(15, 23, 42, 0.05);
      --shadow-sm: 0 8px 22px rgba(15, 23, 42, 0.05);
      --shadow-md: 0 18px 46px rgba(15, 23, 42, 0.14);
      --radius-xl: 18px;
      --radius-lg: 14px;
      --radius-md: 11px;
      --radius-sm: 9px;
    }

    html,
    body {
      background: radial-gradient(circle at top right, rgba(180, 35, 24, 0.06), transparent 30%), var(--canvas);
      color: var(--ink);
    }

    .app-shell {
      grid-template-columns: 274px minmax(0, 1fr);
    }

    .sidebar {
      background: linear-gradient(180deg, var(--sidebar) 0%, var(--sidebar-2) 100%);
      border-right: 0;
      padding: 20px 14px;
      gap: 18px;
      box-shadow: 4px 0 24px rgba(15, 23, 42, 0.12);
    }

    .brand {
      padding: 8px 8px 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .brand-mark {
      width: 38px;
      height: 38px;
      border-radius: 11px;
      background: linear-gradient(135deg, var(--accent) 0%, #dc4334 100%);
      box-shadow: 0 8px 18px rgba(180, 35, 24, 0.28);
    }

    .brand h1 {
      color: #ffffff;
      font-size: 0.96rem;
      letter-spacing: -0.02em;
    }

    .brand p {
      color: var(--sidebar-muted);
    }

    .menu-section-label {
      margin-top: 4px;
      color: #7f8da0;
    }

    .menu {
      gap: 4px;
    }

    .nav-button {
      position: relative;
      padding: 10px 11px;
      border-radius: 10px;
      color: #c7d1df;
      border-color: transparent;
    }

    .nav-button:hover,
    .nav-button:focus-visible {
      background: rgba(255, 255, 255, 0.07);
      color: #ffffff;
    }

    .nav-button.active {
      background: rgba(255, 255, 255, 0.11);
      color: #ffffff;
      border-color: rgba(255, 255, 255, 0.10);
      box-shadow: inset 3px 0 0 var(--accent), 0 8px 18px rgba(0, 0, 0, 0.12);
    }

    .nav-icon {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #697789;
    }

    .nav-button:hover .nav-icon,
    .nav-button.active .nav-icon {
      background: var(--accent);
      box-shadow: 0 0 0 4px rgba(180, 35, 24, 0.16);
    }

    .nav-title {
      font-size: 0.88rem;
      font-weight: 600;
    }

    .nav-subtitle {
      color: #93a0b2;
    }

    .sidebar-foot {
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(255, 255, 255, 0.10);
      color: var(--sidebar-text);
    }

    .sidebar-foot strong {
      color: #ffffff;
    }

    .sidebar-foot p {
      color: #a9b4c3;
    }

    .sidebar-foot code,
    .subtle-panel code {
      background: rgba(255, 255, 255, 0.10);
      border-color: rgba(255, 255, 255, 0.12);
      color: #ffffff;
    }

    .content-area {
      padding: 24px;
    }

    .page-frame {
      border-color: #dfe5ee;
      border-radius: 20px;
      box-shadow: 0 18px 45px rgba(15, 23, 42, 0.07);
    }

    .topbar {
      padding: 18px 26px;

      color: #946200;
      border-color: #f2d58b;
    }

    .financeiro-legacy-status.partial {
      background: #fff1e9;
      color: #bf5a24;
      border-color: #f2c2a9;
    }

    .financeiro-legacy-status.paid {
      background: #ecf8f3;
      color: #0b7d62;
      border-color: #b7e4d3;
    }

    .financeiro-legacy-grid {

      grid-template-columns: minmax(0, 1.02fr) minmax(0, 1.18fr);

    .financeiro-legacy-stack {
      display: grid;

    /* Fluxo visual e navegação aprimorada da folha */
    .payroll-nav-groups {
      display: flex;
      gap: 12px;
      align-items: stretch;
      overflow-x: auto;
      padding: 2px 2px 8px;
      overscroll-behavior-inline: contain;
      scrollbar-width: thin;
    }

    .payroll-nav-group {
      min-width: max-content;
      padding: 8px;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      background: var(--surface-2);
    }

    .payroll-nav-group-label {
      display: block;
      margin: 0 4px 7px;
      color: var(--ink-3);
      font-size: 0.66rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .payroll-nav-group .modal-tabs {
      flex-wrap: nowrap;
      gap: 5px;
    }

    .payroll-nav-group .modal-tab {
      padding: 7px 10px;
      background: var(--surface);
      white-space: nowrap;
    }

    .workflow-card {
      padding: 18px;
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      background: var(--surface);
      box-shadow: var(--shadow-xs);
    }

    .workflow-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 15px;
      flex-wrap: wrap;
    }

    .workflow-head h3 { margin: 0; font-size: 0.96rem; }
    .workflow-head p { margin: 4px 0 0; color: var(--ink-2); font-size: 0.8rem; }

    .workflow-steps {
      display: grid;
      grid-template-columns: repeat(6, minmax(112px, 1fr));
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 2px;
    }

    .workflow-step {
      position: relative;
      min-width: 112px;
      min-height: 78px;
      padding: 11px 11px 10px;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      background: var(--surface-2);
    }

    .workflow-step-number {
      width: 24px;
      height: 24px;
      display: grid;
      place-items: center;
      margin-bottom: 7px;
      border-radius: 999px;
      background: var(--surface-3);
      color: var(--ink-3);
      font-family: var(--mono);
      font-size: 0.7rem;
      font-weight: 700;
    }

    .workflow-step strong { display: block; font-size: 0.78rem; }
    .workflow-step small { display: block; margin-top: 3px; color: var(--ink-3); font-size: 0.68rem; line-height: 1.35; }
    .workflow-step.done { border-color: transparent; background: var(--success-soft); }
    .workflow-step.done .workflow-step-number { background: var(--success); color: #fff; }
    .workflow-step.done strong, .workflow-step.done small { color: var(--success); }
    .workflow-step.current { border-color: var(--accent); background: var(--accent-soft); box-shadow: 0 0 0 2px var(--accent-soft); }
    .workflow-step.current .workflow-step-number { background: var(--accent); color: #fff; }
    .workflow-step.current strong { color: var(--accent-ink); }
    .workflow-step.warning { background: var(--warning-soft); border-color: transparent; }
    .workflow-step.warning .workflow-step-number { background: var(--warning); color: #fff; }
    .workflow-step.warning strong, .workflow-step.warning small { color: var(--warning); }
    .workflow-step.locked { opacity: 0.62; }

    .operation-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;

      function generateNextPayrollRegistration() {
        const registrations = state.data.payrollEmployees
          .map((employee) => String(employee.registration || "").trim().toUpperCase())
          .filter(Boolean);
        const maxNumber = registrations.reduce((highest, registration) => {
          const digits = registration.match(/(\d+)/g);
          if (!digits) {
            return highest;
          }
          const numeric = Number(digits.join(""));
          return Number.isFinite(numeric) && numeric > highest ? numeric : highest;
        }, 0);
        const maxDigits = registrations.reduce((highest, registration) => {
          const digits = registration.match(/(\d+)/g);
          const size = digits ? digits.join("").length : 0;
          return size > highest ? size : highest;
        }, 3);
        return `MAT-${String(maxNumber + 1).padStart(Math.max(maxDigits, 3), "0")}`;
      }

      function loadCollections() {
        Object.keys(STORAGE_KEYS).forEach((key) => {
          state.data[key] = readCollection(STORAGE_KEYS[key]);
        });
        migrateCollections();
      }

      function migrateCollections() {
        const migratedAccounts = migrateChartAccounts(state.data.chartAccounts);
        state.data.chartAccounts = migratedAccounts;
        persistCollection("chartAccounts");

        migrateDocumentTypes();
        migrateInvoices();
        migrateFinancialNatures();
        migratePayrollCollections();
      }

      // Atualiza naturezas antigas para o modelo hierárquico e para contabilização com débito e crédito.
      function migrateFinancialNatures() {
        if (!Array.isArray(state.data.financialNatures) || !state.data.financialNatures.length) {
          return;
        }
        let changed = false;
        const usedCodes = new Set();
        state.data.financialNatures = state.data.financialNatures.map((nature, index) => {
          const migrated = { ...nature };
          if (!/^\d+(?:\.\d+)*$/.test(clean(migrated.code))) {
            let candidate = String(index + 1);
            while (usedCodes.has(candidate)) candidate = String(Number(candidate) + 1);
            migrated.code = candidate;
            changed = true;
          }
          usedCodes.add(migrated.code);
          if (!migrated.type) { migrated.type = "Analítica"; changed = true; }
          if (typeof migrated.isActive !== "boolean") { migrated.isActive = true; changed = true; }
          const oldMappings = Array.isArray(migrated.accountMappings)
            ? migrated.accountMappings
            : (migrated.chartAccountId ? [{ id: generateId(), chartAccountId: migrated.chartAccountId, costCenterId: "" }] : []);
          migrated.accountMappings = oldMappings.map((mapping) => {
            const next = {
              ...mapping,
              debitAccountId: mapping.debitAccountId || mapping.chartAccountId || "",
              creditAccountId: mapping.creditAccountId || ""
            };
            if ("chartAccountId" in next) { delete next.chartAccountId; changed = true; }
            return next;
          });
          if ("chartAccountId" in migrated) { delete migrated.chartAccountId; changed = true; }
          return migrated;
        });
        if (changed) persistCollection("financialNatures");
      }

      function migrateDocumentTypes() {
        if (!Array.isArray(state.data.documentTypes)) {
          state.data.documentTypes = [];
        }
        const defaultNames = ["Nota de serviço", "Nota de produto"];
        let changed = false;
        defaultNames.forEach((name) => {
          const exists = state.data.documentTypes.some((record) => record.name === name);
          if (!exists) {
            state.data.documentTypes.push({
              id: generateId(),
              code: generateCode("documentTypes"),
              name,
              isActive: true,
              createdAt: new Date().toISOString(),
              updatedAt: new Date().toISOString()
            });
            changed = true;
          }
        });
        if (changed) {
          persistCollection("documentTypes");
        }
      }

      function migrateInvoices() {
        if (!Array.isArray(state.data.invoices) || !state.data.invoices.length) {
          return;
        }
        let changed = false;
        state.data.invoices = state.data.invoices.map((invoice) => {
          if (invoice.kind && invoice.documentNumber !== undefined && invoice.costCenterId !== undefined) {
            return invoice;
          }
          changed = true;
          return {
            ...invoice,
            kind: invoice.kind || "invoice",
            documentNumber: invoice.documentNumber || "",
            costCenterId: invoice.costCenterId || ""
          };
        });
        if (changed) {
          persistCollection("invoices");
        }
      }

      function readCollection(storageKey) {
        try {
          const raw = localStorage.getItem(storageKey);
          if (!raw) {
            return [];
          }
          const parsed = JSON.parse(raw);
          return Array.isArray(parsed) ? parsed : [];
        } catch (error) {
          console.error("Falha ao ler localStorage:", error);
          return [];
        }
      }

      function persistCollection(collectionKey) {
        localStorage.setItem(STORAGE_KEYS[collectionKey], JSON.stringify(state.data[collectionKey]));
      }

      function persistAllCollections() {
        Object.keys(STORAGE_KEYS).forEach((key) => {
          persistCollection(key);
        });
      }

      function getDataSnapshot() {
        return Object.keys(STORAGE_KEYS).reduce((snapshot, key) => {
          snapshot[key] = Array.isArray(state.data[key]) ? [...state.data[key]] : [];
          return snapshot;
        }, {});
      }

      function getLastCloudModified() {
        return parseInt(localStorage.getItem(CLOUD_LAST_MODIFIED_STORAGE_KEY) || "0", 10);
      }

      function setLastCloudModified(value) {
        localStorage.setItem(CLOUD_LAST_MODIFIED_STORAGE_KEY, String(value || 0));
      }

      function saveCollection(collectionKey, records) {
        state.data[collectionKey] = Array.isArray(records) ? records : [];
        persistCollection(collectionKey);
        CLOUD.schedulePush(getDataSnapshot());
      }

      function upsertRecord(collectionKey, record) {
        if (!STORAGE_KEYS[collectionKey]) {
          console.error(`Coleção desconhecida: ${collectionKey}`);
          return record;
        }
        if (!Array.isArray(state.data[collectionKey])) {
          state.data[collectionKey] = [];
        }
        const index = state.data[collectionKey].findIndex((item) => item.id === record.id);
        if (index >= 0) {
          state.data[collectionKey][index] = record;
        } else {
          state.data[collectionKey].push(record);
        }
        persistCollection(collectionKey);
        CLOUD.schedulePush(getDataSnapshot());
        return record;
      }

      function deleteRecord(collectionKey, id, title = "Registro", successMessage = "Registro excluído com sucesso.") {
        if (!STORAGE_KEYS[collectionKey] || !Array.isArray(state.data[collectionKey])) {
          notify("error", title, "Coleção não encontrada para exclusão.");
          return false;
        }
        const before = state.data[collectionKey].length;
        state.data[collectionKey] = state.data[collectionKey].filter((record) => record.id !== id);
        if (state.data[collectionKey].length === before) {
          notify("error", title, "Registro não encontrado.");
          return false;
        }
        persistCollection(collectionKey);
        CLOUD.schedulePush(getDataSnapshot());
        notify("success", title, successMessage);
        renderApp();
        return true;
      }

      // Aplica um snapshot remoto/local completo sem acionar o ciclo de autosave.
      function applyDataSnapshot(snapshot, options = {}) {
        Object.keys(STORAGE_KEYS).forEach((key) => {
          state.data[key] = Array.isArray(snapshot?.[key]) ? snapshot[key] : [];
        });
        migrateCollections();
        persistAllCollections();
        if (options.lastModified) {
          setLastCloudModified(options.lastModified);
        }
      }

      const CLOUD = {
        apiKey: null,
        binId: null,
        status: "offline",
        syncTimer: null,
        syncing: false,

        init() {
          try {
            const stored = localStorage.getItem(CLOUD_CONFIG_STORAGE_KEY);
            if (!stored) {
              state.ui.cloudDraft = createEmptyCloudDraft();
              return;
            }
            const config = JSON.parse(stored);
            this.apiKey = clean(config.apiKey);
            this.binId = clean(config.binId);
            state.ui.cloudDraft = createEmptyCloudDraft(config);
            this.status = this.isConfigured() ? "ok" : "offline";
          } catch (error) {
            console.error("Falha ao carregar configuração de nuvem:", error);
            state.ui.cloudDraft = createEmptyCloudDraft();
            this.status = "error";
          }
        },

        isConfigured() {
          return Boolean(this.apiKey && this.binId);
        },

        saveConfig(apiKey, binId) {
          this.apiKey = clean(apiKey);
          this.binId = clean(binId);
          localStorage.setItem(CLOUD_CONFIG_STORAGE_KEY, JSON.stringify({ apiKey: this.apiKey, binId: this.binId }));
          state.ui.cloudDraft = createEmptyCloudDraft({ apiKey: this.apiKey, binId: this.binId });
          this.status = this.isConfigured() ? "ok" : "offline";
        },

        clearConfig() {
          this.apiKey = null;
          this.binId = null;
          this.status = "offline";
          localStorage.removeItem(CLOUD_CONFIG_STORAGE_KEY);
          state.ui.cloudDraft = createEmptyCloudDraft();
        },

        async push(snapshot) {
          if (!this.isConfigured() || this.syncing) {
            return false;
          }
          this.syncing = true;
          this.status = "syncing";
          renderApp();
          try {
            const ts = Date.now();
            const payload = { ...snapshot, lastModified: ts };
            const response = await fetch(`https://api.jsonbin.io/v3/b/${this.binId}`, {
              method: "PUT",
              headers: {
                "Content-Type": "application/json",
                "X-Master-Key": this.apiKey,
                "X-Bin-Versioning": "false"
              },
              body: JSON.stringify(payload)
            });
            if (!response.ok) {
              throw new Error(`HTTP ${response.status}`);
            }
            setLastCloudModified(ts);
            this.status = "ok";
            renderApp();
            return true;
          } catch (error) {
            this.status = "error";
            console.error("Erro ao enviar dados para JSONBin:", error);
            renderApp();
            throw error;
          } finally {
            this.syncing = false;
          }
        },

        async pull() {
          if (!this.isConfigured()) {
            return null;
          }
          const response = await fetch(`https://api.jsonbin.io/v3/b/${this.binId}/latest`, {
            headers: {
              "X-Master-Key": this.apiKey
            }
          });
          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }
          const json = await response.json();
          return json.record || null;
        },

        async syncIfNewer(silent = false) {
          if (!this.isConfigured()) {
            this.status = "offline";
            renderApp();
            return false;
          }

          this.status = "syncing";
          renderApp();

          try {
            const remote = await this.pull();
            const hasKnownData = remote && Object.keys(STORAGE_KEYS).some((key) => Array.isArray(remote[key]));
            if (!hasKnownData) {
              this.status = "ok";
              renderApp();
              return false;
            }

            const localTs = getLastCloudModified();
            const remoteTs = parseInt(remote.lastModified || "0", 10);

            if (remoteTs > localTs) {
              applyDataSnapshot(remote, { lastModified: remoteTs });
              this.status = "ok";
              renderApp();
              if (!silent) {
                notify("success", "Sincronização", "Os dados mais novos da nuvem foram aplicados ao ERP.");
              }
              return true;
            }

            this.status = "ok";
            renderApp();
            if (!silent) {
              notify("success", "Sincronização", "A cópia local já está atualizada em relação à nuvem.");
            }
            return false;
          } catch (error) {
            this.status = "error";
            console.error("Erro ao sincronizar dados do JSONBin:", error);
            renderApp();
            if (!silent) {
              notify("error", "Sincronização", "Não foi possível verificar os dados na nuvem.");
            }
            return false;
          }
        },

        schedulePush(snapshot) {
          if (!this.isConfigured()) {
            return;
          }
          clearTimeout(this.syncTimer);
          this.syncTimer = window.setTimeout(() => {
            this.push(snapshot).catch(() => {});
          }, 1500);
        }
      };

      function handleInputOrChange(event) {
        const target = event.target;
        if (!(target instanceof HTMLElement)) {
          return;
        }

        if (target.dataset.accountReducedInput) {
          handleAccountReducedCodeInput(target);
          return;
        }

        if (target.dataset.accountLookupFilter) {
          const field = target.dataset.accountLookupFilter;
          state.ui.accountLookup.filters[field] = target.value || "";
          state.ui.accountLookup.page = 1;
          scheduleAccountLookupRefresh();
          return;
        }

        const searchKey = target.dataset.search;
        if (searchKey) {
          state.ui.search[searchKey] = target.value || "";
          if (event.type === "change") {
            renderApp();
          }
          return;
        }

        const payrollWorkEmployeeId = target.dataset.payrollWorkEmployee;
        const payrollWorkField = target.dataset.payrollWorkField;
        if (payrollWorkEmployeeId && payrollWorkField) {
          if (!state.ui.payrollRunDraft.employeeInputs) {
            state.ui.payrollRunDraft.employeeInputs = {};
          }
          const current = state.ui.payrollRunDraft.employeeInputs[payrollWorkEmployeeId] || {};
          state.ui.payrollRunDraft.employeeInputs[payrollWorkEmployeeId] = {
            ...current,
            [payrollWorkField]: target.value
          };
          return;
        }

        const payrollAttendanceImport = target.dataset.payrollAttendanceImport;
        if (payrollAttendanceImport && target instanceof HTMLInputElement && target.type === "file") {
          const file = target.files?.[0];
          importPayrollAttendanceFile(file).catch((error) => {
            console.error("Erro ao importar apuração da folha:", error);
            notify("error", "Importação da apuração", error.message || "Não foi possível importar o arquivo.");
          });
          target.value = "";
          return;
        }

        const payrollTableImportKind = target.dataset.payrollTableImport;
        if (payrollTableImportKind && target instanceof HTMLInputElement && target.type === "file") {
          const file = target.files?.[0];
          importPayrollTableFromExcel(payrollTableImportKind, file).catch((error) => {
            console.error("Erro ao importar planilha da folha:", error);
            notify("error", `Tabela de ${payrollTableImportKind}`, error.message || "Não foi possível importar a planilha.");
          });
          return;
        }

        const form = target.closest("form");
        if (!(form instanceof HTMLFormElement)) {
          return;
        }

        const formType = form.dataset.form;
        const fieldName = target.name;
        if (!fieldName) {
          return;
        }

        const payrollDraftMap = {
          "payroll-employee": "payrollEmployeeDraft",
          "payroll-position": "payrollPositionDraft",
          "payroll-department": "payrollDepartmentDraft",
          "payroll-event": "payrollEventDraft",
          "payroll-parameter": "payrollParameterDraft",
          "payroll-inss": "payrollInssDraft",
          "payroll-irrf": "payrollIrrfDraft",
          "payroll-charge": "payrollEmployerChargeDraft",
          "payroll-period": "payrollPeriodDraft",
          "payroll-mapping": "payrollMappingDraft",
          "payroll-run": "payrollRunDraft",
          "payroll-provision-settings": "payrollProvisionSettingsDraft",
          "payroll-provision-account-config": "payrollProvisionAccountingConfigDraft"
        };

        if (payrollDraftMap[formType]) {
          const draft = state.ui[payrollDraftMap[formType]];
          if (target.type === "checkbox") {
            draft[fieldName] = target.checked;
          } else {
            draft[fieldName] = target.value;
          }
          if (formType === "payroll-employee" && fieldName === "positionId") {
            syncPayrollEmployeeDraftFromPosition();
          }
          if (formType === "payroll-run" && fieldName === "competence") {
            draft.employeeInputs = {};
            state.ui.payrollSelectedRunEmployeeId = "";
          }
          if (["costCenterId", "positionId", "departmentId", "eventId", "type", "calculationType", "tableType", "employeeScope", "competence", "payrollType"].includes(fieldName)) {
            renderApp();
          }
          return;
        }

        const payrollFilterMap = {
          "payroll-employee-filters": "payrollEmployeeFilters",
          "payroll-position-filters": "payrollPositionFilters",
          "payroll-department-filters": "payrollDepartmentFilters"
        };

        if (payrollFilterMap[formType]) {
          state.ui[payrollFilterMap[formType]][fieldName] = target.value;
          return;
        }

        if (formType === "payroll-provision-filters") {
          state.ui.payrollProvisionFilters[fieldName] = target.value;
          state.ui.payrollSelectedProvisionId = "";
          if (event.type === "change") renderApp();
          return;
        }

        if (formType === "payroll-provision-accounting") {
          state.ui.payrollProvisionAccountingDraft[fieldName] = target.value;
          if (fieldName === "competence" && target.value) {
            state.ui.payrollProvisionAccountingDraft.postingDate = `${target.value}-28`;
            state.ui.payrollProvisionAccountingDraft.batchNumber = `PROV-${String(target.value).replace("-", "")}`;
          }
          state.ui.payrollProvisionPreview = null;
          if (event.type === "change") renderApp();
          return;
        }

        if (formType === "invoice") {
          state.ui.invoiceDraft[fieldName] = target.value;
        }

        if (formType === "invoice-line") {
          state.ui.invoiceDraft.lineForm[fieldName] = target.value;
          if (fieldName === "itemId") {
            renderApp();
          }
        }

        if (formType === "invoice-installment") {
          state.ui.invoiceDraft.installmentForm[fieldName] = target.value;
        }

        if (formType === "item") {
          state.ui.itemFormDraft[fieldName] = target.value;
          if (fieldName === "financialNatureId") {
            state.ui.itemNaturePreviewId = target.value;
            renderApp();
          }
        }

        if (formType === "accounting-entry") {
          state.ui.accountingEntryDraft[fieldName] = target.value;
          if (fieldName === "costCenterId" || fieldName === "debitAccountId" || fieldName === "creditAccountId") {
            renderApp();
          }
        }

        if (formType === "accounting-entry-filters") {
          state.ui.accountingEntryFilters[fieldName] = target.value;
          renderApp();
        }

        if (formType === "trial-balance") {
          const nextValue = target instanceof HTMLInputElement && target.type === "checkbox" ? target.checked : target.value;
          state.ui.trialBalanceFilters[fieldName] = nextValue;
          state.ui.trialBalanceFilters.submitted = false;
          renderApp();
        }

        if (formType === "payroll-report-filters") {
          state.ui.payrollReportFilters[fieldName] = target.value;
          state.ui.payrollReportFilters.submitted = false;
          renderApp();
          return;
        }

        if (formType === "supplier-filters") {
          state.ui.supplierFilters[fieldName] = target.value;
          return;
        }

        if (formType === "financial-nature-filters") {
          state.ui.financialNatureFilters[fieldName] = target.value;
          return;
        }

        if (formType === "item-filters") {
          state.ui.itemFilters[fieldName] = target.value;
          return;
        }

        if (formType === "invoice-filters") {
          state.ui.invoiceFilters[fieldName] = target.value;
          return;
        }

        if (formType === "financeiro-filters") {
          state.ui.financeiroFilters[fieldName] = target.value;
          state.ui.search.financeiro = state.ui.financeiroFilters.general || "";
          return;
        }

        if (formType === "cloud-config") {
          state.ui.cloudDraft[fieldName] = target.value;
        }

        if (formType === "chart-account") {
          state.ui.chartAccountFormDraft[fieldName] = target.value;
          syncChartAccountPreview();
        }

        if (formType === "chart-account-child") {
          state.ui.chartAccountChildDraft[fieldName] = target.value;
          syncChartAccountPreview("chart-account-child-preview", state.ui.chartAccountChildDraft);
        }

        if (formType === "financial-nature") {
          state.ui.financialNatureFormDraft[fieldName] = target.value;
        }

        if (formType === "financial-nature-mapping") {
          state.ui.financialNatureFormDraft.mappingForm[fieldName] = target.value;
        }

        if (formType === "cost-center-classification") {
          state.ui.costCenterClassificationFormDraft[fieldName] = target.value;
        }
      }

      function submitTrialBalance(formData) {
        const startDate = clean(formData.get("startDate"));
        const endDate = clean(formData.get("endDate"));
        const costCenterId = clean(formData.get("costCenterId")) || "all";
        const showPreviousBalance = formData.get("showPreviousBalance") === "on";
        const showDebit = formData.get("showDebit") === "on";
        const showCredit = formData.get("showCredit") === "on";
        const showMovement = formData.get("showMovement") === "on";
        const showBalance = formData.get("showBalance") === "on";

        if (!startDate || !endDate) {
          notify("error", "Balancete", "Informe a data inicial e a data final para emitir o balancete.");
          return;
        }

        if (startDate > endDate) {
          notify("error", "Balancete", "A data inicial não pode ser maior que a data final.");
          return;
        }

        if (costCenterId !== "all" && !getCostCenterById(costCenterId)) {
          notify("error", "Balancete", "Selecione um centro de custo válido ou use a opção todos.");
          return;
        }

        if (!showPreviousBalance && !showDebit && !showCredit && !showMovement && !showBalance) {
          notify("error", "Balancete", "Selecione pelo menos uma coluna de configuração para emitir o balancete.");
          return;
        }

        state.ui.trialBalanceFilters = {
          startDate,
          endDate,
          costCenterId,
          showPreviousBalance,
          showDebit,
          showCredit,
          showMovement,
          showBalance,
          submitted: true
        };
        state.ui.trialBalanceSelectedAccountId = "";
        state.ui.trialBalanceModalOpen = false;
        state.ui.trialBalanceReportModalOpen = true;
        notify("success", "Balancete", "Balancete emitido com os filtros informados.");
        renderApp();
      }

        if (!entry) {
          notify("error", "Lançamento contábil", "O lançamento selecionado não foi encontrado.");

      function prepareChartAccountRecord(formData) {
        const id = clean(formData.get("id"));
        const code = formatAccountCode(clean(formData.get("code")));
        const name = clean(formData.get("name"));
        const reducedCode = normalizeReducedCode(formData.get("reducedCode")) || generateNextReducedCode();
        const companyName = clean(formData.get("companyName")) || "Empresa Principal";
        const branchName = clean(formData.get("branchName")) || "Matriz";
        const planName = clean(formData.get("planName")) || "Plano Padrão";

        const balanceNature = clean(formData.get("balanceNature"));
        const isActive = clean(formData.get("status")) !== "Inativa";

        if (!code || !name || !type || !balanceNature) {
          notify("error", "Conta contábil", "Preencha código, nome, tipo e natureza do saldo da conta.");
          return;
        }

        const existing = state.data.chartAccounts.find((record) => record.id === id);
        const duplicateReducedCode = state.data.chartAccounts.find((record) => record.id !== id && normalizeReducedCode(record.reducedCode) === reducedCode);
        if (duplicateReducedCode) {
          notify("error", "Conta contábil", `O código reduzido ${reducedCode} já pertence à conta ${duplicateReducedCode.code} - ${duplicateReducedCode.name}.`);
          return null;
        }
        const validation = validateChartAccount({
          id,
          code,
          name,
          type,
          balanceNature,
          isActive
        });

        if (!validation.valid) {
          notify("error", "Conta contábil", validation.errors[0]);
          return null;
        }

        return {
          existing,
          record: {
          id: existing?.id || generateId(),
          code: validation.record.code,
          normalizedCode: validation.record.normalizedCode,
          reducedCode,
          name,
          companyName,
          branchName,
          planName,
          type,
          level: validation.record.level,
          parentCode: validation.record.parentCode,
          group: validation.record.group,
          balanceNature,
          isActive,
          requiresCodeAdjustment: false,
          adjustmentMessage: "",
          createdAt: existing?.createdAt || new Date().toISOString(),
          updatedAt: new Date().toISOString()
          }
        };
      }

      function submitFinancialNature(formData) {
        const id = clean(formData.get("id"));
        const code = clean(formData.get("code"));
        const name = clean(formData.get("name"));
        const type = clean(formData.get("type")) || "Analítica";
        const isActive = clean(formData.get("status")) !== "Inativa";

        if (!code || !/^\d+(?:\.\d+)*$/.test(code)) {
          notify("error", "Natureza financeira", "Informe um código hierárquico válido, usando números separados por pontos. Ex.: 1.01.001.");
          return;
        }
        if (!name) {
          notify("error", "Natureza financeira", "Informe o nome da natureza financeira.");
          return;
        }
        const duplicateCode = state.data.financialNatures.find((record) => record.id !== id && clean(record.code) === code);
        if (duplicateCode) {
          notify("error", "Natureza financeira", "Já existe uma natureza financeira com esse código.");
          return;
        }
        const parentCode = code.includes(".") ? code.split(".").slice(0, -1).join(".") : "";
        if (parentCode && !state.data.financialNatures.some((record) => record.id !== id && clean(record.code) === parentCode && record.type === "Sintética")) {
          notify("error", "Natureza financeira", `Cadastre primeiro a natureza sintética pai ${parentCode}.`);
          return;
        }
        if (type === "Analítica" && state.data.financialNatures.some((record) => record.id !== id && clean(record.code).startsWith(`${code}.`))) {
          notify("error", "Natureza financeira", "Uma natureza com filhas deve permanecer do tipo Sintética.");
          return;
        }

        const mappings = state.ui.financialNatureFormDraft.accountMappings || [];
        const invalidMapping = mappings.find((mapping) => {
          const debit = mapping.debitAccountId ? getChartAccountById(mapping.debitAccountId) : null;
          const credit = mapping.creditAccountId ? getChartAccountById(mapping.creditAccountId) : null;
          return (mapping.debitAccountId && !isChartAccountAvailableForLinks(debit))
            || (mapping.creditAccountId && !isChartAccountAvailableForLinks(credit))
            || (mapping.debitAccountId && mapping.debitAccountId === mapping.creditAccountId);
        });
        if (invalidMapping) {
          notify("error", "Natureza financeira", "Existe uma contabilização inválida. Revise as contas de débito e crédito.");
          return;
        }

        const existing = state.data.financialNatures.find((record) => record.id === id);
        const record = {
          id: existing?.id || generateId(),
          code,
          name,
          type,
          level: code.split(".").length,
          parentCode,
          isActive,
          accountMappings: mappings.map((mapping) => ({ ...mapping })),
          createdAt: existing?.createdAt || new Date().toISOString(),
          updatedAt: new Date().toISOString()
        };

        upsertRecord("financialNatures", record);
        state.ui.editing.financialNatureId = null;
        state.ui.financialNatureFormDraft = createEmptyFinancialNatureDraft();
        state.ui.financialNatureModalOpen = false;
        notify("success", "Natureza financeira", existing ? "Natureza financeira atualizada com sucesso." : "Natureza financeira cadastrada com sucesso.");
        renderApp();
      }

      // Adiciona uma contabilização opcional por centro de custo. Débito e crédito podem ser informados separadamente.
      function submitFinancialNatureMapping(formData) {
        const debitAccountId = clean(formData.get("debitAccountId"));
        const creditAccountId = clean(formData.get("creditAccountId"));
        const costCenterId = clean(formData.get("costCenterId"));

        if (!debitAccountId && !creditAccountId) {
          notify("error", "Contabilização", "Informe ao menos a conta de débito ou a conta de crédito para adicionar esta linha.");
          return;
        }
        const debitAccount = debitAccountId ? getChartAccountById(debitAccountId) : null;
        const creditAccount = creditAccountId ? getChartAccountById(creditAccountId) : null;
        if (debitAccountId && !isChartAccountAvailableForLinks(debitAccount)) {
          notify("error", "Contabilização", "Selecione uma conta de débito analítica, ativa e válida.");
          return;
        }
        if (creditAccountId && !isChartAccountAvailableForLinks(creditAccount)) {
          notify("error", "Contabilização", "Selecione uma conta de crédito analítica, ativa e válida.");
          return;
        }
        if (debitAccountId && debitAccountId === creditAccountId) {
          notify("error", "Contabilização", "As contas de débito e crédito devem ser diferentes.");
          return;
        }
        if (costCenterId && !getCostCenterById(costCenterId)) {
          notify("error", "Contabilização", "Selecione um centro de custo válido ou deixe em branco para a contabilização padrão.");
          return;

        const duplicate = state.ui.financialNatureFormDraft.accountMappings.find((mapping) => (mapping.costCenterId || "") === (costCenterId || ""));
        if (duplicate) {
          notify("error", "Contabilização", costCenterId ? "Já existe uma contabilização para esse centro de custo." : "Já existe uma contabilização padrão cadastrada.");
          return;
        }
        state.ui.financialNatureFormDraft.accountMappings.push({ id: generateId(), debitAccountId, creditAccountId, costCenterId });
        state.ui.financialNatureFormDraft.mappingForm = { debitAccountId: "", creditAccountId: "", costCenterId: "" };
