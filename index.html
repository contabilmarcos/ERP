      function syncAccountingEventEntries(invoice) {
        const prefix = `auto-event-${invoice.id}-`;
        const currentLineIds = new Set(invoice.items.map((line) => line.id));

        let entries = state.data.accountingEntries.filter((entry) => {
          if (!entry.id.startsWith(prefix)) {
            return true;
          }
          return currentLineIds.has(entry.id.slice(prefix.length));
        });

        const documentType = getDocumentTypeByName(invoice.type);
        const event = documentType ? getAccountingEventByDocumentTypeId(documentType.id) : null;

        if (event && invoice.costCenterId) {
          invoice.items.forEach((line) => {
            const id = prefix + line.id;
            const record = {
              id,
              code: id,
              entryDate: invoice.issueDate,
              description: `${documentType.name} ${invoice.documentNumber || invoice.code} - ${line.itemName}`,
              costCenterId: invoice.costCenterId,
              debitAccountId: line.chartAccountId,
              creditAccountId: event.creditAccountId,
              amount: line.totalPrice,
              origin: "accounting-event",
              sourceInvoiceId: invoice.id,
              createdAt: new Date().toISOString(),
              updatedAt: new Date().toISOString()
            };
            const idx = entries.findIndex((entry) => entry.id === id);
            if (idx >= 0) {
              entries[idx] = record;
            } else {
              entries.push(record);
            }
          });
        }

        saveCollection("accountingEntries", entries);
      }

      function removeInvoiceGeneratedEntries(invoiceId) {
        const eventPrefix = `auto-event-${invoiceId}-`;
        const remainingEntries = state.data.accountingEntries.filter((entry) => {
          if (entry.id.startsWith(eventPrefix)) {
            return false;
          }
          if (entry.origin === "settlement-event" && entry.sourceInvoiceId === invoiceId) {
            return false;
          }
          return true;
        });
        saveCollection("accountingEntries", remainingEntries);
        saveCollection("settlements", state.data.settlements.filter((record) => record.invoiceId !== invoiceId));
      }

      function generateSettlementAccountingEntry(settlement, invoice) {
        const id = `auto-settlement-${settlement.id}`;
        let entries = state.data.accountingEntries.filter((entry) => entry.id !== id);

        const documentType = getDocumentTypeByName(invoice.type);
        const event = documentType ? getSettlementEventByDocumentTypeId(documentType.id) : null;

        if (event && invoice.costCenterId) {
          const installment = invoice.installments.find((item) => item.id === settlement.installmentId);
          entries.push({
            id,
            code: id,
            entryDate: settlement.settlementDate,
            description: `Baixa - ${documentType.name} ${invoice.documentNumber || invoice.code}${installment ? ` - parcela ${installment.installmentNumber}` : ""}`,
            costCenterId: invoice.costCenterId,
            debitAccountId: event.debitAccountId,
            creditAccountId: settlement.payingAccountId,
            amount: settlement.amount,
            origin: "settlement-event",
            sourceInvoiceId: invoice.id,
            sourceSettlementId: settlement.id,
            createdAt: new Date().toISOString(),
            updatedAt: new Date().toISOString()
          });
          saveCollection("accountingEntries", entries);
          return true;
        }

        saveCollection("accountingEntries", entries);
        return false;
      }

      function getPayrollTitlePayableAccountId(payrollTitle) {
        if (!payrollTitle) return "";
        if (payrollTitle.payableAccountId) return payrollTitle.payableAccountId;

        if (payrollTitle.eventId) {
          const runItem = state.data.payrollRunItems.find((item) => item.runId === payrollTitle.runId && item.eventId === payrollTitle.eventId && item.employeeId === payrollTitle.employeeId);
          const mapping = runItem ? getPayrollMappingForItem(runItem) : null;
          if (mapping?.creditAccountId) return mapping.creditAccountId;
          const event = getPayrollEventById(payrollTitle.eventId);
          if (event?.creditAccountId) return event.creditAccountId;
        }

        const params = getActivePayrollParameters(payrollTitle.competence);
        if ((payrollTitle.description || "").toLowerCase().includes("salário líquido")) {
          return params?.salaryPayableAccountId || "";
        }
        return params?.chargesPayableAccountId || params?.salaryPayableAccountId || "";
      }

      function generatePayrollSettlementAccountingEntry(settlement, payrollTitle) {
        const id = `auto-payroll-payable-${settlement.id}`;
        let entries = state.data.accountingEntries.filter((entry) => entry.id !== id);
        const payableAccountId = getPayrollTitlePayableAccountId(payrollTitle);
        const payableAccount = getChartAccountById(payableAccountId);
        const payingAccount = getChartAccountById(settlement.payingAccountId);
        const run = getPayrollRunById(payrollTitle.runId);
        const employee = getPayrollEmployeeById(payrollTitle.employeeId);
        const costCenterId = payrollTitle.costCenterId || employee?.costCenterId || "";

        if (payableAccount && isChartAccountAvailableForLinks(payableAccount) && payingAccount && isChartAccountAvailableForLinks(payingAccount)) {
          entries.push({
            id,
            code: id,
            entryDate: settlement.settlementDate,
            description: `Baixa - ${payrollTitle.description || "Título financeiro da folha"}`,
            costCenterId,
            debitAccountId: payableAccountId,
            creditAccountId: settlement.payingAccountId,
            amount: settlement.amount,
            origin: "settlement-event",
            batchName: "Lançamentos a Pagar",
            sourcePayrollRunId: payrollTitle.runId,
            sourcePayrollRunCode: run?.code || payrollTitle.competence || "Folha",
            sourcePayrollTitleId: payrollTitle.id,
            sourcePayrollTitleCode: payrollTitle.code,
            sourceSettlementId: settlement.id,
            competence: payrollTitle.competence,
            createdAt: new Date().toISOString(),
            updatedAt: new Date().toISOString()
          });
          saveCollection("accountingEntries", entries);
          return true;
        }

        saveCollection("accountingEntries", entries);
        return false;
      }

      function submitSettlement(formData) {
        const target = state.ui.settlementTarget;
        if (!target) {
          notify("error", "Baixa", "Nenhuma parcela selecionada para baixa.");
          return;
        }

        const settlementDate = clean(formData.get("settlementDate"));
        const payingAccountId = clean(formData.get("payingAccountId"));
        const amount = Number(clean(formData.get("amount")) || 0);

        const payingAccount = getChartAccountById(payingAccountId);
        if (!payingAccount || !isChartAccountAvailableForLinks(payingAccount)) {
          notify("error", "Baixa", "Selecione uma conta analítica, ativa e válida para a baixa.");
          return;
        }

        if (!settlementDate) {
          notify("error", "Baixa", "Informe a data da baixa.");
          return;
        }

        if (!amount || amount <= 0) {
          notify("error", "Baixa", "Informe um valor de baixa maior que zero.");
          return;
        }

        if (target.type === "payroll") {
          const payrollTitle = state.data.payrollFinancialEntries.find((record) => record.id === target.payrollTitleId);
          if (!payrollTitle) {
            notify("error", "Baixa", "Título financeiro da folha não encontrado.");
            return;
          }

          const alreadySettled = getPayrollTitleSettledAmount(payrollTitle.id);
          const remaining = roundCurrency(toDecimal(payrollTitle.amount) - alreadySettled);
          if (amount - remaining > 0.009) {
            notify("error", "Baixa", `O valor da baixa não pode ultrapassar o saldo em aberto de ${formatCurrency(remaining)}.`);
            return;
          }

          const settlement = {
            id: generateId(),
            code: generateCode("settlements"),
            payrollFinancialEntryId: payrollTitle.id,
            settlementDate,
            payingAccountId,
            amount: roundCurrency(amount),
            createdAt: new Date().toISOString(),
            updatedAt: new Date().toISOString()
          };

          const nextSettlements = [settlement, ...state.data.settlements];
          saveCollection("settlements", nextSettlements);
          const generated = generatePayrollSettlementAccountingEntry(settlement, payrollTitle);

          const newSettled = roundCurrency(alreadySettled + amount);
          const nextStatus = roundCurrency(toDecimal(payrollTitle.amount) - newSettled) <= 0.009 ? "Quitada" : "Parcial";
          upsertRecord("payrollFinancialEntries", {
            ...payrollTitle,
            payableAccountId: payrollTitle.payableAccountId || getPayrollTitlePayableAccountId(payrollTitle),
            status: nextStatus,
            paidAmount: newSettled,
            remainingAmount: Math.max(0, roundCurrency(toDecimal(payrollTitle.amount) - newSettled)),
            lastSettlementDate: settlementDate,
            payingAccountId,
            updatedAt: payrollNow()
          });

          state.ui.settlementModalOpen = false;
          state.ui.settlementTarget = null;
          state.ui.settlementFormDraft = createEmptySettlementDraft();

          notify(
            "success",
            "Baixa",
            generated
              ? "Título financeiro da folha baixado e lançamento enviado para Contábil > Lançamentos a Pagar."
              : "Título financeiro da folha baixado. Configure a conta a pagar da folha para gerar o lançamento em Contábil > Lançamentos a Pagar."
          );
          renderApp();
          return;
        }

        const invoice = state.data.invoices.find((record) => record.id === target.invoiceId);
        const installment = invoice?.installments.find((item) => item.id === target.installmentId);

        if (!invoice || !installment) {
          notify("error", "Baixa", "Parcela não encontrada.");
          return;
        }

        const alreadySettled = getInstallmentSettledAmount(invoice.id, installment.id);
        const remaining = roundCurrency(installment.amount - alreadySettled);

        if (amount - remaining > 0.009) {
          notify("error", "Baixa", `O valor da baixa não pode ultrapassar o saldo em aberto de ${formatCurrency(remaining)}.`);
          return;
        }

        const settlement = {
          id: generateId(),
          code: generateCode("settlements"),
          invoiceId: invoice.id,
          installmentId: installment.id,
          settlementDate,
          payingAccountId,
          amount: roundCurrency(amount),
          createdAt: new Date().toISOString(),
          updatedAt: new Date().toISOString()
        };

        saveCollection("settlements", [settlement, ...state.data.settlements]);
        const generated = generateSettlementAccountingEntry(settlement, invoice);

        state.ui.settlementModalOpen = false;
        state.ui.settlementTarget = null;
        state.ui.settlementFormDraft = createEmptySettlementDraft();

        notify(

          "Baixa",
          generated
            ? "Baixa registrada e lançamento contábil gerado com sucesso."
            : "Baixa registrada. Cadastre um evento de baixa para esse tipo de documento e informe o centro de custo para gerar o lançamento contábil automaticamente."
        );

      function undoInvoiceSettlement(invoiceId, installmentId) {
        const invoice = state.data.invoices.find((record) => record.id === invoiceId);
        const installment = invoice?.installments.find((item) => item.id === installmentId);
        if (!invoice || !installment) {
          notify("error", "Desfazer baixa", "Parcela não encontrada.");
          return;
        }

        const settlement = getInstallmentSettlements(invoiceId, installmentId)
          .slice()
          .sort((a, b) => String(b.createdAt || "").localeCompare(String(a.createdAt || "")))[0];
        if (!settlement) {
          notify("error", "Desfazer baixa", "Não existe baixa registrada para essa parcela.");
          return;
        }

        saveCollection("settlements", state.data.settlements.filter((record) => record.id !== settlement.id));
        removeAccountingEntriesBySettlementId(settlement.id);
        notify("success", "Desfazer baixa", `Baixa da parcela ${installment.installmentNumber} desfeita com sucesso.`);
        renderApp();
      }

      function undoPayrollSettlement(payrollTitleId) {
        const payrollTitle = state.data.payrollFinancialEntries.find((record) => record.id === payrollTitleId);
        if (!payrollTitle) {
          notify("error", "Desfazer baixa", "Título financeiro da folha não encontrado.");
          return;
        }

        const settlement = getPayrollTitleSettlements(payrollTitleId)
          .slice()
          .sort((a, b) => String(b.createdAt || "").localeCompare(String(a.createdAt || "")))[0];
        if (!settlement) {
          notify("error", "Desfazer baixa", "Não existe baixa registrada para esse título.");
          return;
        }

        saveCollection("settlements", state.data.settlements.filter((record) => record.id !== settlement.id));
        removeAccountingEntriesBySettlementId(settlement.id);

        const newSettled = getPayrollTitleSettledAmount(payrollTitleId);
        const amount = roundCurrency(toDecimal(payrollTitle.amount));
        const remainingAmount = Math.max(0, roundCurrency(amount - newSettled));
        upsertRecord("payrollFinancialEntries", {
          ...payrollTitle,
          status: remainingAmount <= 0.009 ? "Quitada" : (newSettled > 0 ? "Parcial" : "Em aberto"),
          paidAmount: newSettled,
          remainingAmount,
          lastSettlementDate: "",
          payingAccountId: "",
          updatedAt: payrollNow()
        });

        notify("success", "Desfazer baixa", "Baixa do título financeiro da folha desfeita com sucesso.");
        renderApp();
      }

      function getTrialBalanceEntries(filters) {
        return state.data.accountingEntries.filter((entry) => {
          const matchesDate = (!filters.startDate || entry.entryDate >= filters.startDate)

      function getTrialBalanceVisibleColumns(filters) {
        const columns = [];
        if (filters.showPreviousBalance) {
          columns.push({ key: "previousBalance", label: "Saldo anterior", formatter: formatSignedCurrency });
        }
        if (filters.showDebit) {
          columns.push({ key: "debit", label: "Débito", formatter: formatCurrency });
        }
        if (filters.showCredit) {
          columns.push({ key: "credit", label: "Crédito", formatter: formatCurrency });
        }
        if (filters.showMovement) {
          columns.push({ key: "movement", label: "Movimento", formatter: formatSignedCurrency });
        }
        if (filters.showBalance) {
          columns.push({ key: "balance", label: "Saldo", formatter: formatSignedCurrency });
        }
        return columns;
      }

      function getTrialBalanceReport(filters) {
        const beforeEntries = state.data.accountingEntries.filter((entry) => {
          const matchesDate = !filters.startDate || entry.entryDate < filters.startDate;
          const matchesCostCenter = filters.costCenterId === "all" || entry.costCenterId === filters.costCenterId;
          return matchesDate && matchesCostCenter;
        });
        const periodEntries = getTrialBalanceEntries(filters);
        const rowsByAccount = new Map();

        function ensureAccountRow(accountId) {
          if (!rowsByAccount.has(accountId)) {
            rowsByAccount.set(accountId, {
              previousBalance: 0,
              debit: 0,
              credit: 0,
              hasDirectMovement: false
            });
          }
          return rowsByAccount.get(accountId);
        }

        function applyToAccountAndAncestors(accountId, field, amount, markDirect = false) {
          let account = getChartAccountById(accountId);
          while (account) {
            const row = ensureAccountRow(account.id);
            row[field] = roundCurrency(row[field] + amount);
            if (markDirect && account.id === accountId) {
              row.hasDirectMovement = true;
            }
            account = account.parentCode ? getChartAccountByCode(account.parentCode) : null;
          }
        }

        beforeEntries.forEach((entry) => {
          const amount = roundCurrency(Number(entry.amount || 0));
          if (amount <= 0) {
            return;
          }
          applyToAccountAndAncestors(entry.debitAccountId, "previousBalance", amount, true);
          applyToAccountAndAncestors(entry.creditAccountId, "previousBalance", -amount, true);
        });

        periodEntries.forEach((entry) => {
          const amount = roundCurrency(Number(entry.amount || 0));
          if (amount <= 0) {
            return;
          }
          applyToAccountAndAncestors(entry.debitAccountId, "debit", amount, true);
          applyToAccountAndAncestors(entry.creditAccountId, "credit", amount, true);
        });

        const rows = sortAccountsByCode(
          Array.from(rowsByAccount.keys()).map((accountId) => {
            const account = getChartAccountById(accountId);
            if (!account) {
              return null;
            }
            const movement = rowsByAccount.get(accountId);
            const previousBalance = roundCurrency(movement.previousBalance);
            const debit = roundCurrency(movement.debit);
            const credit = roundCurrency(movement.credit);
            const netMovement = roundCurrency(debit - credit);
            const balance = roundCurrency(previousBalance + netMovement);
            const syntheticFromMovement = isSyntheticAccount(account) && (Math.abs(previousBalance) > 0.009 || Math.abs(debit) > 0.009 || Math.abs(credit) > 0.009);
            return {
              account,
              previousBalance,
              debit,
              credit,
              movement: netMovement,
              balance,
              code: account.code,
              normalizedCode: account.normalizedCode,
              level: account.level,
              name: account.name,
              includeInReport: movement.hasDirectMovement || syntheticFromMovement
            };
          }).filter((row) => row && row.includeInReport)
        );

        const analyticalRows = rows.filter((row) => isAnalyticalAccount(row.account));
        const totals = analyticalRows.reduce((acc, row) => ({
          previousBalance: roundCurrency(acc.previousBalance + row.previousBalance),
          debit: roundCurrency(acc.debit + row.debit),
          credit: roundCurrency(acc.credit + row.credit),
          movement: roundCurrency(acc.movement + row.movement),
          balance: roundCurrency(acc.balance + row.balance)
        }), {
          previousBalance: 0,
          debit: 0,
          credit: 0,
          movement: 0,
          balance: 0
        });

        return {
          rows,
          totals,
          entries: periodEntries
        };
      }

      function generateCode(collectionKey) {
        const config = CODE_CONFIG[collectionKey];
        if (!config) {
          return String(collectionKey || "REG").slice(0, 3).toUpperCase() + "-" + Date.now();
        }
        const collection = Array.isArray(state.data[collectionKey]) ? state.data[collectionKey] : [];
        const max = collection.reduce((highest, record) => {
          const number = extractNumericCode(record.code, config.prefix);
          return number > highest ? number : highest;
        }, 0);
        return config.prefix + String(max + 1).padStart(config.digits, "0");
      }

      function extractNumericCode(code, prefix) {
        if (!code || typeof code !== "string" || !code.startsWith(prefix)) {
          return 0;
        }
        const digits = Number(code.slice(prefix.length));
        return Number.isFinite(digits) ? digits : 0;
      }

      function generateId() {
        if (window.crypto && typeof window.crypto.randomUUID === "function") {
          return window.crypto.randomUUID();
        }
        return "id-" + Date.now() + "-" + Math.random().toString(16).slice(2);
      }

      }

      function getChartAccountByCode(code) {

      function getToday() {

      function clean(value) {
        return String(value ?? "").trim();
      }

      // Normaliza o código para comparações e ordenação, removendo os separadores.
      function normalizeAccountCode(code) {
        return clean(code).replace(/\D/g, "");
      }

      // Aplica a máscara contábil em códigos válidos ou parcialmente válidos do plano.
      function formatAccountCode(code) {
        const normalized = normalizeAccountCode(code);
        const cleaned = clean(code).replace(/[^\d.]/g, "");
        const segmentsByLength = {
          1: [1],
          2: [1, 1],
          4: [1, 1, 2],
          6: [1, 1, 2, 2],
          9: [1, 1, 2, 2, 3]
        };
        const segmentLengths = segmentsByLength[normalized.length];

        if (!segmentLengths) {
          return cleaned;
        }

        let cursor = 0;
        return segmentLengths.map((size) => {
          const value = normalized.slice(cursor, cursor + size);
          cursor += size;
          return value;
        }).join(".");
      }

      function isValidChartAccountCode(code) {
        return CHART_ACCOUNT_CODE_PATTERNS.some((pattern) => pattern.regex.test(code));
      }

      function getAccountLevel(code) {
        const formattedCode = formatAccountCode(code);
        const pattern = CHART_ACCOUNT_CODE_PATTERNS.find((item) => item.regex.test(formattedCode));
        return pattern ? pattern.level : 0;
      }

      function getParentAccountCode(code) {
        const formattedCode = formatAccountCode(code);
        const level = getAccountLevel(formattedCode);
        if (level <= 1) {
          return "";
        }
        return formattedCode.split(".").slice(0, level - 1).join(".");
      }

      function getChildSegmentLength(level) {
        const map = {
          2: 1,
          3: 2,
          4: 2,
          5: 3
        };
        return map[level] || 0;
      }

      function getNextChildChartAccountCode(parentAccount) {
        if (!parentAccount || !isSyntheticAccount(parentAccount)) {
          return "";
        }

        const childLevel = getAccountLevel(parentAccount.code) + 1;
        const segmentLength = getChildSegmentLength(childLevel);
        if (!segmentLength) {
          return "";
        }

        const children = state.data.chartAccounts.filter((account) => account.parentCode === parentAccount.code);
        const maxSegment = children.reduce((highest, child) => {
          const segment = formatAccountCode(child.code).split(".")[childLevel - 1] || "";
          const numeric = Number(segment);
          return Number.isFinite(numeric) && numeric > highest ? numeric : highest;
        }, 0);

        const nextNumeric = maxSegment + 1;
        const nextSegment = String(nextNumeric).padStart(segmentLength, "0");
        if (nextSegment.length > segmentLength) {
          return "";
        }

        return `${parentAccount.code}.${nextSegment}`;
      }

      function openChartAccountChildModal(parentAccount) {
        const suggestedCode = getNextChildChartAccountCode(parentAccount);
        if (!suggestedCode) {
          notify("error", "Plano de contas", "Esse grupo já atingiu o limite de códigos filhos disponíveis dentro da máscara atual.");
          return;
        }

        state.ui.chartAccountChildParentId = parentAccount.id;
        state.ui.chartAccountChildDraft = createChildChartAccountDraft(parentAccount, suggestedCode);
        state.ui.chartAccountChildModalOpen = true;
        renderApp();
      }

      function closeChartAccountChildModal(shouldRender = true) {
        state.ui.chartAccountChildModalOpen = false;
        state.ui.chartAccountChildParentId = "";
        state.ui.chartAccountChildDraft = createEmptyChartAccountDraft();
        if (shouldRender) {
          renderApp();
        }
      }

      function getAccountGroup(code) {
        const digit = clean(code).charAt(0);
        return CHART_ACCOUNT_GROUP_LABELS[digit] || "Grupo não identificado";
      }

      function sortAccountsByCode(accounts) {
        return [...accounts].sort((left, right) => {
          const leftCode = (left.normalizedCode || normalizeAccountCode(left.code)).padEnd(9, "0");
          const rightCode = (right.normalizedCode || normalizeAccountCode(right.code)).padEnd(9, "0");
          return leftCode.localeCompare(rightCode) || (left.level || 0) - (right.level || 0) || left.name.localeCompare(right.name);
        });
      }

      function isAnalyticalAccount(account) {
        return account?.type === "Analítica";
      }

      function isSyntheticAccount(account) {
        return account?.type === "Sintética";
      }

      function getAccountChildren(account) {
        return state.data.chartAccounts.filter((record) => record.parentCode === account.code);
      }

      function accountHasChildren(account) {
        return getAccountChildren(account).length > 0;
      }

      function getChartAccountAncestors(account) {
        const ancestors = [];
        let current = account;
        while (current?.parentCode) {
          const parent = getChartAccountByCode(current.parentCode);
          if (!parent) {
            break;
          }
          ancestors.push(parent);
          current = parent;
        }
        return ancestors;
      }

      function getChartAccountTreeRows(searchTerm = "") {
        const records = sortAccountsByCode(state.data.chartAccounts);
        const grouped = new Map();
        records.forEach((record) => {
          const key = record.parentCode || "root";
          if (!grouped.has(key)) {
            grouped.set(key, []);
          }
          grouped.get(key).push(record);
        });

        const term = (searchTerm || "").toLowerCase().trim();
        const visibleIds = new Set();
        if (term) {
          records.forEach((record) => {
            const haystack = `${record.code} ${record.normalizedCode || ""} ${record.name} ${record.type} ${record.group} ${record.balanceNature} ${record.isActive ? "ativa" : "inativa"}`.toLowerCase();
            if (haystack.includes(term)) {
              visibleIds.add(record.id);
              getChartAccountAncestors(record).forEach((ancestor) => visibleIds.add(ancestor.id));
            }
          });
        }

        const rows = [];
        function walk(parentCode = "", depth = 0) {
          const children = grouped.get(parentCode || "root") || [];
          children.forEach((record) => {
            if (term && !visibleIds.has(record.id)) {
              return;
            }
            const hasChildren = Boolean((grouped.get(record.code) || []).length);
            rows.push({
              ...record,
              treeDepth: depth,
              treeHasChildren: hasChildren
            });
            if (term || !state.ui.chartAccountTreeCollapsed[record.id]) {
              walk(record.code, depth + 1);
            }
          });
        }

        walk();
        return rows;
      }

      function getChartAccountLinkSummary(account) {
        const linkedNatures = state.data.financialNatures.filter((nature) => (nature.accountMappings || []).some((mapping) => mapping.chartAccountId === account.id));
        const linkedItems = state.data.items.filter((item) => linkedNatures.some((nature) => nature.id === item.financialNatureId));
        const linkedInvoices = state.data.invoices.filter((invoice) => invoice.items.some((item) => item.chartAccountId === account.id));
        return {
          natures: linkedNatures,
          items: linkedItems,
          invoices: linkedInvoices
        };
      }

      function isChartAccountAvailableForLinks(account) {
        return Boolean(account && isAnalyticalAccount(account) && account.isActive !== false && !account.requiresCodeAdjustment);
      }

      function getSelectableChartAccounts() {
        return sortAccountsByCode(state.data.chartAccounts.filter((account) => isChartAccountAvailableForLinks(account)));
      }

      // Retorna a contabilização padrão (sem centro de custo) da natureza, se existir.
      function getFinancialNatureDefaultAccount(nature) {
        if (!nature) {
          return null;
        }
        const mappings = Array.isArray(nature.accountMappings) ? nature.accountMappings : [];
        const fallback = mappings.find((mapping) => !mapping.costCenterId);
        return fallback ? getChartAccountById(fallback.chartAccountId) : null;
      }

      // Resolve a conta contábil de débito de uma natureza financeira para um centro de custo específico:
      // usa a contabilização exata daquele centro de custo e, se não existir, cai para a contabilização padrão.
      function getFinancialNatureAccountForCostCenter(nature, costCenterId) {
        if (!nature) {
          return null;
        }
        const mappings = Array.isArray(nature.accountMappings) ? nature.accountMappings : [];
        const exact = costCenterId ? mappings.find((mapping) => mapping.costCenterId === costCenterId) : null;
        if (exact) {
          return getChartAccountById(exact.chartAccountId);
        }
        return getFinancialNatureDefaultAccount(nature);
      }

      function isFinancialNatureAvailableForLinks(nature) {
        if (!nature) {
          return false;
        }
        const mappings = Array.isArray(nature.accountMappings) ? nature.accountMappings : [];
        return mappings.some((mapping) => isChartAccountAvailableForLinks(getChartAccountById(mapping.chartAccountId)));
      }

      function getSelectableFinancialNatures() {
        return state.data.financialNatures.filter((nature) => isFinancialNatureAvailableForLinks(nature));
      }

      function getSelectableItems() {
        return state.data.items.filter((item) => {
          const nature = getFinancialNatureById(item.financialNatureId);
          return Boolean(nature && isFinancialNatureAvailableForLinks(nature));
        });
      }

      // Valida a estrutura mínima do plano de contas para preservar hierarquia e vínculos contábeis.
      function validateChartAccount(record) {
        const errors = [];
        const code = formatAccountCode(record.code);
        const normalizedCode = normalizeAccountCode(code);
        const level = getAccountLevel(code);
        const group = getAccountGroup(code);
        const parentCode = getParentAccountCode(code);
        const duplicate = state.data.chartAccounts.find((account) => account.id !== record.id && account.normalizedCode === normalizedCode);
        const parentAccount = parentCode ? getChartAccountByCode(parentCode) : null;
        const currentRecord = record.id ? getChartAccountById(record.id) : null;
        const siblingChildren = state.data.chartAccounts.filter((account) => account.id !== record.id && account.parentCode === code);

        if (!isValidChartAccountCode(code)) {
          errors.push("O código da conta deve seguir a máscara 9.9.99.99.999, usando apenas números e pontos.");
        }

        if (!CHART_ACCOUNT_GROUP_LABELS[code.charAt(0)]) {
          errors.push("O primeiro dígito do código deve identificar um grupo contábil válido entre 1 e 7.");
        }

        if (duplicate) {
          errors.push("Já existe uma conta contábil com esse código normalizado.");
        }

        if (level > 1 && !parentAccount) {
          errors.push("Toda conta abaixo do nível 1 precisa possuir uma conta pai existente.");
        }

        if (parentAccount && isAnalyticalAccount(parentAccount)) {
          errors.push("Não é permitido cadastrar conta filha abaixo de uma conta analítica.");
        }

        if (!["Sintética", "Analítica"].includes(record.type)) {
          errors.push("Selecione um tipo de conta válido.");
        }

        if (!["Devedora", "Credora"].includes(record.balanceNature)) {
          errors.push("Selecione uma natureza do saldo válida.");
        }

        if (record.type === "Analítica" && siblingChildren.length > 0) {
          errors.push("Contas analíticas não podem possuir contas filhas.");
        }

        if (currentRecord && currentRecord.code !== code && accountHasChildren(currentRecord)) {
          errors.push("Não é possível alterar o código de uma conta que já possui contas filhas.");
        }

        if (currentRecord && currentRecord.type !== record.type) {
          const links = getChartAccountLinkSummary(currentRecord);
          if (record.type === "Sintética" && (links.natures.length || links.items.length || links.invoices.length)) {
            errors.push("Não é possível transformar a conta em sintética porque ela já possui vínculos de lançamento.");
          }
          if (record.type === "Analítica" && accountHasChildren(currentRecord)) {
            errors.push("Não é possível transformar a conta em analítica porque ela já possui contas filhas.");
          }
        }

        return {
          valid: errors.length === 0,
          errors,
          record: {
            code,
            normalizedCode,
            level,
            parentCode,
            group
          }
        };
      }

      function generateNextReducedCode() {
        const maxCode = state.data.chartAccounts.reduce((max, account) => {
          const numeric = parseInt(account.reducedCode, 10);
          return Number.isFinite(numeric) && numeric > max ? numeric : max;
        }, 0);
        return String(maxCode + 1).padStart(6, "0");
      }

      function migrateChartAccounts(accounts) {
        const migrated = sortAccountsByCode(accounts.map((account) => migrateChartAccountRecord(account)));
        let nextReducedCode = migrated.reduce((max, account) => {
          const numeric = parseInt(account.reducedCode, 10);
          return Number.isFinite(numeric) && numeric > max ? numeric : max;
        }, 0) + 1;
        migrated.forEach((account) => {
          if (!account.reducedCode) {
            account.reducedCode = String(nextReducedCode).padStart(6, "0");
            nextReducedCode += 1;
          }
        });
        return migrated;
      }

      function migrateChartAccountRecord(account) {
        const formattedCode = formatAccountCode(account.code);
        const validCode = isValidChartAccountCode(formattedCode);
        const level = getAccountLevel(formattedCode);
        const linkedSummary = getChartAccountLinkSummary({
          id: account.id,
          code: account.code
        });
        const linked = linkedSummary.natures.length || linkedSummary.items.length || linkedSummary.invoices.length;
        const groupDigit = clean(account.code).charAt(0);
        const defaultBalanceNature = CHART_ACCOUNT_BALANCE_DEFAULTS[groupDigit] || "Devedora";
        const resolvedType = ["Sintética", "Analítica"].includes(account.type)
          ? account.type
          : linked || level === 5
            ? "Analítica"
            : "Sintética";

        return {
          ...account,
          code: validCode ? formattedCode : clean(account.code),
          normalizedCode: normalizeAccountCode(account.code),
          name: account.name || "",
          type: resolvedType,
          level,
          parentCode: validCode ? getParentAccountCode(formattedCode) : "",
          group: getAccountGroup(account.code),
          balanceNature: ["Devedora", "Credora"].includes(account.balanceNature) ? account.balanceNature : defaultBalanceNature,
          isActive: typeof account.isActive === "boolean" ? account.isActive : true,
          requiresCodeAdjustment: !validCode,
          adjustmentMessage: validCode ? "" : "Código fora da nova máscara contábil. Ajuste recomendado para análise futura.",
          createdAt: account.createdAt || new Date().toISOString(),
          updatedAt: account.updatedAt || new Date().toISOString()
        };
      }

      function loadDefaultChartAccounts() {
        const existingNormalizedCodes = new Set(state.data.chartAccounts.map((account) => account.normalizedCode));
        const virtualAccounts = [...state.data.chartAccounts];
        const additions = [];

        getDefaultChartAccountsSeed().forEach((seed) => {
          const formattedCode = formatAccountCode(seed.code);
          const normalizedCode = normalizeAccountCode(formattedCode);
          if (existingNormalizedCodes.has(normalizedCode)) {
            return;
          }

          const parentCode = getParentAccountCode(formattedCode);
          if (parentCode && !virtualAccounts.some((account) => account.code === parentCode)) {
            return;
          }

          const record = {
            id: generateId(),
            code: formattedCode,
            normalizedCode,
            name: seed.name,
            type: seed.type,
            level: getAccountLevel(formattedCode),
            parentCode,
            group: getAccountGroup(formattedCode),
            balanceNature: seed.balanceNature,
            isActive: true,
            requiresCodeAdjustment: false,
            adjustmentMessage: "",
            createdAt: new Date().toISOString(),
            updatedAt: new Date().toISOString()
          };

          additions.push(record);
          virtualAccounts.push(record);
          existingNormalizedCodes.add(normalizedCode);
        });

        if (!additions.length) {
          notify("error", "Plano de contas", "A base inicial já foi carregada ou possui códigos equivalentes cadastrados.");
          return;
        }

        saveCollection("chartAccounts", sortAccountsByCode([...state.data.chartAccounts, ...additions]));
        notify("success", "Plano de contas", `${additions.length} conta(s) de exemplo foram adicionadas ao plano.`);
        renderApp();
      }

      function roundCurrency(value) {
        return Math.round((Number(value) + Number.EPSILON) * 100) / 100;
      }

      function formatCurrency(value) {
        return new Intl.NumberFormat("pt-BR", {
          style: "currency",
          currency: "BRL"
        }).format(Number(value || 0));
      }

      function formatPercent(value) {
        const numericValue = Number(value || 0);
        return `${new Intl.NumberFormat("pt-BR", { minimumFractionDigits: 2, maximumFractionDigits: 4 }).format(numericValue)}%`;
      }

      function formatSignedCurrency(value) {
        const numericValue = Number(value || 0);
        if (numericValue < 0) {
          return "-" + formatCurrency(Math.abs(numericValue));
        }
        return formatCurrency(numericValue);
      }

      function formatDate(value) {
        if (!value) {
          return "-";
        }
        const date = new Date(value + "T00:00:00");
        if (Number.isNaN(date.getTime())) {
          return value;
        }
        return new Intl.DateTimeFormat("pt-BR").format(date);
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function filterRecords(records, searchTerm, builder) {
        const term = (searchTerm || "").toLowerCase().trim();
        if (!term) {
          return records;
        }
        return records.filter((record) => builder(record).toLowerCase().includes(term));
      }

      function getInvoiceTotals(invoice) {
        const totalItemsAmount = roundCurrency(invoice.items.reduce((sum, item) => sum + Number(item.totalPrice || 0), 0));
        const totalInstallmentsAmount = roundCurrency(invoice.installments.reduce((sum, installment) => sum + Number(installment.amount || 0), 0));
        const difference = roundCurrency(totalItemsAmount - totalInstallmentsAmount);
        return { totalItemsAmount, totalInstallmentsAmount, difference };
      }

      function getInvoiceStatusClass(difference) {
        return Math.abs(difference) <= 0.009 ? "ok" : "warn";
      }

      let lockedScrollY = 0;

      function applyModalScrollLock(shouldLock) {
        const alreadyLocked = document.body.dataset.scrollLocked === "true";
        if (shouldLock && !alreadyLocked) {
          lockedScrollY = window.scrollY || window.pageYOffset || 0;
          document.body.dataset.scrollLocked = "true";
          document.body.style.position = "fixed";
          document.body.style.top = `-${lockedScrollY}px`;
          document.body.style.left = "0";
          document.body.style.right = "0";
          document.body.style.width = "100%";
          document.body.style.overflow = "hidden";
        } else if (!shouldLock && alreadyLocked) {
          document.body.dataset.scrollLocked = "false";
          document.body.style.position = "";
          document.body.style.top = "";
          document.body.style.left = "";
          document.body.style.right = "";
          document.body.style.width = "";
          document.body.style.overflow = "";
          window.scrollTo(0, lockedScrollY);
        }
      }

      function renderInvoiceModal() {
        const draft = state.ui.invoiceDraft;
        const totals = getInvoiceTotals(draft);
        const supplier = getSupplierById(draft.supplierId);
        const selectableItems = getSelectableItems();
        const isLancamento = draft.kind === "lancamento";
        const canLaunch = isLancamento
          ? selectableItems.length > 0
          : state.data.suppliers.length > 0 && selectableItems.length > 0;
        const lineItem = getItemById(draft.lineForm.itemId);
        const lineNature = lineItem ? getFinancialNatureById(lineItem.financialNatureId) : null;
        const lineAccount = lineNature ? getFinancialNatureAccountForCostCenter(lineNature, draft.costCenterId) : null;
        const activeTab = state.ui.activeInvoiceTab || "dados";
        const tabItems = [
          { key: "dados", label: "Dados" },
          { key: "itens", label: `Itens (${draft.items.length})` },
          { key: "financeiro", label: `Financeiro (${draft.installments.length})` },
          { key: "resumo", label: "Resumo" }
        ];

        let tabContent = "";
        if (activeTab === "itens") {
          tabContent = renderInvoiceItemsTab(draft, selectableItems, canLaunch, lineItem, lineNature, lineAccount);
        } else if (activeTab === "financeiro") {
          tabContent = renderInvoiceFinancialTab(draft, canLaunch);
        } else if (activeTab === "resumo") {
          tabContent = renderInvoiceSummaryTab(draft, supplier, totals, canLaunch);
        } else {
          tabContent = renderInvoiceBaseTab(draft, supplier, canLaunch);
        }

        return `
          <div class="modal-overlay">
            <button class="modal-backdrop" type="button" data-action="close-invoice-modal" aria-label="Fechar modal"></button>
            <div class="modal-shell" role="dialog" aria-modal="true" aria-labelledby="invoice-modal-title">
              <div class="modal-header">
                <div>
                  <h3 class="modal-title" id="invoice-modal-title">${draft.id ? `Edição do ${draft.kind === "lancamento" ? "lançamento" : "nota fiscal"} ${escapeHtml(draft.code)}` : `Novo ${draft.kind === "lancamento" ? "lançamento" : "nota fiscal"}`}</h3>
                  <p class="modal-subtitle">A listagem continua visível no módulo fiscal e o cadastro acontece em etapas dentro deste modal.</p>
                </div>
                <div class="inline-actions">
                  ${draft.id ? `<button class="ghost-button" type="button" data-action="${draft.kind === "lancamento" ? "new-lancamento" : "new-invoice"}">Novo rascunho</button>` : ""}
                  <button class="ghost-button" type="button" data-action="close-invoice-modal">Fechar</button>
                </div>
              </div>
              <div class="modal-body">
                ${!canLaunch ? `
                  <section class="notice-card">
                    <div class="notice-icon">PR</div>
                    <div>
                      <strong>Pré-requisitos para lançar no fiscal</strong>
                      <p>${draft.kind === "lancamento" ? "Você precisa ter pelo menos um item vinculado a natureza financeira com conta contábil analítica ativa." : "Você precisa ter pelo menos um fornecedor e um item vinculado a natureza financeira com conta contábil analítica ativa."}</p>
                    </div>
                  </section>
                ` : ""}
                <div class="modal-tabs" aria-label="Etapas da nota fiscal">
                  ${tabItems.map((tab) => `
                    <button class="modal-tab ${activeTab === tab.key ? "active" : ""}" type="button" data-invoice-tab="${tab.key}">
                      ${escapeHtml(tab.label)}
                    </button>
                  `).join("")}
                </div>
                ${tabContent}
              </div>
            </div>
          </div>
        `;
      }

      function renderSettlementModal() {
        const target = state.ui.settlementTarget;
        const draft = state.ui.settlementFormDraft;
        const isPayrollTitle = target?.type === "payroll";
        const payrollTitle = isPayrollTitle ? state.data.payrollFinancialEntries.find((record) => record.id === target.payrollTitleId) : null;
        const invoice = !isPayrollTitle && target ? state.data.invoices.find((record) => record.id === target.invoiceId) : null;
        const installment = invoice ? invoice.installments.find((item) => item.id === target.installmentId) : null;
        const alreadySettled = isPayrollTitle && payrollTitle
          ? getPayrollTitleSettledAmount(payrollTitle.id)
          : (target ? getInstallmentSettledAmount(target.invoiceId, target.installmentId) : 0);
        const titleAmount = isPayrollTitle ? toDecimal(payrollTitle?.amount) : toDecimal(installment?.amount);
        const remaining = titleAmount ? roundCurrency(titleAmount - alreadySettled) : 0;
        const accounts = getSelectableChartAccounts();
        const payrollEmployee = payrollTitle ? getPayrollEmployeeById(payrollTitle.employeeId) : null;
        const subtitle = isPayrollTitle
          ? `Folha de Pagamento ${escapeHtml(payrollTitle?.competence || "")} - ${escapeHtml(payrollTitle?.code || "")}`
          : (invoice ? `${escapeHtml(invoice.type)} ${escapeHtml(invoice.documentNumber || invoice.code)}${installment ? ` - Parcela ${escapeHtml(String(installment.installmentNumber))}` : ""}` : "Parcela");
        const notFound = isPayrollTitle ? !payrollTitle : (!invoice || !installment);

      function renderTrialBalanceLedgerPanel(filters, report) {
        const selectedId = state.ui.trialBalanceSelectedAccountId;

        if (!selectedId) {
          return `
            <div class="subtle-panel ledger-panel">
              <h4>Razão contábil</h4>
              <div class="empty-card">
                <strong>Selecione uma conta</strong>
                <p>Clique em uma conta do balancete ao lado para ver a movimentação do período.</p>
              </div>
            </div>
          `;
        }

        const account = getChartAccountById(selectedId);
        const row = report.rows.find((item) => item.account.id === selectedId);

        if (!account || !row) {
          return `
            <div class="subtle-panel ledger-panel">
              <h4>Razão contábil</h4>
              <div class="empty-card">
                <strong>Conta não encontrada no balancete emitido.</strong>
              </div>
            </div>
          `;
        }

        const isDebitNature = account.balanceNature === "Devedora";
        const ledgerEntries = getAccountLedgerEntries(selectedId, filters);
        let runningBalance = row.previousBalance;

        const entriesHtml = ledgerEntries.map((entry) => {
          const amount = roundCurrency(Number(entry.amount || 0));
          const isDebit = entry.debitAccountId === selectedId;
          const signedEffect = isDebit ? amount : -amount;
          runningBalance = roundCurrency(runningBalance + (isDebitNature ? signedEffect : -signedEffect));
          const counterpartAccount = getChartAccountById(isDebit ? entry.creditAccountId : entry.debitAccountId);
          const costCenter = getCostCenterById(entry.costCenterId);

          return `
            <div class="ledger-entry">
              <div class="ledger-entry-head">
                <span class="mono">${escapeHtml(formatDate(entry.entryDate))}</span>
                <span class="badge ${isDebit ? "positive" : "danger"}">${isDebit ? "Débito" : "Crédito"}</span>
              </div>
              <div>${escapeHtml(entry.description || "-")}</div>
              <div class="table-muted">
                ${counterpartAccount ? `Contrapartida: ${escapeHtml(counterpartAccount.code)} - ${escapeHtml(counterpartAccount.name)}` : "Contrapartida não encontrada"}
                ${costCenter ? ` | ${escapeHtml(costCenter.code)} - ${escapeHtml(costCenter.name)}` : ""}
              </div>
              <div class="ledger-entry-amounts">
                <span class="mono">${escapeHtml(formatCurrency(amount))}</span>
                <span class="mono table-muted">Saldo: ${escapeHtml(formatSignedCurrency(runningBalance))}</span>
              </div>
            </div>
          `;
        }).join("");

        return `
          <div class="subtle-panel ledger-panel">
            <h4>Razão contábil</h4>
            <p class="table-muted mono">${escapeHtml(account.code)} - ${escapeHtml(account.name)}</p>
            <div class="ledger-summary">
              <div>
                <span class="table-muted">Saldo anterior</span>
                <strong>${escapeHtml(formatSignedCurrency(row.previousBalance))}</strong>
              </div>
              <div>
                <span class="table-muted">Saldo final</span>
                <strong>${escapeHtml(formatSignedCurrency(row.balance))}</strong>
              </div>
            </div>
            ${ledgerEntries.length ? `
              <div class="ledger-entries-list">${entriesHtml}</div>
            ` : `
              <div class="empty-card">
                <strong>Nenhum lançamento direto no período.</strong>
                <p>O saldo desta conta pode vir apenas de contas filhas.</p>
              </div>
            `}
          </div>
        `;
      }

      function getAllInstallmentsWithStatus(searchTerm) {
        const rows = [];
        state.data.invoices.forEach((invoice) => {
          invoice.installments.forEach((installment) => {
            const settled = getInstallmentSettledAmount(invoice.id, installment.id);
            const remaining = roundCurrency(installment.amount - settled);
            const status = remaining <= 0.009 ? "Quitada" : (settled > 0 ? "Parcial" : "Em aberto");
            rows.push({ source: "invoice", invoice, installment, dueDate: installment.dueDate, amount: installment.amount, settled, remaining, status });
          });
        });

        state.data.payrollFinancialEntries.forEach((title) => {
          const settled = getPayrollTitleSettledAmount(title.id);
          const remaining = roundCurrency(toDecimal(title.amount) - settled);
          const status = remaining <= 0.009 ? "Quitada" : (settled > 0 ? "Parcial" : (title.status || "Em aberto"));
          rows.push({ source: "payroll", payrollTitle: title, dueDate: title.dueDate, amount: title.amount, settled, remaining, status });
        });

        rows.sort((a, b) => (a.dueDate || "").localeCompare(b.dueDate || "") || (a.source || "").localeCompare(b.source || ""));

        const term = (searchTerm || "").toLowerCase().trim();
        if (!term) {
          return rows;
        }

        return rows.filter((row) => {
          if (row.source === "payroll") {
            const employee = getPayrollEmployeeById(row.payrollTitle.employeeId);
            const costCenter = getCostCenterById(row.payrollTitle.costCenterId);
            const nature = state.data.financialNatures.find((item) => item.id === row.payrollTitle.financialNatureId);
            const haystack = `${row.payrollTitle.code} ${row.payrollTitle.description || ""} Folha de Pagamento ${row.payrollTitle.competence || ""} ${employee?.name || ""} ${costCenter?.name || ""} ${nature?.name || ""}`.toLowerCase();
            return haystack.includes(term);
          }
          const supplier = getSupplierById(row.invoice.supplierId);
          const haystack = `${row.invoice.code} ${row.invoice.documentNumber || ""} ${row.invoice.type} ${supplier?.legalName || ""} ${row.installment.paymentMethod || ""}`.toLowerCase();
          return haystack.includes(term);
        });
      }

      function getFinanceiroRowCounterparty(row) {
        if (row.source === "payroll") {
          const employee = getPayrollEmployeeById(row.payrollTitle.employeeId);
          return employee?.name || "Folha de Pagamento";
        }
        const supplier = getSupplierById(row.invoice.supplierId);
        return supplier?.legalName || "Sem fornecedor";
      }

      function getFinanceiroRowDocument(row) {
        if (row.source === "payroll") {
          return `${row.payrollTitle.code} ${row.payrollTitle.description || ""} ${row.payrollTitle.competence || ""}`.trim();
        }
        return `${row.invoice.documentNumber || row.invoice.code} ${row.invoice.type || ""} ${row.invoice.code || ""}`.trim();
      }

      function getFinanceiroRowStatusClass(status) {
        if (status === "Quitada") {
          return "paid";
        }
        if (status === "Parcial") {
          return "partial";
        }
        return "open";
      }

      function matchFinanceiroDateRange(value, start, end) {
        if (!value) {
          return !start && !end;
        }
        if (start && value < start) {
          return false;
        }
        if (end && value > end) {
          return false;
        }
        return true;
      }

      function getFinanceiroFilteredRows(searchTerm, filters) {
        const rows = getAllInstallmentsWithStatus(searchTerm);
        return rows.filter((row) => {
          const documentText = getFinanceiroRowDocument(row).toLowerCase();
          const counterpartyText = getFinanceiroRowCounterparty(row).toLowerCase();
          const sourceMatch = filters.source === "all" || row.source === filters.source;
          const statusMatch =
            filters.status === "all"
            || (filters.status === "open" && row.status === "Em aberto")
            || (filters.status === "partial" && row.status === "Parcial")
            || (filters.status === "paid" && row.status === "Quitada");
          const creditorMatch = !filters.creditor || counterpartyText.includes(filters.creditor.toLowerCase().trim());
          const dueMatch = matchFinanceiroDateRange(row.dueDate, filters.dueStart, filters.dueEnd);
          const amountMin = toDecimal(filters.amountMin || 0);
          const amountMax = toDecimal(filters.amountMax || 0);
          const amountMinMatch = !filters.amountMin || row.amount >= amountMin;
          const amountMaxMatch = !filters.amountMax || row.amount <= amountMax;
          const documentMatch = !filters.general || documentText.includes(filters.general.toLowerCase().trim()) || counterpartyText.includes(filters.general.toLowerCase().trim());
          return sourceMatch && statusMatch && creditorMatch && dueMatch && amountMinMatch && amountMaxMatch && documentMatch;
        });
      }

      function includesFilterValue(value, filterValue) {
        if (!filterValue) {
          return true;
        }
        return String(value || "").toLowerCase().includes(String(filterValue).toLowerCase().trim());
      }

      function getFilteredSuppliers(filters) {
        return state.data.suppliers.filter((record) => (
          includesFilterValue(record.legalName, filters.legalName)
          && includesFilterValue(record.document, filters.document)
          && includesFilterValue(record.email, filters.email)
          && includesFilterValue(record.phone, filters.phone)
          && includesFilterValue(record.address, filters.address)
        ));
      }

      function getFilteredFinancialNatures(filters) {
        return state.data.financialNatures.filter((record) => {
          const mappings = record.accountMappings || [];
          const accountMatch = !filters.chartAccountId || mappings.some((mapping) => mapping.chartAccountId === filters.chartAccountId);
          const costCenterMatch = !filters.costCenterId || mappings.some((mapping) => mapping.costCenterId === filters.costCenterId);
          return includesFilterValue(record.name, filters.name) && accountMatch && costCenterMatch;
        });
      }

      function getFilteredItems(filters) {
        return state.data.items.filter((record) => (
          includesFilterValue(record.name, filters.name)
          && (!filters.financialNatureId || record.financialNatureId === filters.financialNatureId)
          && includesFilterValue(record.description, filters.description)
        ));
      }

      function getFilteredInvoices(filters) {
        return state.data.invoices.filter((record) => (
          includesFilterValue(record.type, filters.type)
          && (!filters.supplierId || record.supplierId === filters.supplierId)
          && includesFilterValue(record.documentNumber, filters.documentNumber)
          && (!filters.issueDate || record.issueDate === filters.issueDate)
          && (!filters.costCenterId || (record.costCenterId || "") === filters.costCenterId)
          && includesFilterValue(record.description, filters.description)
        ));
      }

      function getFilteredPayrollEmployees(filters) {
        return state.data.payrollEmployees.filter((item) => (
          includesFilterValue(item.name, filters.name)
          && includesFilterValue(normalizeCpf(item.cpf), normalizeCpf(filters.cpf))
          && includesFilterValue(item.registration, filters.registration)
          && (!filters.admissionDate || item.admissionDate === filters.admissionDate)
          && (!filters.terminationDate || item.terminationDate === filters.terminationDate)
          && (!filters.positionId || item.positionId === filters.positionId)
          && (!filters.departmentId || item.departmentId === filters.departmentId)
          && (!filters.costCenterId || item.costCenterId === filters.costCenterId)
          && includesFilterValue(String(item.salaryBase ?? ""), filters.salaryBase)
          && (!filters.salaryType || item.salaryType === filters.salaryType)
          && includesFilterValue(String(item.monthlyJourney ?? ""), filters.monthlyJourney)
          && (!filters.status || item.status === filters.status)
          && includesFilterValue(item.bankData, filters.bankData)
          && includesFilterValue(item.notes, filters.notes)
        ));
      }

      function getFilteredPayrollPositions(filters) {
        return state.data.payrollPositions.filter((item) => (
          includesFilterValue(item.name, filters.name)
          && includesFilterValue(item.cbo, filters.cbo)
          && includesFilterValue(String(item.suggestedSalary ?? ""), filters.suggestedSalary)
          && (!filters.departmentId || item.departmentId === filters.departmentId)
          && (!filters.costCenterId || item.costCenterId === filters.costCenterId)
          && (!filters.chartAccountId || item.chartAccountId === filters.chartAccountId)
          && (!filters.status || item.status === filters.status)
        ));
      }

      function getFilteredPayrollDepartments(filters) {
        return state.data.payrollDepartments.filter((item) => (
          includesFilterValue(item.name, filters.name)
          && (!filters.costCenterId || item.costCenterId === filters.costCenterId)
          && includesFilterValue(item.manager, filters.manager)
          && (!filters.status || item.status === filters.status)
        ));
      }

            ...entry,
            destinationModule: "financeiro",
            destinationName: "Módulo financeiro"

          if (!next.payableAccountId) {
            const payableAccountId = getPayrollTitlePayableAccountId(next);
            if (payableAccountId) {
              next.payableAccountId = payableAccountId;
            }
          }
          if (JSON.stringify(next) !== JSON.stringify(entry)) {

          }
          return next;
        });

        }

      function normalizeCpf(value) {
        return String(value || "").replace(/\D/g, "");
      }

      function formatCpf(value) {
        const digits = normalizeCpf(value);
        if (digits.length !== 11) return value || "";
        return `${digits.slice(0, 3)}.${digits.slice(3, 6)}.${digits.slice(6, 9)}-${digits.slice(9)}`;
      }

      function toDecimal(value) {
        if (typeof value === "number") return Number.isFinite(value) ? value : 0;
        const raw = String(value ?? "").trim().replace(/\s/g, "").replace(/R\$/gi, "").replace(/%/g, "");
        if (!raw) return 0;
        const hasComma = raw.includes(",");
        const hasDot = raw.includes(".");
        const normalized = hasComma && hasDot
          ? raw.replace(/\./g, "").replace(",", ".")
          : hasComma
            ? raw.replace(",", ".")
            : raw;
        const parsed = parseFloat(normalized.replace(/[^0-9.-]/g, ""));
        return Number.isFinite(parsed) ? parsed : 0;
      }

        return new Date().toISOString();

      }

      function submitPayrollEmployee(formData) {
        const draft = state.ui.payrollEmployeeDraft;
        const id = state.ui.editing.payrollEmployeeId;
        const previous = getPayrollEmployeeById(id);
        const cpf = normalizeCpf(formData.get("cpf"));
        const positionId = formData.get("positionId") || "";
        const position = getPayrollPositionById(positionId);
        const salaryBaseFromPosition = roundCurrency(Number(position?.suggestedSalary || 0));
        const record = {
          id: id || generateId(),
          code: draft.code || generateCode("payrollEmployees"),
          name: clean(formData.get("name")),
          cpf,
          registration: String(previous?.registration || clean(formData.get("registration")) || generateNextPayrollRegistration()).trim().toUpperCase(),
          admissionDate: formData.get("admissionDate") || "",
          terminationDate: formData.get("terminationDate") || "",
          positionId,
          departmentId: formData.get("departmentId") || "",
          costCenterId: formData.get("costCenterId") || "",
          salaryBase: salaryBaseFromPosition > 0 ? salaryBaseFromPosition : roundCurrency(toDecimal(formData.get("salaryBase"))),
          salaryType: formData.get("salaryType") || "Mensalista",
          monthlyJourney: toDecimal(formData.get("monthlyJourney")) || 220,
          status: formData.get("status") || "Ativo",
          bankData: clean(formData.get("bankData")),
          notes: clean(formData.get("notes"))
        };
        if (!record.name || cpf.length !== 11 || !record.registration || !record.admissionDate || !record.positionId || !record.costCenterId) {
          notify("error", "Funcionário", "Preencha nome, CPF válido, admissão, cargo e centro de custo.");
          return;
        }
        if (!position) {
          notify("error", "Funcionário", "Selecione um cargo válido para carregar o salário automaticamente.");
          return;
        }
        if (salaryBaseFromPosition <= 0) {
          notify("error", "Funcionário", "O cargo selecionado não possui salário cadastrado. Ajuste o salário no cadastro de cargos.");
          return;
        }
        if (state.data.payrollEmployees.some((item) => item.id !== record.id && normalizeCpf(item.cpf) === cpf)) {
          notify("error", "CPF duplicado", "Já existe funcionário com este CPF.");
          return;
        }
        if (state.data.payrollEmployees.some((item) => item.id !== record.id && String(item.registration || "").trim().toUpperCase() === record.registration)) {
          notify("error", "Matrícula duplicada", "Já existe funcionário com esta matrícula.");
          return;
        }
        upsertRecord("payrollEmployees", { ...previous, ...record, updatedAt: payrollNow(), createdAt: previous?.createdAt || payrollNow() });
        if (!previous || Number(previous.salaryBase) !== Number(record.salaryBase)) {
          upsertRecord("payrollSalaryHistory", { id: generateId(), code: generateCode("payrollSalaryHistory"), employeeId: record.id, salaryBase: record.salaryBase, salaryType: record.salaryType, effectiveDate: record.admissionDate, reason: previous ? "Alteração salarial" : "Salário inicial", createdAt: payrollNow(), updatedAt: payrollNow(), status: "Ativo" });
        }
        state.ui.editing.payrollEmployeeId = null;
        state.ui.payrollEmployeeDraft = createEmptyPayrollEmployeeDraft();
        state.ui.payrollEmployeeModalOpen = false;
        notify("success", "Funcionário", "Cadastro salvo com sucesso.");
        renderApp();
      }

      async function importPayrollTableFromExcel(kind, file) {
        if (!file) return;
        if (!String(file.name || "").toLowerCase().endsWith(".xlsx")) {
          throw new Error("Selecione um arquivo Excel no formato .xlsx.");
        }
        if (typeof DecompressionStream === "undefined") {
          throw new Error("Seu navegador não permite ler .xlsx diretamente neste arquivo local. Atualize o navegador ou importe em um navegador baseado em Chromium.");
        }
        const matrix = await readFirstWorksheetFromXlsx(file);
        const rows = normalizePayrollTableImport(matrix, kind);
        const draftKey = kind === "INSS" ? "payrollInssDraft" : "payrollIrrfDraft";
        state.ui[draftKey].rowsJson = JSON.stringify(rows, null, 2);
        if (!state.ui[draftKey].name || state.ui[draftKey].name === `${kind} parametrizável`) {
          state.ui[draftKey].name = `${kind} importado - ${file.name.replace(/\.xlsx$/i, "")}`;
        }
        notify("success", `Tabela de ${kind}`, `${rows.length} faixas importadas da planilha.`);
        renderApp();
      }

      async function readFirstWorksheetFromXlsx(file) {
        const buffer = await file.arrayBuffer();
        const entries = await unzipXlsxEntries(buffer);
        const sharedStrings = parseXlsxSharedStrings(entries["xl/sharedStrings.xml"] || "");
        const sheetName = Object.keys(entries).find((name) => /^xl\/worksheets\/sheet\d+\.xml$/i.test(name));
        if (!sheetName) throw new Error("A planilha não possui aba de dados reconhecida.");
        return parseXlsxSheet(entries[sheetName], sharedStrings);
      }

      async function unzipXlsxEntries(buffer) {
        const bytes = new Uint8Array(buffer);
        const view = new DataView(buffer);
        const decoder = new TextDecoder("utf-8");
        let eocdOffset = -1;
        for (let i = bytes.length - 22; i >= Math.max(0, bytes.length - 66000); i -= 1) {
          if (view.getUint32(i, true) === 0x06054b50) { eocdOffset = i; break; }
        }
        if (eocdOffset < 0) throw new Error("Arquivo .xlsx inválido ou corrompido.");
        const totalEntries = view.getUint16(eocdOffset + 10, true);
        let centralOffset = view.getUint32(eocdOffset + 16, true);
        const entries = {};
        for (let i = 0; i < totalEntries; i += 1) {
          if (view.getUint32(centralOffset, true) !== 0x02014b50) break;
          const method = view.getUint16(centralOffset + 10, true);
          const compressedSize = view.getUint32(centralOffset + 20, true);
          const nameLength = view.getUint16(centralOffset + 28, true);
          const extraLength = view.getUint16(centralOffset + 30, true);
          const commentLength = view.getUint16(centralOffset + 32, true);
          const localOffset = view.getUint32(centralOffset + 42, true);
          const name = decoder.decode(bytes.slice(centralOffset + 46, centralOffset + 46 + nameLength));
          const localNameLength = view.getUint16(localOffset + 26, true);
          const localExtraLength = view.getUint16(localOffset + 28, true);
          const dataStart = localOffset + 30 + localNameLength + localExtraLength;
          const compressed = bytes.slice(dataStart, dataStart + compressedSize);
          let contentBytes;
          if (method === 0) {
            contentBytes = compressed;
          } else if (method === 8) {
            const stream = new Blob([compressed]).stream().pipeThrough(new DecompressionStream("deflate-raw"));
            contentBytes = new Uint8Array(await new Response(stream).arrayBuffer());
          } else {
            centralOffset += 46 + nameLength + extraLength + commentLength;
            continue;
          }
          if (/\.xml$/i.test(name)) entries[name] = decoder.decode(contentBytes);
          centralOffset += 46 + nameLength + extraLength + commentLength;
        }
        return entries;
      }

      function parseXlsxSharedStrings(xml) {
        if (!xml) return [];
        const doc = new DOMParser().parseFromString(xml, "application/xml");
        return Array.from(doc.getElementsByTagName("si")).map((si) => si.textContent || "");
      }

      function parseXlsxSheet(xml, sharedStrings) {
        const doc = new DOMParser().parseFromString(xml, "application/xml");
        const rows = [];
        Array.from(doc.getElementsByTagName("row")).forEach((rowNode) => {
          const row = [];
          Array.from(rowNode.getElementsByTagName("c")).forEach((cell) => {
            const ref = cell.getAttribute("r") || "A1";
            const colIndex = columnLettersToIndex(ref.replace(/\d/g, ""));
            const type = cell.getAttribute("t");
            const valueNode = cell.getElementsByTagName("v")[0];
            const inlineNode = cell.getElementsByTagName("is")[0];
            let value = valueNode ? valueNode.textContent : "";
            if (type === "s") value = sharedStrings[parseInt(value || "0", 10)] || "";
            else if (type === "inlineStr") value = inlineNode ? inlineNode.textContent || "" : "";
            else if (type === "b") value = value === "1";
            else if (value !== "" && !Number.isNaN(Number(value))) value = Number(value);
            row[colIndex] = value;
          });
          if (row.some((value) => String(value ?? "").trim() !== "")) rows.push(row);
        });
        return rows;
      }

      function columnLettersToIndex(letters) {
        return String(letters || "A").toUpperCase().split("").reduce((sum, letter) => sum * 26 + letter.charCodeAt(0) - 64, 0) - 1;
      }

      function normalizePayrollTableImport(matrix, kind) {
        const rawRows = (matrix || []).filter((row) => row.some((value) => String(value ?? "").trim() !== ""));
        if (!rawRows.length) throw new Error("A planilha está vazia.");
        const firstRow = rawRows[0].map((value) => String(value ?? "").toLowerCase());
        const hasHeader = firstRow.some((value) => /faixa|base|inicial|final|aliq|alíq|dedu|parcela|teto|dependente/.test(value));
        const header = hasHeader ? firstRow : [];
        const body = hasHeader ? rawRows.slice(1) : rawRows;
        const findColumn = (patterns, fallback) => {
          const index = header.findIndex((text) => patterns.some((pattern) => pattern.test(text)));
          return index >= 0 ? index : fallback;
        };
        const indexes = {
          rangeStart: findColumn([/inicial/, /mín/, /min/, /de\b/, /base/], 0),
          rangeEnd: findColumn([/final/, /máx/, /max/, /até/, /ate/], 1),
          rate: findColumn([/aliq/, /alíq/, /percent/, /%/], 2),
          deduction: findColumn([/dedu/, /parcela/], 3),
          ceiling: findColumn([/teto/], -1),
          dependentDeduction: findColumn([/dependente/], -1)
        };
        const rows = body.map((row) => {
          const rangeStart = toDecimal(row[indexes.rangeStart]);
          const rangeEnd = toDecimal(row[indexes.rangeEnd]);
          let rate = toDecimal(row[indexes.rate]);
          if (Math.abs(rate) > 0 && Math.abs(rate) <= 1) rate = rate * 100;
          const deduction = toDecimal(row[indexes.deduction]);
          const ceiling = indexes.ceiling >= 0 ? toDecimal(row[indexes.ceiling]) : (kind === "INSS" ? rangeEnd : 0);
          const dependentDeduction = indexes.dependentDeduction >= 0 ? toDecimal(row[indexes.dependentDeduction]) : 0;
          return { rangeStart, rangeEnd, rate, deduction, ceiling, dependentDeduction };
        }).filter((row) => row.rate > 0 || row.rangeEnd > 0 || row.deduction > 0);
        if (!rows.length) throw new Error("Não encontrei faixas válidas. Use colunas de faixa inicial, faixa final, alíquota e dedução.");
        rows.sort((a, b) => a.rangeStart - b.rangeStart);
        return rows;
      }

      function parsePayrollRowsJson(value) {
        try {
          const rows = JSON.parse(value || "[]");
          if (!Array.isArray(rows)) return null;
          return rows.map((row) => ({ rangeStart: toDecimal(row.rangeStart), rangeEnd: toDecimal(row.rangeEnd), rate: toDecimal(row.rate), deduction: toDecimal(row.deduction), ceiling: toDecimal(row.ceiling), dependentDeduction: toDecimal(row.dependentDeduction) }));
        } catch (error) {
          return null;
        }
      }
