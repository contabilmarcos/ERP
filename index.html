                  </div>
                  <div class="financeiro-legacy-row">
                    <label class="financeiro-legacy-label" for="financeiro-creditor">Credor:</label>
                    <div class="financeiro-legacy-control-group">
                      <input id="financeiro-creditor" class="financeiro-legacy-input" name="creditor" value="${escapeHtml(filters.creditor)}" placeholder="Fornecedor ou funcionário">
                      <span class="financeiro-legacy-icon">⌕</span>
                    </div>
                  </div>
                  <div class="financeiro-legacy-row">
                    <label class="financeiro-legacy-label" for="financeiro-source">Tipo de negócio:</label>
                    <div class="financeiro-legacy-control-group single">
                      <select id="financeiro-source" class="financeiro-legacy-select" name="source">
                        <option value="all" ${filters.source === "all" ? "selected" : ""}>Todos</option>
                        <option value="invoice" ${filters.source === "invoice" ? "selected" : ""}>Notas e lançamentos</option>
                        <option value="payroll" ${filters.source === "payroll" ? "selected" : ""}>Folha de pagamento</option>
                      </select>
                    </div>
                  </div>
                  <div class="financeiro-legacy-row dual">
                    <label class="financeiro-legacy-label" for="financeiro-due-start">Vencimento:</label>
                    <div class="financeiro-legacy-control-group">
                      <input id="financeiro-due-start" class="financeiro-legacy-input" name="dueStart" type="date" value="${escapeHtml(filters.dueStart)}">
                      <span class="financeiro-legacy-icon">📅</span>
                    </div>
                    <span class="financeiro-legacy-range-separator">a</span>
                    <div class="financeiro-legacy-control-group">
                      <input class="financeiro-legacy-input" name="dueEnd" type="date" value="${escapeHtml(filters.dueEnd)}">
                      <span class="financeiro-legacy-icon">📅</span>
                    </div>
                  </div>
                  <div class="financeiro-legacy-row dual">
                    <label class="financeiro-legacy-label" for="financeiro-amount-min">Valor bruto:</label>
                    <div class="financeiro-legacy-control-group single">
                      <input id="financeiro-amount-min" class="financeiro-legacy-input" name="amountMin" type="number" min="0" step="0.01" value="${escapeHtml(filters.amountMin)}" placeholder="0,00">
                    </div>
                    <span class="financeiro-legacy-range-separator">a</span>
                    <div class="financeiro-legacy-control-group single">
                      <input class="financeiro-legacy-input" name="amountMax" type="number" min="0" step="0.01" value="${escapeHtml(filters.amountMax)}" placeholder="0,00">
                    </div>
                  </div>
                  <div class="financeiro-legacy-row">
                    <label class="financeiro-legacy-label" for="financeiro-status">Situação da parcela:</label>
                    <div class="financeiro-legacy-control-group single">
                      <select id="financeiro-status" class="financeiro-legacy-select" name="status">
                        <option value="all" ${filters.status === "all" ? "selected" : ""}>[ Todas ]</option>
                        <option value="open" ${filters.status === "open" ? "selected" : ""}>Em aberto</option>
                        <option value="partial" ${filters.status === "partial" ? "selected" : ""}>Parcial</option>
                        <option value="paid" ${filters.status === "paid" ? "selected" : ""}>Quitada</option>
                      </select>
                    </div>
                  </div>
                  <div class="financeiro-legacy-actions">
                    <button class="financeiro-legacy-button" type="submit">Consultar</button>
                    <button class="financeiro-legacy-button secondary" type="button" data-action="reset-financeiro-filters">Limpar</button>
                  </div>
                </form>
              </section>

              <section class="financeiro-legacy-panel">
                <h4 class="financeiro-legacy-section-title">Resultado da consulta</h4>
                <div class="financeiro-legacy-summary">
                  <article class="financeiro-legacy-stat">
                    <span>Parcelas em aberto</span>
                    <strong>${escapeHtml(String(openCount))}</strong>
                    <small>Saldo em aberto atual</small>
                  </article>
                  <article class="financeiro-legacy-stat">
                    <span>Saldo total</span>
                    <strong>${escapeHtml(formatCurrency(totalOpen))}</strong>
                    <small>Valores ainda pendentes</small>
                  </article>
                  <article class="financeiro-legacy-stat">
                    <span>Baixas parciais</span>
                    <strong>${escapeHtml(String(partialCount))}</strong>
                    <small>Parcelas com liquidação parcial</small>
                  </article>
                  <article class="financeiro-legacy-stat">
                    <span>Total filtrado</span>
                    <strong>${escapeHtml(formatCurrency(totalFiltered))}</strong>
                    <small>${escapeHtml(String(paidCount))} parcela(s) já quitada(s)</small>
                  </article>
                </div>
                ${rows.length ? `
                  <div class="financeiro-legacy-table-wrap">
                    <table class="financeiro-legacy-table">
                      <thead>
                        <tr>
                          <th>Documento</th>
                          <th>Credor</th>
                          <th>Parcela</th>
                          <th>Vencimento</th>
                          <th>Valor</th>
                          <th>Baixado</th>
                          <th>Saldo</th>
                          <th>Situação</th>
                          <th>Ações</th>
                        </tr>
                      </thead>
                      <tbody>
                        ${rows.map((row) => {
                          const statusClass = getFinanceiroRowStatusClass(row.status);
                          const actionAttributes = row.source === "payroll"
                            ? `data-action="open-settlement-modal" data-payroll-title-id="${escapeHtml(row.payrollTitle.id)}"`
                            : `data-action="open-settlement-modal" data-invoice-id="${escapeHtml(row.invoice.id)}" data-installment-id="${escapeHtml(row.installment.id)}"`;
                          const undoActionAttributes = row.source === "payroll"
                            ? `data-action="undo-settlement" data-payroll-title-id="${escapeHtml(row.payrollTitle.id)}"`
                            : `data-action="undo-settlement" data-invoice-id="${escapeHtml(row.invoice.id)}" data-installment-id="${escapeHtml(row.installment.id)}"`;
                          return `
                            <tr>
                              <td>
                                <strong class="mono">${escapeHtml(row.source === "payroll" ? row.payrollTitle.code : (row.invoice.documentNumber || row.invoice.code))}</strong>
                                <div class="table-muted">${escapeHtml(row.source === "payroll" ? `Folha ${row.payrollTitle.competence || ""}` : row.invoice.type)}</div>
                              </td>
                              <td class="table-muted">${escapeHtml(getFinanceiroRowCounterparty(row))}</td>
                              <td class="mono">${escapeHtml(String(row.source === "payroll" ? 1 : row.installment.installmentNumber))}</td>
                              <td>${escapeHtml(formatDate(row.dueDate))}</td>
                              <td class="mono">${escapeHtml(formatCurrency(row.amount))}</td>
                              <td class="mono">${escapeHtml(formatCurrency(row.settled))}</td>
                              <td class="mono">${escapeHtml(formatCurrency(row.remaining))}</td>
                              <td><span class="financeiro-legacy-status ${statusClass}">${escapeHtml(row.status)}</span></td>
                              <td>
                                <div class="table-actions">
                                  <button class="action-chip" type="button" ${actionAttributes} ${row.status === "Quitada" ? "disabled" : ""}>Dar baixa</button>
                                  <button class="action-chip danger" type="button" ${undoActionAttributes} ${row.settled > 0 ? "" : "disabled"}>Desfazer baixa</button>
                                </div>
                              </td>
                            </tr>
                          `;
                        }).join("")}
                      </tbody>
                    </table>
                  </div>
                ` : `
                  <div class="empty-card" style="border-radius:4px;">
                    <strong>Nenhuma parcela encontrada.</strong>
                    <p>Ajuste os parâmetros da consulta ou registre notas fiscais e títulos financeiros para que apareçam aqui.</p>
                  </div>
                `}
              </section>
            </div>
          </section>
        `;
      }

      function renderFiscalView() {
        const filters = state.ui.invoiceFilters || createEmptyInvoiceFilters();
        const selectableItems = getSelectableItems();
        const records = getFilteredInvoices(filters);
        const canLaunchInvoice = state.data.suppliers.length > 0 && selectableItems.length > 0;
        const canLaunchLancamento = selectableItems.length > 0;
        const launchingsCount = state.data.invoices.filter((record) => record.kind === "lancamento").length;
        const invoicesCount = state.data.invoices.length - launchingsCount;
        const totalItems = state.data.invoices.reduce((sum, record) => sum + record.items.length, 0);
        const totalInstallments = state.data.invoices.reduce((sum, record) => sum + record.installments.length, 0);
        const hasFilters = Object.values(filters).some((value) => String(value || "").trim() !== "");

        return `
          <section class="financeiro-legacy-shell">
            <div class="financeiro-legacy-head">
              <h3 class="financeiro-legacy-title">Notas fiscais e lançamentos</h3>
              <p class="financeiro-legacy-note">Bloco superior com os parâmetros do módulo e, abaixo, o resultado da consulta fiscal.</p>
            </div>
            <div class="financeiro-legacy-body">
              ${!canLaunchLancamento ? `
                <section class="notice-card">
                  <div class="notice-icon">PR</div>
                  <div>
                    <strong>Pré-requisitos para lançar no fiscal</strong>
                    <p>Você precisa ter pelo menos um item vinculado a natureza financeira com conta contábil analítica ativa. Para nota fiscal, além disso, também é necessário ter um fornecedor cadastrado.</p>
                  </div>
                </section>
              ` : ""}

              <section class="financeiro-legacy-panel">
                <div class="financeiro-legacy-toolbar">
                  <div>
                    <h4 class="financeiro-legacy-section-title">Parâmetros do módulo</h4>
                    <p class="page-subtitle">Os parâmetros de consulta seguem os campos-base do cadastro de nota fiscal e lançamento.</p>
                  </div>
                  <div class="inline-actions">
                    <button class="secondary-button" type="button" data-action="reset-invoice-filters">Limpar</button>
                    <button class="secondary-button" type="button" data-action="new-lancamento" ${canLaunchLancamento ? "" : "disabled"}>Novo lançamento</button>
                    <button class="primary-button" type="button" data-action="new-invoice" ${canLaunchInvoice ? "" : "disabled"}>Nova nota fiscal</button>
                  </div>
                </div>
                <form data-form="invoice-filters" autocomplete="off">
                  <div class="form-grid">
                    <div class="field">
                      <label for="invoice-filter-type">Tipo</label>
                      <input id="invoice-filter-type" name="type" maxlength="120" value="${escapeHtml(filters.type)}" placeholder="Filtrar por tipo">
                    </div>
                    <div class="field">
                      <label for="invoice-filter-supplier">Fornecedor</label>
                      <select id="invoice-filter-supplier" name="supplierId">
                        <option value="">Todos</option>
                        ${state.data.suppliers.map((record) => `
                          <option value="${escapeHtml(record.id)}" ${filters.supplierId === record.id ? "selected" : ""}>
                            ${escapeHtml(record.code)} - ${escapeHtml(record.legalName)}
                          </option>
                        `).join("")}
                      </select>
                    </div>
                    <div class="field">
                      <label for="invoice-filter-document-number">Número do documento</label>
                      <input id="invoice-filter-document-number" name="documentNumber" maxlength="80" value="${escapeHtml(filters.documentNumber)}" placeholder="Filtrar por número">
                    </div>
                    <div class="field">
                      <label for="invoice-filter-issue-date">Data de emissão</label>
                      <input id="invoice-filter-issue-date" name="issueDate" type="date" value="${escapeHtml(filters.issueDate)}">
                    </div>
                    <div class="field">
                      <label for="invoice-filter-cost-center">Centro de custo</label>
                      <select id="invoice-filter-cost-center" name="costCenterId">
                        <option value="">Todos</option>
                        ${state.data.costCenters.map((record) => `
                          <option value="${escapeHtml(record.id)}" ${filters.costCenterId === record.id ? "selected" : ""}>
                            ${escapeHtml(record.code)} - ${escapeHtml(record.name)}
                          </option>
                        `).join("")}
                      </select>
                    </div>
                    <div class="field">
                      <label for="invoice-filter-description">Descrição</label>
                      <input id="invoice-filter-description" name="description" maxlength="260" value="${escapeHtml(filters.description)}" placeholder="Filtrar por descrição">
                    </div>
                  </div>
                  <div class="form-actions">
                    <button class="primary-button" type="submit">Consultar</button>
                  </div>
                </form>
                <div class="financeiro-legacy-subpanel">
                  <strong>Visão rápida</strong>
                  <ul class="financeiro-legacy-list">
                    <li>Total de registros: ${escapeHtml(String(state.data.invoices.length))}.</li>
                    <li>Notas fiscais: ${escapeHtml(String(invoicesCount))}. Lançamentos: ${escapeHtml(String(launchingsCount))}.</li>
                    <li>Itens lançados: ${escapeHtml(String(totalItems))}. Parcelas lançadas: ${escapeHtml(String(totalInstallments))}.</li>
                  </ul>
                </div>
              </section>

              <section class="financeiro-legacy-panel">
                <div class="financeiro-legacy-toolbar">
                  <div>
                    <h4 class="financeiro-legacy-section-title">Resultado da consulta</h4>
                    <p class="page-subtitle">Notas fiscais e lançamentos já registrados localmente.</p>
                  </div>
                </div>
                ${records.length ? `
                  <div class="financeiro-legacy-table-wrap">
                    <table class="financeiro-legacy-table">
                      <thead>
                        <tr>
                          <th>Código</th>
                          <th>Número</th>
                          <th>Tipo / fornecedor</th>
                          <th>Emissão</th>
                          <th>Descrição</th>
                          <th>Itens</th>
                          <th>Parcelas</th>
                          <th>Total</th>
                          <th>Ações</th>
                        </tr>
                      </thead>
                      <tbody>
                        ${records.map((record) => {
                          const supplierRecord = getSupplierById(record.supplierId);
                          const difference = roundCurrency(record.totalItemsAmount - record.totalInstallmentsAmount);
                          return `
                            <tr>
                              <td class="mono">${escapeHtml(record.code)}</td>
                              <td class="mono">${escapeHtml(record.documentNumber || "-")}</td>
                              <td>
                                <strong>${escapeHtml(record.type)}</strong>
                                <div class="table-muted">${supplierRecord ? escapeHtml(supplierRecord.legalName) : (record.kind === "lancamento" ? "Sem fornecedor" : "Fornecedor indisponível")}</div>
                                ${record.kind === "lancamento" ? `<span class="badge">Lançamento</span>` : ""}
                              </td>
                              <td>${escapeHtml(formatDate(record.issueDate))}</td>
                              <td class="table-muted">${escapeHtml(record.description || "Sem descrição")}</td>
                              <td class="mono">${escapeHtml(String(record.items.length))}</td>
                              <td>
                                <div class="mono">${escapeHtml(String(record.installments.length))}</div>
                                <div class="badge-row" style="margin-top:8px;">
                                  <span class="badge ${Math.abs(difference) <= 0.009 ? "positive" : "warning"}">${Math.abs(difference) <= 0.009 ? "Conciliada" : "Divergente"}</span>
                                </div>
                              </td>
                              <td class="mono">${escapeHtml(formatCurrency(record.totalItemsAmount))}</td>
                              <td>
                                <div class="table-actions">
                                  <button class="action-chip" type="button" data-action="edit-invoice" data-id="${escapeHtml(record.id)}">Editar</button>
                                  <button class="action-chip danger" type="button" data-action="delete-invoice" data-id="${escapeHtml(record.id)}">Excluir</button>
                                </div>
                              </td>
                            </tr>
                          `;
                        }).join("")}
                      </tbody>
                    </table>
                  </div>
                ` : `
                  <div class="empty-card" style="border-radius:4px;">
                    <strong>Nenhuma nota fiscal ou lançamento encontrado.</strong>
                    <p>${hasFilters ? "Nenhum registro corresponde aos parâmetros informados." : "Depois de cadastrar itens, você já pode fazer lançamentos avulsos. Para nota fiscal, cadastre também um fornecedor."}</p>
                    <div class="inline-actions">
                      <button class="primary-button" type="button" data-action="new-invoice" ${canLaunchInvoice ? "" : "disabled"}>Nova nota fiscal</button>
                      <button class="secondary-button" type="button" data-action="new-lancamento" ${canLaunchLancamento ? "" : "disabled"}>Novo lançamento</button>
                    </div>
                  </div>
                `}
              </section>
            </div>
          </section>
        `;
      }

      initialize();

    })();
  </script>
</body>
</html>
