        return `<div class="split-grid"><form class="card" data-form="payroll-parameter"><div class="section-head"><div><h3>Parâmetros gerais</h3><p>Percentuais e contas não ficam fixos no código: são dados editáveis.</p></div></div><div class="form-grid">${renderPayrollInput("activeCompetence", "Competência ativa", draft.activeCompetence, "2026-07", "month")}${renderPayrollInput("paymentDay", "Dia padrão de pagamento", draft.paymentDay, "5")}${renderPayrollInput("defaultMonthlyJourney", "Jornada mensal padrão", draft.defaultMonthlyJourney, "220")}${renderPayrollInput("fgtsRate", "Percentual FGTS", draft.fgtsRate, "0")}${renderPayrollInput("apprenticeFgtsRate", "FGTS aprendiz", draft.apprenticeFgtsRate, "0")}${renderPayrollInput("vacationProvisionRate", "Provisão de férias (%)", draft.vacationProvisionRate, "0")}${renderPayrollInput("thirteenthProvisionRate", "Provisão de 13º (%)", draft.thirteenthProvisionRate, "0")}${renderPayrollInput("provisionChargesRate", "Encargos sobre provisões (%)", draft.provisionChargesRate, "0")}${renderPayrollSelect("defaultPayrollType", "Tipo de cálculo padrão", draft.defaultPayrollType, PAYROLL_TYPES.map((x) => [x, x]))}${renderPayrollSelect("salaryPayableAccountId", "Conta salários a pagar", draft.salaryPayableAccountId, getSelectableChartAccounts().map((item) => [item.id, `${item.code} - ${item.name}`]), "Selecione")}${renderPayrollSelect("chargesPayableAccountId", "Conta encargos a recolher", draft.chargesPayableAccountId, getSelectableChartAccounts().map((item) => [item.id, `${item.code} - ${item.name}`]), "Selecione")}${renderPayrollSelect("status", "Status", draft.status, [["Ativo", "Ativo"], ["Inativo", "Inativo"]])}</div>${renderPayrollFormActions("reset-payroll-parameter")}</form><form class="card" data-form="payroll-period"><div class="section-head"><div><h3>Calendário da folha</h3><p>Abertura, fechamento, pagamento e status por competência.</p></div></div><div class="form-grid">${renderPayrollInput("competence", "Competência", periodDraft.competence, "2026-07", "month")}${renderPayrollInput("openDate", "Data de abertura", periodDraft.openDate, "", "date")}${renderPayrollInput("closeDate", "Data de fechamento", periodDraft.closeDate, "", "date")}${renderPayrollInput("paymentDate", "Data de pagamento", periodDraft.paymentDate, "", "date")}${renderPayrollSelect("status", "Status", periodDraft.status, PAYROLL_PERIOD_STATUS.map((x) => [x, x]))}</div>${renderPayrollFormActions("reset-payroll-period")}</form></div><section class="table-card"><div class="table-toolbar"><h4>Parâmetros e competências</h4></div><div class="table-scroll"><table><thead><tr><th>Tipo</th><th>Código</th><th>Competência</th><th>Status</th><th>Ações</th></tr></thead><tbody>${state.data.payrollParameters.map((item) => `<tr><td>Parâmetros</td><td><strong>${escapeHtml(item.code)}</strong></td><td>${escapeHtml(item.activeCompetence)}</td><td>${renderStatusBadge(item.status)}</td><td>${renderPayrollRowActions("payroll-parameter", item.id)}</td></tr>`).join("")}${state.data.payrollPeriods.map((item) => `<tr><td>Calendário</td><td><strong>${escapeHtml(item.code)}</strong></td><td>${escapeHtml(item.competence)}</td><td>${renderStatusBadge(item.status)}</td><td>${renderPayrollRowActions("payroll-period", item.id)}</td></tr>`).join("")}</tbody></table></div></section>`;
      }

      function renderPayrollTablesPanel() {
        return `<section class="notice-card"><div class="notice-icon">XLS</div><div><strong>INSS e IRRF por importação de Excel</strong><p>As tabelas progressivas de INSS e IRRF são alimentadas por planilha .xlsx. Os encargos patronais permanecem manuais, para você informar a alíquota correta, base, vigência, contas e centro de custo no próprio sistema.</p></div></section><div class="split-grid">${renderPayrollTableForm("INSS", state.ui.payrollInssDraft)}${renderPayrollTableForm("IRRF", state.ui.payrollIrrfDraft)}</div>${renderPayrollChargePanel()}${renderPayrollTablesList()}`;
      }

      function renderPayrollTableForm(kind, draft) {
        const rows = parsePayrollRowsJson(draft.rowsJson) || [];
        const preview = rows.length
          ? `<div class="table-scroll"><table><thead><tr><th>Faixa inicial</th><th>Faixa final</th><th>Alíquota</th><th>Dedução</th><th>Teto</th></tr></thead><tbody>${rows.map((row) => `<tr><td>${formatCurrency(row.rangeStart)}</td><td>${row.rangeEnd ? formatCurrency(row.rangeEnd) : "Sem limite"}</td><td>${formatPercent(row.rate)}</td><td>${formatCurrency(row.deduction)}</td><td>${row.ceiling ? formatCurrency(row.ceiling) : "-"}</td></tr>`).join("")}</tbody></table></div>`
          : `<div class="empty-card" style="padding:16px;"><strong>Nenhuma faixa importada</strong><p>Importe uma planilha .xlsx com as colunas: faixa inicial, faixa final, alíquota e parcela a deduzir.</p></div>`;
        const irrfReductionFields = kind === "IRRF" ? `
          <div class="subtle-panel field full">
            <h4>Regra complementar do redutor mensal do IRRF</h4>
            <p>A tabela progressiva continua calculando o IRRF bruto. Depois, esta regra parametrizada aplica o redutor sobre o imposto calculado.</p>
            <div class="badge-row" style="margin: 10px 0 12px;">
              <label class="badge"><input type="checkbox" name="irrfReductionEnabled" ${draft.irrfReductionEnabled ? "checked" : ""}> Aplicar redutor mensal</label>
            </div>
            <div class="form-grid">
              ${renderPayrollInput("irrfExemptionLimit", "Zerar IRRF até rendimento", draft.irrfExemptionLimit, "5000,00")}
              ${renderPayrollInput("irrfReductionUpperLimit", "Aplicar redução parcial até", draft.irrfReductionUpperLimit, "7350,00")}
              ${renderPayrollInput("irrfReductionFixedValue", "Valor fixo da fórmula", draft.irrfReductionFixedValue, "978,62")}
              ${renderPayrollInput("irrfReductionFactor", "Fator sobre rendimento", draft.irrfReductionFactor, "0,133145")}
              ${renderPayrollTextarea("irrfReductionFormula", "Fórmula do redutor parcial", draft.irrfReductionFormula, "valorFixoReducao - fatorReducao * rendimentoTributavel")}
            </div>
            <p class="field-hint">Variáveis disponíveis na fórmula: <code>rendimentoTributavel</code>, <code>baseIrrf</code>, <code>impostoBruto</code>, <code>valorFixoReducao</code>, <code>fatorReducao</code>, <code>limiteIsencao</code> e <code>limiteReducao</code>.</p>
          </div>` : "";
        return `<form class="card" data-form="payroll-${kind.toLowerCase()}"><div class="section-head"><div><h3>Tabela de ${kind}</h3><p>Importe a tabela progressiva por Excel. O cálculo usa as faixas importadas e não mantém valores legais fixos no código.</p></div></div><div class="form-grid single-column">${renderPayrollInput("name", "Nome", draft.name, `${kind} vigente`)}${renderPayrollInput("competenceStart", "Competência inicial", draft.competenceStart, "2026-07", "month")}${renderPayrollInput("competenceEnd", "Competência final", draft.competenceEnd, "", "month")}<div class="field"><label for="payroll-${kind.toLowerCase()}-file">Importar planilha Excel</label><input id="payroll-${kind.toLowerCase()}-file" type="file" accept=".xlsx,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" data-payroll-table-import="${kind}"><p class="field-hint">Formato aceito: .xlsx. Colunas esperadas: faixa inicial, faixa final, alíquota e dedução. Se a alíquota vier como 0,075, o sistema converte para 7,5%.</p></div>${renderPayrollTextarea("rowsJson", "Faixas importadas / JSON técnico", draft.rowsJson, "[{ rangeStart, rangeEnd, rate, deduction, ceiling }]")}<div class="field full"><label>Prévia das faixas</label>${preview}</div>${irrfReductionFields}${renderPayrollSelect("status", "Status", draft.status, [["Ativo", "Ativo"], ["Inativo", "Inativo"]])}</div>${renderPayrollFormActions(`reset-payroll-${kind.toLowerCase()}`)}</form>`;
      }

      function renderPayrollChargePanel() {
        const draft = state.ui.payrollEmployerChargeDraft;
        return `<form class="card" data-form="payroll-charge"><div class="section-head"><div><h3>Encargos patronais</h3><p>Cadastro manual de INSS patronal, RAT, FAP, terceiros, FGTS ou outras contribuições por vigência e centro de custo.</p></div></div><div class="form-grid">${renderPayrollInput("name", "Nome", draft.name, "INSS patronal")}${renderPayrollInput("rate", "Percentual", draft.rate, "0")}${renderPayrollSelect("baseType", "Base", draft.baseType, [["Base INSS", "Base INSS"], ["Base FGTS", "Base FGTS"], ["Salário base", "Salário base"]])}${renderPayrollInput("competenceStart", "Vigência inicial", draft.competenceStart, "2026-07", "month")}${renderPayrollInput("competenceEnd", "Vigência final", draft.competenceEnd, "", "month")}${renderPayrollSelect("costCenterId", "Centro de custo aplicável", draft.costCenterId, [["", "Todos"], ...state.data.costCenters.map((item) => [item.id, `${item.code} - ${item.name}`])])}${renderPayrollSelect("debitAccountId", "Conta débito", draft.debitAccountId, getSelectableChartAccounts().map((item) => [item.id, `${item.code} - ${item.name}`]), "Opcional")}${renderPayrollSelect("creditAccountId", "Conta crédito", draft.creditAccountId, getSelectableChartAccounts().map((item) => [item.id, `${item.code} - ${item.name}`]), "Opcional")}${renderPayrollSelect("financialNatureId", "Natureza financeira", draft.financialNatureId, getSelectableFinancialNatures().map((item) => [item.id, `${item.code} - ${item.name}`]), "Opcional")}${renderPayrollSelect("status", "Status", draft.status, [["Ativo", "Ativo"], ["Inativo", "Inativo"]])}</div>${renderPayrollFormActions("reset-payroll-charge")}</form>`;
      }

      function renderPayrollTablesList() {
        const rows = [
          ...state.data.payrollInssTables.map((item) => ({ ...item, kind: "INSS" })),
          ...state.data.payrollIrrfTables.map((item) => ({ ...item, kind: "IRRF" })),
          ...state.data.payrollEmployerCharges.map((item) => ({ ...item, kind: "Encargo" }))
        ];
        return `<section class="table-card"><div class="table-toolbar"><h4>Tabelas e encargos cadastrados</h4></div><div class="table-scroll"><table><thead><tr><th>Tipo</th><th>Código</th><th>Nome</th><th>Vigência</th><th>Status</th><th>Ações</th></tr></thead><tbody>${rows.length ? rows.map((item) => `<tr><td>${escapeHtml(item.kind)}</td><td><strong>${escapeHtml(item.code)}</strong></td><td>${escapeHtml(item.name)}${item.kind === "IRRF" ? `<div class="table-muted">${getDefaultPayrollIrrfReductionRule(item).enabled ? "Redutor mensal ativo" : "Redutor mensal inativo"}</div>` : ""}</td><td>${escapeHtml(item.competenceStart || "-")} a ${escapeHtml(item.competenceEnd || "vigente")}</td><td>${renderStatusBadge(item.status)}</td><td>${item.kind === "INSS" ? renderPayrollRowActions("payroll-inss", item.id) : item.kind === "IRRF" ? renderPayrollRowActions("payroll-irrf", item.id) : renderPayrollRowActions("payroll-charge", item.id)}</td></tr>`).join("") : renderPayrollEmptyRow(6, "Nenhuma tabela ou encargo cadastrado.")}</tbody></table></div></section>`;
      }

      function renderPayrollProcessingPanel() {
        const draft = state.ui.payrollRunDraft;
        const employees = getPayrollProcessingEmployees(draft);
        const runs = filterRecords(state.data.payrollRuns, state.ui.search.payrollRuns, (item) => `${item.code} ${item.competence} ${item.payrollType} ${item.status}`);
        const selectedRun = getPayrollRunById(state.ui.payrollSelectedRunId) || runs[0];
        const selectedItems = selectedRun ? state.data.payrollRunItems.filter((item) => item.runId === selectedRun.id) : [];
        return `<div class="layout-grid"><form class="card" data-form="payroll-run"><div class="section-head"><div><h3>Processamento mensal</h3><p>Selecione competência, tipo de folha e informe a apuração de cada funcionário antes de calcular.</p></div></div><div class="form-grid">${renderPayrollInput("competence", "Competência", draft.competence, "2026-07", "month")}${renderPayrollSelect("payrollType", "Tipo de folha", draft.payrollType, PAYROLL_TYPES.map((x) => [x, x]))}${renderPayrollSelect("employeeScope", "Funcionários", draft.employeeScope, [["active", "Somente ativos"], ["all", "Ativos e afastados"]])}${renderPayrollTextarea("notes", "Observações", draft.notes, "Observações do processamento")}</div>${renderPayrollProcessingEmployeeGrid(employees)}<div class="form-actions"><button class="primary-button" type="button" data-action="payroll-process-run">Gerar cálculo</button></div></form><section class="table-card">${renderPayrollTableHeader("Folhas processadas", "payrollRuns", "Pesquisar competência")}<div class="table-scroll"><table><thead><tr><th>Folha</th><th>Tipo</th><th>Funcionários</th><th>Proventos</th><th>Descontos</th><th>Líquido</th><th>Status</th><th>Ações</th></tr></thead><tbody>${runs.length ? runs.map((run) => `<tr class="selectable-row ${selectedRun?.id === run.id ? "selected" : ""}" data-action="payroll-select-run" data-id="${run.id}"><td><strong>${escapeHtml(run.code)}</strong><div class="table-muted">${escapeHtml(run.competence)}</div></td><td>${escapeHtml(run.payrollType)}</td><td>${run.employeeCount || 0}</td><td>${formatCurrency(run.totalEarnings)}</td><td>${formatCurrency(run.totalDeductions)}</td><td><strong>${formatCurrency(run.netPayable)}</strong></td><td>${renderStatusBadge(run.status)}</td><td><div class="table-actions"><button class="action-chip" type="button" data-action="payroll-select-run" data-id="${run.id}">Ver</button>${canReopenPayrollRun(run) ? `<button class="action-chip danger" type="button" data-action="payroll-reopen-run" data-id="${run.id}">Reabrir</button>` : `<button class="action-chip" type="button" data-action="payroll-close-run" data-id="${run.id}">Fechar</button>`}</div></td></tr>`).join("") : renderPayrollEmptyRow(8, "Nenhuma folha processada.")}</tbody></table></div></section></div>${renderPayrollRunDetails(selectedRun, selectedItems)}`;
      }

      function renderPayrollProcessingEmployeeGrid(employees) {
        const rows = employees.map((employee) => {
          const input = getPayrollEmployeeWorkInput(employee.id, employee);
          const field = (name, value, step = "0.01", max = "744") => `<input type="number" min="0" max="${max}" step="${step}" value="${escapeHtml(String(value))}" data-payroll-work-employee="${escapeHtml(employee.id)}" data-payroll-work-field="${name}" aria-label="${escapeHtml(name)} de ${escapeHtml(employee.name)}">`;
          return `<tr><td><strong>${escapeHtml(employee.name)}</strong><div class="table-muted">${escapeHtml(employee.registration || employee.code || "-")}</div></td><td>${formatCurrency(employee.salaryBase)}</td><td>${field("daysWorked", input.daysWorked, "0.01", "31")}</td><td>${field("absences", input.absences, "0.01", "31")}</td><td>${field("overtimeHours", input.overtimeHours)}</td><td>${field("delayHours", input.delayHours)}</td></tr>`;
        }).join("");
        return `<div class="field full" style="margin-top:16px;"><label>Apuração por funcionário</label><p class="field-hint">Informe dias trabalhados, faltas, horas extras 50% e horas de atraso. O salário base é proporcional aos dias trabalhados; faltas e atrasos entram como descontos; horas extras entram como provento.</p><div class="table-scroll"><table><thead><tr><th>Funcionário</th><th>Salário base</th><th>Dias trabalhados</th><th>Faltas</th><th>Horas extras</th><th>Horas atraso</th></tr></thead><tbody>${rows || renderPayrollEmptyRow(6, "Nenhum funcionário disponível para este filtro.")}</tbody></table></div></div>`;
      }

      function renderPayrollRunDetails(run, items) {
        if (!run) return `<section class="empty-card"><strong>Nenhuma folha selecionada</strong><p>Depois de processar uma competência, os movimentos, bases e provisões aparecerão aqui.</p></section>`;
        const bases = state.data.payrollCalculationBases.filter((item) => item.runId === run.id);
        const provisions = state.data.payrollProvisions.filter((item) => item.runId === run.id);
        const attendanceRows = (run.attendanceInputs || []).map((item) => `<tr><td>${escapeHtml(item.employeeName || getPayrollEmployeeById(item.employeeId)?.name || "-")}</td><td>${escapeHtml(String(item.workDays ?? 0))}</td><td>${escapeHtml(String(item.absenceDays ?? 0))}</td><td>${escapeHtml(String(item.overtimeHours ?? 0))}</td><td>${escapeHtml(String(item.delayHours ?? 0))}</td></tr>`).join("");
        const attendanceTable = attendanceRows ? `<div class="table-scroll"><table><thead><tr><th>Funcionário</th><th>Dias trabalhados</th><th>Faltas</th><th>Horas extras</th><th>Horas atraso</th></tr></thead><tbody>${attendanceRows}</tbody></table></div>` : `<div class="empty-card" style="padding:16px;"><strong>Apuração não gravada</strong><p>Folhas antigas não possuem a grade de dias/horas gravada.</p></div>`;
        return `<section class="table-card"><div class="table-toolbar"><h4>Movimentos da folha ${escapeHtml(run.code)}</h4><div class="inline-actions"><span class="status-highlight ${run.status === "Contabilizada" ? "ok" : "warn"}">${escapeHtml(run.status)}</span></div></div><div class="totals-grid"><div class="total-card"><span>Base INSS</span><strong>${formatCurrency(bases.reduce((s, x) => s + Number(x.inssBase || 0), 0))}</strong><small>Calculada por incidências das rubricas.</small></div><div class="total-card"><span>Base FGTS</span><strong>${formatCurrency(bases.reduce((s, x) => s + Number(x.fgtsBase || 0), 0))}</strong><small>Parametrizada por rubrica.</small></div><div class="total-card"><span>Provisões</span><strong>${formatCurrency(provisions.reduce((s, x) => s + Number(x.vacationProvision || 0) + Number(x.thirteenthProvision || 0) + Number(x.chargesProvision || 0), 0))}</strong><small>Férias, 13º e encargos sobre provisões.</small></div></div><div class="subtle-panel" style="margin: 14px 16px;"><h4>Apuração usada no cálculo</h4>${attendanceTable}</div><div class="table-scroll"><table><thead><tr><th>Funcionário</th><th>Rubrica</th><th>Tipo</th><th>Valor</th><th>Cálculo</th><th>Centro de custo</th></tr></thead><tbody>${items.length ? items.map((item) => `<tr><td>${escapeHtml(getPayrollEmployeeById(item.employeeId)?.name || "-")}</td><td>${escapeHtml(item.eventCode)} - ${escapeHtml(item.eventName)}</td><td>${renderStatusBadge(item.eventType)}</td><td>${formatCurrency(item.amount)}</td><td>${item.reductionAmount ? `<div class="table-muted">Bruto ${formatCurrency(item.grossAmount)} · Redutor ${formatCurrency(item.reductionAmount)}</div><div class="table-muted">${escapeHtml(item.calculationNote || "")}</div>` : escapeHtml(item.calculationNote || "-")}</td><td>${escapeHtml(getCostCenterById(item.costCenterId)?.name || "-")}</td></tr>`).join("") : renderPayrollEmptyRow(6, "Sem movimentos calculados.")}</tbody></table></div></section>`;
      }

      function renderPayrollIntegrationPanel() {
        const draft = state.ui.payrollMappingDraft;
        const entries = filterRecords(state.data.payrollAccountingEntries, state.ui.search.payrollAccountingEntries, (item) => `${item.code} ${item.history} ${item.competence}`);
        const financial = filterRecords(state.data.payrollFinancialEntries, state.ui.search.payrollFinancialEntries, (item) => `${item.code} ${item.description} ${item.competence}`);
        return `<div class="layout-grid"><form class="card" data-form="payroll-mapping"><div class="section-head"><div><h3>Vínculo contábil por rubrica</h3><p>Sem contas configuradas a folha não é fechada nem contabilizada.</p></div></div><div class="form-grid">${renderPayrollSelect("eventId", "Rubrica", draft.eventId, state.data.payrollEvents.map((item) => [item.id, `${item.code} - ${item.name}`]), "Selecione")}${renderPayrollSelect("costCenterId", "Centro de custo", draft.costCenterId, [["", "Todos"], ...state.data.costCenters.map((item) => [item.id, `${item.code} - ${item.name}`])])}${renderPayrollSelect("debitAccountId", "Conta débito", draft.debitAccountId, getSelectableChartAccounts().map((item) => [item.id, `${item.code} - ${item.name}`]), "Selecione")}${renderPayrollSelect("creditAccountId", "Conta crédito", draft.creditAccountId, getSelectableChartAccounts().map((item) => [item.id, `${item.code} - ${item.name}`]), "Selecione")}${renderPayrollSelect("financialNatureId", "Natureza financeira", draft.financialNatureId, getSelectableFinancialNatures().map((item) => [item.id, `${item.code} - ${item.name}`]), "Opcional")}${renderPayrollSelect("entryType", "Tipo de lançamento", draft.entryType, [["Competência", "Competência"], ["Pagamento", "Pagamento"], ["Provisão", "Provisão"]])}${renderPayrollInput("defaultHistory", "Histórico padrão", draft.defaultHistory, "Despesa de salários")}${renderPayrollSelect("status", "Status", draft.status, [["Ativo", "Ativo"], ["Inativo", "Inativo"]])}</div>${renderPayrollFormActions("reset-payroll-mapping")}</form><section class="table-card"><div class="table-toolbar"><h4>Mapeamentos</h4></div><div class="table-scroll"><table><thead><tr><th>Código</th><th>Rubrica</th><th>Débito</th><th>Crédito</th><th>Status</th><th>Ações</th></tr></thead><tbody>${state.data.payrollAccountingMappings.length ? state.data.payrollAccountingMappings.map((item) => `<tr><td><strong>${escapeHtml(item.code)}</strong></td><td>${escapeHtml(getPayrollEventById(item.eventId)?.name || "-")}</td><td>${escapeHtml(getChartAccountById(item.debitAccountId)?.name || "-")}</td><td>${escapeHtml(getChartAccountById(item.creditAccountId)?.name || "-")}</td><td>${renderStatusBadge(item.status)}</td><td>${renderPayrollRowActions("payroll-mapping", item.id)}</td></tr>`).join("") : renderPayrollEmptyRow(6, "Nenhum mapeamento cadastrado.")}</tbody></table></div></section></div><div class="split-grid"><section class="table-card">${renderPayrollTableHeader("Lançamentos contábeis da folha", "payrollAccountingEntries", "Pesquisar lançamento")}<div class="table-scroll"><table><thead><tr><th>Código</th><th>Competência</th><th>Histórico</th><th>Valor</th><th>Status</th></tr></thead><tbody>${entries.length ? entries.map((item) => `<tr><td><strong>${escapeHtml(item.code)}</strong></td><td>${escapeHtml(item.competence)}</td><td>${escapeHtml(item.history)}</td><td>${formatCurrency(item.amount)}</td><td>${renderStatusBadge(item.status)}</td></tr>`).join("") : renderPayrollEmptyRow(5, "Nenhum lançamento contábil gerado.")}</tbody></table></div></section><section class="table-card">${renderPayrollTableHeader("Títulos financeiros da folha", "payrollFinancialEntries", "Pesquisar título")}<div class="table-scroll"><table><thead><tr><th>Código</th><th>Vencimento</th><th>Descrição</th><th>Valor</th><th>Status</th></tr></thead><tbody>${financial.length ? financial.map((item) => `<tr><td><strong>${escapeHtml(item.code)}</strong></td><td>${formatDate(item.dueDate)}</td><td>${escapeHtml(item.description)}</td><td>${formatCurrency(item.amount)}</td><td>${renderStatusBadge(item.status)}</td></tr>`).join("") : renderPayrollEmptyRow(5, "Nenhum título financeiro gerado.")}</tbody></table></div></section></div>`;
      }

      function renderPayrollReportsPanel() {
        const latest = [...state.data.payrollRuns].sort((a, b) => String(b.competence).localeCompare(String(a.competence)))[0];
        const filters = state.ui.payrollReportFilters || createEmptyPayrollReportFilters();
        const competencies = [...new Set(state.data.payrollRuns.map((run) => run.competence).filter(Boolean))].sort((a, b) => String(b).localeCompare(String(a)));
        const employeeOptions = [...state.data.payrollEmployees]
          .sort((a, b) => String(a.name || "").localeCompare(String(b.name || "")))
          .map((item) => [item.id, `${item.registration || item.code} - ${item.name}`]);
        const report = filters.submitted ? buildPayrollAnalyticalReport(filters) : null;
        return `
          <section class="card">
            <div class="section-head">
              <div>
                <h3>Relatórios da folha</h3>
                <p>Gere a folha analítica com filtros por competência, tipo de folha, centro de custo, funcionário e situação. O relatório mostra o individual por funcionário e o consolidado geral.</p>
              </div>
            </div>
            <div class="stats-grid">
              <div class="stats-card"><small>Última competência</small><strong>${escapeHtml(latest?.competence || "-")}</strong><span>${escapeHtml(latest?.code || "Nenhuma folha processada")}</span></div>
              <div class="stats-card"><small>Líquido a pagar</small><strong>${formatCurrency(latest?.netPayable || 0)}</strong><span>Folha selecionada mais recente.</span></div>
              <div class="stats-card"><small>Mapa contábil</small><strong>${state.data.payrollAccountingEntries.length}</strong><span>Lançamentos gerados.</span></div>
              <div class="stats-card"><small>Títulos financeiros</small><strong>${state.data.payrollFinancialEntries.length}</strong><span>Valores a pagar/recolher.</span></div>
            </div>
          </section>
          <form class="card" data-form="payroll-report-filters" autocomplete="off">
            <div class="section-head">
              <div>
                <h3>Gerar relatório da folha analítica</h3>
                <p>Use os filtros abaixo para emitir o relatório detalhado. Deixe “Todos” quando quiser consolidar mais de uma folha.</p>
              </div>
            </div>
            <div class="form-grid">
              ${renderPayrollSelect("reportType", "Relatório", filters.reportType, [["analytical", "Folha analítica"]])}
              ${renderPayrollSelect("competence", "Competência", filters.competence, competencies.map((competence) => [competence, competence]), "Todas")}
              ${renderPayrollSelect("payrollType", "Tipo de folha", filters.payrollType, [["all", "Todos"], ...PAYROLL_TYPES.map((type) => [type, type])])}
              ${renderPayrollSelect("costCenterId", "Centro de custo", filters.costCenterId, [["all", "Todos"], ...state.data.costCenters.map((item) => [item.id, `${item.code} - ${item.name}`])])}
              ${renderPayrollSelect("employeeId", "Funcionário", filters.employeeId, [["all", "Todos"], ...employeeOptions])}
              ${renderPayrollSelect("status", "Situação da folha", filters.status, [["all", "Todas"], ...PAYROLL_PERIOD_STATUS.map((status) => [status, status])])}
            </div>
            <div class="form-actions">
              <button class="primary-button" type="submit">Gerar relatório analítico</button>
              <button class="ghost-button" type="button" data-action="reset-payroll-report">Limpar filtros</button>
              ${filters.submitted ? `<button class="secondary-button" type="button" data-action="print-payroll-report">Gerar PDF modelo folha resumo</button>` : ""}
            </div>
          </form>
          ${filters.submitted ? renderPayrollAnalyticalReport(report, filters) : `<section class="empty-card"><strong>Nenhum relatório emitido ainda.</strong><p>Selecione os filtros e clique em “Gerar relatório analítico” para visualizar o individual por funcionário e o geral consolidado da folha.</p></section>`}
        `;
      }

      function submitPayrollAnalyticalReport(formData) {
        const filters = createEmptyPayrollReportFilters({
          reportType: clean(formData.get("reportType")) || "analytical",
          competence: clean(formData.get("competence")),
          payrollType: clean(formData.get("payrollType")) || "all",
          costCenterId: clean(formData.get("costCenterId")) || "all",
          employeeId: clean(formData.get("employeeId")) || "all",
          status: clean(formData.get("status")) || "all",
          submitted: true
        });
        const report = buildPayrollAnalyticalReport(filters);
        if (!report.runs.length) {
          notify("error", "Relatório da folha", "Nenhuma folha processada foi encontrada para os filtros informados.");
          state.ui.payrollReportFilters = { ...filters, submitted: false };
          renderApp();
          return;
        }
        state.ui.payrollReportFilters = filters;
        notify("success", "Relatório da folha", "Relatório analítico gerado com os filtros informados.");
        renderApp();
      }

      function isPayrollIrrfRunItem(item) {
        const event = getPayrollEventById(item.eventId);
        const text = normalizePayrollText(`${item?.eventName || ""} ${event?.nature || ""} ${event?.tableType || ""}`);
        return text.includes("irrf");
      }

      function buildPayrollAnalyticalReport(rawFilters) {
        const filters = createEmptyPayrollReportFilters(rawFilters);
        const runs = state.data.payrollRuns
          .filter((run) => !filters.competence || run.competence === filters.competence)
          .filter((run) => filters.payrollType === "all" || run.payrollType === filters.payrollType)
          .filter((run) => filters.status === "all" || run.status === filters.status)
          .sort((a, b) => `${a.competence || ""}${a.payrollType || ""}`.localeCompare(`${b.competence || ""}${b.payrollType || ""}`));
        const runIds = new Set(runs.map((run) => run.id));
        const items = state.data.payrollRunItems
          .filter((item) => runIds.has(item.runId))
          .filter((item) => matchesPayrollReportEmployeeFilter(item.employeeId, item.costCenterId, filters));
        const bases = state.data.payrollCalculationBases
          .filter((item) => runIds.has(item.runId))
          .filter((item) => matchesPayrollReportEmployeeFilter(item.employeeId, "", filters));
        const provisions = state.data.payrollProvisions
          .filter((item) => runIds.has(item.runId))
          .filter((item) => matchesPayrollReportEmployeeFilter(item.employeeId, "", filters));
        const employeeIds = [...new Set([...items.map((item) => item.employeeId), ...bases.map((item) => item.employeeId), ...provisions.map((item) => item.employeeId)])]
          .filter(Boolean)
          .sort((a, b) => String(getPayrollEmployeeById(a)?.name || "").localeCompare(String(getPayrollEmployeeById(b)?.name || "")));
        const employeeReports = employeeIds.map((employeeId) => {
          const employee = getPayrollEmployeeById(employeeId) || { id: employeeId, name: "Funcionário não localizado", registration: "", costCenterId: "" };
          const employeeItems = items.filter((item) => item.employeeId === employeeId);
          const employeeBases = bases.filter((item) => item.employeeId === employeeId);
          const employeeProvisions = provisions.filter((item) => item.employeeId === employeeId);
          const attendance = getPayrollReportAttendance(runs, employeeId);
          const earnings = sumPayrollReportItems(employeeItems, "Provento");
          const deductions = sumPayrollReportItems(employeeItems, "Desconto");
          const informative = employeeItems.filter((item) => !["Provento", "Desconto"].includes(item.eventType)).reduce((sum, item) => sum + Number(item.amount || 0), 0);
          const irrfItems = employeeItems.filter(isPayrollIrrfRunItem);
          return {
            employee,
            items: employeeItems,
            attendance,
            earnings: roundCurrency(earnings),
            deductions: roundCurrency(deductions),
            informative: roundCurrency(informative),
            net: roundCurrency(earnings - deductions),
            bases: {
              inss: roundCurrency(employeeBases.reduce((sum, item) => sum + Number(item.inssBase || 0), 0)),
              irrf: roundCurrency(employeeBases.reduce((sum, item) => sum + Number(item.irrfBase || 0), 0)),
              fgts: roundCurrency(employeeBases.reduce((sum, item) => sum + Number(item.fgtsBase || 0), 0))
            },
            irrf: {
              gross: roundCurrency(irrfItems.reduce((sum, item) => sum + Number(item.grossAmount || item.amount || 0), 0)),
              reduction: roundCurrency(irrfItems.reduce((sum, item) => sum + Number(item.reductionAmount || 0), 0)),
              net: roundCurrency(irrfItems.reduce((sum, item) => sum + Number(item.amount || 0), 0))
            },
            provisions: {
              vacation: roundCurrency(employeeProvisions.reduce((sum, item) => sum + Number(item.vacationProvision || 0), 0)),
              thirteenth: roundCurrency(employeeProvisions.reduce((sum, item) => sum + Number(item.thirteenthProvision || 0), 0)),
              charges: roundCurrency(employeeProvisions.reduce((sum, item) => sum + Number(item.chargesProvision || 0), 0))
            }
          };
        });
        const byEvent = buildPayrollReportEventSummary(items);
        const byCostCenter = buildPayrollReportCostCenterSummary(items, bases, employeeReports);
        const totals = {
          employeeCount: employeeReports.length,
          earnings: roundCurrency(employeeReports.reduce((sum, item) => sum + Number(item.earnings || 0), 0)),
          deductions: roundCurrency(employeeReports.reduce((sum, item) => sum + Number(item.deductions || 0), 0)),
          informative: roundCurrency(employeeReports.reduce((sum, item) => sum + Number(item.informative || 0), 0)),
          net: roundCurrency(employeeReports.reduce((sum, item) => sum + Number(item.net || 0), 0)),
          baseInss: roundCurrency(employeeReports.reduce((sum, item) => sum + Number(item.bases.inss || 0), 0)),
          baseIrrf: roundCurrency(employeeReports.reduce((sum, item) => sum + Number(item.bases.irrf || 0), 0)),
          baseFgts: roundCurrency(employeeReports.reduce((sum, item) => sum + Number(item.bases.fgts || 0), 0)),
          irrfGross: roundCurrency(employeeReports.reduce((sum, item) => sum + Number(item.irrf.gross || 0), 0)),
          irrfReduction: roundCurrency(employeeReports.reduce((sum, item) => sum + Number(item.irrf.reduction || 0), 0)),
          irrfNet: roundCurrency(employeeReports.reduce((sum, item) => sum + Number(item.irrf.net || 0), 0)),
          provisions: roundCurrency(employeeReports.reduce((sum, item) => sum + Number(item.provisions.vacation || 0) + Number(item.provisions.thirteenth || 0) + Number(item.provisions.charges || 0), 0))
        };
        return { filters, runs, items, bases, provisions, employeeReports, byEvent, byCostCenter, totals };
      }

      function matchesPayrollReportEmployeeFilter(employeeId, itemCostCenterId, filters) {
        if (filters.employeeId !== "all" && employeeId !== filters.employeeId) return false;
        if (filters.costCenterId !== "all") {
          const employee = getPayrollEmployeeById(employeeId);
          const costCenterId = itemCostCenterId || employee?.costCenterId || "";
          return costCenterId === filters.costCenterId;
        }
        return true;
      }

      function sumPayrollReportItems(items, eventType) {
        return items.filter((item) => item.eventType === eventType).reduce((sum, item) => sum + Number(item.amount || 0), 0);
      }

      function getPayrollReportAttendance(runs, employeeId) {
        return runs.reduce((acc, run) => {
          const entry = (run.attendanceInputs || []).find((item) => item.employeeId === employeeId);
          if (!entry) return acc;
          acc.workDays += Number(entry.workDays ?? entry.daysWorked ?? 0);
          acc.absenceDays += Number(entry.absenceDays ?? entry.absences ?? 0);
          acc.overtimeHours += Number(entry.overtimeHours || 0);
          acc.delayHours += Number(entry.delayHours || 0);
          return acc;
        }, { workDays: 0, absenceDays: 0, overtimeHours: 0, delayHours: 0 });
      }

      function buildPayrollReportEventSummary(items) {
        const map = new Map();
        items.forEach((item) => {
          const key = item.eventId || item.eventName || "sem";
          if (!map.has(key)) {
            map.set(key, { eventId: item.eventId, eventName: item.eventName || getPayrollEventById(item.eventId)?.name || "Sem rubrica", eventCode: item.eventCode || getPayrollEventById(item.eventId)?.code || "", eventType: item.eventType || "", count: 0, earnings: 0, deductions: 0, informative: 0, net: 0 });
          }
          const row = map.get(key);
          row.count += 1;
          if (item.eventType === "Provento") row.earnings += Number(item.amount || 0);
          else if (item.eventType === "Desconto") row.deductions += Number(item.amount || 0);
          else row.informative += Number(item.amount || 0);
          row.net += Number(item.signedAmount ?? item.amount ?? 0);
        });
        return [...map.values()].map((row) => ({ ...row, earnings: roundCurrency(row.earnings), deductions: roundCurrency(row.deductions), informative: roundCurrency(row.informative), net: roundCurrency(row.net) }))
          .sort((a, b) => String(a.eventCode || a.eventName).localeCompare(String(b.eventCode || b.eventName)));
      }

      function buildPayrollReportCostCenterSummary(items, bases, employeeReports) {
        const map = new Map();
        const ensure = (costCenterId) => {
          const key = costCenterId || "sem";
          if (!map.has(key)) map.set(key, { costCenterId: key, employees: new Set(), earnings: 0, deductions: 0, net: 0, baseInss: 0, baseIrrf: 0, baseFgts: 0 });
          return map.get(key);
        };
        items.forEach((item) => {
          const employee = getPayrollEmployeeById(item.employeeId);
          const row = ensure(item.costCenterId || employee?.costCenterId || "sem");
          if (item.employeeId) row.employees.add(item.employeeId);
          if (item.eventType === "Provento") row.earnings += Number(item.amount || 0);
          if (item.eventType === "Desconto") row.deductions += Number(item.amount || 0);
          row.net += Number(item.signedAmount ?? item.amount ?? 0);
        });
        bases.forEach((base) => {
          const employee = getPayrollEmployeeById(base.employeeId);
          const row = ensure(employee?.costCenterId || "sem");
          if (base.employeeId) row.employees.add(base.employeeId);
          row.baseInss += Number(base.inssBase || 0);
          row.baseIrrf += Number(base.irrfBase || 0);
          row.baseFgts += Number(base.fgtsBase || 0);
        });
        employeeReports.forEach((report) => ensure(report.employee.costCenterId || "sem").employees.add(report.employee.id));
        return [...map.values()].map((row) => ({ ...row, employeeCount: row.employees.size, earnings: roundCurrency(row.earnings), deductions: roundCurrency(row.deductions), net: roundCurrency(row.net), baseInss: roundCurrency(row.baseInss), baseIrrf: roundCurrency(row.baseIrrf), baseFgts: roundCurrency(row.baseFgts) }))
          .sort((a, b) => String(getCostCenterById(a.costCenterId)?.name || a.costCenterId).localeCompare(String(getCostCenterById(b.costCenterId)?.name || b.costCenterId)));
      }

      function renderPayrollAnalyticalReport(report, filters) {
        if (!report || !report.runs.length) {
          return `<section class="empty-card"><strong>Nenhuma folha encontrada.</strong><p>Revise a competência, o centro de custo, o funcionário, o tipo de folha ou a situação selecionada.</p></section>`;
        }
        const filterLabel = renderPayrollReportFilterLabel(filters, report.runs);
        const employeeSummaryRows = report.employeeReports.length ? report.employeeReports.map((row) => `
          <tr>
            <td><strong>${escapeHtml(row.employee.name)}</strong><div class="table-muted">Matrícula ${escapeHtml(row.employee.registration || row.employee.code || "-")}</div></td>
            <td>${escapeHtml(getCostCenterById(row.employee.costCenterId)?.name || "Sem centro")}</td>
            <td>${formatPayrollQuantity(row.attendance.workDays)}</td>
            <td>${formatPayrollQuantity(row.attendance.absenceDays)}</td>
            <td>${formatPayrollQuantity(row.attendance.overtimeHours)}</td>
            <td>${formatPayrollQuantity(row.attendance.delayHours)}</td>
            <td>${formatCurrency(row.earnings)}</td>
            <td>${formatCurrency(row.deductions)}</td>
            <td><strong>${formatCurrency(row.net)}</strong></td>
          </tr>
        `).join("") : renderPayrollEmptyRow(9, "Nenhum funcionário encontrado para os filtros.");
        const eventRows = report.byEvent.length ? report.byEvent.map((row) => `
          <tr>
            <td><strong>${escapeHtml([row.eventCode, row.eventName].filter(Boolean).join(" - "))}</strong></td>
            <td>${renderStatusBadge(row.eventType || "Rubrica")}</td>
            <td>${row.count}</td>
            <td>${formatCurrency(row.earnings)}</td>
            <td>${formatCurrency(row.deductions)}</td>
            <td>${formatCurrency(row.informative)}</td>
            <td><strong>${formatCurrency(row.net)}</strong></td>
          </tr>
        `).join("") : renderPayrollEmptyRow(7, "Sem rubricas no relatório.");
        const costCenterRows = report.byCostCenter.length ? report.byCostCenter.map((row) => `
          <tr>
            <td><strong>${escapeHtml(getCostCenterById(row.costCenterId)?.name || "Sem centro")}</strong></td>
            <td>${row.employeeCount}</td>
            <td>${formatCurrency(row.earnings)}</td>
            <td>${formatCurrency(row.deductions)}</td>
            <td><strong>${formatCurrency(row.net)}</strong></td>
            <td>${formatCurrency(row.baseInss)}</td>
            <td>${formatCurrency(row.baseIrrf)}</td>
            <td>${formatCurrency(row.baseFgts)}</td>
          </tr>
        `).join("") : renderPayrollEmptyRow(8, "Sem centros de custo no relatório.");
        return `
          <section class="table-card">
            <div class="table-toolbar">
              <div>
                <h4>Relatório da folha analítica</h4>
                <div class="table-muted">${filterLabel}</div>
              </div>
              <span class="status-highlight ok">Gerado</span>
            </div>
            <div class="totals-grid" style="padding: 16px;">
              <div class="total-card"><span>Funcionários</span><strong>${report.totals.employeeCount}</strong><small>Funcionários com movimentos ou bases calculadas.</small></div>
              <div class="total-card"><span>Total de proventos</span><strong>${formatCurrency(report.totals.earnings)}</strong><small>Soma geral dos proventos filtrados.</small></div>
              <div class="total-card"><span>Total de descontos</span><strong>${formatCurrency(report.totals.deductions)}</strong><small>Soma geral dos descontos filtrados.</small></div>
              <div class="total-card"><span>Líquido geral</span><strong>${formatCurrency(report.totals.net)}</strong><small>Proventos menos descontos.</small></div>
              <div class="total-card"><span>Base INSS</span><strong>${formatCurrency(report.totals.baseInss)}</strong><small>Total das bases de INSS.</small></div>
              <div class="total-card"><span>Base IRRF</span><strong>${formatCurrency(report.totals.baseIrrf)}</strong><small>Total das bases de IRRF.</small></div>
              <div class="total-card"><span>IRRF bruto</span><strong>${formatCurrency(report.totals.irrfGross)}</strong><small>Imposto antes do redutor mensal.</small></div>
              <div class="total-card"><span>Redutor IRRF</span><strong>${formatCurrency(report.totals.irrfReduction)}</strong><small>Redução aplicada após a tabela progressiva.</small></div>
              <div class="total-card"><span>IRRF líquido</span><strong>${formatCurrency(report.totals.irrfNet)}</strong><small>IRRF efetivamente descontado.</small></div>
              <div class="total-card"><span>Base FGTS</span><strong>${formatCurrency(report.totals.baseFgts)}</strong><small>Total das bases de FGTS.</small></div>
              <div class="total-card"><span>Provisões</span><strong>${formatCurrency(report.totals.provisions)}</strong><small>Férias, 13º e encargos sobre provisões.</small></div>
            </div>
            <div class="table-scroll">
              <table>
                <thead><tr><th>Funcionário</th><th>Centro de custo</th><th>Dias trab.</th><th>Faltas</th><th>H.E.</th><th>Atrasos</th><th>Proventos</th><th>Descontos</th><th>Líquido</th></tr></thead>
                <tbody>${employeeSummaryRows}</tbody>
              </table>
            </div>
          </section>
          <div class="split-grid">
            <section class="table-card">
              <div class="table-toolbar"><h4>Geral por rubrica</h4></div>
              <div class="table-scroll"><table><thead><tr><th>Rubrica</th><th>Tipo</th><th>Qtde.</th><th>Proventos</th><th>Descontos</th><th>Informativo</th><th>Saldo</th></tr></thead><tbody>${eventRows}</tbody></table></div>
            </section>
            <section class="table-card">
              <div class="table-toolbar"><h4>Geral por centro de custo</h4></div>
              <div class="table-scroll"><table><thead><tr><th>Centro de custo</th><th>Funcionários</th><th>Proventos</th><th>Descontos</th><th>Líquido</th><th>Base INSS</th><th>Base IRRF</th><th>Base FGTS</th></tr></thead><tbody>${costCenterRows}</tbody></table></div>
            </section>
          </div>
          ${renderPayrollAnalyticalEmployeeDetails(report)}
        `;
      }

      function renderPayrollAnalyticalEmployeeDetails(report) {
        if (!report.employeeReports.length) {
          return `<section class="empty-card"><strong>Sem detalhamento individual.</strong><p>Nenhum funcionário possui movimentos para os filtros informados.</p></section>`;
        }
        return report.employeeReports.map((row) => {
          const detailRows = row.items.length ? row.items.map((item) => {
            const run = state.data.payrollRuns.find((candidate) => candidate.id === item.runId);
            return `<tr>
              <td>${escapeHtml(run?.competence || "-")}</td>
              <td>${escapeHtml(run?.payrollType || "-")}</td>
              <td><strong>${escapeHtml(item.eventCode)} - ${escapeHtml(item.eventName)}</strong></td>
              <td>${renderStatusBadge(item.eventType)}</td>
              <td>${item.eventType === "Provento" ? formatCurrency(item.amount) : "-"}</td>
              <td>${item.eventType === "Desconto" ? formatCurrency(item.amount) : "-"}</td>
              <td>${!["Provento", "Desconto"].includes(item.eventType) ? formatCurrency(item.amount) : "-"}</td>
              <td>${item.reductionAmount ? `Bruto ${formatCurrency(item.grossAmount)} · Redutor ${formatCurrency(item.reductionAmount)} · ${escapeHtml(item.calculationNote || "")}` : escapeHtml(item.calculationNote || "-")}</td>
              <td>${escapeHtml(getCostCenterById(item.costCenterId)?.name || "Sem centro")}</td>
            </tr>`;
          }).join("") : renderPayrollEmptyRow(9, "Sem movimentos para este funcionário.");
          return `<section class="table-card">
            <div class="table-toolbar">
              <div>
                <h4>${escapeHtml(row.employee.name)}</h4>
                <div class="table-muted">Matrícula ${escapeHtml(row.employee.registration || row.employee.code || "-")} · Centro de custo: ${escapeHtml(getCostCenterById(row.employee.costCenterId)?.name || "Sem centro")}</div>
              </div>
              <strong>${formatCurrency(row.net)}</strong>
            </div>
            <div class="totals-grid" style="padding: 14px 16px;">
              <div class="total-card"><span>Proventos</span><strong>${formatCurrency(row.earnings)}</strong><small>Total individual.</small></div>
              <div class="total-card"><span>Descontos</span><strong>${formatCurrency(row.deductions)}</strong><small>Total individual.</small></div>
              <div class="total-card"><span>Líquido</span><strong>${formatCurrency(row.net)}</strong><small>Valor líquido do funcionário.</small></div>
              <div class="total-card"><span>Apuração</span><strong>${formatPayrollQuantity(row.attendance.workDays)} dias</strong><small>${formatPayrollQuantity(row.attendance.absenceDays)} faltas · ${formatPayrollQuantity(row.attendance.overtimeHours)} H.E. · ${formatPayrollQuantity(row.attendance.delayHours)} atrasos</small></div>
            </div>
            <div class="table-scroll"><table><thead><tr><th>Competência</th><th>Tipo folha</th><th>Rubrica</th><th>Tipo</th><th>Provento</th><th>Desconto</th><th>Informativo</th><th>Cálculo</th><th>Centro de custo</th></tr></thead><tbody>${detailRows}</tbody></table></div>
          </section>`;
        }).join("");
      }


      function exportPayrollAnalyticalPdf() {
        const filters = state.ui.payrollReportFilters || createEmptyPayrollReportFilters();
        if (!filters.submitted) {
          notify("error", "Relatório da folha", "Gere o relatório analítico antes de emitir o PDF.");
          return;
        }
        const report = buildPayrollAnalyticalReport(filters);
        if (!report.runs.length) {
          notify("error", "Relatório da folha", "Não há dados para emitir PDF com os filtros atuais.");
          return;
        }
        const printWindow = window.open("", "_blank", "width=1200,height=900");
        if (!printWindow) {
          notify("error", "Relatório da folha", "O navegador bloqueou a janela do PDF. Libere pop-ups e tente novamente.");
          return;
        }
        printWindow.document.open();
        printWindow.document.write(buildPayrollAnalyticalPrintHtml(report, filters));
        printWindow.document.close();
        printWindow.focus();
        setTimeout(() => printWindow.print(), 300);
      }

      function buildPayrollAnalyticalPrintHtml(report, filters) {
        const issuedAt = new Date().toLocaleString("pt-BR");
        const competenceLabel = filters.competence || [...new Set(report.runs.map((run) => run.competence).filter(Boolean))].join(", ") || "Todas";

        const employeeBlocks = report.employeeReports.map((row, index) => buildPayrollPrintEmployeeBlock(row, report, index + 1)).join("");
        const eventRows = report.byEvent.map((row) => `

            <td class="right">${formatPayrollPrintMoney(row.baseIrrf)}</td>

          </tr>
        `).join("");
        return `<!DOCTYPE html>
<html lang="pt-BR">
<head>

  <style>
    @page { size: A4 portrait; margin: 7mm; }

    .employee-block { break-inside: avoid; page-break-inside: avoid; border-bottom: 2px dashed #111; padding: 5px 0 6px; }
    .employee-main { display: grid; grid-template-columns: 58px 1.9fr 1.5fr .9fr; gap: 10px; font-weight: 700; }

    .movement-area { display: grid; grid-template-columns: minmax(0, .98fr) minmax(0, 1.18fr); gap: 12px; margin-top: 4px; }
    .event-row { display: grid; grid-template-columns: 42px minmax(0, 1fr) 48px 72px; gap: 8px; white-space: nowrap; }
    .event-name { overflow: hidden; text-overflow: ellipsis; }
    .bases-grid { display: grid; grid-template-columns: 1fr 1fr; column-gap: 16px; row-gap: 1px; }
    .base-line { display: grid; grid-template-columns: minmax(0, 1fr) 72px; gap: 8px; white-space: nowrap; }
    .base-label { overflow: hidden; text-overflow: ellipsis; }
    .section-title { font-weight: 700; margin: 8px 0 3px; padding-top: 3px; border-top: 1px dashed #111; }

  </style>
</head>
<body>

        <div>Situação</div>

    </header>
    ${employeeBlocks || `<div class="employee-block">Nenhum funcionário encontrado para os filtros.</div>`}
    <section class="grand-total">

        <div class="total-line"><span>Informativas</span><span class="right">${formatPayrollPrintMoney(report.totals.informative)}</span></div>
        <div class="total-line"><span>Base INSS</span><span class="right">${formatPayrollPrintMoney(report.totals.baseInss)}</span></div>
        <div class="total-line"><span>Base IRRF</span><span class="right">${formatPayrollPrintMoney(report.totals.baseIrrf)}</span></div>
        <div class="total-line"><span>IRRF bruto</span><span class="right">${formatPayrollPrintMoney(report.totals.irrfGross)}</span></div>

        <div class="total-line"><span>Base FGTS</span><span class="right">${formatPayrollPrintMoney(report.totals.baseFgts)}</span></div>
        <div class="total-line"><span>Provisões</span><span class="right">${formatPayrollPrintMoney(report.totals.provisions)}</span></div>
      </div>
      <div class="section-title">Resumo geral por rubrica</div>

        <thead><tr><th>Rubrica</th><th class="right">Qtde.</th><th class="right">Proventos</th><th class="right">Descontos</th><th class="right">Informativo</th><th class="right">Saldo</th></tr></thead>
        <tbody>${eventRows || `<tr><td colspan="6">Sem rubricas.</td></tr>`}</tbody>
      </table>
      <div class="section-title">Resumo geral por centro de custo</div>
      <table>
        <thead><tr><th>Centro de custo</th><th class="right">Func.</th><th class="right">Proventos</th><th class="right">Descontos</th><th class="right">Líquido</th><th class="right">Base INSS</th><th class="right">Base IRRF</th><th class="right">Base FGTS</th></tr></thead>
        <tbody>${costCenterRows || `<tr><td colspan="8">Sem centros de custo.</td></tr>`}</tbody>
      </table>
    </section>
    <footer class="footer">
      <span>Relatório emitido pelo ERP Local - Folha de Pagamento</span>
      <span>Página: <span class="muted">use a numeração do navegador/PDF</span></span>
    </footer>
  </main>
</body>
</html>`;
      }

      function buildPayrollPrintEmployeeBlock(row, report, index) {
        const employee = row.employee || {};
        const position = getPayrollPositionById(employee.positionId);
        const costCenter = getCostCenterById(employee.costCenterId);
        const eventsHtml = row.items.length ? row.items.map((item) => `
          <div class="event-row">
            <span>${escapeHtml(item.eventCode || "")}</span>
            <span class="event-name">${escapeHtml(item.eventName || "")}</span>
            <span class="right">${escapeHtml(formatPayrollQuantity(getPayrollPrintItemReference(item, row)))}</span>
            <span class="right">${formatPayrollPrintMoney(item.amount)}</span>
          </div>
        `).join("") : `<div class="event-row"><span></span><span>Sem movimentos</span><span></span><span class="right">0,00</span></div>`;
        const charges = getPayrollPrintChargeSummary(row, report);
        const fgtsAmount = getPayrollPrintEventAmount(row, ["fgts"]);
        const inssAmount = getPayrollPrintEventAmount(row, ["inss"]);
        const irrfAmount = getPayrollPrintEventAmount(row, ["irrf"]);
        const irrfGrossAmount = Number(row.irrf?.gross || irrfAmount || 0);
        const irrfReductionAmount = Number(row.irrf?.reduction || 0);
        const baseLines = [
          ["Descontos", row.deductions],
          ["Líquido", row.net],
          ["Base Líquida IRRF", Math.max(0, Number(row.bases.irrf || 0) - irrfAmount)],
          ["Base IRRF", row.bases.irrf],
          ["IRRF Bruto", irrfGrossAmount],
          ["Redutor IRRF", irrfReductionAmount],
          ["Base INSS - Envelope", row.bases.inss],
          ["Base FGTS", row.bases.fgts],
          ["FGTS", fgtsAmount],
          ["INSS Empregado", inssAmount],
          ["IRRF Líquido", irrfAmount],
          ["INSS Empresa", charges.inss],
          ["INSS SAT/RAT", charges.sat],
          ["INSS Terceiros", charges.thirdParty],
          ["INSS Total (Emp+SAT+Terc)", charges.totalInss],
          ["FGTS Patronal/Encargo", charges.fgts],
          ["Provisão Férias", row.provisions.vacation],
          ["Provisão 13º", row.provisions.thirteenth],
          ["Encargos s/ Provisões", row.provisions.charges],
          ["Proventos", row.earnings]
        ].map(([label, value]) => `
          <div class="base-line"><span class="base-label">${escapeHtml(label)}</span><span class="right">${formatPayrollPrintMoney(value)}</span></div>
        `).join("");
        return `
          <section class="employee-block">
            <div class="employee-main">
              <span>${escapeHtml(employee.registration || employee.code || String(index).padStart(6, "0"))}</span>
              <span>${escapeHtml(employee.name || "Funcionário")}</span>
              <span>${escapeHtml(position?.name || "Função não informada")}</span>
              <span class="right">${escapeHtml(employee.status || "-")}</span>
            </div>
            <div class="employee-sub">
              <span>${escapeHtml(formatDate(employee.admissionDate))}</span>
              <span>${formatPayrollPrintMoney(employee.salaryBase)}</span>
              <span>${escapeHtml(costCenter?.name || "Sem centro de custo")}</span>
              <span class="right">Movimento: ${escapeHtml(report.runs.map((run) => run.code).filter(Boolean).slice(0, 2).join(", ") || "-")}</span>
            </div>
            <div class="movement-area">
              <div>${eventsHtml}</div>
              <div class="bases-grid">${baseLines}</div>
            </div>
          </section>
        `;
      }

      function getPayrollPrintItemReference(item, employeeReport) {
        const name = normalizePayrollText(item.eventName || "");
        if (name.includes("dia") && name.includes("trabal")) return item.workDays ?? employeeReport.attendance.workDays;
        if (name.includes("falta")) return item.absenceDays ?? employeeReport.attendance.absenceDays;
        if (name.includes("hora") && name.includes("extra")) return item.overtimeHours ?? employeeReport.attendance.overtimeHours;
        if (name.includes("atras")) return item.delayHours ?? employeeReport.attendance.delayHours;
        return item.quantity ?? "";
      }

      function getPayrollPrintEventAmount(employeeReport, patterns) {
        const normalizedPatterns = patterns.map(normalizePayrollText);
        const item = employeeReport.items.find((candidate) => {
          const haystack = normalizePayrollText(`${candidate.eventCode || ""} ${candidate.eventName || ""}`);
          return normalizedPatterns.some((pattern) => haystack.includes(pattern));
        });
        return Number(item?.amount || 0);
      }

      function getPayrollPrintChargeSummary(employeeReport, report) {
        const competence = report.runs.find((run) => employeeReport.items.some((item) => item.runId === run.id))?.competence || report.runs[0]?.competence || "";
        const costCenterId = employeeReport.employee.costCenterId || "";
        const summary = { inss: 0, sat: 0, thirdParty: 0, fgts: 0, other: 0, totalInss: 0 };
        state.data.payrollEmployerCharges
          .filter((charge) => charge.status !== "Inativo")
          .filter((charge) => !charge.competenceStart || String(charge.competenceStart) <= String(competence))
          .filter((charge) => !charge.competenceEnd || String(charge.competenceEnd) >= String(competence))
          .filter((charge) => !charge.costCenterId || charge.costCenterId === costCenterId)
          .forEach((charge) => {
            const base = getPayrollPrintChargeBase(charge, employeeReport);
            const amount = roundCurrency(base * toDecimal(charge.rate) / 100);
            const name = normalizePayrollText(charge.name || "");
            if (name.includes("sat") || name.includes("rat")) summary.sat += amount;
            else if (name.includes("terceir")) summary.thirdParty += amount;
            else if (name.includes("fgts")) summary.fgts += amount;
            else if (name.includes("inss")) summary.inss += amount;
            else summary.other += amount;
          });
        summary.totalInss = roundCurrency(summary.inss + summary.sat + summary.thirdParty);
        return Object.fromEntries(Object.entries(summary).map(([key, value]) => [key, roundCurrency(value)]));
      }

      function getPayrollPrintChargeBase(charge, employeeReport) {
        if (charge.baseType === "Base INSS") return Number(employeeReport.bases.inss || 0);
        if (charge.baseType === "Base FGTS") return Number(employeeReport.bases.fgts || 0);
        return toDecimal(employeeReport.employee.salaryBase);
      }

      function normalizePayrollText(value) {
        return String(value || "").normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
      }

      function formatPayrollPrintMoney(value) {
        return Number(value || 0).toLocaleString("pt-BR", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      }

      function renderPayrollReportFilterLabel(filters, runs) {
        const parts = [];
        parts.push(filters.competence ? `Competência ${filters.competence}` : "Todas as competências");
        parts.push(filters.payrollType === "all" ? "Todos os tipos de folha" : filters.payrollType);
        parts.push(filters.costCenterId === "all" ? "Todos os centros de custo" : `Centro de custo ${getCostCenterById(filters.costCenterId)?.name || filters.costCenterId}`);
        parts.push(filters.employeeId === "all" ? "Todos os funcionários" : `Funcionário ${getPayrollEmployeeById(filters.employeeId)?.name || filters.employeeId}`);
        parts.push(filters.status === "all" ? "Todas as situações" : `Situação ${filters.status}`);
        parts.push(`${runs.length} folha(s) encontrada(s)`);
        return escapeHtml(parts.join(" · "));
      }

      function formatPayrollQuantity(value) {
        const number = Number(value || 0);
        return number.toLocaleString("pt-BR", { minimumFractionDigits: Number.isInteger(number) ? 0 : 2, maximumFractionDigits: 2 });
      }

      function renderPayrollInput(name, label, value, placeholder = "", type = "text") {
        return `<div class="field"><label for="payroll-${name}">${escapeHtml(label)}</label><input id="payroll-${name}" name="${name}" type="${type}" ${type === "number" ? 'step="any"' : ""} value="${escapeHtml(value ?? "")}" placeholder="${escapeHtml(placeholder)}"></div>`;
      }
      function renderPayrollTextarea(name, label, value, placeholder = "") {
        return `<div class="field full"><label for="payroll-${name}">${escapeHtml(label)}</label><textarea id="payroll-${name}" name="${name}" placeholder="${escapeHtml(placeholder)}">${escapeHtml(value ?? "")}</textarea></div>`;
      }
      function renderPayrollSelect(name, label, value, options, placeholder) {
        const list = Array.isArray(options) ? options : [];
        return `<div class="field"><label for="payroll-${name}">${escapeHtml(label)}</label><select id="payroll-${name}" name="${name}">${placeholder ? `<option value="">${escapeHtml(placeholder)}</option>` : ""}${list.map((option) => { const val = Array.isArray(option) ? option[0] : option; const text = Array.isArray(option) ? option[1] : option; return `<option value="${escapeHtml(val)}" ${String(value ?? "") === String(val) ? "selected" : ""}>${escapeHtml(text)}</option>`; }).join("")}</select></div>`;
      }
      function renderPayrollCheckboxes(draft) {
        const fields = [["incidenceInss", "Incide INSS"], ["incidenceFgts", "Incide FGTS"], ["incidenceIrrf", "Incide IRRF"], ["incidenceVacation", "Incide férias"], ["incidenceThirteenth", "Incide 13º"], ["integratesSalary", "Integra salário"], ["autoApply", "Automática no cálculo"], ["active", "Ativa"]];
        return `<div class="field full"><label>Incidências e status</label><div class="badge-row">${fields.map(([name, label]) => `<label class="badge"><input type="checkbox" name="${name}" ${draft[name] ? "checked" : ""}> ${escapeHtml(label)}</label>`).join("")}</div></div>`;
      }
      function renderPayrollFormActions(resetAction) {
        return `<div class="form-actions"><button class="primary-button" type="submit">Salvar</button><button class="ghost-button" type="button" data-action="${resetAction}">Limpar</button></div>`;
      }
      function renderPayrollTableHeader(title, searchKey, placeholder) {
        return `<div class="table-toolbar"><h4>${escapeHtml(title)}</h4><input class="search-input" type="search" data-search="${searchKey}" value="${escapeHtml(state.ui.search[searchKey] || "")}" placeholder="${escapeHtml(placeholder)}"></div>`;
      }
      function renderPayrollRowActions(prefix, id) {
        return `<div class="table-actions"><button class="action-chip" type="button" data-action="edit-${prefix}" data-id="${id}">Editar</button><button class="action-chip danger" type="button" data-action="delete-${prefix}" data-id="${id}">Excluir</button></div>`;
      }
      function renderPayrollEmptyRow(colspan, message) {
        return `<tr><td colspan="${colspan}"><div class="empty-card" style="border:0; box-shadow:none;"><strong>${escapeHtml(message)}</strong><p>Use o formulário ao lado para criar o primeiro registro.</p></div></td></tr>`;
