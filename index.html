                    <label>Conta contábil derivada</label>
                    <div class="field-readonly">${selectedAccount ? `${escapeHtml(selectedAccount.code)} - ${escapeHtml(selectedAccount.name)} | ${escapeHtml(selectedAccount.group)} | ${escapeHtml(selectedAccount.balanceNature)}` : "A conta contábil será exibida conforme a natureza selecionada."}</div>
                    ${selectedNature && !linkedAccountIsValid ? `<div class="inline-note warning">A natureza selecionada não está mais vinculada a uma conta analítica ativa.</div>` : ""}
                  </div>
                </div>
                <div class="form-actions">
                  <button class="primary-button" type="submit" ${canCreate ? "" : "disabled"}>${editing ? "Salvar alterações" : "Cadastrar item"}</button>
                  ${editing ? `<button class="ghost-button" type="button" data-action="reset-item">Cancelar edição</button>` : ""}
                </div>
              </form>
            </article>
            <article class="table-card">
              <div class="table-toolbar">
                <div>
                  <h4>Lista de itens</h4>
                  <p class="page-subtitle">Pesquisa por código, nome, descrição, natureza financeira ou conta contábil.</p>
                </div>
                <input class="search-input" data-search="items" placeholder="Pesquisar itens" value="${escapeHtml(searchTerm)}">
              </div>
              ${records.length ? `
                <div class="table-scroll">
                  <table>
                    <thead>
                      <tr>
                        <th>Código</th>
                        <th>Item</th>
                        <th>Natureza financeira</th>
                        <th>Conta contábil</th>
                        <th>Ações</th>
                      </tr>
                    </thead>
                    <tbody>
                      ${records.map((record) => {
                        const nature = getFinancialNatureById(record.financialNatureId);
                        const account = nature ? getChartAccountById(nature.chartAccountId) : null;
                        return `
                          <tr>
                            <td class="mono">${escapeHtml(record.code)}</td>
                            <td>
                              <strong>${escapeHtml(record.name)}</strong>
                              <div class="table-muted">${escapeHtml(record.description || "Sem descrição")}</div>
                            </td>
                            <td>${escapeHtml(nature?.name || "Natureza indisponível")}</td>
                            <td>
                              <div class="badge-row">
                                <span class="badge">${escapeHtml(account?.code || "Conta indisponível")}</span>
                                ${account && isChartAccountAvailableForLinks(account) ? `<span class="badge positive">Vínculo liberado</span>` : `<span class="badge warning">Revisar vínculo</span>`}
                              </div>
                              <div class="table-muted">${escapeHtml(account?.name || "Conta contábil removida")}</div>
                              <div class="table-muted">${escapeHtml(account ? `${account.group} | ${account.balanceNature}` : "Conta contábil indisponível")}</div>
                            </td>
                            <td>
                              <div class="table-actions">
                                <button class="action-chip" type="button" data-action="edit-item" data-id="${escapeHtml(record.id)}">Editar</button>
                                <button class="action-chip danger" type="button" data-action="delete-item" data-id="${escapeHtml(record.id)}">Excluir</button>
                              </div>
                            </td>
                          </tr>
                        `;
                      }).join("")}
                    </tbody>
                  </table>
                </div>
              ` : `
                <div class="empty-card">
                  <strong>Nenhum item encontrado.</strong>
                  <p>${searchTerm ? "Nenhum item foi localizado com os filtros atuais." : "Cadastre o primeiro item para utilizá-lo nas notas fiscais."}</p>
                </div>
              `}
            </article>
          </section>
        `;
      }

      function renderFiscalView() {
        const draft = state.ui.invoiceDraft;
        const totals = getInvoiceTotals(draft);
        const supplier = getSupplierById(draft.supplierId);
        const searchTerm = state.ui.search.invoices;
        const selectableItems = getSelectableItems();
        const records = filterRecords(
          state.data.invoices,
          searchTerm,
          (record) => {
            const recordSupplier = getSupplierById(record.supplierId);
            return `${record.code} ${record.type} ${record.description} ${recordSupplier?.legalName || ""} ${record.issueDate}`;
          }
        );
        const canLaunch = state.data.suppliers.length > 0 && selectableItems.length > 0;
        const lineItem = getItemById(draft.lineForm.itemId);
        const lineNature = lineItem ? getFinancialNatureById(lineItem.financialNatureId) : null;
        const lineAccount = lineNature ? getChartAccountById(lineNature.chartAccountId) : null;

        return `
          ${!state.data.suppliers.length || !selectableItems.length ? `
            <section class="notice-card">
              <div class="notice-icon">PR</div>
              <div>
                <strong>Pré-requisitos para lançar notas fiscais</strong>
                <p>Você precisa ter pelo menos um fornecedor e um item vinculado a natureza financeira com conta contábil analítica ativa.</p>
              </div>
            </section>
          ` : ""}
          <section class="card">
            <div class="section-head">
              <div>
                <h3>${draft.id ? `Editar nota fiscal ${escapeHtml(draft.code)}` : "Nova nota fiscal"}</h3>
                <p>Registre notas de serviço ou produto com itens vinculados à estrutura contábil e parcelas da parte financeira.</p>
              </div>
              ${draft.id ? `<button class="ghost-button" type="button" data-action="new-invoice">Limpar rascunho</button>` : ""}
            </div>
            <form data-form="invoice" autocomplete="off">
              <div class="form-grid">
                <div class="field">
                  <label for="invoice-type">Tipo da nota</label>
                  <select id="invoice-type" name="type" ${canLaunch ? "" : "disabled"}>
                    <option value="Nota de serviço" ${draft.type === "Nota de serviço" ? "selected" : ""}>Nota de serviço</option>
                    <option value="Nota de produto" ${draft.type === "Nota de produto" ? "selected" : ""}>Nota de produto</option>
                  </select>
                </div>
                <div class="field">
                  <label for="invoice-supplier">Fornecedor</label>
                  <select id="invoice-supplier" name="supplierId" ${canLaunch ? "required" : "disabled"}>
                    <option value="">Selecione um fornecedor</option>
                    ${state.data.suppliers.map((record) => `
                      <option value="${escapeHtml(record.id)}" ${draft.supplierId === record.id ? "selected" : ""}>
                        ${escapeHtml(record.code)} - ${escapeHtml(record.legalName)}
                      </option>
                    `).join("")}
                  </select>
                </div>
                <div class="field">
                  <label for="invoice-date">Data de emissão</label>
                  <input id="invoice-date" type="date" name="issueDate" value="${escapeHtml(draft.issueDate || "")}" ${canLaunch ? "required" : "disabled"}>
                </div>
                <div class="field">
                  <label>Fornecedor selecionado</label>
                  <div class="field-readonly">${supplier ? `${escapeHtml(supplier.code)} - ${escapeHtml(supplier.legalName)}` : "Selecione um fornecedor cadastrado."}</div>
                </div>
                <div class="field full">
                  <label for="invoice-description">Descrição da nota</label>
                  <textarea id="invoice-description" name="description" maxlength="300" ${canLaunch ? "" : "disabled"} placeholder="Descreva o conteúdo ou finalidade da nota">${escapeHtml(draft.description || "")}</textarea>
                </div>
              </div>
              <div class="form-actions">
                <button class="primary-button" type="submit" ${canLaunch ? "" : "disabled"}>${draft.id ? "Salvar alterações da nota" : "Salvar nota fiscal"}</button>
              </div>
            </form>
          </section>

          <section class="split-grid">
            <article class="card">
              <div class="section-head">
                <div>
                  <h3>Itens da nota</h3>
                  <p>Selecione um item cadastrado para carregar automaticamente sua natureza financeira e conta contábil vinculadas.</p>
                </div>
              </div>
              <form data-form="invoice-line" autocomplete="off">
                <div class="form-grid">
                  <div class="field full">
                    <label for="invoice-line-item">Item</label>
                    <select id="invoice-line-item" name="itemId" ${canLaunch ? "required" : "disabled"}>
                      <option value="">Selecione um item</option>
                      ${selectableItems.map((item) => {
                        const nature = getFinancialNatureById(item.financialNatureId);
                        const account = nature ? getChartAccountById(nature.chartAccountId) : null;
                        return `
                          <option value="${escapeHtml(item.id)}" ${draft.lineForm.itemId === item.id ? "selected" : ""}>
                            ${escapeHtml(item.code)} - ${escapeHtml(item.name)}${nature ? ` | ${escapeHtml(nature.name)}` : ""}${account ? ` | ${escapeHtml(account.code)}` : ""}
                          </option>
                        `;
                      }).join("")}
                    </select>
                  </div>
                  <div class="field">
                    <label for="invoice-line-quantity">Quantidade</label>
                    <input id="invoice-line-quantity" type="number" name="quantity" min="0.01" step="0.01" value="${escapeHtml(String(draft.lineForm.quantity || 1))}" ${canLaunch ? "required" : "disabled"}>
                  </div>
                  <div class="field">
                    <label for="invoice-line-unit-price">Valor unitário</label>
                    <input id="invoice-line-unit-price" type="number" name="unitPrice" min="0.01" step="0.01" value="${escapeHtml(String(draft.lineForm.unitPrice || ""))}" ${canLaunch ? "required" : "disabled"}>
                  </div>
                  <div class="field full">
                    <label>Natureza financeira e conta contábil</label>
                    <div class="field-readonly">
                      ${lineItem && lineNature && lineAccount
                        ? `${escapeHtml(lineNature.code)} - ${escapeHtml(lineNature.name)} | ${escapeHtml(lineAccount.code)} - ${escapeHtml(lineAccount.name)} | ${escapeHtml(lineAccount.group)} | ${escapeHtml(lineAccount.balanceNature)}`
                        : "Selecione um item para visualizar os vínculos automáticos."}
                    </div>
                  </div>
                </div>
                <div class="form-actions">
                  <button class="secondary-button" type="submit" ${canLaunch ? "" : "disabled"}>Adicionar item</button>
                </div>
              </form>
              ${draft.items.length ? `
                <div class="table-card" style="margin-top:20px;">
                  <div class="table-scroll">
                    <table>
                      <thead>
                        <tr>
                          <th>Item</th>
                          <th>Natureza</th>
                          <th>Conta</th>
                          <th>Qtd.</th>
                          <th>Vlr. unitário</th>
                          <th>Vlr. total</th>
                          <th>Ações</th>
                        </tr>
                      </thead>
                      <tbody>
                        ${draft.items.map((item) => `
                          <tr>
                            <td>
                              <strong>${escapeHtml(item.itemName)}</strong>
                              <div class="table-muted">${escapeHtml(item.itemCode || item.itemId)}</div>
                            </td>
                            <td>${escapeHtml(item.financialNatureName)}</td>
                            <td>
                              <div class="badge-row">
                                <span class="badge">${escapeHtml(item.chartAccountCode)}</span>
                                ${item.chartAccountType ? `<span class="badge positive">${escapeHtml(item.chartAccountType)}</span>` : ""}
                              </div>
                              <div class="table-muted">${escapeHtml(item.chartAccountName)}</div>
                              <div class="table-muted">${escapeHtml([item.chartAccountGroup, item.chartAccountBalanceNature].filter(Boolean).join(" | ") || "Metadados não informados")}</div>
                            </td>
                            <td class="mono">${escapeHtml(String(item.quantity))}</td>
                            <td class="mono">${escapeHtml(formatCurrency(item.unitPrice))}</td>
                            <td class="mono">${escapeHtml(formatCurrency(item.totalPrice))}</td>
                            <td>
                              <button class="action-chip danger" type="button" data-action="remove-invoice-line" data-id="${escapeHtml(item.id)}">Remover</button>
                            </td>
                          </tr>
                        `).join("")}
                      </tbody>
                    </table>
                  </div>
                </div>
              ` : `
                <div class="empty-card" style="margin-top:20px;">
                  <strong>Nenhum item adicionado à nota.</strong>
                  <p>Inclua os itens do lançamento para compor o valor total e carregar automaticamente a classificação financeira e contábil.</p>
                </div>
              `}
            </article>

            <article class="card">
              <div class="section-head">
                <div>
                  <h3>Financeiro da nota</h3>
                  <p>Adicione uma ou mais parcelas com status, forma de pagamento, vencimento e valor.</p>
                </div>
              </div>
              <form data-form="invoice-installment" autocomplete="off">
                <div class="form-grid">
                  <div class="field">
                    <label for="installment-number">Número da parcela</label>
                    <input id="installment-number" type="number" name="installmentNumber" min="1" step="1" value="${escapeHtml(String(draft.installmentForm.installmentNumber || 1))}" ${canLaunch ? "required" : "disabled"}>
                  </div>
                  <div class="field">
                    <label for="installment-due-date">Data de vencimento</label>
                    <input id="installment-due-date" type="date" name="dueDate" value="${escapeHtml(draft.installmentForm.dueDate || "")}" ${canLaunch ? "required" : "disabled"}>
                  </div>
                  <div class="field">
                    <label for="installment-amount">Valor da parcela</label>
                    <input id="installment-amount" type="number" name="amount" min="0.01" step="0.01" value="${escapeHtml(String(draft.installmentForm.amount || ""))}" ${canLaunch ? "required" : "disabled"}>
                  </div>
                  <div class="field">
                    <label for="installment-method">Forma de pagamento</label>
                    <input id="installment-method" name="paymentMethod" maxlength="60" value="${escapeHtml(draft.installmentForm.paymentMethod || "")}" placeholder="Boleto, PIX, TED..." ${canLaunch ? "required" : "disabled"}>
                  </div>
                  <div class="field full">
                    <label for="installment-status">Status da parcela</label>
                    <select id="installment-status" name="status" ${canLaunch ? "" : "disabled"}>
                      <option value="Em aberto" ${draft.installmentForm.status === "Em aberto" ? "selected" : ""}>Em aberto</option>
                      <option value="Pago" ${draft.installmentForm.status === "Pago" ? "selected" : ""}>Pago</option>
                      <option value="Cancelado" ${draft.installmentForm.status === "Cancelado" ? "selected" : ""}>Cancelado</option>
                    </select>
                  </div>
                </div>
                <div class="form-actions">
                  <button class="secondary-button" type="submit" ${canLaunch ? "" : "disabled"}>Adicionar parcela</button>
                </div>
              </form>
              ${draft.installments.length ? `
                <div class="table-card" style="margin-top:20px;">
                  <div class="table-scroll">
                    <table>
                      <thead>
                        <tr>
                          <th>Parcela</th>
                          <th>Vencimento</th>
                          <th>Valor</th>
                          <th>Forma de pagamento</th>
                          <th>Status</th>
                          <th>Ações</th>
                        </tr>
                      </thead>
                      <tbody>
                        ${draft.installments.map((installment) => `
                          <tr>
                            <td class="mono">${escapeHtml(String(installment.installmentNumber))}</td>
                            <td>${escapeHtml(formatDate(installment.dueDate))}</td>
                            <td class="mono">${escapeHtml(formatCurrency(installment.amount))}</td>
                            <td>${escapeHtml(installment.paymentMethod)}</td>
                            <td>
                              <span class="badge ${installment.status === "Pago" ? "positive" : installment.status === "Cancelado" ? "danger" : "warning"}">${escapeHtml(installment.status)}</span>
                            </td>
                            <td>
                              <button class="action-chip danger" type="button" data-action="remove-installment" data-id="${escapeHtml(installment.id)}">Remover</button>
                            </td>
                          </tr>
                        `).join("")}
                      </tbody>
                    </table>
                  </div>
                </div>
              ` : `
                <div class="empty-card" style="margin-top:20px;">
                  <strong>Nenhuma parcela adicionada.</strong>
                  <p>Inclua uma ou mais parcelas para registrar a parte financeira da nota fiscal.</p>
                </div>
              `}
            </article>
          </section>

          <section class="card">
            <div class="section-head">
              <div>
                <h3>Resumo financeiro e consistência</h3>
                <p>O sistema compara automaticamente o total dos itens com o total das parcelas antes do salvamento da nota.</p>
              </div>
              <div class="status-highlight ${getInvoiceStatusClass(totals.difference)}">
                ${Math.abs(totals.difference) <= 0.009 ? "Totais conciliados" : "Diferença entre itens e parcelas"}
              </div>
            </div>
            <div class="totals-grid">
              <article class="total-card">
                <span>Total dos itens</span>
                <strong class="mono">${escapeHtml(formatCurrency(totals.totalItemsAmount))}</strong>
                <small>Soma de quantidade x valor unitário de todos os itens adicionados à nota.</small>
              </article>
              <article class="total-card">
                <span>Total das parcelas</span>
                <strong class="mono">${escapeHtml(formatCurrency(totals.totalInstallmentsAmount))}</strong>
                <small>Soma de todas as parcelas registradas na seção financeira da nota.</small>
              </article>
              <article class="total-card">
                <span>Diferença</span>
                <strong class="mono">${escapeHtml(formatCurrency(totals.difference))}</strong>
                <small>${Math.abs(totals.difference) <= 0.009 ? "A nota pode ser salva normalmente." : "Ajuste itens ou parcelas para permitir o salvamento da nota."}</small>
              </article>
            </div>
          </section>

          <section class="table-card">
            <div class="table-toolbar">
              <div>
                <h4>Notas fiscais lançadas</h4>
                <p class="page-subtitle">Pesquise, edite ou exclua notas fiscais já registradas localmente.</p>
              </div>
              <input class="search-input" data-search="invoices" placeholder="Pesquisar notas fiscais" value="${escapeHtml(searchTerm)}">
            </div>
            ${records.length ? `
              <div class="table-scroll">
                <table>
                  <thead>
                    <tr>
                      <th>Código</th>
                      <th>Tipo / fornecedor</th>
                      <th>Emissão</th>
                      <th>Descrição</th>
                      <th>Itens</th>
                      <th>Parcelas</th>
                      <th>Total</th>
                      <th>Ações</th>
                    </tr>
                  </thead>
                  <tbody>
                    ${records.map((record) => {
                      const supplierRecord = getSupplierById(record.supplierId);
                      const difference = roundCurrency(record.totalItemsAmount - record.totalInstallmentsAmount);
                      return `
                        <tr>
                          <td class="mono">${escapeHtml(record.code)}</td>
                          <td>
                            <strong>${escapeHtml(record.type)}</strong>
                            <div class="table-muted">${escapeHtml(supplierRecord?.legalName || "Fornecedor indisponível")}</div>
                          </td>
                          <td>${escapeHtml(formatDate(record.issueDate))}</td>
                          <td class="table-muted">${escapeHtml(record.description || "Sem descrição")}</td>
                          <td class="mono">${escapeHtml(String(record.items.length))}</td>
                          <td>
                            <div class="mono">${escapeHtml(String(record.installments.length))}</div>
                            <div class="badge-row" style="margin-top:8px;">
                              <span class="badge ${Math.abs(difference) <= 0.009 ? "positive" : "warning"}">${Math.abs(difference) <= 0.009 ? "Conciliada" : "Divergente"}</span>
                            </div>
                          </td>
                          <td class="mono">${escapeHtml(formatCurrency(record.totalItemsAmount))}</td>
                          <td>
                            <div class="table-actions">
                              <button class="action-chip" type="button" data-action="edit-invoice" data-id="${escapeHtml(record.id)}">Editar</button>
                              <button class="action-chip danger" type="button" data-action="delete-invoice" data-id="${escapeHtml(record.id)}">Excluir</button>
                            </div>
                          </td>
                        </tr>
                      `;
                    }).join("")}
                  </tbody>
                </table>
              </div>
            ` : `
              <div class="empty-card">
                <strong>Nenhuma nota fiscal encontrada.</strong>
                <p>${searchTerm ? "Nenhuma nota fiscal corresponde ao termo pesquisado." : "Depois de cadastrar fornecedores e itens, use esta área para registrar as notas fiscais."}</p>
              </div>
            `}
          </section>
        `;
      }

      initialize();
    })();
  </script>
</body>
</html>
