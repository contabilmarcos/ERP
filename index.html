      function normalizePayrollText(value) {
        return String(value || "")
          .normalize("NFD")
          .replace(/[\u0300-\u036f]/g, "")
          .toLowerCase();
      }

      function isPayrollSalaryBaseEvent(event) {
        const text = `${event?.code || ""} ${event?.name || ""} ${event?.nature || ""}`;
        const normalized = normalizePayrollText(text);
        return normalized.includes("salario base") || normalized.includes("natureza salario") || normalized.includes(" salario");
      }

      function isPayrollOvertime50Event(event) {
        const text = normalizePayrollText(`${event?.name || ""} ${event?.nature || ""}`);
        return text.includes("hora extra") && !text.includes("100");
      }

      function isPayrollAbsenceEvent(event) {
        const text = normalizePayrollText(`${event?.name || ""} ${event?.nature || ""}`);
        return text.includes("falta");
      }

      function isPayrollDelayEvent(event) {
        const text = normalizePayrollText(`${event?.name || ""} ${event?.nature || ""}`);
        return text.includes("atraso");
      }

      function clampPayrollNumber(value, min = 0, max = 9999) {
        return Math.min(max, Math.max(min, toDecimal(value)));
      }

      function getPayrollProcessingEmployees(draft = state.ui.payrollRunDraft) {
        return state.data.payrollEmployees.filter((item) => draft.employeeScope === "all" ? item.status !== "Demitido" : item.status === "Ativo");
      }

      function getPayrollEmployeeWorkInput(employeeId, employee) {
        const draftInputs = state.ui.payrollRunDraft.employeeInputs || {};
        const raw = draftInputs[employeeId] || {};
        return {
          daysWorked: clampPayrollNumber(raw.daysWorked ?? 30, 0, 31),
          absences: clampPayrollNumber(raw.absences ?? 0, 0, 31),
          overtimeHours: clampPayrollNumber(raw.overtimeHours ?? 0, 0, 744),
          delayHours: clampPayrollNumber(raw.delayHours ?? 0, 0, 744),
          monthlyJourney: clampPayrollNumber(employee?.monthlyJourney ?? 220, 1, 744)
        };
      }

      function getWorkDrivenPayrollEvents(events, employeeInputs) {
        const needsOvertime = Object.values(employeeInputs).some((item) => toDecimal(item.overtimeHours) > 0);
        const needsAbsence = Object.values(employeeInputs).some((item) => toDecimal(item.absences) > 0);
        const needsDelay = Object.values(employeeInputs).some((item) => toDecimal(item.delayHours) > 0);
        return events.filter((event) => {
          if (needsOvertime && isPayrollOvertime50Event(event)) return true;
          if (needsAbsence && isPayrollAbsenceEvent(event)) return true;
          if (needsDelay && isPayrollDelayEvent(event)) return true;
          return false;
        });
      }

      function evaluatePayrollFormula(formula, context) {
        const expression = String(formula || "0").trim();
        if (!/^[\d\s+\-*/().,%a-zA-Z_]+$/.test(expression)) return 0;
        const names = Object.keys(context);
        const values = Object.values(context);
        try {
          return toDecimal(Function(...names, `return (${expression.replace(/,/g, ".")});`)(...values));
        } catch (error) {
          return 0;
        }
      }

      function getValidPayrollTable(kind, competence) {
        const collection = kind === "INSS" ? state.data.payrollInssTables : state.data.payrollIrrfTables;
        return collection.find((table) => table.status !== "Inativo" && table.competenceStart <= competence && (!table.competenceEnd || table.competenceEnd >= competence));
      }

      function calculateProgressivePayrollAmount(kind, base, competence) {
        const table = getValidPayrollTable(kind, competence);
        if (!table) return { amount: 0, grossAmount: 0, reductionAmount: 0, base: roundCurrency(base), tableCode: "", calculationNote: "Tabela não localizada" };
        const rows = [...(table.rows || [])].sort((a, b) => toDecimal(a.rangeStart) - toDecimal(b.rangeStart));
        let row = rows.find((item) => base >= toDecimal(item.rangeStart) && (!toDecimal(item.rangeEnd) || base <= toDecimal(item.rangeEnd)));
        if (!row && rows.length) {
          const last = rows[rows.length - 1];
          if (base > toDecimal(last.rangeEnd)) row = last;
        }
        if (!row) return { amount: 0, grossAmount: 0, reductionAmount: 0, base: roundCurrency(base), tableCode: table.code, calculationNote: "Sem faixa aplicável" };
        const limit = toDecimal(row.ceiling) || toDecimal(row.rangeEnd) || base;
        const taxable = Math.min(base, limit);
        const grossAmount = Math.max(0, roundCurrency((taxable * toDecimal(row.rate) / 100) - toDecimal(row.deduction)));
        if (kind !== "IRRF") {
          return { amount: grossAmount, grossAmount, reductionAmount: 0, base: roundCurrency(base), tableCode: table.code, calculationNote: "Tabela progressiva" };
        }
        const irrfResult = applyPayrollIrrfMonthlyReduction(table, grossAmount, base);
        return { ...irrfResult, base: roundCurrency(base), tableCode: table.code };
      }

      function applyPayrollIrrfMonthlyReduction(table, grossAmount, taxableIncome) {
        const rule = getDefaultPayrollIrrfReductionRule(table);
        if (!rule.enabled || grossAmount <= 0) {
          return { amount: grossAmount, grossAmount, reductionAmount: 0, calculationNote: "IRRF bruto sem redutor" };
        }
        let reductionAmount = 0;
        let calculationNote = "IRRF bruto sem redutor";
        if (taxableIncome <= toDecimal(rule.exemptionLimit)) {
          reductionAmount = grossAmount;
          calculationNote = "Redutor mensal zerou o IRRF";
        } else if (taxableIncome <= toDecimal(rule.reductionUpperLimit)) {
          const formulaValue = evaluatePayrollFormula(rule.reductionFormula, {
            rendimentoTributavel: taxableIncome,
            baseIrrf: taxableIncome,
            impostoBruto: grossAmount,
            grossIrrf: grossAmount,
            limiteIsencao: toDecimal(rule.exemptionLimit),
            limiteReducao: toDecimal(rule.reductionUpperLimit),
            valorFixoReducao: toDecimal(rule.reductionFixedValue),
            fatorReducao: toDecimal(rule.reductionFactor)
          });
          const fallbackValue = toDecimal(rule.reductionFixedValue) - (toDecimal(rule.reductionFactor) * taxableIncome);
          reductionAmount = Math.max(0, Number.isFinite(formulaValue) ? formulaValue : fallbackValue);
          calculationNote = "Redutor mensal parcial do IRRF";
        }
        reductionAmount = roundCurrency(Math.min(grossAmount, Math.max(0, reductionAmount)));
        return {
          amount: Math.max(0, roundCurrency(grossAmount - reductionAmount)),
          grossAmount,
          reductionAmount,
          calculationNote
        };
      }

      function calculatePayrollEventResult(event, employee, params, bases, competence, workInput = {}) {
        if (event.calculationType === "Tabela progressiva") {
          const base = event.tableType === "IRRF" ? bases.irrf : bases.inss;
          return calculateProgressivePayrollAmount(event.tableType, base, competence);
        }
        const amount = calculatePayrollEventAmount(event, employee, params, bases, competence, workInput);
        return { amount, grossAmount: amount, reductionAmount: 0, base: 0, tableCode: "", calculationNote: "" };
      }

      function calculatePayrollEventAmount(event, employee, params, bases, competence, workInput = {}) {
        const originalSalaryBase = toDecimal(employee.salaryBase);
        const daysWorked = clampPayrollNumber(workInput.daysWorked ?? 30, 0, 31);
        const absences = clampPayrollNumber(workInput.absences ?? 0, 0, 31);
        const overtimeHours = clampPayrollNumber(workInput.overtimeHours ?? 0, 0, 744);
        const delayHours = clampPayrollNumber(workInput.delayHours ?? 0, 0, 744);
        const journey = toDecimal(employee.monthlyJourney) || toDecimal(params.defaultMonthlyJourney) || 220;
        const hourlyRate = journey ? originalSalaryBase / journey : 0;
        const dailyRate = originalSalaryBase / 30;
        const proratedSalary = roundCurrency(originalSalaryBase * daysWorked / 30);

        if (isPayrollSalaryBaseEvent(event)) return proratedSalary;
        if (isPayrollOvertime50Event(event)) return roundCurrency(overtimeHours * hourlyRate * 1.5);
        if (isPayrollAbsenceEvent(event)) return roundCurrency(absences * dailyRate);
        if (isPayrollDelayEvent(event)) return roundCurrency(delayHours * hourlyRate);

        const salaryBase = originalSalaryBase;
        const context = {
          salaryBase,
          originalSalaryBase,
          proratedSalary,
          daysWorked,
          absences,
          overtimeHours,
          delayHours,
          hourlyRate,
          dailyRate,
          quantity: 1,
          value: toDecimal(event.fixedValue),
          unitValue: toDecimal(event.fixedValue),
          percentage: toDecimal(event.percentage),
          baseInss: bases.inss,
          baseIrrf: bases.irrf,
          baseFgts: bases.fgts,
          fgtsRate: toDecimal(params.fgtsRate)
        };
        if (event.calculationType === "Valor fixo") return roundCurrency(toDecimal(event.fixedValue));
        if (event.calculationType === "Percentual") return roundCurrency(salaryBase * toDecimal(event.percentage) / 100);
        if (event.calculationType === "Quantidade x valor") return roundCurrency(context.quantity * context.unitValue);
        if (event.calculationType === "Tabela progressiva") return calculateProgressivePayrollAmount(event.tableType, event.tableType === "IRRF" ? bases.irrf : bases.inss, competence).amount;
        if (event.calculationType === "Fórmula") return roundCurrency(evaluatePayrollFormula(event.formula, context));
        return 0;
      }

      function executePayrollRunProcessing() {
        const draft = state.ui.payrollRunDraft;
        const competence = draft.competence;
        const payrollType = draft.payrollType;
        if (!competence || !payrollType) { notify("error", "Processamento", "Informe competência e tipo de folha."); return; }
        const period = requirePayrollOpenCompetence(competence);
        let activePeriod = period;
        if (!activePeriod) {
          activePeriod = { id: generateId(), code: generateCode("payrollPeriods"), competence, openDate: new Date().toISOString().slice(0, 10), closeDate: "", paymentDate: "", status: "Aberta", createdAt: payrollNow(), updatedAt: payrollNow() };
          upsertRecord("payrollPeriods", activePeriod);
        }
        const employees = getPayrollProcessingEmployees(draft);
        if (!employees.length) { notify("error", "Processamento", "Não há funcionários ativos para calcular."); return; }
        const params = getActivePayrollParameters(competence);
        const activeEvents = state.data.payrollEvents.filter((item) => item.active !== false);
        const employeeInputs = Object.fromEntries(employees.map((employee) => [employee.id, getPayrollEmployeeWorkInput(employee.id, employee)]));
        const workDrivenEvents = getWorkDrivenPayrollEvents(activeEvents, employeeInputs);
        const events = [
          ...activeEvents.filter((item) => item.autoApply),
          ...workDrivenEvents
        ].filter((event, index, list) => list.findIndex((candidate) => candidate.id === event.id) === index)
          .sort((a, b) => (Number(a.calculationOrder) || 0) - (Number(b.calculationOrder) || 0));
        if (!events.length) { notify("error", "Processamento", "Cadastre ao menos uma rubrica automática ativa."); return; }

        const needsOvertime = Object.values(employeeInputs).some((item) => item.overtimeHours > 0);
        const needsAbsence = Object.values(employeeInputs).some((item) => item.absences > 0);
        const needsDelay = Object.values(employeeInputs).some((item) => item.delayHours > 0);
        const missingWorkEvents = [];
        if (needsOvertime && !events.some(isPayrollOvertime50Event)) missingWorkEvents.push("Hora extra 50%");
        if (needsAbsence && !events.some(isPayrollAbsenceEvent)) missingWorkEvents.push("Faltas");
        if (needsDelay && !events.some(isPayrollDelayEvent)) missingWorkEvents.push("Atrasos");
        if (missingWorkEvents.length) {
          notify("error", "Processamento", `Cadastre/ative as rubricas: ${missingWorkEvents.join(", ")}.`);
          return;
        }

        const existing = state.data.payrollRuns.find((item) => item.competence === competence && item.payrollType === payrollType && item.status !== "Contabilizada");
        const runId = existing?.id || generateId();
        if (existing) {
          state.data.payrollRunItems = state.data.payrollRunItems.filter((item) => item.runId !== existing.id);
          state.data.payrollCalculationBases = state.data.payrollCalculationBases.filter((item) => item.runId !== existing.id);
          state.data.payrollProvisions = state.data.payrollProvisions.filter((item) => item.runId !== existing.id);
        }
        const runItems = [];
        const baseItems = [];
        const provisionItems = [];
        let totalEarnings = 0;
        let totalDeductions = 0;
        employees.forEach((employee) => {
          const workInput = employeeInputs[employee.id];
          const bases = { inss: 0, irrf: 0, fgts: 0 };
          const employeeItems = [];
          events.forEach((event) => {
            const calculation = calculatePayrollEventResult(event, employee, params, bases, competence, workInput);
            const amount = roundCurrency(calculation.amount);
            if (!amount && !calculation.grossAmount && !calculation.reductionAmount) return;
            if (event.type === "Provento") {
              if (event.incidenceInss) bases.inss += amount;
              if (event.incidenceIrrf) bases.irrf += amount;
              if (event.incidenceFgts) bases.fgts += amount;
            }
            if (event.type === "Desconto" && (isPayrollAbsenceEvent(event) || isPayrollDelayEvent(event))) {
              bases.inss = Math.max(0, bases.inss - amount);
              bases.irrf = Math.max(0, bases.irrf - amount);
              bases.fgts = Math.max(0, bases.fgts - amount);
            }
            if (event.type === "Desconto" && ["INSS", "IRRF"].includes(event.tableType || event.nature)) {
              if (event.nature === "INSS") bases.irrf = Math.max(0, bases.irrf - amount);
            }
            const signedAmount = event.type === "Desconto" ? -Math.abs(amount) : amount;
            employeeItems.push({
              id: generateId(),
              code: `MOV${String(runItems.length + employeeItems.length + 1).padStart(7, "0")}`,
              runId,
              employeeId: employee.id,
              eventId: event.id,
              eventCode: event.code,
              eventName: event.name,
              eventType: event.type,
              amount: roundCurrency(Math.abs(amount)),
              signedAmount: roundCurrency(signedAmount),
              grossAmount: roundCurrency(calculation.grossAmount ?? Math.abs(amount)),
              reductionAmount: roundCurrency(calculation.reductionAmount || 0),
              calculationBase: roundCurrency(calculation.base || 0),
              tableCode: calculation.tableCode || "",
              calculationNote: calculation.calculationNote || "",
              baseInss: roundCurrency(bases.inss),
              baseIrrf: roundCurrency(bases.irrf),
              baseFgts: roundCurrency(bases.fgts),
              costCenterId: employee.costCenterId,
              workDays: workInput.daysWorked,
              absenceDays: workInput.absences,
              overtimeHours: workInput.overtimeHours,
              delayHours: workInput.delayHours,
              status: "Calculado",
              createdAt: payrollNow(),
              updatedAt: payrollNow()
            });
          });
          employeeItems.forEach((item) => {
            if (item.eventType === "Provento") totalEarnings += item.amount;
            if (item.eventType === "Desconto") totalDeductions += item.amount;
          });
          runItems.push(...employeeItems);
          baseItems.push({ id: generateId(), code: `BAS${String(baseItems.length + 1).padStart(7, "0")}`, runId, employeeId: employee.id, inssBase: roundCurrency(bases.inss), irrfBase: roundCurrency(bases.irrf), fgtsBase: roundCurrency(bases.fgts), createdAt: payrollNow(), updatedAt: payrollNow(), status: "Ativo" });
          provisionItems.push({ id: generateId(), code: `PRV${String(provisionItems.length + 1).padStart(7, "0")}`, runId, employeeId: employee.id, vacationProvision: roundCurrency(toDecimal(employee.salaryBase) * toDecimal(params.vacationProvisionRate) / 100), thirteenthProvision: roundCurrency(toDecimal(employee.salaryBase) * toDecimal(params.thirteenthProvisionRate) / 100), chargesProvision: roundCurrency(toDecimal(employee.salaryBase) * toDecimal(params.provisionChargesRate) / 100), createdAt: payrollNow(), updatedAt: payrollNow(), status: "Ativo" });
        });
        const netPayable = roundCurrency(totalEarnings - totalDeductions);
        const attendanceInputs = employees.map((employee) => ({
          employeeId: employee.id,
          employeeName: employee.name,
          workDays: employeeInputs[employee.id].daysWorked,
          absenceDays: employeeInputs[employee.id].absences,
          overtimeHours: employeeInputs[employee.id].overtimeHours,
          delayHours: employeeInputs[employee.id].delayHours
        }));
        const run = { id: runId, code: existing?.code || generateCode("payrollRuns"), periodId: activePeriod.id, competence, payrollType, employeeScope: draft.employeeScope, employeeCount: employees.length, totalEarnings: roundCurrency(totalEarnings), totalDeductions: roundCurrency(totalDeductions), netPayable, attendanceInputs, status: "Calculada", notes: clean(draft.notes), createdAt: existing?.createdAt || payrollNow(), updatedAt: payrollNow() };
        upsertRecord("payrollRuns", run);
        state.data.payrollRunItems.push(...runItems);
        state.data.payrollCalculationBases.push(...baseItems);
        state.data.payrollProvisions.push(...provisionItems);
        upsertRecord("payrollPeriods", { ...activePeriod, status: "Calculada", updatedAt: payrollNow() });
        ["payrollRunItems", "payrollCalculationBases", "payrollProvisions"].forEach(persistCollection);
        state.ui.payrollSelectedRunId = runId;
        notify("success", "Processamento", "Folha processada com dias trabalhados, faltas, horas extras, atrasos, rubricas e bases parametrizadas.");
        renderApp();
      }

      function getPayrollMappingForItem(item) {
        const employee = getPayrollEmployeeById(item.employeeId);
        const event = getPayrollEventById(item.eventId);
        return state.data.payrollAccountingMappings.find((mapping) => mapping.status !== "Inativo" && mapping.eventId === item.eventId && (!mapping.costCenterId || mapping.costCenterId === employee?.costCenterId)) || (event?.debitAccountId && event?.creditAccountId ? { eventId: event.id, costCenterId: employee?.costCenterId || "", debitAccountId: event.debitAccountId, creditAccountId: event.creditAccountId, financialNatureId: event.financialNatureId, defaultHistory: event.defaultHistory || event.name } : null);
      }

      function executePayrollRunClosing(id) {
        const run = getPayrollRunById(id);
        if (!run || run.status === "Contabilizada") return;
        const params = getActivePayrollParameters(run.competence);
        if (!params.salaryPayableAccountId || !params.chargesPayableAccountId) { notify("error", "Fechamento", "Configure as contas de salários a pagar e encargos a recolher nos parâmetros."); return; }
        const items = state.data.payrollRunItems.filter((item) => item.runId === id && item.amount > 0);
        const missing = items.filter((item) => !getPayrollMappingForItem(item));
        if (missing.length) { notify("error", "Integração contábil", `Existem ${missing.length} rubricas sem contas configuradas.`); return; }
        const accountingEntries = [];
        const financialEntries = [];
        items.forEach((item, index) => {
          const mapping = getPayrollMappingForItem(item);
          const employee = getPayrollEmployeeById(item.employeeId);
          accountingEntries.push({ id: generateId(), code: `FLC${String(state.data.payrollAccountingEntries.length + accountingEntries.length + 1).padStart(7, "0")}`, runId: id, runCode: run.code, competence: run.competence, employeeId: item.employeeId, eventId: item.eventId, date: `${run.competence}-28`, debitAccountId: mapping.debitAccountId, creditAccountId: mapping.creditAccountId, costCenterId: mapping.costCenterId || employee?.costCenterId || "", amount: item.amount, history: mapping.defaultHistory || `Folha ${run.competence} - ${item.eventName}`, status: "Gerado", createdAt: payrollNow(), updatedAt: payrollNow() });
          if (item.eventType === "Desconto" || item.eventType === "Informativa") {
            financialEntries.push({ id: generateId(), code: `FFT${String(state.data.payrollFinancialEntries.length + financialEntries.length + 1).padStart(7, "0")}`, runId: id, employeeId: item.employeeId, eventId: item.eventId, competence: run.competence, dueDate: `${run.competence}-${String(params.paymentDay || 5).padStart(2, "0")}`, amount: item.amount, costCenterId: mapping.costCenterId || employee?.costCenterId || "", financialNatureId: mapping.financialNatureId || "", payableAccountId: mapping.creditAccountId || params.chargesPayableAccountId || "", description: `Folha ${run.competence} - ${item.eventName}`, status: "Em aberto", destinationModule: "financeiro", destinationName: "Módulo financeiro", createdAt: payrollNow(), updatedAt: payrollNow() });
          }
        });
        financialEntries.push({ id: generateId(), code: `FFT${String(state.data.payrollFinancialEntries.length + financialEntries.length + 1).padStart(7, "0")}`, runId: id, employeeId: "", eventId: "", competence: run.competence, dueDate: `${run.competence}-${String(params.paymentDay || 5).padStart(2, "0")}`, amount: run.netPayable, costCenterId: "", financialNatureId: "", payableAccountId: params.salaryPayableAccountId || "", description: `Salário líquido a pagar - ${run.code}`, status: "Em aberto", destinationModule: "financeiro", destinationName: "Módulo financeiro", createdAt: payrollNow(), updatedAt: payrollNow() });
        const accountingModuleEntries = accountingEntries.map((entry) => ({
          id: `auto-payroll-accounting-${entry.id}`,
          code: entry.code,
          entryDate: entry.date,
          description: entry.history,
          costCenterId: entry.costCenterId,
          debitAccountId: entry.debitAccountId,
          creditAccountId: entry.creditAccountId,
          amount: entry.amount,
          origin: "payroll-accounting",
          batchName: PAYROLL_ACCOUNTING_BATCH_NAME,
          sourcePayrollRunId: id,
          sourcePayrollRunCode: run.code,
          sourcePayrollEntryId: entry.id,
          competence: run.competence,
          createdAt: payrollNow(),
          updatedAt: payrollNow()
        }));
        state.data.accountingEntries = state.data.accountingEntries.filter((entry) => !(entry.origin === "payroll-accounting" && entry.sourcePayrollRunId === id));
        state.data.accountingEntries.push(...accountingModuleEntries);
        state.data.payrollAccountingEntries.push(...accountingEntries.map((entry) => ({ ...entry, accountingBatchName: PAYROLL_ACCOUNTING_BATCH_NAME, accountingModuleEntryId: `auto-payroll-accounting-${entry.id}` })));
        state.data.payrollFinancialEntries.push(...financialEntries.map((entry) => ({ ...entry, destinationModule: "financeiro", destinationName: "Módulo financeiro" })));
        upsertRecord("payrollRuns", { ...run, status: "Contabilizada", accountingBatchName: PAYROLL_ACCOUNTING_BATCH_NAME, updatedAt: payrollNow() });
        const period = getPayrollPeriodById(run.periodId);
        if (period) upsertRecord("payrollPeriods", { ...period, status: "Contabilizada", closeDate: new Date().toISOString().slice(0, 10), updatedAt: payrollNow() });
        ["accountingEntries", "settlements", "payrollAccountingEntries", "payrollFinancialEntries"].forEach(persistCollection);
        notify("success", "Fechamento", `Folha contabilizada no lote ${PAYROLL_ACCOUNTING_BATCH_NAME} e títulos enviados para o módulo Financeiro.`);
        renderApp();
      }

      function canReopenPayrollRun(run) {
        if (!run) return false;
        return ["Fechada", "Contabilizada", "Integrada", "Encerrada"].includes(run.status)
          || state.data.payrollAccountingEntries.some((item) => item.runId === run.id)
          || state.data.payrollFinancialEntries.some((item) => item.runId === run.id)
          || state.data.accountingEntries.some((item) => item.origin === "payroll-accounting" && item.sourcePayrollRunId === run.id);
      }

      function getPayrollPeriodByRun(run) {
        return getPayrollPeriodById(run?.periodId) || state.data.payrollPeriods.find((item) => item.competence === run?.competence) || null;
      }

      function reopenPayrollRun(id) {
        const run = getPayrollRunById(id);
        if (!run) {
          notify("error", "Reabertura", "Folha não encontrada para reabertura.");
          return;
        }

        const payrollTitleIds = state.data.payrollFinancialEntries
          .filter((item) => item.runId === id)
          .map((item) => item.id);

        const removedAccountingEntries = state.data.payrollAccountingEntries.filter((item) => item.runId === id).length;
        const removedFinancialEntries = payrollTitleIds.length;
        const removedSettlements = state.data.settlements.filter((item) => payrollTitleIds.includes(item.payrollFinancialEntryId)).length;
        const removedPayableEntries = state.data.accountingEntries.filter((item) => item.origin === "settlement-event" && item.sourcePayrollRunId === id).length;

        state.data.payrollAccountingEntries = state.data.payrollAccountingEntries.filter((item) => item.runId !== id);
        state.data.payrollFinancialEntries = state.data.payrollFinancialEntries.filter((item) => item.runId !== id);
        state.data.settlements = state.data.settlements.filter((item) => !payrollTitleIds.includes(item.payrollFinancialEntryId));
        state.data.accountingEntries = state.data.accountingEntries.filter((item) => {
          if (item.origin === "payroll-accounting" && item.sourcePayrollRunId === id) return false;
          if (item.origin === "settlement-event" && item.sourcePayrollRunId === id) return false;
          return true;
        });

        const reopenedRun = {
          ...run,
          status: "Calculada",
          accountingBatchName: "",
          reopenedAt: payrollNow(),
          updatedAt: payrollNow()
        };
        upsertRecord("payrollRuns", reopenedRun);

        const period = getPayrollPeriodByRun(run);
        if (period) {
          upsertRecord("payrollPeriods", {
            ...period,
            status: "Calculada",
            closeDate: "",
            updatedAt: payrollNow()
          });
        }

        ["accountingEntries", "settlements", "payrollAccountingEntries", "payrollFinancialEntries", "payrollRuns", "payrollPeriods"].forEach(persistCollection);
        CLOUD.schedulePush(getDataSnapshot());
        notify("success", "Reabertura", `Folha reaberta. Removidos ${removedAccountingEntries} lançamentos contábeis, ${removedFinancialEntries} títulos financeiros, ${removedSettlements} baixas vinculadas e ${removedPayableEntries} lançamento(s) a pagar do contábil.`);
        state.ui.payrollSelectedRunId = id;
        renderApp();
      }


      function formatNumber(value) {
        return new Intl.NumberFormat("pt-BR", { minimumFractionDigits: 0, maximumFractionDigits: 4 }).format(toDecimal(value));
      }

      function formatDateTime(value) {
        if (!value) return "-";
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return String(value);
        return new Intl.DateTimeFormat("pt-BR", { dateStyle: "short", timeStyle: "short" }).format(date);
      }

      function getPayrollProvisionSettingsById(id) {
        return state.data.payrollProvisionSettings.find((item) => item.id === id);
      }

      function getPayrollProvisionAccountingConfigById(id) {
        return state.data.payrollProvisionAccountingConfigs.find((item) => item.id === id);
      }

      function getActivePayrollProvisionSettings(companyName, branchName) {
        const active = state.data.payrollProvisionSettings.filter((item) => item.status !== "Inativo");
        return active.find((item) => (!companyName || item.companyName === companyName) && (!branchName || item.branchName === branchName)) || active[0] || createEmptyPayrollProvisionSettingsDraft();
      }

      function getPayrollProvisionCompetence(companyName, branchName, competence) {
        return state.data.payrollProvisionCompetences.find((item) => item.companyName === companyName && item.branchName === branchName && item.competence === competence) || null;
      }

      function ensurePayrollProvisionCompetence(companyName, branchName, competence) {
        const existing = getPayrollProvisionCompetence(companyName, branchName, competence);
        if (existing) return existing;
        const record = {
          id: generateId(), code: generateCode("payrollProvisionCompetences"), companyName, branchName, competence,
          status: "Em cálculo", accountedTypes: [], createdAt: payrollNow(), updatedAt: payrollNow(), calculatedAt: "", accountedAt: "", accountingBatchIds: []
        };
        state.data.payrollProvisionCompetences.push(record);
        return record;
      }

      function payrollProvisionCompetenceBounds(competence) {
        const [year, month] = String(competence || "").split("-").map(Number);
        if (!year || !month) return null;
        return {
          start: new Date(year, month - 1, 1, 12),
          end: new Date(year, month, 0, 12),
          year,
          month
        };
      }

      function payrollProvisionDate(value) {
        if (!value) return null;
        const [year, month, day] = String(value).slice(0, 10).split("-").map(Number);
        if (!year || !month || !day) return null;
        return new Date(year, month - 1, day, 12);
      }

      function payrollProvisionDaysInclusive(start, end) {
        if (!start || !end || end < start) return 0;
        return Math.floor((end.getTime() - start.getTime()) / 86400000) + 1;
      }

      function getPayrollProvisionAttendance(employeeId, competence) {
        const run = [...state.data.payrollRuns]
          .filter((item) => item.competence === competence)
          .sort((a, b) => String(b.updatedAt || "").localeCompare(String(a.updatedAt || "")))[0];
        const row = run?.attendanceInputs?.find((item) => item.employeeId === employeeId);
        return { absenceDays: Math.max(0, toDecimal(row?.absenceDays)), workDays: Math.max(0, toDecimal(row?.workDays)) };
      }

      function getPayrollSalaryForCompetence(employee, competence) {
        const bounds = payrollProvisionCompetenceBounds(competence);
        if (!bounds) return roundCurrency(toDecimal(employee?.salaryBase));
        const history = state.data.payrollSalaryHistory
          .filter((item) => item.employeeId === employee.id && item.status !== "Inativo" && (!item.effectiveDate || payrollProvisionDate(item.effectiveDate) <= bounds.end))
          .sort((a, b) => {
            const dateCompare = String(b.effectiveDate || "").localeCompare(String(a.effectiveDate || ""));
            return dateCompare || String(b.updatedAt || "").localeCompare(String(a.updatedAt || ""));
          });
        return roundCurrency(toDecimal(history[0]?.salaryBase ?? employee.salaryBase));
      }

      function payrollProvisionQualifiesMonth(employee, monthStart, monthEnd, competence) {
        const admission = payrollProvisionDate(employee.admissionDate) || monthStart;
        const termination = payrollProvisionDate(employee.terminationDate);
        const effectiveStart = admission > monthStart ? admission : monthStart;
        const effectiveEnd = termination && termination < monthEnd ? termination : monthEnd;
        let serviceDays = payrollProvisionDaysInclusive(effectiveStart, effectiveEnd);
        const target = `${monthStart.getFullYear()}-${String(monthStart.getMonth() + 1).padStart(2, "0")}`;
        if (target === competence) {
          serviceDays -= getPayrollProvisionAttendance(employee.id, competence).absenceDays;
        }
        return serviceDays >= 15;
      }

      function calculatePayrollProvisionAvos(employee, competence, kind) {
        const bounds = payrollProvisionCompetenceBounds(competence);
        const admission = payrollProvisionDate(employee.admissionDate);
        if (!bounds || !admission || admission > bounds.end) return 0;
        const termination = payrollProvisionDate(employee.terminationDate);
        const calculationEnd = termination && termination < bounds.end ? termination : bounds.end;
        let periodStart;
        if (kind === "thirteenth") {
          periodStart = new Date(bounds.year, 0, 1, 12);
          if (admission > periodStart) periodStart = admission;
        } else {
          let anniversaryYear = bounds.year;
          let anniversary = new Date(anniversaryYear, admission.getMonth(), admission.getDate(), 12);
          if (anniversary > bounds.end) anniversary = new Date(anniversaryYear - 1, admission.getMonth(), admission.getDate(), 12);
          periodStart = anniversary < admission ? admission : anniversary;
        }
        if (calculationEnd < periodStart) return 0;
        let cursor = new Date(periodStart.getFullYear(), periodStart.getMonth(), 1, 12);
        const lastMonth = new Date(calculationEnd.getFullYear(), calculationEnd.getMonth(), 1, 12);
        let avos = 0;
        while (cursor <= lastMonth && avos < 12) {
          const monthStart = new Date(cursor.getFullYear(), cursor.getMonth(), 1, 12);
          const monthEnd = new Date(cursor.getFullYear(), cursor.getMonth() + 1, 0, 12);
          if (payrollProvisionQualifiesMonth(employee, monthStart, monthEnd, competence)) avos += 1;
          cursor = new Date(cursor.getFullYear(), cursor.getMonth() + 1, 1, 12);
        }
        return Math.min(12, avos);
      }

      function calculateVacationProvision(salaryBase, avos) {
        const vacationValue = toDecimal(salaryBase) * Math.max(0, Math.min(12, toDecimal(avos))) / 12;
        const oneThird = vacationValue / 3;
        return {
          vacationValue: roundCurrency(vacationValue),
          oneThird: roundCurrency(oneThird),
          total: roundCurrency(vacationValue + oneThird)
        };
      }

      function calculateThirteenthProvision(salaryBase, avos) {
        return roundCurrency(toDecimal(salaryBase) * Math.max(0, Math.min(12, toDecimal(avos))) / 12);
      }

      function calculateProvisionCharges(baseValue, settings) {
        const charge = (enabled, rate) => enabled ? roundCurrency(toDecimal(baseValue) * toDecimal(rate) / 100) : 0;
        return {
          inss: charge(settings.inssCompanyEnabled, settings.inssCompanyRate),
          thirdParty: charge(settings.thirdPartyEnabled, settings.thirdPartyRate),
          rat: charge(settings.ratEnabled, settings.ratRate),
          fgts: charge(settings.fgtsEnabled, settings.fgtsRate)
        };
      }

      function getPreviousPayrollProvisionRecord(employeeId, companyName, branchName, competence) {
        return [...state.data.payrollProvisions]
          .filter((item) => item.schemaVersion === 2 && item.employeeId === employeeId && item.companyName === companyName && item.branchName === branchName && item.competence < competence && item.status === "Contabilizada")
          .sort((a, b) => String(b.competence).localeCompare(String(a.competence)))[0] || null;
      }

      function calculatePayrollProvisionMovements(balances, previousBalances) {
        return PAYROLL_PROVISION_COMPONENTS.reduce((result, component) => {
          result[component.key] = roundCurrency(toDecimal(balances?.[component.key]) - toDecimal(previousBalances?.[component.key]));
          return result;
        }, {});
      }

      function buildPayrollProvisionRecord(employee, competence, settings, existing) {
        const salaryBase = getPayrollSalaryForCompetence(employee, competence);
        const vacationAvos = calculatePayrollProvisionAvos(employee, competence, "vacation");
        const thirteenthAvos = calculatePayrollProvisionAvos(employee, competence, "thirteenth");
        const vacation = calculateVacationProvision(salaryBase, vacationAvos);
        const thirteenth = calculateThirteenthProvision(salaryBase, thirteenthAvos);
        const vacationCharges = calculateProvisionCharges(vacation.total, settings);
        const thirteenthCharges = calculateProvisionCharges(thirteenth, settings);
        const adjustments = {
          vacation: roundCurrency(toDecimal(existing?.adjustments?.vacation)),
          thirteenth: roundCurrency(toDecimal(existing?.adjustments?.thirteenth))
        };
        const payments = {
          vacation: roundCurrency(toDecimal(existing?.payments?.vacation)),
          thirteenth: roundCurrency(toDecimal(existing?.payments?.thirteenth))
        };
        const balances = {
          vacation: roundCurrency(vacation.total + adjustments.vacation - payments.vacation),
          vacationInss: vacationCharges.inss,
          vacationThirdParty: vacationCharges.thirdParty,
          vacationRat: vacationCharges.rat,
          vacationFgts: vacationCharges.fgts,
          thirteenth: roundCurrency(thirteenth + adjustments.thirteenth - payments.thirteenth),
          thirteenthInss: thirteenthCharges.inss,
          thirteenthThirdParty: thirteenthCharges.thirdParty,
          thirteenthRat: thirteenthCharges.rat,
          thirteenthFgts: thirteenthCharges.fgts
        };
        const previous = getPreviousPayrollProvisionRecord(employee.id, settings.companyName, settings.branchName, competence);
        const previousAccounted = previous?.balances || {};
        const accountingBalances = {
          ...balances,
          vacation: roundCurrency(vacation.total + adjustments.vacation),
          thirteenth: roundCurrency(thirteenth + adjustments.thirteenth)
        };
        const movements = calculatePayrollProvisionMovements(accountingBalances, previousAccounted);
        const netMovements = calculatePayrollProvisionMovements(balances, previousAccounted);
        const totalVacationCharges = roundCurrency(vacationCharges.inss + vacationCharges.thirdParty + vacationCharges.rat + vacationCharges.fgts);
        const totalThirteenthCharges = roundCurrency(thirteenthCharges.inss + thirteenthCharges.thirdParty + thirteenthCharges.rat + thirteenthCharges.fgts);
        const totalVacation = roundCurrency(balances.vacation + totalVacationCharges);
        const totalThirteenth = roundCurrency(balances.thirteenth + totalThirteenthCharges);
        const department = getPayrollDepartmentById(employee.departmentId);
        const costCenter = getCostCenterById(employee.costCenterId);
        return {
          id: existing?.id || generateId(), code: existing?.code || generateCode("payrollProvisions"), schemaVersion: 2,
          companyName: settings.companyName, branchName: settings.branchName, competence, employeeId: employee.id,
          employeeCode: employee.code, registration: employee.registration, employeeName: employee.name,
          departmentId: employee.departmentId || "", departmentName: department?.name || "",
          costCenterId: employee.costCenterId || "", costCenterName: costCenter?.name || "",
          employeeStatus: employee.status || "Ativo", admissionDate: employee.admissionDate || "", terminationDate: employee.terminationDate || "",
          salaryBase, vacationAvos, thirteenthAvos,
          vacationValue: vacation.vacationValue, vacationOneThird: vacation.oneThird, vacationProvision: vacation.total,
          vacationInss: vacationCharges.inss, vacationThirdParty: vacationCharges.thirdParty, vacationRat: vacationCharges.rat, vacationFgts: vacationCharges.fgts,
          thirteenthProvision: thirteenth, thirteenthInss: thirteenthCharges.inss, thirteenthThirdParty: thirteenthCharges.thirdParty, thirteenthRat: thirteenthCharges.rat, thirteenthFgts: thirteenthCharges.fgts,
          totalVacationCharges, totalThirteenthCharges, totalVacation, totalThirteenth, totalGeneral: roundCurrency(totalVacation + totalThirteenth),
          adjustments, payments, previousAccounted, movements, netMovements, accountingBalances, balances,
          ratesSnapshot: { inssCompanyRate: toDecimal(settings.inssCompanyRate), thirdPartyRate: toDecimal(settings.thirdPartyRate), ratRate: toDecimal(settings.ratRate), fgtsRate: toDecimal(settings.fgtsRate) },
          enabledSnapshot: { inssCompanyEnabled: settings.inssCompanyEnabled !== false, thirdPartyEnabled: settings.thirdPartyEnabled !== false, ratEnabled: settings.ratEnabled !== false, fgtsEnabled: settings.fgtsEnabled !== false },
          status: existing?.status === "Contabilizada" ? "Contabilizada" : "Em cálculo",
          calculationDate: payrollNow(), createdAt: existing?.createdAt || payrollNow(), updatedAt: payrollNow(),
          notes: existing?.notes || ""
        };
      }

      function getPayrollProvisionEligibleEmployees(filters) {
        const bounds = payrollProvisionCompetenceBounds(filters.competence);
        if (!bounds) return [];
        return state.data.payrollEmployees.filter((employee) => {
          const admission = payrollProvisionDate(employee.admissionDate);
          if (!admission || admission > bounds.end) return false;
          return (filters.departmentId === "all" || employee.departmentId === filters.departmentId)
            && (filters.costCenterId === "all" || employee.costCenterId === filters.costCenterId)
            && (filters.employeeId === "all" || employee.id === filters.employeeId)
            && (filters.employeeStatus === "all" || employee.status === filters.employeeStatus);
        });
      }

      function calculatePayrollProvisions() {
        const filters = state.ui.payrollProvisionFilters;
        const settings = getActivePayrollProvisionSettings(filters.companyName, filters.branchName);
        if (!filters.competence || !settings || settings.companyName !== filters.companyName || settings.branchName !== filters.branchName) {
          notify("error", "Provisões", "Selecione uma empresa/filial com percentuais configurados e informe a competência.");
          return;
        }
        const competenceRecord = getPayrollProvisionCompetence(filters.companyName, filters.branchName, filters.competence);
        if (competenceRecord?.status === "Contabilizada") {
          notify("error", "Competência bloqueada", "A competência já foi contabilizada. Estorne e reabra antes de recalcular.");
          return;
        }
        const employees = getPayrollProvisionEligibleEmployees(filters);
        if (!employees.length) {
          notify("error", "Provisões", "Nenhum funcionário corresponde aos filtros informados.");
          return;
        }
        const employeeIds = new Set(employees.map((item) => item.id));
        const preserved = state.data.payrollProvisions.filter((item) => !(item.schemaVersion === 2 && item.companyName === filters.companyName && item.branchName === filters.branchName && item.competence === filters.competence && employeeIds.has(item.employeeId)));
        const generated = employees.map((employee, index) => {
          const existing = state.data.payrollProvisions.find((item) => item.schemaVersion === 2 && item.companyName === filters.companyName && item.branchName === filters.branchName && item.competence === filters.competence && item.employeeId === employee.id);
          const record = buildPayrollProvisionRecord(employee, filters.competence, settings, existing);
          if (!existing) record.code = payrollCode("payrollProvisions", index);
          return record;
        });
        state.data.payrollProvisions = [...preserved, ...generated];
        const record = ensurePayrollProvisionCompetence(filters.companyName, filters.branchName, filters.competence);
        Object.assign(record, { status: "Em cálculo", calculatedAt: payrollNow(), updatedAt: payrollNow() });
        persistCollection("payrollProvisions");
        persistCollection("payrollProvisionCompetences");
        CLOUD.schedulePush(getDataSnapshot());
        notify("success", "Provisões calculadas", `${generated.length} funcionário(s) calculado(s) individualmente.`);
        renderApp();
      }

      function getFilteredPayrollProvisions(filters = state.ui.payrollProvisionFilters) {
        return state.data.payrollProvisions
          .filter((item) => item.schemaVersion === 2 && item.companyName === filters.companyName && item.branchName === filters.branchName && item.competence === filters.competence)
          .filter((item) => filters.departmentId === "all" || item.departmentId === filters.departmentId)
          .filter((item) => filters.costCenterId === "all" || item.costCenterId === filters.costCenterId)
          .filter((item) => filters.employeeId === "all" || item.employeeId === filters.employeeId)
          .filter((item) => filters.employeeStatus === "all" || item.employeeStatus === filters.employeeStatus)
          .sort((a, b) => String(a.employeeName || "").localeCompare(String(b.employeeName || "")));
      }

      function summarizePayrollProvisions(records, provisionType = "all") {
        const summary = records.reduce((result, item) => {
          result.vacation += toDecimal(item.balances?.vacation);
          result.vacationCharges += toDecimal(item.totalVacationCharges);
          result.thirteenth += toDecimal(item.balances?.thirteenth);
          result.thirteenthCharges += toDecimal(item.totalThirteenthCharges);
          return result;
        }, { vacation: 0, vacationCharges: 0, thirteenth: 0, thirteenthCharges: 0, total: 0 });
        if (provisionType === "vacation") summary.total = summary.vacation;
        else if (provisionType === "vacationCharges") summary.total = summary.vacationCharges;
        else if (provisionType === "thirteenth") summary.total = summary.thirteenth;
        else if (provisionType === "thirteenthCharges") summary.total = summary.thirteenthCharges;
        else summary.total = summary.vacation + summary.vacationCharges + summary.thirteenth + summary.thirteenthCharges;
        return summary;
      }

      function setPayrollProvisionCompetenceCalculated() {
        const filters = state.ui.payrollProvisionFilters;
        const competenceRecord = getPayrollProvisionCompetence(filters.companyName, filters.branchName, filters.competence);
        const records = getFilteredPayrollProvisions({ ...filters, departmentId: "all", costCenterId: "all", employeeId: "all", employeeStatus: "all" });
        if (!competenceRecord || !records.length) {
          notify("error", "Fechamento das provisões", "Calcule as provisões antes de marcar a competência como calculada.");
          return;
        }
        if (competenceRecord.status === "Contabilizada") {
          notify("error", "Fechamento das provisões", "A competência já está contabilizada.");
          return;
        }
        const invalid = records.filter((item) => !Number.isFinite(toDecimal(item.totalGeneral)) || !item.costCenterId || PAYROLL_PROVISION_COMPONENTS.some((component) => toDecimal(item.balances?.[component.key]) < -0.009));
        if (invalid.length) {
          notify("error", "Validação", `${invalid.length} funcionário(s) possuem valor inválido, saldo negativo ou centro de custo ausente.`);
          return;
        }
        competenceRecord.status = "Calculada";
        competenceRecord.calculatedAt = payrollNow();
        competenceRecord.updatedAt = payrollNow();
        records.forEach((item) => { item.status = "Calculada"; item.updatedAt = payrollNow(); });
        persistCollection("payrollProvisionCompetences");
        persistCollection("payrollProvisions");
        CLOUD.schedulePush(getDataSnapshot());
        notify("success", "Competência calculada", "A competência foi conferida e liberada para a prévia contábil.");
        renderApp();
      }

      function reopenPayrollProvisionCompetence() {
        const filters = state.ui.payrollProvisionFilters;
        const competenceRecord = getPayrollProvisionCompetence(filters.companyName, filters.branchName, filters.competence);
        if (!competenceRecord) {
          notify("error", "Reabertura", "Competência de provisões não encontrada.");
          return;
        }
        const activeBatch = state.data.payrollProvisionAccountingBatches.find((item) => item.companyName === filters.companyName && item.branchName === filters.branchName && item.competence === filters.competence && item.status !== "Estornado");
        if (activeBatch) {
          notify("error", "Reabertura", "Estorne primeiro os lotes contábeis ativos desta competência.");
          return;
        }
        competenceRecord.status = "Reaberta";
        competenceRecord.updatedAt = payrollNow();
        state.data.payrollProvisions.forEach((item) => {
          if (item.schemaVersion === 2 && item.companyName === filters.companyName && item.branchName === filters.branchName && item.competence === filters.competence) item.status = "Reaberta";
        });
        persistCollection("payrollProvisionCompetences");
        persistCollection("payrollProvisions");
        notify("success", "Competência reaberta", "Os valores podem ser recalculados novamente.");
        renderApp();
      }

      function submitPayrollProvisionSettings(formData) {
        const id = state.ui.editing.payrollProvisionSettingsId;
        const previous = getPayrollProvisionSettingsById(id);
        const record = {
          id: id || generateId(), code: previous?.code || generateCode("payrollProvisionSettings"),
          companyName: clean(formData.get("companyName")), branchName: clean(formData.get("branchName")),
          inssCompanyRate: toDecimal(formData.get("inssCompanyRate")), thirdPartyRate: toDecimal(formData.get("thirdPartyRate")),
          ratRate: toDecimal(formData.get("ratRate")), fgtsRate: toDecimal(formData.get("fgtsRate")),
          inssCompanyEnabled: formData.get("inssCompanyEnabled") === "on", thirdPartyEnabled: formData.get("thirdPartyEnabled") === "on",
          ratEnabled: formData.get("ratEnabled") === "on", fgtsEnabled: formData.get("fgtsEnabled") === "on",
          costCenterRule: formData.get("costCenterRule") || "current", status: formData.get("status") || "Ativo",
          createdAt: previous?.createdAt || payrollNow(), updatedAt: payrollNow()
        };
        if (!record.companyName || !record.branchName || [record.inssCompanyRate, record.thirdPartyRate, record.ratRate, record.fgtsRate].some((value) => value < 0 || value > 100)) {
          notify("error", "Configuração das provisões", "Informe empresa, filial e percentuais válidos entre 0% e 100%.");
          return;
        }
        if (state.data.payrollProvisionSettings.some((item) => item.id !== record.id && item.companyName === record.companyName && item.branchName === record.branchName)) {
          notify("error", "Configuração duplicada", "Já existe uma configuração para esta empresa e filial.");
          return;
        }
        upsertRecord("payrollProvisionSettings", record);
        state.ui.editing.payrollProvisionSettingsId = null;
        state.ui.payrollProvisionSettingsDraft = createEmptyPayrollProvisionSettingsDraft();
        state.ui.payrollProvisionFilters.companyName = record.companyName;
        state.ui.payrollProvisionFilters.branchName = record.branchName;
        notify("success", "Configuração das provisões", "Percentuais e critérios salvos com sucesso.");
        renderApp();
      }

      function deletePayrollProvisionSettings(id) {
        const settings = getPayrollProvisionSettingsById(id);
        if (!settings) return;
        const used = state.data.payrollProvisions.some((item) => item.schemaVersion === 2 && item.companyName === settings.companyName && item.branchName === settings.branchName);
        if (used) {
          notify("error", "Configuração em uso", "Não é possível excluir uma configuração já utilizada em cálculos. Inative-a.");
          return;
        }
        deleteRecord("payrollProvisionSettings", id, "Configuração das provisões", "Configuração excluída com sucesso.");
      }

      function submitPayrollProvisionAdjustment(formData) {
        const id = formData.get("id");
        const record = state.data.payrollProvisions.find((item) => item.id === id && item.schemaVersion === 2);
        if (!record) return;
        const competenceRecord = getPayrollProvisionCompetence(record.companyName, record.branchName, record.competence);
        if (competenceRecord?.status === "Contabilizada") {
          notify("error", "Competência bloqueada", "Estorne e reabra a competência antes de informar ajustes ou baixas.");
          return;
        }
        record.adjustments = { vacation: roundCurrency(toDecimal(formData.get("vacationAdjustment"))), thirteenth: roundCurrency(toDecimal(formData.get("thirteenthAdjustment"))) };
        record.payments = { vacation: roundCurrency(toDecimal(formData.get("vacationPayment"))), thirteenth: roundCurrency(toDecimal(formData.get("thirteenthPayment"))) };
        record.notes = clean(formData.get("notes"));
        const employee = getPayrollEmployeeById(record.employeeId);
        const settings = getActivePayrollProvisionSettings(record.companyName, record.branchName);
        const recalculated = buildPayrollProvisionRecord(employee, record.competence, settings, record);
        Object.assign(record, recalculated, { status: competenceRecord?.status === "Calculada" ? "Calculada" : "Em cálculo", updatedAt: payrollNow() });
        if (competenceRecord && competenceRecord.status === "Calculada") competenceRecord.status = "Em cálculo";
        persistCollection("payrollProvisions");
        persistCollection("payrollProvisionCompetences");
        notify("success", "Memória de cálculo", "Ajustes e baixas atualizados. Confira e marque a competência como calculada novamente.");
        renderApp();
      }

      function renderPayrollProvisionSettingsForm() {
