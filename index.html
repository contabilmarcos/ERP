<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ERP Local - Fiscal e Cadastros</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #eef3f7;
      --surface: rgba(255, 255, 255, 0.96);
      --surface-strong: #ffffff;
      --surface-muted: #f6f8fb;
      --sidebar: #0f1e2f;
      --sidebar-alt: #15283d;
      --primary: #176087;
      --primary-strong: #0f4e6f;
      --accent: #11a47f;
      --warning: #d97706;
      --danger: #c24141;
      --text: #1f2937;
      --text-soft: #5b6474;
      --border: #d8e1ea;
      --shadow: 0 24px 64px rgba(15, 30, 47, 0.12);
      --radius-xl: 24px;
      --radius-lg: 18px;
      --radius-md: 14px;
      --radius-sm: 10px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at top right, rgba(23, 96, 135, 0.10), transparent 28%),
        radial-gradient(circle at left bottom, rgba(17, 164, 127, 0.12), transparent 30%),
        var(--bg);
      color: var(--text);
      font-family: "Manrope", sans-serif;
    }

    button, input, select, textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .app-shell {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 300px 1fr;
    }

    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.03), transparent 30%),
        linear-gradient(180deg, var(--sidebar) 0%, var(--sidebar-alt) 100%);
      color: #f5f8fb;
      padding: 28px 22px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      z-index: 20;
      box-shadow: inset -1px 0 0 rgba(255, 255, 255, 0.05);
    }

    .brand {
      display: flex;
      gap: 16px;
      align-items: center;
      padding: 18px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: var(--radius-lg);
      backdrop-filter: blur(14px);
    }

    .brand-mark {
      width: 52px;
      height: 52px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, rgba(23, 96, 135, 0.95), rgba(17, 164, 127, 0.9));
      font-weight: 800;
      letter-spacing: 0.08em;
      box-shadow: 0 20px 42px rgba(17, 164, 127, 0.18);
    }

    .brand h1 {
      margin: 0;
      font-family: "Fraunces", serif;
      font-size: 1.15rem;
      font-weight: 600;
      line-height: 1.2;
    }

    .brand p {
      margin: 4px 0 0;
      color: rgba(255, 255, 255, 0.72);
      font-size: 0.9rem;
    }

    .menu-section-label {
      margin: 0 0 10px;
      color: rgba(255, 255, 255, 0.55);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 0.76rem;
      font-weight: 700;
    }

    .menu {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .nav-button {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 14px;
      border: 1px solid transparent;
      padding: 14px 16px;
      border-radius: 16px;
      background: transparent;
      color: rgba(255, 255, 255, 0.9);
      text-align: left;
      transition: transform 0.2s ease, background 0.2s ease, border-color 0.2s ease;
    }

    .nav-button:hover,
    .nav-button:focus-visible {
      transform: translateX(4px);
      background: rgba(255, 255, 255, 0.07);
      border-color: rgba(255, 255, 255, 0.08);
      outline: none;
    }

    .nav-button.active {
      background: linear-gradient(135deg, rgba(23, 96, 135, 0.35), rgba(17, 164, 127, 0.22));
      border-color: rgba(255, 255, 255, 0.12);
      box-shadow: 0 18px 42px rgba(7, 17, 30, 0.22);
    }

    .nav-icon {
      width: 16px;
      height: 16px;
      border-radius: 999px;
      background: linear-gradient(135deg, #9cd0ea, #e8fff7);
      box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.05);
      flex-shrink: 0;
    }

    .nav-title {
      font-weight: 700;
      font-size: 0.96rem;
    }

    .nav-subtitle {
      display: block;
      margin-top: 2px;
      color: rgba(255, 255, 255, 0.6);
      font-size: 0.78rem;
      font-weight: 500;
    }

    .sidebar-foot {
      margin-top: auto;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: var(--radius-lg);
      padding: 18px;
    }

    .sidebar-foot strong {
      display: block;
      margin-bottom: 8px;
      font-size: 0.94rem;
    }

    .sidebar-foot p {
      margin: 0;
      color: rgba(255, 255, 255, 0.68);
      font-size: 0.84rem;
      line-height: 1.6;
    }

    .content-area {
      padding: 28px;
      min-width: 0;
    }

    .page-frame {
      min-height: calc(100vh - 56px);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.52), rgba(255, 255, 255, 0.88));
      border: 1px solid rgba(255, 255, 255, 0.55);
      border-radius: 28px;
      box-shadow: var(--shadow);
      overflow: hidden;
      backdrop-filter: blur(18px);
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      padding: 28px 32px 20px;
      border-bottom: 1px solid rgba(216, 225, 234, 0.85);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.95), rgba(247, 250, 252, 0.78));
    }

    .title-wrap {
      display: flex;
      align-items: center;
      gap: 16px;
      min-width: 0;
    }

    .title-mark {
      width: 52px;
      height: 52px;
      display: grid;
      place-items: center;
      border-radius: 18px;
      background: linear-gradient(135deg, rgba(23, 96, 135, 0.12), rgba(17, 164, 127, 0.16));
      color: var(--primary-strong);
      font-weight: 800;
      box-shadow: inset 0 0 0 1px rgba(23, 96, 135, 0.08);
    }

    .page-title {
      margin: 0;
      font-size: 1.65rem;
      line-height: 1.2;
      font-weight: 800;
    }

    .page-subtitle {
      margin: 6px 0 0;
      color: var(--text-soft);
      font-size: 0.94rem;
    }

    .topbar-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .icon-button,
    .ghost-button,
    .primary-button,
    .danger-button,
    .secondary-button {
      border: 1px solid transparent;
      border-radius: 14px;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease, border-color 0.2s ease;
    }

    .icon-button {
      width: 46px;
      height: 46px;
      background: var(--surface-strong);
      border-color: var(--border);
      color: var(--text);
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
    }

    .ghost-button,
    .primary-button,
    .danger-button,
    .secondary-button {
      padding: 12px 16px;
      font-weight: 700;
    }

    .ghost-button {
      background: var(--surface-strong);
      border-color: var(--border);
      color: var(--text);
    }

    .secondary-button {
      background: rgba(23, 96, 135, 0.08);
      color: var(--primary-strong);
      border-color: rgba(23, 96, 135, 0.10);
    }

    .primary-button {
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: #ffffff;
      box-shadow: 0 18px 34px rgba(23, 96, 135, 0.18);
    }

    .danger-button {
      background: rgba(194, 65, 65, 0.10);
      color: var(--danger);
      border-color: rgba(194, 65, 65, 0.12);
    }

    .ghost-button:hover,
    .primary-button:hover,
    .danger-button:hover,
    .secondary-button:hover,
    .icon-button:hover,
    .ghost-button:focus-visible,
    .primary-button:focus-visible,
    .danger-button:focus-visible,
    .secondary-button:focus-visible,
    .icon-button:focus-visible {
      transform: translateY(-1px);
      outline: none;
      box-shadow: 0 14px 26px rgba(15, 30, 47, 0.12);
    }

    .page-content {
      padding: 24px 32px 32px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .hero-panel,
    .card,
    .table-card,
    .empty-card,
    .stats-card,
    .notice-card {
      background: var(--surface);
      border: 1px solid rgba(216, 225, 234, 0.82);
      border-radius: var(--radius-xl);
      box-shadow: 0 16px 36px rgba(15, 30, 47, 0.06);
    }

    .hero-panel {
      padding: 28px;
      display: grid;
      grid-template-columns: 1.4fr 1fr;
      gap: 18px;
      background:
        radial-gradient(circle at top right, rgba(17, 164, 127, 0.12), transparent 25%),
        linear-gradient(135deg, rgba(255, 255, 255, 0.98), rgba(246, 249, 252, 0.96));
    }

    .hero-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(23, 96, 135, 0.08);
      color: var(--primary-strong);
      font-size: 0.8rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .hero-panel h2 {
      margin: 16px 0 10px;
      font-size: 2rem;
      line-height: 1.15;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .hero-panel p {
      margin: 0;
      color: var(--text-soft);
      line-height: 1.7;
      font-size: 0.97rem;
    }

    .hero-actions {
      margin-top: 22px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .hero-stack {
      display: grid;
      gap: 14px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
    }

    .stats-card {
      padding: 18px;
    }

    .stats-card small {
      color: var(--text-soft);
      font-weight: 700;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      font-size: 0.73rem;
    }

    .stats-card strong {
      display: block;
      margin-top: 12px;
      font-size: 2rem;
      line-height: 1;
      font-weight: 800;
      color: #101928;
    }

    .stats-card span {
      display: block;
      margin-top: 10px;
      color: var(--text-soft);
      font-size: 0.88rem;
    }

    .card {
      padding: 24px;
    }

    .notice-card {
      padding: 20px;
      display: flex;
      gap: 14px;
      align-items: flex-start;
      background: linear-gradient(135deg, rgba(23, 96, 135, 0.08), rgba(17, 164, 127, 0.08));
    }

    .notice-icon {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      background: rgba(255, 255, 255, 0.85);
      font-weight: 800;
      color: var(--primary-strong);
      flex-shrink: 0;
    }

    .notice-card strong {
      display: block;
      margin-bottom: 6px;
      font-size: 1rem;
    }

    .notice-card p {
      margin: 0;
      color: var(--text-soft);
      line-height: 1.65;
    }

    .section-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .section-head h3,
    .section-head h4 {
      margin: 0;
      font-size: 1.08rem;
      font-weight: 800;
      letter-spacing: -0.01em;
    }

    .section-head p {
      margin: 6px 0 0;
      color: var(--text-soft);
      font-size: 0.92rem;
      line-height: 1.6;
    }

    .layout-grid {
      display: grid;
      grid-template-columns: 1fr 1.2fr;
      gap: 20px;
      align-items: start;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .form-grid.single-column {
      grid-template-columns: 1fr;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    .field label {
      font-size: 0.88rem;
      font-weight: 700;
      color: #132333;
    }

    .field-hint {
      margin: -2px 0 0;
      color: var(--text-soft);
      font-size: 0.76rem;
    }

    .field input,
    .field select,
    .field textarea {
      width: 100%;
      border: 1px solid var(--border);
      background: #ffffff;
      color: var(--text);
      border-radius: 14px;
      padding: 12px 14px;
      min-height: 48px;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    .field textarea {
      resize: vertical;
      min-height: 112px;
    }

    .field input:focus,
    .field select:focus,
    .field textarea:focus {
      outline: none;
      border-color: rgba(23, 96, 135, 0.55);
      box-shadow: 0 0 0 4px rgba(23, 96, 135, 0.12);
      background: #ffffff;
    }

    .field-readonly {
      display: flex;
      align-items: center;
      min-height: 48px;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px dashed rgba(23, 96, 135, 0.22);
      background: rgba(23, 96, 135, 0.05);
      color: var(--primary-strong);
      font-weight: 700;
    }

    .field-readonly.compact {
      min-height: 42px;
      padding-top: 10px;
      padding-bottom: 10px;
      font-size: 0.9rem;
    }

    .form-actions,
    .inline-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 20px;
    }

    .inline-actions {
      margin-top: 0;
      align-items: center;
    }

    .table-card {
      overflow: hidden;
    }

    .table-toolbar {
      padding: 22px 22px 18px;
      display: flex;
      gap: 14px;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      border-bottom: 1px solid rgba(216, 225, 234, 0.7);
    }

    .search-input {
      width: min(100%, 360px);
      min-height: 46px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: #ffffff;
      padding: 0 14px;
    }

    .table-scroll {
      overflow: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 720px;
    }

    th,
    td {
      padding: 16px 18px;
      text-align: left;
      border-bottom: 1px solid rgba(216, 225, 234, 0.72);
      vertical-align: top;
    }

    th {
      font-size: 0.76rem;
      color: var(--text-soft);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 800;
      background: rgba(246, 248, 251, 0.88);
      white-space: nowrap;
    }

    td {
      font-size: 0.93rem;
      color: var(--text);
    }

    tbody tr:hover {
      background: rgba(23, 96, 135, 0.04);
    }

    .table-muted {
      color: var(--text-soft);
      font-size: 0.84rem;
      line-height: 1.5;
    }

    .table-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .action-chip {
      border: 1px solid rgba(216, 225, 234, 0.9);
      background: #ffffff;
      color: var(--text);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 0.82rem;
      font-weight: 700;
    }

    .action-chip.danger {
      color: var(--danger);
      border-color: rgba(194, 65, 65, 0.22);
      background: rgba(194, 65, 65, 0.06);
    }

    .badge-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 7px 10px;
      font-size: 0.76rem;
      font-weight: 800;
      letter-spacing: 0.02em;
      background: rgba(23, 96, 135, 0.08);
      color: var(--primary-strong);
    }

    .badge.positive {
      background: rgba(17, 164, 127, 0.12);
      color: #0f7a61;
    }

    .badge.warning {
      background: rgba(217, 119, 6, 0.14);
      color: #9a5a06;
    }

    .badge.danger {
      background: rgba(194, 65, 65, 0.14);
      color: #9b2e2e;
    }

    .account-preview-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-top: 14px;
    }

    .account-tree-preview {
      margin-top: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .account-tree-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.74);
      border: 1px solid rgba(216, 225, 234, 0.9);
    }

    .account-tree-item.current {
      background: rgba(23, 96, 135, 0.08);
      border-color: rgba(23, 96, 135, 0.18);
    }

    .inline-note {
      margin-top: 12px;
      padding: 12px 14px;
      border-radius: 14px;
      font-size: 0.86rem;
      font-weight: 700;
    }

    .inline-note.warning {
      background: rgba(217, 119, 6, 0.12);
      color: #9a5a06;
    }

    .inline-note.danger {
      background: rgba(194, 65, 65, 0.12);
      color: #962f2f;
    }

    .chart-account-row.synthetic {
      background: rgba(23, 96, 135, 0.035);
    }

    .chart-account-name {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 24px;
    }

    .chart-account-name strong {
      font-size: 0.93rem;
    }

    .account-indent-guide {
      display: inline-block;
      width: 18px;
      height: 2px;
      border-radius: 999px;
      background: rgba(23, 96, 135, 0.22);
      flex-shrink: 0;
    }

    .account-meta {
      margin-top: 8px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .empty-card {
      padding: 30px;
      text-align: center;
    }

    .empty-card strong {
      display: block;
      font-size: 1.02rem;
      margin-bottom: 8px;
    }

    .empty-card p {
      margin: 0 auto;
      max-width: 600px;
      color: var(--text-soft);
      line-height: 1.7;
    }

    .empty-card .inline-actions {
      justify-content: center;
      margin-top: 18px;
    }

    .split-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 20px;
    }

    .subtle-panel {
      padding: 18px;
      border-radius: 18px;
      border: 1px solid rgba(216, 225, 234, 0.86);
      background: rgba(246, 248, 251, 0.9);
    }

    .subtle-panel h4 {
      margin: 0 0 10px;
      font-size: 0.98rem;
      font-weight: 800;
    }

    .subtle-panel p,
    .subtle-panel li {
      color: var(--text-soft);
      font-size: 0.9rem;
      line-height: 1.6;
    }

    .subtle-list {
      margin: 0;
      padding-left: 18px;
    }

    .totals-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
    }

    .total-card {
      padding: 18px;
      border-radius: 18px;
      border: 1px solid rgba(216, 225, 234, 0.86);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.97), rgba(246, 248, 251, 0.92));
    }

    .total-card span {
      color: var(--text-soft);
      font-size: 0.82rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .total-card strong {
      display: block;
      margin-top: 12px;
      font-size: 1.42rem;
      font-weight: 800;
      color: #0f1724;
    }

    .total-card small {
      display: block;
      margin-top: 10px;
      color: var(--text-soft);
      line-height: 1.5;
    }

    .status-highlight {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 14px;
      font-size: 0.88rem;
      font-weight: 800;
    }

    .status-highlight.ok {
      background: rgba(17, 164, 127, 0.12);
      color: #0f7a61;
    }

    .status-highlight.warn {
      background: rgba(217, 119, 6, 0.14);
      color: #9a5a06;
    }

    .toast-stack {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 60;
      display: flex;
      flex-direction: column;
      gap: 10px;
      pointer-events: none;
    }

    .toast {
      min-width: 280px;
      max-width: 360px;
      padding: 14px 16px;
      border-radius: 18px;
      border: 1px solid rgba(216, 225, 234, 0.82);
      background: rgba(255, 255, 255, 0.96);
      box-shadow: 0 22px 42px rgba(15, 30, 47, 0.16);
      display: flex;
      gap: 12px;
      align-items: flex-start;
      pointer-events: auto;
    }

    .toast strong {
      display: block;
      margin-bottom: 4px;
      font-size: 0.92rem;
    }

    .toast p {
      margin: 0;
      color: var(--text-soft);
      font-size: 0.84rem;

      .layout-grid,

      table {

      }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    (() => {
      const STORAGE_KEYS = {
        costCenters: "erp_cost_centers",
        suppliers: "erp_suppliers",
        financialNatures: "erp_financial_natures",
        chartAccounts: "erp_chart_accounts",
        items: "erp_items",
        invoices: "erp_invoices"
      };
      const CLOUD_CONFIG_STORAGE_KEY = "erp_cloud_sync_config";
      const CLOUD_LAST_MODIFIED_STORAGE_KEY = "erp_cloud_last_modified";

      const CODE_CONFIG = {
        costCenters: { prefix: "CC", digits: 4 },
        suppliers: { prefix: "FOR", digits: 4 },
        financialNatures: { prefix: "NAT", digits: 4 },
        items: { prefix: "ITE", digits: 4 },
        invoices: { prefix: "NF", digits: 6 }
      };

      const CHART_ACCOUNT_GROUP_LABELS = {
        "1": "Ativo",
        "2": "Passivo",
        "3": "Patrimônio Líquido",
        "4": "Receitas",
        "5": "Custos",
        "6": "Despesas",
        "7": "Resultado / Apuração"
      };

      const CHART_ACCOUNT_BALANCE_DEFAULTS = {
        "1": "Devedora",
        "2": "Credora",
        "3": "Credora",
        "4": "Credora",
        "5": "Devedora",
        "6": "Devedora",
        "7": "Credora"
      };

      const CHART_ACCOUNT_CODE_PATTERNS = [
        { level: 1, regex: /^\d$/ },
        { level: 2, regex: /^\d\.\d$/ },
        { level: 3, regex: /^\d\.\d\.\d{2}$/ },
        { level: 4, regex: /^\d\.\d\.\d{2}\.\d{2}$/ },
        { level: 5, regex: /^\d\.\d\.\d{2}\.\d{2}\.\d{3}$/ }
      ];

      const VIEW_META = {
        dashboard: {
          icon: "DB",
          title: "Painel inicial",
          subtitle: "Acompanhe o estado do ERP e comece seus cadastros a partir de uma base totalmente vazia."
        },
        settings: {
          icon: "CF",
          title: "Configurações do sistema",
          subtitle: "Organize parametrizações futuras e mantenha os centros de custo com controle local."
        },
        suppliers: {
          icon: "FO",
          title: "Cadastro de fornecedores",
          subtitle: "Gerencie os fornecedores que serão utilizados no lançamento das notas fiscais."
        },
        chartAccounts: {
          icon: "CT",
          title: "Contas contábeis",
          subtitle: "Monte a base contábil que sustenta naturezas financeiras, itens e lançamentos fiscais."
        },
        financialNatures: {
          icon: "NF",
          title: "Natureza financeira",
          subtitle: "Cadastre naturezas obrigatoriamente vinculadas às contas contábeis."
        },
        items: {
          icon: "IT",
          title: "Cadastro de itens",
          subtitle: "Mantenha os itens utilizados nas notas fiscais com vínculo direto à natureza financeira."
        },
        fiscal: {
          icon: "FI",
          title: "Módulo fiscal",
          subtitle: "Lance notas fiscais de serviço ou produto com itens, vínculo contábil e parcelas financeiras."
        }
      };

      const state = {
        data: {
          costCenters: [],
          suppliers: [],
          financialNatures: [],
          chartAccounts: [],
          items: [],
          invoices: []
        },
        ui: {
          activeView: "dashboard",
          sidebarOpen: false,
          search: {
            costCenters: "",
            suppliers: "",
            chartAccounts: "",
            financialNatures: "",
            items: "",
            invoices: ""
          },
          cloudDraft: createEmptyCloudDraft(),
          chartAccountFormDraft: createEmptyChartAccountDraft(),
          financialNatureFormDraft: createEmptyFinancialNatureDraft(),
          itemNaturePreviewId: "",
          itemFormDraft: createEmptyItemDraft(),
          editing: {
            costCenterId: null,
            supplierId: null,
            chartAccountId: null,
            financialNatureId: null,
            itemId: null
          },
          invoiceDraft: createEmptyInvoiceDraft(),
          toasts: []
        }
      };

      function createEmptyInvoiceDraft(invoice) {
        if (invoice) {
          return {
            id: invoice.id,
            code: invoice.code,
            type: invoice.type,
            supplierId: invoice.supplierId,
            issueDate: invoice.issueDate,
            description: invoice.description,
            items: Array.isArray(invoice.items) ? invoice.items.map((item) => ({ ...item })) : [],
            installments: Array.isArray(invoice.installments) ? invoice.installments.map((installment) => ({ ...installment })) : [],
            lineForm: {
              itemId: "",
              quantity: 1,
              unitPrice: ""
            },
            installmentForm: {
              installmentNumber: (invoice.installments?.length || 0) + 1,
              dueDate: "",
              amount: "",
              paymentMethod: "",
              status: "Em aberto"
            }
          };
        }

        return {
          id: null,
          code: "",
          type: "Nota de serviço",
          supplierId: "",
          issueDate: getToday(),
          description: "",
          items: [],
          installments: [],
          lineForm: {
            itemId: "",
            quantity: 1,
            unitPrice: ""
          },
          installmentForm: {
            installmentNumber: 1,
            dueDate: "",
            amount: "",
            paymentMethod: "",
            status: "Em aberto"
          }
        };
      }

      function createEmptyChartAccountDraft(account) {
        return {
          id: account?.id || "",
          code: account?.code || "",
          name: account?.name || "",
          type: account?.type || "Sintética",
          balanceNature: account?.balanceNature || "Devedora",
          status: account?.isActive === false ? "Inativa" : "Ativa"
        };
      }

      function createEmptyCloudDraft(config) {
        return {
          apiKey: config?.apiKey || "",
          binId: config?.binId || ""
        };
      }

      function createEmptyFinancialNatureDraft(nature) {
        return {
          id: nature?.id || "",
          name: nature?.name || "",
          chartAccountId: nature?.chartAccountId || ""
        };
      }

      function createEmptyItemDraft(item) {
        return {
          id: item?.id || "",
          name: item?.name || "",
          description: item?.description || "",
          financialNatureId: item?.financialNatureId || ""
        };
      }

      function initialize() {
        loadCollections();
        CLOUD.init();
        bindGlobalEvents();
        renderApp();
        CLOUD.syncIfNewer(true);
      }

      function loadCollections() {
        Object.keys(STORAGE_KEYS).forEach((key) => {
          state.data[key] = readCollection(STORAGE_KEYS[key]);
        });
        migrateCollections();
      }

      function migrateCollections() {
        const migratedAccounts = migrateChartAccounts(state.data.chartAccounts);
        state.data.chartAccounts = migratedAccounts;
        persistCollection("chartAccounts");
      }

      function readCollection(storageKey) {
        try {
          const raw = localStorage.getItem(storageKey);
          if (!raw) {
            return [];
          }
          const parsed = JSON.parse(raw);
          return Array.isArray(parsed) ? parsed : [];
        } catch (error) {
          console.error("Falha ao ler localStorage:", error);
          return [];
        }
      }

      function persistCollection(collectionKey) {
        localStorage.setItem(STORAGE_KEYS[collectionKey], JSON.stringify(state.data[collectionKey]));
      }

      function persistAllCollections() {
        Object.keys(STORAGE_KEYS).forEach((key) => {
          persistCollection(key);
        });
      }

      function getDataSnapshot() {
        return {
          costCenters: [...state.data.costCenters],
          suppliers: [...state.data.suppliers],
          financialNatures: [...state.data.financialNatures],
          chartAccounts: [...state.data.chartAccounts],
          items: [...state.data.items],
          invoices: [...state.data.invoices]
        };
      }

      function getLastCloudModified() {
        return parseInt(localStorage.getItem(CLOUD_LAST_MODIFIED_STORAGE_KEY) || "0", 10);
      }

      function setLastCloudModified(value) {
        localStorage.setItem(CLOUD_LAST_MODIFIED_STORAGE_KEY, String(value || 0));
      }

      function saveCollection(collectionKey, records) {
        state.data[collectionKey] = records;
        persistCollection(collectionKey);
        CLOUD.schedulePush(getDataSnapshot());
      }

      // Aplica um snapshot remoto/local completo sem acionar o ciclo de autosave.
      function applyDataSnapshot(snapshot, options = {}) {
        Object.keys(STORAGE_KEYS).forEach((key) => {
          state.data[key] = Array.isArray(snapshot?.[key]) ? snapshot[key] : [];
        });
        migrateCollections();
        persistAllCollections();
        if (options.lastModified) {
          setLastCloudModified(options.lastModified);
        }
      }

      const CLOUD = {
        apiKey: null,
        binId: null,
        status: "offline",
        syncTimer: null,
        syncing: false,

        init() {
          try {
            const stored = localStorage.getItem(CLOUD_CONFIG_STORAGE_KEY);
            if (!stored) {
              state.ui.cloudDraft = createEmptyCloudDraft();
              return;
            }
            const config = JSON.parse(stored);
            this.apiKey = clean(config.apiKey);
            this.binId = clean(config.binId);
            state.ui.cloudDraft = createEmptyCloudDraft(config);
            this.status = this.isConfigured() ? "ok" : "offline";
          } catch (error) {
            console.error("Falha ao carregar configuração de nuvem:", error);
            state.ui.cloudDraft = createEmptyCloudDraft();
            this.status = "error";
          }
        },

        isConfigured() {
          return Boolean(this.apiKey && this.binId);
        },

        saveConfig(apiKey, binId) {
          this.apiKey = clean(apiKey);
          this.binId = clean(binId);
          localStorage.setItem(CLOUD_CONFIG_STORAGE_KEY, JSON.stringify({ apiKey: this.apiKey, binId: this.binId }));
          state.ui.cloudDraft = createEmptyCloudDraft({ apiKey: this.apiKey, binId: this.binId });
          this.status = this.isConfigured() ? "ok" : "offline";
        },

        clearConfig() {
          this.apiKey = null;
          this.binId = null;
          this.status = "offline";
          localStorage.removeItem(CLOUD_CONFIG_STORAGE_KEY);
          state.ui.cloudDraft = createEmptyCloudDraft();
        },

        async push(snapshot) {
          if (!this.isConfigured() || this.syncing) {
            return false;
          }
          this.syncing = true;
          this.status = "syncing";
          renderApp();
          try {
            const ts = Date.now();
            const payload = { ...snapshot, lastModified: ts };
            const response = await fetch(`https://api.jsonbin.io/v3/b/${this.binId}`, {
              method: "PUT",
              headers: {
                "Content-Type": "application/json",
                "X-Master-Key": this.apiKey,
                "X-Bin-Versioning": "false"
              },
              body: JSON.stringify(payload)
            });
            if (!response.ok) {
              throw new Error(`HTTP ${response.status}`);
            }
            setLastCloudModified(ts);
            this.status = "ok";
            renderApp();
            return true;
          } catch (error) {
            this.status = "error";
            console.error("Erro ao enviar dados para JSONBin:", error);
            renderApp();
            throw error;
          } finally {
            this.syncing = false;
          }
        },

        async pull() {
          if (!this.isConfigured()) {
            return null;
          }
          const response = await fetch(`https://api.jsonbin.io/v3/b/${this.binId}/latest`, {
            headers: {
              "X-Master-Key": this.apiKey
            }
          });
          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }
          const json = await response.json();
          return json.record || null;
        },

        async syncIfNewer(silent = false) {
          if (!this.isConfigured()) {
            this.status = "offline";
            renderApp();
            return false;
          }

          this.status = "syncing";
          renderApp();

          try {
            const remote = await this.pull();
            const hasKnownData = remote && Object.keys(STORAGE_KEYS).some((key) => Array.isArray(remote[key]));
            if (!hasKnownData) {
              this.status = "ok";
              renderApp();
              return false;
            }

            const localTs = getLastCloudModified();
            const remoteTs = parseInt(remote.lastModified || "0", 10);

            if (remoteTs > localTs) {
              applyDataSnapshot(remote, { lastModified: remoteTs });
              this.status = "ok";
              renderApp();
              if (!silent) {
                notify("success", "Sincronização", "Os dados mais novos da nuvem foram aplicados ao ERP.");
              }
              return true;
            }

            this.status = "ok";
            renderApp();
            if (!silent) {
              notify("success", "Sincronização", "A cópia local já está atualizada em relação à nuvem.");
            }
            return false;
          } catch (error) {
            this.status = "error";
            console.error("Erro ao sincronizar dados do JSONBin:", error);
            renderApp();
            if (!silent) {
              notify("error", "Sincronização", "Não foi possível verificar os dados na nuvem.");
            }
            return false;
          }
        },

        schedulePush(snapshot) {
          if (!this.isConfigured()) {
            return;
          }
          clearTimeout(this.syncTimer);
          this.syncTimer = window.setTimeout(() => {
            this.push(snapshot).catch(() => {});
          }, 1500);
        }
      };

      function bindGlobalEvents() {
        document.addEventListener("click", handleClick);
        document.addEventListener("submit", handleSubmit);
        document.addEventListener("input", handleInputOrChange);
        document.addEventListener("change", handleInputOrChange);
      }

      function handleClick(event) {
        const target = event.target.closest("[data-action], [data-nav]");
        if (!target) {
          return;
        }

        if (target.dataset.nav) {
          event.preventDefault();
          navigate(target.dataset.nav);
          return;
        }

        const { action, id } = target.dataset;

        switch (action) {
          case "toggle-sidebar":
            state.ui.sidebarOpen = !state.ui.sidebarOpen;
            renderApp();
            break;
          case "close-sidebar":
            state.ui.sidebarOpen = false;
            renderApp();
            break;
          case "reset-cost-center":
            state.ui.editing.costCenterId = null;
            renderApp();
            break;
          case "reset-supplier":
            state.ui.editing.supplierId = null;
            renderApp();
            break;
          case "reset-chart-account":
            state.ui.editing.chartAccountId = null;
            state.ui.chartAccountFormDraft = createEmptyChartAccountDraft();
            renderApp();
            break;
          case "reset-financial-nature":
            state.ui.editing.financialNatureId = null;
            state.ui.financialNatureFormDraft = createEmptyFinancialNatureDraft();
            renderApp();
            break;
          case "reset-item":
            state.ui.editing.itemId = null;
            state.ui.itemNaturePreviewId = "";
            state.ui.itemFormDraft = createEmptyItemDraft();
            renderApp();
            break;
          case "new-invoice":
            state.ui.invoiceDraft = createEmptyInvoiceDraft();
            navigate("fiscal");
            break;
          case "edit-cost-center":
            state.ui.editing.costCenterId = id;
            navigate("settings");
            break;
          case "edit-supplier":
            state.ui.editing.supplierId = id;
            navigate("suppliers");
            break;
          case "edit-chart-account":
            {
              const account = getChartAccountById(id);
              state.ui.chartAccountFormDraft = createEmptyChartAccountDraft(account);
            }
            state.ui.editing.chartAccountId = id;
            navigate("chartAccounts");
            break;
          case "edit-financial-nature":
            {
              const nature = getFinancialNatureById(id);
              state.ui.financialNatureFormDraft = createEmptyFinancialNatureDraft(nature);
            }
            state.ui.editing.financialNatureId = id;
            navigate("financialNatures");
            break;
          case "edit-item":
            {
              const item = getItemById(id);
              state.ui.itemNaturePreviewId = item?.financialNatureId || "";
              state.ui.itemFormDraft = createEmptyItemDraft(item);
            }
            state.ui.editing.itemId = id;
            navigate("items");
            break;
          case "edit-invoice":
            startInvoiceEdit(id);
            break;
          case "delete-cost-center":
            deleteCostCenter(id);
            break;
          case "delete-supplier":
            deleteSupplier(id);
            break;
          case "delete-chart-account":
            deleteChartAccount(id);
            break;
          case "load-default-chart-accounts":
            loadDefaultChartAccounts();
            break;
          case "cloud-disconnect":
            CLOUD.clearConfig();
            notify("success", "Sincronização", "A configuração de nuvem foi removida deste navegador.");
            renderApp();
            break;
          case "cloud-sync-now":
            if (!CLOUD.isConfigured()) {
              notify("error", "Sincronização", "Informe a Master Key e o Bin ID antes de sincronizar.");
              break;
            }
            CLOUD.push(getDataSnapshot())
              .then(() => notify("success", "Sincronização", "Dados enviados para a nuvem com sucesso."))
              .catch(() => notify("error", "Sincronização", "Falha ao enviar os dados para o JSONBin."));
            break;
          case "cloud-pull-now":
            if (!CLOUD.isConfigured()) {
              notify("error", "Sincronização", "Informe a Master Key e o Bin ID antes de buscar dados.");
              break;
            }
            CLOUD.syncIfNewer(false);
            break;
          case "delete-financial-nature":
            deleteFinancialNature(id);
            break;
          case "delete-item":
            deleteItem(id);
            break;
          case "delete-invoice":
            deleteInvoice(id);
            break;
          case "remove-invoice-line":
            removeInvoiceLine(id);
            break;
          case "remove-installment":
            removeInstallment(id);
            break;
          default:
            break;
        }
      }

      function handleSubmit(event) {
        const form = event.target;
        if (!(form instanceof HTMLFormElement)) {
          return;
        }

        const formType = form.dataset.form;
        if (!formType) {
          return;
        }

        event.preventDefault();

        switch (formType) {
          case "cost-center":
            submitCostCenter(new FormData(form));
            break;
          case "supplier":
            submitSupplier(new FormData(form));
            break;
          case "chart-account":
            submitChartAccount(new FormData(form));
            break;
          case "financial-nature":
            submitFinancialNature(new FormData(form));
            break;
          case "item":
            submitItem(new FormData(form));
            break;
          case "invoice":
            submitInvoice(new FormData(form));
            break;
          case "invoice-line":
            submitInvoiceLine(new FormData(form));
            break;
          case "invoice-installment":
            submitInstallment(new FormData(form));
            break;
          case "cloud-config":
            submitCloudConfig(new FormData(form));
            break;
          default:
            break;
        }
      }

      function handleInputOrChange(event) {
        const target = event.target;
        if (!(target instanceof HTMLElement)) {
          return;
        }

        const searchKey = target.dataset.search;
        if (searchKey) {
          state.ui.search[searchKey] = target.value || "";
          renderApp();
          return;
        }

        const form = target.closest("form");
        if (!(form instanceof HTMLFormElement)) {
          return;
        }

        const formType = form.dataset.form;
        const fieldName = target.name;
        if (!fieldName) {
          return;
        }

        if (formType === "invoice") {
          state.ui.invoiceDraft[fieldName] = target.value;
        }

        if (formType === "invoice-line") {
          state.ui.invoiceDraft.lineForm[fieldName] = target.value;
          if (fieldName === "itemId") {
            renderApp();
          }
        }

        if (formType === "invoice-installment") {
          state.ui.invoiceDraft.installmentForm[fieldName] = target.value;
        }

        if (formType === "item") {
          state.ui.itemFormDraft[fieldName] = target.value;
          if (fieldName === "financialNatureId") {
            state.ui.itemNaturePreviewId = target.value;
            renderApp();
          }
        }

        if (formType === "cloud-config") {
          state.ui.cloudDraft[fieldName] = target.value;
        }

        if (formType === "chart-account") {
          state.ui.chartAccountFormDraft[fieldName] = target.value;
          syncChartAccountPreview();
        }

        if (formType === "financial-nature") {
          state.ui.financialNatureFormDraft[fieldName] = target.value;
          if (fieldName === "chartAccountId") {
            renderApp();
          }
        }
      }

      function navigate(view) {
        state.ui.activeView = view;
        state.ui.sidebarOpen = false;
        renderApp();
      }

      function submitCostCenter(formData) {
        const id = clean(formData.get("id"));
        const name = clean(formData.get("name"));

        if (!name) {
          notify("error", "Centro de custo", "Informe o nome do centro de custo.");
          return;
        }

        const existing = state.data.costCenters.find((record) => record.id === id);
        const record = {
          id: existing?.id || generateId(),
          code: existing?.code || generateCode("costCenters"),
          name,
          createdAt: existing?.createdAt || new Date().toISOString(),
          updatedAt: new Date().toISOString()
        };

        upsertRecord("costCenters", record);

        if (draft.items.length === 0) {
          notify("error", "Nota fiscal", "Adicione pelo menos um item à nota fiscal.");
          return;

        if (draft.installments.length === 0) {
          notify("error", "Nota fiscal", "Adicione pelo menos uma parcela financeira.");

        const invalidLine = draft.items.find((line) => {

          notify("error", "Nota fiscal", "O total das parcelas precisa ser igual ao total dos itens para salvar a nota.");

      function deleteRecord(collectionKey, id, title, successMessage) {
        const exists = state.data[collectionKey].some((record) => record.id === id);
        if (!exists) {
          notify("error", title, "Registro não encontrado.");
          return;
        }

        saveCollection(collectionKey, state.data[collectionKey].filter((record) => record.id !== id));

        Object.keys(state.ui.editing).forEach((key) => {
          if (state.ui.editing[key] === id) {
            state.ui.editing[key] = null;
          }
        });

        if (state.ui.itemNaturePreviewId && collectionKey === "items") {
          state.ui.itemNaturePreviewId = "";
          state.ui.itemFormDraft = createEmptyItemDraft();
        }

        if (collectionKey === "chartAccounts") {
          state.ui.chartAccountFormDraft = createEmptyChartAccountDraft();
        }

        if (collectionKey === "financialNatures") {
          state.ui.financialNatureFormDraft = createEmptyFinancialNatureDraft();
        }

        if (state.ui.invoiceDraft.id === id) {
          state.ui.invoiceDraft = createEmptyInvoiceDraft();
        }

        notify("success", title, successMessage);
        renderApp();
      }

      function upsertRecord(collectionKey, record) {
        const existingIndex = state.data[collectionKey].findIndex((item) => item.id === record.id);
        const nextCollection = [...state.data[collectionKey]];

        if (existingIndex >= 0) {
          nextCollection[existingIndex] = record;
        } else {
          nextCollection.unshift(record);
        }

        saveCollection(collectionKey, collectionKey === "chartAccounts" ? sortAccountsByCode(nextCollection) : nextCollection);
      }

      function generateCode(collectionKey) {
        const config = CODE_CONFIG[collectionKey];
        const max = state.data[collectionKey].reduce((highest, record) => {
          const number = extractNumericCode(record.code, config.prefix);
          return number > highest ? number : highest;
        }, 0);
        return config.prefix + String(max + 1).padStart(config.digits, "0");
      }

      function extractNumericCode(code, prefix) {
        if (!code || typeof code !== "string" || !code.startsWith(prefix)) {
          return 0;
        }
        const digits = Number(code.slice(prefix.length));
        return Number.isFinite(digits) ? digits : 0;
      }

      function generateId() {
        if (window.crypto && typeof window.crypto.randomUUID === "function") {
          return window.crypto.randomUUID();
        }
        return "id-" + Date.now() + "-" + Math.random().toString(16).slice(2);
      }

      function getChartAccountById(id) {
        return state.data.chartAccounts.find((record) => record.id === id) || null;
      }

      function getChartAccountByCode(code) {
        const formattedCode = formatAccountCode(code);
        return state.data.chartAccounts.find((record) => record.code === formattedCode) || null;
      }

      function getFinancialNatureById(id) {
        return state.data.financialNatures.find((record) => record.id === id) || null;
      }

      function getSupplierById(id) {
        return state.data.suppliers.find((record) => record.id === id) || null;
      }

      function getItemById(id) {
        return state.data.items.find((record) => record.id === id) || null;
      }

      function getToday() {
        return new Date().toISOString().slice(0, 10);
      }

      function clean(value) {
        return String(value ?? "").trim();
      }

      // Normaliza o código para comparações e ordenação, removendo os separadores.
      function normalizeAccountCode(code) {
        return clean(code).replace(/\D/g, "");
      }

      // Aplica a máscara contábil em códigos válidos ou parcialmente válidos do plano.
      function formatAccountCode(code) {
        const normalized = normalizeAccountCode(code);
        const cleaned = clean(code).replace(/[^\d.]/g, "");
        const segmentsByLength = {
          1: [1],
          2: [1, 1],
          4: [1, 1, 2],
          6: [1, 1, 2, 2],
          9: [1, 1, 2, 2, 3]
        };
        const segmentLengths = segmentsByLength[normalized.length];

        if (!segmentLengths) {
          return cleaned;
        }

        let cursor = 0;
        return segmentLengths.map((size) => {
          const value = normalized.slice(cursor, cursor + size);
          cursor += size;
          return value;
        }).join(".");
      }

      function isValidChartAccountCode(code) {
        return CHART_ACCOUNT_CODE_PATTERNS.some((pattern) => pattern.regex.test(code));
      }

      function getAccountLevel(code) {
        const formattedCode = formatAccountCode(code);
        const pattern = CHART_ACCOUNT_CODE_PATTERNS.find((item) => item.regex.test(formattedCode));
        return pattern ? pattern.level : 0;
      }

      function getParentAccountCode(code) {
        const formattedCode = formatAccountCode(code);
        const level = getAccountLevel(formattedCode);
        if (level <= 1) {
          return "";
        }
        return formattedCode.split(".").slice(0, level - 1).join(".");
      }

      function getAccountGroup(code) {
        const digit = clean(code).charAt(0);
        return CHART_ACCOUNT_GROUP_LABELS[digit] || "Grupo não identificado";
      }

      function sortAccountsByCode(accounts) {
        return [...accounts].sort((left, right) => {
          const leftCode = (left.normalizedCode || normalizeAccountCode(left.code)).padEnd(9, "0");
          const rightCode = (right.normalizedCode || normalizeAccountCode(right.code)).padEnd(9, "0");
          return leftCode.localeCompare(rightCode) || (left.level || 0) - (right.level || 0) || left.name.localeCompare(right.name);
        });
      }

      function isAnalyticalAccount(account) {
        return account?.type === "Analítica";
      }

      function isSyntheticAccount(account) {
        return account?.type === "Sintética";
      }

      function getAccountChildren(account) {
        return state.data.chartAccounts.filter((record) => record.parentCode === account.code);
      }

      function accountHasChildren(account) {
        return getAccountChildren(account).length > 0;
      }

      function getChartAccountLinkSummary(account) {
        const linkedNatures = state.data.financialNatures.filter((nature) => nature.chartAccountId === account.id);
        const linkedItems = state.data.items.filter((item) => linkedNatures.some((nature) => nature.id === item.financialNatureId));
        const linkedInvoices = state.data.invoices.filter((invoice) => invoice.items.some((item) => item.chartAccountId === account.id));
        return {
          natures: linkedNatures,
          items: linkedItems,
          invoices: linkedInvoices
        };
      }

      function isChartAccountAvailableForLinks(account) {
        return Boolean(account && isAnalyticalAccount(account) && account.isActive !== false && !account.requiresCodeAdjustment);
      }

      function getSelectableChartAccounts() {
        return sortAccountsByCode(state.data.chartAccounts.filter((account) => isChartAccountAvailableForLinks(account)));
      }

      function getFinancialNatureLinkedAccount(nature) {
        if (!nature) {
          return null;
        }
        return getChartAccountById(nature.chartAccountId);
      }

      function isFinancialNatureAvailableForLinks(nature) {
        return isChartAccountAvailableForLinks(getFinancialNatureLinkedAccount(nature));
      }

      function getSelectableFinancialNatures() {
        return state.data.financialNatures.filter((nature) => isFinancialNatureAvailableForLinks(nature));
      }

      function getSelectableItems() {
        return state.data.items.filter((item) => {
          const nature = getFinancialNatureById(item.financialNatureId);
          return Boolean(nature && isFinancialNatureAvailableForLinks(nature));
        });
      }

      // Valida a estrutura mínima do plano de contas para preservar hierarquia e vínculos contábeis.
      function validateChartAccount(record) {
        const errors = [];
        const code = formatAccountCode(record.code);
        const normalizedCode = normalizeAccountCode(code);
        const level = getAccountLevel(code);
        const group = getAccountGroup(code);
        const parentCode = getParentAccountCode(code);
        const duplicate = state.data.chartAccounts.find((account) => account.id !== record.id && account.normalizedCode === normalizedCode);
        const parentAccount = parentCode ? getChartAccountByCode(parentCode) : null;
        const currentRecord = record.id ? getChartAccountById(record.id) : null;
        const siblingChildren = state.data.chartAccounts.filter((account) => account.id !== record.id && account.parentCode === code);

        if (!isValidChartAccountCode(code)) {
          errors.push("O código da conta deve seguir a máscara 9.9.99.99.999, usando apenas números e pontos.");
        }

        if (!CHART_ACCOUNT_GROUP_LABELS[code.charAt(0)]) {
          errors.push("O primeiro dígito do código deve identificar um grupo contábil válido entre 1 e 7.");
        }

        if (duplicate) {
          errors.push("Já existe uma conta contábil com esse código normalizado.");
        }

        if (level > 1 && !parentAccount) {
          errors.push("Toda conta abaixo do nível 1 precisa possuir uma conta pai existente.");
        }

        if (parentAccount && isAnalyticalAccount(parentAccount)) {
          errors.push("Não é permitido cadastrar conta filha abaixo de uma conta analítica.");
        }

        if (!["Sintética", "Analítica"].includes(record.type)) {
          errors.push("Selecione um tipo de conta válido.");
        }

        if (!["Devedora", "Credora"].includes(record.balanceNature)) {
          errors.push("Selecione uma natureza do saldo válida.");
        }

        if (record.type === "Analítica" && siblingChildren.length > 0) {
          errors.push("Contas analíticas não podem possuir contas filhas.");
        }

        if (currentRecord && currentRecord.code !== code && accountHasChildren(currentRecord)) {
          errors.push("Não é possível alterar o código de uma conta que já possui contas filhas.");
        }

        if (currentRecord && currentRecord.type !== record.type) {
          const links = getChartAccountLinkSummary(currentRecord);
          if (record.type === "Sintética" && (links.natures.length || links.items.length || links.invoices.length)) {
            errors.push("Não é possível transformar a conta em sintética porque ela já possui vínculos de lançamento.");
          }
          if (record.type === "Analítica" && accountHasChildren(currentRecord)) {
            errors.push("Não é possível transformar a conta em analítica porque ela já possui contas filhas.");
          }
        }

        return {
          valid: errors.length === 0,
          errors,
          record: {
            code,
            normalizedCode,
            level,
            parentCode,
            group
          }
        };
      }

      function migrateChartAccounts(accounts) {
        return sortAccountsByCode(accounts.map((account) => migrateChartAccountRecord(account)));
      }

      function migrateChartAccountRecord(account) {
        const formattedCode = formatAccountCode(account.code);
        const validCode = isValidChartAccountCode(formattedCode);
        const level = getAccountLevel(formattedCode);
        const linkedSummary = getChartAccountLinkSummary({
          id: account.id,
          code: account.code
        });
        const linked = linkedSummary.natures.length || linkedSummary.items.length || linkedSummary.invoices.length;
        const groupDigit = clean(account.code).charAt(0);
        const defaultBalanceNature = CHART_ACCOUNT_BALANCE_DEFAULTS[groupDigit] || "Devedora";
        const resolvedType = ["Sintética", "Analítica"].includes(account.type)
          ? account.type
          : linked || level === 5
            ? "Analítica"
            : "Sintética";

        return {
          ...account,
          code: validCode ? formattedCode : clean(account.code),
          normalizedCode: normalizeAccountCode(account.code),
          name: account.name || "",
          type: resolvedType,
          level,
          parentCode: validCode ? getParentAccountCode(formattedCode) : "",
          group: getAccountGroup(account.code),
          balanceNature: ["Devedora", "Credora"].includes(account.balanceNature) ? account.balanceNature : defaultBalanceNature,
          isActive: typeof account.isActive === "boolean" ? account.isActive : true,
          requiresCodeAdjustment: !validCode,
          adjustmentMessage: validCode ? "" : "Código fora da nova máscara contábil. Ajuste recomendado para análise futura.",
          createdAt: account.createdAt || new Date().toISOString(),
          updatedAt: account.updatedAt || new Date().toISOString()
        };
      }

      function getDefaultChartAccountsSeed() {
        return [
          { code: "1", name: "Ativo", type: "Sintética", balanceNature: "Devedora" },
          { code: "1.1", name: "Ativo Circulante", type: "Sintética", balanceNature: "Devedora" },
          { code: "1.1.01", name: "Disponibilidades", type: "Sintética", balanceNature: "Devedora" },
          { code: "1.1.01.01", name: "Caixa e equivalentes", type: "Sintética", balanceNature: "Devedora" },
          { code: "1.1.01.01.001", name: "Caixa Geral", type: "Analítica", balanceNature: "Devedora" },
          { code: "2", name: "Passivo", type: "Sintética", balanceNature: "Credora" },
          { code: "2.1", name: "Passivo Circulante", type: "Sintética", balanceNature: "Credora" },
          { code: "3", name: "Patrimônio Líquido", type: "Sintética", balanceNature: "Credora" },
          { code: "4", name: "Receitas", type: "Sintética", balanceNature: "Credora" },

      }

      function loadDefaultChartAccounts() {
        const existingNormalizedCodes = new Set(state.data.chartAccounts.map((account) => account.normalizedCode));
        const virtualAccounts = [...state.data.chartAccounts];
        const additions = [];

        getDefaultChartAccountsSeed().forEach((seed) => {
          const formattedCode = formatAccountCode(seed.code);
          const normalizedCode = normalizeAccountCode(formattedCode);
          if (existingNormalizedCodes.has(normalizedCode)) {
            return;
          }

          const parentCode = getParentAccountCode(formattedCode);
          if (parentCode && !virtualAccounts.some((account) => account.code === parentCode)) {
            return;
          }

          const record = {
            id: generateId(),
            code: formattedCode,
            normalizedCode,
            name: seed.name,
            type: seed.type,
            level: getAccountLevel(formattedCode),
            parentCode,
            group: getAccountGroup(formattedCode),
            balanceNature: seed.balanceNature,
            isActive: true,
            requiresCodeAdjustment: false,
            adjustmentMessage: "",
            createdAt: new Date().toISOString(),
            updatedAt: new Date().toISOString()
          };

          additions.push(record);
          virtualAccounts.push(record);
          existingNormalizedCodes.add(normalizedCode);
        });

        if (!additions.length) {
          notify("error", "Plano de contas", "A base inicial já foi carregada ou possui códigos equivalentes cadastrados.");
          return;
        }

        saveCollection("chartAccounts", sortAccountsByCode([...state.data.chartAccounts, ...additions]));
        notify("success", "Plano de contas", `${additions.length} conta(s) de exemplo foram adicionadas ao plano.`);
        renderApp();
      }

      function roundCurrency(value) {
        return Math.round((Number(value) + Number.EPSILON) * 100) / 100;
      }

      function formatCurrency(value) {
        return new Intl.NumberFormat("pt-BR", {
          style: "currency",
          currency: "BRL"
        }).format(Number(value || 0));
      }

      function formatDate(value) {
        if (!value) {
          return "-";
        }
        const date = new Date(value + "T00:00:00");
        if (Number.isNaN(date.getTime())) {
          return value;
        }
        return new Intl.DateTimeFormat("pt-BR").format(date);
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function filterRecords(records, searchTerm, builder) {
        const term = (searchTerm || "").toLowerCase().trim();
        if (!term) {
          return records;
        }
        return records.filter((record) => builder(record).toLowerCase().includes(term));
      }

      function getInvoiceTotals(invoice) {
        const totalItemsAmount = roundCurrency(invoice.items.reduce((sum, item) => sum + Number(item.totalPrice || 0), 0));
        const totalInstallmentsAmount = roundCurrency(invoice.installments.reduce((sum, installment) => sum + Number(installment.amount || 0), 0));
        const difference = roundCurrency(totalItemsAmount - totalInstallmentsAmount);
        return { totalItemsAmount, totalInstallmentsAmount, difference };
      }

      function getInvoiceStatusClass(difference) {
        return Math.abs(difference) <= 0.009 ? "ok" : "warn";
      }
