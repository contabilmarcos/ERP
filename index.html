      // Valida a estrutura mínima do plano de contas para preservar hierarquia e vínculos contábeis.
      function validateChartAccount(record) {
        const errors = [];
        const code = formatAccountCode(record.code);
        const normalizedCode = normalizeAccountCode(code);
        const level = getAccountLevel(code);
        const group = getAccountGroup(code);
        const parentCode = getParentAccountCode(code);
        const duplicate = state.data.chartAccounts.find((account) => account.id !== record.id && account.normalizedCode === normalizedCode);
        const parentAccount = parentCode ? getChartAccountByCode(parentCode) : null;
        const currentRecord = record.id ? getChartAccountById(record.id) : null;
        const siblingChildren = state.data.chartAccounts.filter((account) => account.id !== record.id && account.parentCode === code);

        if (!isValidChartAccountCode(code)) {
          errors.push("O código da conta deve seguir a máscara 9.9.99.99.999, usando apenas números e pontos.");
        }

        if (!CHART_ACCOUNT_GROUP_LABELS[code.charAt(0)]) {
          errors.push("O primeiro dígito do código deve identificar um grupo contábil válido entre 1 e 7.");
        }

        if (duplicate) {
          errors.push("Já existe uma conta contábil com esse código normalizado.");
        }

        if (level > 1 && !parentAccount) {
          errors.push("Toda conta abaixo do nível 1 precisa possuir uma conta pai existente.");
        }

        if (parentAccount && isAnalyticalAccount(parentAccount)) {
          errors.push("Não é permitido cadastrar conta filha abaixo de uma conta analítica.");
        }

        if (!["Sintética", "Analítica"].includes(record.type)) {
          errors.push("Selecione um tipo de conta válido.");
        }

        if (!["Devedora", "Credora"].includes(record.balanceNature)) {
          errors.push("Selecione uma natureza do saldo válida.");
        }

        if (record.type === "Analítica" && siblingChildren.length > 0) {
          errors.push("Contas analíticas não podem possuir contas filhas.");
        }

        if (currentRecord && currentRecord.code !== code && accountHasChildren(currentRecord)) {
          errors.push("Não é possível alterar o código de uma conta que já possui contas filhas.");
        }

        if (currentRecord && currentRecord.type !== record.type) {
          const links = getChartAccountLinkSummary(currentRecord);
          if (record.type === "Sintética" && (links.natures.length || links.items.length || links.invoices.length)) {
            errors.push("Não é possível transformar a conta em sintética porque ela já possui vínculos de lançamento.");
          }
          if (record.type === "Analítica" && accountHasChildren(currentRecord)) {
            errors.push("Não é possível transformar a conta em analítica porque ela já possui contas filhas.");
          }
        }

        return {
          valid: errors.length === 0,
          errors,
          record: {
            code,
            normalizedCode,
            level,
            parentCode,
            group
          }
        };
      }

      function generateNextReducedCode() {
        const maxCode = state.data.chartAccounts.reduce((max, account) => {
          const numeric = parseInt(account.reducedCode, 10);
          return Number.isFinite(numeric) && numeric > max ? numeric : max;
        }, 0);
        return String(maxCode + 1).padStart(6, "0");
      }

      function migrateChartAccounts(accounts) {
        const migrated = sortAccountsByCode(accounts.map((account) => migrateChartAccountRecord(account)));
        let nextReducedCode = migrated.reduce((max, account) => {
          const numeric = parseInt(account.reducedCode, 10);
          return Number.isFinite(numeric) && numeric > max ? numeric : max;
        }, 0) + 1;
        migrated.forEach((account) => {
          if (!account.reducedCode) {
            account.reducedCode = String(nextReducedCode).padStart(6, "0");
            nextReducedCode += 1;
          }
        });
        return migrated;
      }

      function migrateChartAccountRecord(account) {
        const formattedCode = formatAccountCode(account.code);
        const validCode = isValidChartAccountCode(formattedCode);
        const level = getAccountLevel(formattedCode);
        const linkedSummary = getChartAccountLinkSummary({
          id: account.id,
          code: account.code
        });
        const linked = linkedSummary.natures.length || linkedSummary.items.length || linkedSummary.invoices.length;
        const groupDigit = clean(account.code).charAt(0);
        const defaultBalanceNature = CHART_ACCOUNT_BALANCE_DEFAULTS[groupDigit] || "Devedora";
        const resolvedType = ["Sintética", "Analítica"].includes(account.type)
          ? account.type
          : linked || level === 5
            ? "Analítica"
            : "Sintética";

        return {
          ...account,
          code: validCode ? formattedCode : clean(account.code),
          normalizedCode: normalizeAccountCode(account.code),
          name: account.name || "",
          type: resolvedType,
          level,
          parentCode: validCode ? getParentAccountCode(formattedCode) : "",
          group: getAccountGroup(account.code),
          balanceNature: ["Devedora", "Credora"].includes(account.balanceNature) ? account.balanceNature : defaultBalanceNature,
          isActive: typeof account.isActive === "boolean" ? account.isActive : true,
          requiresCodeAdjustment: !validCode,
          adjustmentMessage: validCode ? "" : "Código fora da nova máscara contábil. Ajuste recomendado para análise futura.",
          createdAt: account.createdAt || new Date().toISOString(),
          updatedAt: account.updatedAt || new Date().toISOString()
        };
      }

          { code: "1.1.01.01.001", name: "Caixa Geral", type: "Analítica", balanceNature: "Devedora" },
          { code: "2", name: "Passivo", type: "Sintética", balanceNature: "Credora" },
          { code: "2.1", name: "Passivo Circulante", type: "Sintética", balanceNature: "Credora" },

      function loadDefaultChartAccounts() {
        const existingNormalizedCodes = new Set(state.data.chartAccounts.map((account) => account.normalizedCode));
        const virtualAccounts = [...state.data.chartAccounts];
        const additions = [];

        getDefaultChartAccountsSeed().forEach((seed) => {
          const formattedCode = formatAccountCode(seed.code);
          const normalizedCode = normalizeAccountCode(formattedCode);
          if (existingNormalizedCodes.has(normalizedCode)) {
            return;
          }

          const parentCode = getParentAccountCode(formattedCode);
          if (parentCode && !virtualAccounts.some((account) => account.code === parentCode)) {
            return;
          }

          const record = {
            id: generateId(),
            code: formattedCode,
            normalizedCode,
            name: seed.name,
            type: seed.type,
            level: getAccountLevel(formattedCode),
            parentCode,
            group: getAccountGroup(formattedCode),
            balanceNature: seed.balanceNature,
            isActive: true,
            requiresCodeAdjustment: false,
            adjustmentMessage: "",
            createdAt: new Date().toISOString(),
            updatedAt: new Date().toISOString()
          };

          additions.push(record);
          virtualAccounts.push(record);
          existingNormalizedCodes.add(normalizedCode);
        });

        if (!additions.length) {
          notify("error", "Plano de contas", "A base inicial já foi carregada ou possui códigos equivalentes cadastrados.");
          return;
        }

        saveCollection("chartAccounts", sortAccountsByCode([...state.data.chartAccounts, ...additions]));
        notify("success", "Plano de contas", `${additions.length} conta(s) de exemplo foram adicionadas ao plano.`);
        renderApp();
      }

        return {

      function roundCurrency(value) {
        return Math.round((Number(value) + Number.EPSILON) * 100) / 100;
      }

      function formatCurrency(value) {
        return new Intl.NumberFormat("pt-BR", {
          style: "currency",
          currency: "BRL"
        }).format(Number(value || 0));
      }

      function formatSignedCurrency(value) {
        const numericValue = Number(value || 0);
        if (numericValue < 0) {
          return "-" + formatCurrency(Math.abs(numericValue));
        }
        return formatCurrency(numericValue);
      }

      function formatDate(value) {
        if (!value) {
          return "-";
        }
        const date = new Date(value + "T00:00:00");
        if (Number.isNaN(date.getTime())) {
          return value;
        }
        return new Intl.DateTimeFormat("pt-BR").format(date);
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function filterRecords(records, searchTerm, builder) {
        const term = (searchTerm || "").toLowerCase().trim();
        if (!term) {
          return records;
        }
        return records.filter((record) => builder(record).toLowerCase().includes(term));
      }

      function getInvoiceTotals(invoice) {
        const totalItemsAmount = roundCurrency(invoice.items.reduce((sum, item) => sum + Number(item.totalPrice || 0), 0));
        const totalInstallmentsAmount = roundCurrency(invoice.installments.reduce((sum, installment) => sum + Number(installment.amount || 0), 0));
        const difference = roundCurrency(totalItemsAmount - totalInstallmentsAmount);
        return { totalItemsAmount, totalInstallmentsAmount, difference };
      }

      function getInvoiceStatusClass(difference) {
        return Math.abs(difference) <= 0.009 ? "ok" : "warn";
      }

      function notify(type, title, message) {
        const toast = {
          id: generateId(),

        renderApp();
        window.setTimeout(() => {

      let lockedScrollY = 0;

      function applyModalScrollLock(shouldLock) {
        const alreadyLocked = document.body.dataset.scrollLocked === "true";
        if (shouldLock && !alreadyLocked) {
          lockedScrollY = window.scrollY || window.pageYOffset || 0;
          document.body.dataset.scrollLocked = "true";
          document.body.style.position = "fixed";
          document.body.style.top = `-${lockedScrollY}px`;
          document.body.style.left = "0";
          document.body.style.right = "0";
          document.body.style.width = "100%";
          document.body.style.overflow = "hidden";
        } else if (!shouldLock && alreadyLocked) {
          document.body.dataset.scrollLocked = "false";
          document.body.style.position = "";
          document.body.style.top = "";
          document.body.style.left = "";
          document.body.style.right = "";
          document.body.style.width = "";
          document.body.style.overflow = "";
          window.scrollTo(0, lockedScrollY);
        }
      }

      function renderItemsView() {

        const itemDraft = state.ui.itemFormDraft;
        const searchTerm = state.ui.search.items;
        const selectableNatures = getSelectableFinancialNatures();
        const records = filterRecords(
          state.data.items,
          searchTerm,
          (record) => {
            const nature = getFinancialNatureById(record.financialNatureId);
            const account = nature ? getChartAccountById(nature.chartAccountId) : null;
            return `${record.code} ${record.name} ${record.description} ${nature?.name || ""} ${account?.code || ""} ${account?.name || ""} ${account?.group || ""}`;
          }
        );
        const canCreate = selectableNatures.length > 0;
        const selectedNatureId = state.ui.itemNaturePreviewId || itemDraft.financialNatureId || editing?.financialNatureId || "";
        const selectedNature = getFinancialNatureById(selectedNatureId);
        const selectedAccount = selectedNature ? getChartAccountById(selectedNature.chartAccountId) : null;
        const linkedAccountIsValid = Boolean(selectedAccount && isChartAccountAvailableForLinks(selectedAccount));

        return `
          ${!canCreate ? `
            <section class="notice-card">
              <div class="notice-icon">AT</div>
              <div>
                <strong>Cadastre primeiro a natureza financeira</strong>
                <p>Itens só podem ser criados quando houver pelo menos uma natureza financeira vinculada a conta analítica ativa.</p>
              </div>
            </section>
          ` : ""}
          <section class="layout-grid">
            <article class="card">
              <div class="section-head">
                <div>
                  <h3>${editing ? "Editar item" : "Novo item"}</h3>
                  <p>Cada item deve estar obrigatoriamente associado a uma natureza financeira, que por sua vez define a conta contábil vinculada.</p>
                </div>
              </div>
              <form data-form="item" autocomplete="off">
                <input type="hidden" name="id" value="${escapeHtml(itemDraft.id || editing?.id || "")}">
                <div class="form-grid">
                  <div class="field">
                    <label for="item-name">Nome do item</label>
                    <input id="item-name" name="name" maxlength="160" value="${escapeHtml(itemDraft.name || "")}" ${canCreate ? "required" : "disabled"}>
                  </div>
                  <div class="field">
                    <label for="item-nature">Natureza financeira vinculada</label>
                    <select id="item-nature" name="financialNatureId" ${canCreate ? "required" : "disabled"}>
                      <option value="">Selecione uma natureza financeira</option>
                      ${selectableNatures.map((nature) => {
                        const account = getChartAccountById(nature.chartAccountId);
                        return `
                          <option value="${escapeHtml(nature.id)}" ${selectedNatureId === nature.id ? "selected" : ""}>
                            ${escapeHtml(nature.code)} - ${escapeHtml(nature.name)}${account ? ` | ${escapeHtml(account.code)}` : ""}
                          </option>
                        `;
                      }).join("")}
                    </select>
                  </div>
                  <div class="field full">
                    <label for="item-description">Descrição</label>
                    <textarea id="item-description" name="description" maxlength="260" ${canCreate ? "" : "disabled"} placeholder="Detalhes adicionais do item">${escapeHtml(itemDraft.description || "")}</textarea>
                  </div>
                  <div class="field full">
                    <label>Conta contábil derivada</label>
                    <div class="field-readonly">${selectedAccount ? `${escapeHtml(selectedAccount.code)} - ${escapeHtml(selectedAccount.name)} | ${escapeHtml(selectedAccount.group)} | ${escapeHtml(selectedAccount.balanceNature)}` : "A conta contábil será exibida conforme a natureza selecionada."}</div>
                    ${selectedNature && !linkedAccountIsValid ? `<div class="inline-note warning">A natureza selecionada não está mais vinculada a uma conta analítica ativa.</div>` : ""}
                  </div>
                </div>
                <div class="form-actions">
                  <button class="primary-button" type="submit" ${canCreate ? "" : "disabled"}>${editing ? "Salvar alterações" : "Cadastrar item"}</button>
                  ${editing ? `<button class="ghost-button" type="button" data-action="reset-item">Cancelar edição</button>` : ""}
                </div>
              </form>
            </article>
            <article class="table-card">
              <div class="table-toolbar">
                <div>
                  <h4>Lista de itens</h4>
                  <p class="page-subtitle">Pesquisa por código, nome, descrição, natureza financeira ou conta contábil.</p>
                </div>
                <input class="search-input" data-search="items" placeholder="Pesquisar itens" value="${escapeHtml(searchTerm)}">
              </div>
              ${records.length ? `
                <div class="table-scroll">
                  <table>
                    <thead>
                      <tr>
                        <th>Código</th>
                        <th>Item</th>
                        <th>Natureza financeira</th>
                        <th>Conta contábil</th>
                        <th>Ações</th>
                      </tr>
                    </thead>
                    <tbody>
                      ${records.map((record) => {
                        const nature = getFinancialNatureById(record.financialNatureId);
                        const account = nature ? getChartAccountById(nature.chartAccountId) : null;
                        return `
                          <tr>
                            <td class="mono">${escapeHtml(record.code)}</td>
                            <td>
                              <strong>${escapeHtml(record.name)}</strong>
                              <div class="table-muted">${escapeHtml(record.description || "Sem descrição")}</div>
                            </td>
                            <td>${escapeHtml(nature?.name || "Natureza indisponível")}</td>
                            <td>
                              <div class="badge-row">
                                <span class="badge">${escapeHtml(account?.code || "Conta indisponível")}</span>
                                ${account && isChartAccountAvailableForLinks(account) ? `<span class="badge positive">Vínculo liberado</span>` : `<span class="badge warning">Revisar vínculo</span>`}
                              </div>
                              <div class="table-muted">${escapeHtml(account?.name || "Conta contábil removida")}</div>
                              <div class="table-muted">${escapeHtml(account ? `${account.group} | ${account.balanceNature}` : "Conta contábil indisponível")}</div>
                            </td>
                            <td>
                              <div class="table-actions">
                                <button class="action-chip" type="button" data-action="edit-item" data-id="${escapeHtml(record.id)}">Editar</button>
                                <button class="action-chip danger" type="button" data-action="delete-item" data-id="${escapeHtml(record.id)}">Excluir</button>
                              </div>
                            </td>
                          </tr>
                        `;
                      }).join("")}
                    </tbody>
                  </table>
                </div>
              ` : `
                <div class="empty-card">
                  <strong>Nenhum item encontrado.</strong>
                  <p>${searchTerm ? "Nenhum item foi localizado com os filtros atuais." : "Cadastre o primeiro item para utilizá-lo nas notas fiscais."}</p>
                </div>
              `}
            </article>
          </section>
        `;
      }


      function renderInvoiceBaseTab(draft, supplier, canLaunch) {
        const isLancamento = draft.kind === "lancamento";
        const typeOptions = isLancamento
          ? getActiveDocumentTypes()
          : getActiveDocumentTypes().filter((docType) => ["Nota de serviço", "Nota de produto"].includes(docType.name));

        return `
          <section class="card">
            <div class="section-head">
              <div>
                <h3>${draft.id ? `Editar ${isLancamento ? "lançamento" : "nota fiscal"} ${escapeHtml(draft.code)}` : `Dados ${isLancamento ? "do novo lançamento" : "da nova nota fiscal"}`}</h3>
                <p>Preencha os dados principais primeiro. Depois siga para as abas de itens e financeiro.</p>
              </div>
              ${draft.id ? `<button class="ghost-button" type="button" data-action="${isLancamento ? "new-lancamento" : "new-invoice"}">Novo rascunho</button>` : ""}
            </div>
            <form data-form="invoice" autocomplete="off">
              <div class="form-grid">
                <div class="field">
                  <label for="invoice-type">${isLancamento ? "Tipo de documento" : "Tipo da nota"}</label>
                  <select id="invoice-type" name="type" ${canLaunch ? "" : "disabled"}>
                    ${typeOptions.length ? typeOptions.map((docType) => `
                      <option value="${escapeHtml(docType.name)}" ${draft.type === docType.name ? "selected" : ""}>${escapeHtml(docType.name)}</option>
                    `).join("") : `<option value="">Cadastre um tipo de documento em Configurações</option>`}
                  </select>
                </div>
                <div class="field">
                  <label for="invoice-document-number">Número da nota</label>
                  <input id="invoice-document-number" name="documentNumber" maxlength="40" value="${escapeHtml(draft.documentNumber || "")}" placeholder="Ex.: 000123" ${canLaunch ? "" : "disabled"}>
                </div>
                <div class="field">
                  <label for="invoice-supplier">Fornecedor${isLancamento ? " (opcional)" : ""}</label>
                  <select id="invoice-supplier" name="supplierId" ${canLaunch ? (isLancamento ? "" : "required") : "disabled"}>
                    <option value="">Selecione um fornecedor</option>
                    ${state.data.suppliers.map((record) => `
                      <option value="${escapeHtml(record.id)}" ${draft.supplierId === record.id ? "selected" : ""}>
                        ${escapeHtml(record.code)} - ${escapeHtml(record.legalName)}
                      </option>
                    `).join("")}
                  </select>
                </div>
                <div class="field">
                  <label for="invoice-cost-center">Centro de custo</label>
                  <select id="invoice-cost-center" name="costCenterId" ${canLaunch ? "" : "disabled"}>
                    <option value="">Sem centro de custo</option>
                    ${state.data.costCenters.map((record) => `
                      <option value="${escapeHtml(record.id)}" ${draft.costCenterId === record.id ? "selected" : ""}>
                        ${escapeHtml(record.code)} - ${escapeHtml(record.name)}
                      </option>
                    `).join("")}
                  </select>
                </div>
                <div class="field">
                  <label for="invoice-date">Data de emissão</label>
                  <input id="invoice-date" type="date" name="issueDate" value="${escapeHtml(draft.issueDate || "")}" ${canLaunch ? "required" : "disabled"}>
                </div>
                <div class="field">
                  <label>Fornecedor selecionado</label>
                  <div class="field-readonly">${supplier ? `${escapeHtml(supplier.code)} - ${escapeHtml(supplier.legalName)}` : "Selecione um fornecedor cadastrado."}</div>
                </div>
                <div class="field full">
                  <label for="invoice-description">${isLancamento ? "Descrição do lançamento" : "Descrição da nota"}</label>
                  <textarea id="invoice-description" name="description" maxlength="300" ${canLaunch ? "" : "disabled"} placeholder="Descreva o conteúdo ou finalidade">${escapeHtml(draft.description || "")}</textarea>
                </div>
              </div>
              <div class="form-actions">
                <button class="primary-button" type="submit" ${canLaunch ? "" : "disabled"}>${draft.id ? "Salvar alterações" : "Salvar registro"}</button>
                <button class="secondary-button" type="button" data-invoice-tab="itens" ${canLaunch ? "" : "disabled"}>Ir para itens</button>
              </div>
            </form>
          </section>
        `;

      function renderInvoiceItemsTab(draft, selectableItems, canLaunch, lineItem, lineNature, lineAccount) {

                <h3>Itens da nota</h3>

                </div>
                <div class="field">
                  <label for="invoice-line-unit-price">Valor unitário</label>

                  <table>
                    <thead>
                      <tr>
                        <th>Item</th>
                        <th>Natureza</th>
                        <th>Conta</th>

                    <tbody>
                      ${draft.items.map((item) => `
                        <tr>
                          <td>
                            <strong>${escapeHtml(item.itemName)}</strong>

                          </td>
                          <td>${escapeHtml(item.financialNatureName)}</td>
                          <td>
                            <div class="badge-row">
                              <span class="badge">${escapeHtml(item.chartAccountCode)}</span>
                              ${item.chartAccountType ? `<span class="badge positive">${escapeHtml(item.chartAccountType)}</span>` : ""}
                            </div>
                            <div class="table-muted">${escapeHtml(item.chartAccountName)}</div>
                            <div class="table-muted">${escapeHtml([item.chartAccountGroup, item.chartAccountBalanceNature].filter(Boolean).join(" | ") || "Metadados não informados")}</div>
                          </td>
                          <td class="mono">${escapeHtml(String(item.quantity))}</td>
                          <td class="mono">${escapeHtml(formatCurrency(item.unitPrice))}</td>
                          <td class="mono">${escapeHtml(formatCurrency(item.totalPrice))}</td>

                <p>Inclua os itens do lançamento para compor o valor total e carregar automaticamente a classificação financeira e contábil.</p>
              </div>
            `}
          </section>
        `;
      }

      function renderInvoiceModal() {
        const draft = state.ui.invoiceDraft;
        const totals = getInvoiceTotals(draft);
        const supplier = getSupplierById(draft.supplierId);
        const selectableItems = getSelectableItems();
        const canLaunch = state.data.suppliers.length > 0 && selectableItems.length > 0;
        const lineItem = getItemById(draft.lineForm.itemId);
        const lineNature = lineItem ? getFinancialNatureById(lineItem.financialNatureId) : null;
        const lineAccount = lineNature ? getChartAccountById(lineNature.chartAccountId) : null;
        const activeTab = state.ui.activeInvoiceTab || "dados";
        const tabItems = [
          { key: "dados", label: "Dados" },
          { key: "itens", label: `Itens (${draft.items.length})` },
          { key: "financeiro", label: `Financeiro (${draft.installments.length})` },
          { key: "resumo", label: "Resumo" }
        ];

        let tabContent = "";
        if (activeTab === "itens") {
          tabContent = renderInvoiceItemsTab(draft, selectableItems, canLaunch, lineItem, lineNature, lineAccount);
        } else if (activeTab === "financeiro") {
          tabContent = renderInvoiceFinancialTab(draft, canLaunch);
        } else if (activeTab === "resumo") {
          tabContent = renderInvoiceSummaryTab(draft, supplier, totals, canLaunch);
        } else {
          tabContent = renderInvoiceBaseTab(draft, supplier, canLaunch);
        }

        return `
          <div class="modal-overlay">
            <button class="modal-backdrop" type="button" data-action="close-invoice-modal" aria-label="Fechar modal"></button>
            <div class="modal-shell" role="dialog" aria-modal="true" aria-labelledby="invoice-modal-title">
              <div class="modal-header">
                <div>

                        <span class="table-muted">Vencimento</span>
                        <div class="field-readonly compact">${escapeHtml(formatDate(installment.dueDate))}</div>
                      </div>
                    </div>
                  </div>
                  <form data-form="settlement" autocomplete="off">
                    <div class="form-grid">
                      <div class="field">
                        <label for="settlement-date">Data da baixa</label>
                        <input id="settlement-date" type="date" name="settlementDate" value="${escapeHtml(draft.settlementDate || "")}" required>
                      </div>
                      <div class="field">
                        <label for="settlement-amount">Valor da baixa</label>
                        <input id="settlement-amount" type="number" step="0.01" min="0.01" name="amount" value="${escapeHtml(draft.amount || "")}" required>
                      </div>
                      <div class="field full">
                        <label for="settlement-account">Conta que pagou</label>
                        <select id="settlement-account" name="payingAccountId" required>
                          <option value="">Selecione a conta contábil</option>
                          ${accounts.map((account) => `
                            <option value="${escapeHtml(account.id)}" ${draft.payingAccountId === account.id ? "selected" : ""}>
                              ${escapeHtml(account.code)} - ${escapeHtml(account.name)}

                          `).join("")}
                        </select>
                      </div>
                    </div>
                    <div class="form-actions">
                      <button class="primary-button" type="submit">Confirmar baixa</button>
                    </div>
                  </form>
                `}
              </div>
            </div>
          </div>
        `;
      }

      function renderTrialBalanceModal() {
        const filters = state.ui.trialBalanceFilters;

        return `
          <div class="modal-overlay">
            <button class="modal-backdrop" type="button" data-action="close-trial-balance-modal" aria-label="Fechar modal"></button>
            <div class="modal-shell" role="dialog" aria-modal="true" aria-labelledby="trial-balance-modal-title">
              <div class="modal-header">
                <div>
                  <h3 class="modal-title" id="trial-balance-modal-title">Balancete</h3>
                  <p class="modal-subtitle">Informe os parâmetros de emissão e configure as colunas. Ao emitir, o balancete abre em uma nova janela.</p>
                </div>
                <div class="inline-actions">
                  <button class="ghost-button" type="button" data-action="close-trial-balance-modal">Fechar</button>
                </div>
              </div>
              <div class="modal-body">
                <section class="card">
                  <div class="section-head">
                    <div>
                      <h3>Parâmetros e configuração</h3>
                      <p>Defina o período, o centro de custo e quais colunas devem aparecer no balancete.</p>
                    </div>
                  </div>
                  <form data-form="trial-balance" autocomplete="off">
                    <div class="form-grid">
                      <div class="field">
                        <label for="trial-balance-start-date">Período inicial</label>
                        <input id="trial-balance-start-date" type="date" name="startDate" value="${escapeHtml(filters.startDate || "")}" required>
                      </div>
                      <div class="field">
                        <label for="trial-balance-end-date">Período final</label>
                        <input id="trial-balance-end-date" type="date" name="endDate" value="${escapeHtml(filters.endDate || "")}" required>
                      </div>
                      <div class="field full">
                        <label for="trial-balance-cost-center">Centro de custo</label>
                        <select id="trial-balance-cost-center" name="costCenterId">
                          <option value="all" ${filters.costCenterId === "all" ? "selected" : ""}>Todos os centros de custo</option>
                          ${state.data.costCenters.map((record) => `
                            <option value="${escapeHtml(record.id)}" ${filters.costCenterId === record.id ? "selected" : ""}>
                              ${escapeHtml(record.code)} - ${escapeHtml(record.name)}
                            </option>
                          `).join("")}
                        </select>
                      </div>
                      <div class="field full">
                        <label>Configuração das colunas</label>
                        <div class="checkbox-grid">
                          <label class="checkbox-item">
                            <input type="checkbox" name="showPreviousBalance" ${filters.showPreviousBalance ? "checked" : ""}>
                            <span>Saldo anterior</span>
                          </label>
                          <label class="checkbox-item">
                            <input type="checkbox" name="showDebit" ${filters.showDebit ? "checked" : ""}>
                            <span>Débito</span>
                          </label>
                          <label class="checkbox-item">
                            <input type="checkbox" name="showCredit" ${filters.showCredit ? "checked" : ""}>
                            <span>Crédito</span>
                          </label>
                          <label class="checkbox-item">
                            <input type="checkbox" name="showMovement" ${filters.showMovement ? "checked" : ""}>
                            <span>Movimento</span>
                          </label>
                          <label class="checkbox-item">
                            <input type="checkbox" name="showBalance" ${filters.showBalance ? "checked" : ""}>
                            <span>Saldo</span>
                          </label>
                        </div>
                      </div>
                    </div>
                    <div class="form-actions">
                      <button class="primary-button" type="submit">Emitir</button>
                    </div>
                  </form>
                </section>
                <section class="empty-card">
                  <strong>Balancete com razão contábil integrado.</strong>
                  <p>Ao emitir, uma nova janela mostra o balancete e, ao clicar em uma conta, a movimentação (razão contábil) daquela conta aparece ao lado.</p>
                </section>
              </div>
            </div>
          </div>
        `;
      }

      function getAccountLedgerEntries(accountId, filters) {
        return getTrialBalanceEntries(filters)
          .filter((entry) => entry.debitAccountId === accountId || entry.creditAccountId === accountId)
          .slice()
          .sort((a, b) => (a.entryDate || "").localeCompare(b.entryDate || ""));
      }

      function renderTrialBalanceLedgerPanel(filters, report) {
        const selectedId = state.ui.trialBalanceSelectedAccountId;

        if (!selectedId) {
          return `
            <div class="subtle-panel ledger-panel">
              <h4>Razão contábil</h4>
              <div class="empty-card">
                <strong>Selecione uma conta</strong>
                <p>Clique em uma conta do balancete ao lado para ver a movimentação do período.</p>
              </div>
            </div>
          `;
        }

        const account = getChartAccountById(selectedId);
        const row = report.rows.find((item) => item.account.id === selectedId);

        if (!account || !row) {
          return `
            <div class="subtle-panel ledger-panel">
              <h4>Razão contábil</h4>
              <div class="empty-card">
                <strong>Conta não encontrada no balancete emitido.</strong>
              </div>
            </div>
          `;
        }

        const isDebitNature = account.balanceNature === "Devedora";
        const ledgerEntries = getAccountLedgerEntries(selectedId, filters);
        let runningBalance = row.previousBalance;

        const entriesHtml = ledgerEntries.map((entry) => {
          const amount = roundCurrency(Number(entry.amount || 0));
          const isDebit = entry.debitAccountId === selectedId;
          const signedEffect = isDebit ? amount : -amount;
          runningBalance = roundCurrency(runningBalance + (isDebitNature ? signedEffect : -signedEffect));
          const counterpartAccount = getChartAccountById(isDebit ? entry.creditAccountId : entry.debitAccountId);
          const costCenter = getCostCenterById(entry.costCenterId);

          return `
            <div class="ledger-entry">
              <div class="ledger-entry-head">
                <span class="mono">${escapeHtml(formatDate(entry.entryDate))}</span>
                <span class="badge ${isDebit ? "positive" : "danger"}">${isDebit ? "Débito" : "Crédito"}</span>
              </div>
              <div>${escapeHtml(entry.description || "-")}</div>
              <div class="table-muted">
                ${counterpartAccount ? `Contrapartida: ${escapeHtml(counterpartAccount.code)} - ${escapeHtml(counterpartAccount.name)}` : "Contrapartida não encontrada"}
                ${costCenter ? ` | ${escapeHtml(costCenter.code)} - ${escapeHtml(costCenter.name)}` : ""}
              </div>
              <div class="ledger-entry-amounts">
                <span class="mono">${escapeHtml(formatCurrency(amount))}</span>
                <span class="mono table-muted">Saldo: ${escapeHtml(formatSignedCurrency(runningBalance))}</span>
              </div>
            </div>
          `;
        }).join("");

        return `
          <div class="subtle-panel ledger-panel">
            <h4>Razão contábil</h4>
            <p class="table-muted mono">${escapeHtml(account.code)} - ${escapeHtml(account.name)}</p>
            <div class="ledger-summary">
              <div>
                <span class="table-muted">Saldo anterior</span>
                <strong>${escapeHtml(formatSignedCurrency(row.previousBalance))}</strong>
              </div>
              <div>
                <span class="table-muted">Saldo final</span>
                <strong>${escapeHtml(formatSignedCurrency(row.balance))}</strong>
              </div>
            </div>
            ${ledgerEntries.length ? `
              <div class="ledger-entries-list">${entriesHtml}</div>
            ` : `
              <div class="empty-card">
                <strong>Nenhum lançamento direto no período.</strong>
                <p>O saldo desta conta pode vir apenas de contas filhas.</p>
              </div>
            `}
          </div>
        `;
      }

      function renderTrialBalanceReportModal() {
        const filters = state.ui.trialBalanceFilters;
        const visibleColumns = getTrialBalanceVisibleColumns(filters);
        const selectedCostCenter = filters.costCenterId === "all" ? null : getCostCenterById(filters.costCenterId);
        const report = filters.submitted ? getTrialBalanceReport(filters) : { rows: [], totals: {}, entries: [] };
        const selectedId = state.ui.trialBalanceSelectedAccountId;

        return `
          <div class="modal-overlay">
            <button class="modal-backdrop" type="button" data-action="close-trial-balance-report-modal" aria-label="Fechar modal"></button>
            <div class="modal-shell fullscreen" role="dialog" aria-modal="true" aria-labelledby="trial-balance-report-modal-title">
              <div class="modal-header">
                <div>
                  <h3 class="modal-title" id="trial-balance-report-modal-title">Balancete emitido</h3>
                  <p class="modal-subtitle">Período de ${escapeHtml(formatDate(filters.startDate))} até ${escapeHtml(formatDate(filters.endDate))}${selectedCostCenter ? ` | Centro de custo: ${escapeHtml(selectedCostCenter.code)} - ${escapeHtml(selectedCostCenter.name)}` : " | Centro de custo: todos"}</p>
                </div>
                <div class="inline-actions">
                  <button class="secondary-button" type="button" data-action="export-trial-balance-pdf">Exportar PDF</button>
                  <button class="ghost-button" type="button" data-action="edit-trial-balance-filters">Ajustar filtros</button>
                  <button class="ghost-button" type="button" data-action="close-trial-balance-report-modal">Fechar</button>
                </div>
              </div>
              <div class="modal-body">
                <div class="trial-balance-split">
                  <section class="table-card">
                    <div class="table-toolbar">
                      <div>
                        <h4>Contas do balancete</h4>
                        <p class="page-subtitle">Clique em uma conta para ver a movimentação (razão contábil) ao lado.</p>
                      </div>
                      <div class="badge-row">
                        <span class="badge">${escapeHtml(String(report.entries.length))} lançamento(s)</span>
                        <span class="badge positive">${escapeHtml(String(report.rows.length))} conta(s)</span>
                      </div>
                    </div>
                    ${report.rows.length ? `
                      <div class="table-scroll">
                        <table>
                          <thead>
                            <tr>
                              <th>Código</th>
                              <th>Conta</th>
                              ${visibleColumns.map((column) => `<th>${escapeHtml(column.label)}</th>`).join("")}
                            </tr>
                          </thead>
                          <tbody>
                            ${report.rows.map((row) => `
                              <tr class="selectable-row ${row.account.id === selectedId ? "selected" : ""}" data-action="select-trial-balance-account" data-id="${escapeHtml(row.account.id)}">
                                <td class="mono">${escapeHtml(row.account.code)}</td>
                                <td>
                                  <strong>${escapeHtml(row.account.name)}</strong>
                                  <div class="table-muted">${escapeHtml(`${row.account.group} | ${row.account.balanceNature}`)}</div>
                                </td>
                                ${visibleColumns.map((column) => `<td class="mono">${escapeHtml(column.formatter(row[column.key]))}</td>`).join("")}
                              </tr>
                            `).join("")}
                            <tr>
                              <td class="mono"><strong>Total</strong></td>
                              <td class="table-muted">Totais do período</td>
                              ${visibleColumns.map((column) => `<td class="mono"><strong>${escapeHtml(column.formatter(report.totals[column.key]))}</strong></td>`).join("")}
                            </tr>
                          </tbody>
                        </table>
                      </div>
                    ` : `
                      <div class="empty-card">
                        <strong>Nenhum movimento encontrado para o balancete.</strong>
                        <p>Revise o período informado, o centro de custo selecionado ou os lançamentos cadastrados antes de emitir novamente.</p>
                      </div>
                    `}
                  </section>
                  ${renderTrialBalanceLedgerPanel(filters, report)}
                </div>
              </div>
            </div>
          </div>
        `;
      }

      function getAllInstallmentsWithStatus(searchTerm) {
        const rows = [];
        state.data.invoices.forEach((invoice) => {
          invoice.installments.forEach((installment) => {
            const settled = getInstallmentSettledAmount(invoice.id, installment.id);
            const remaining = roundCurrency(installment.amount - settled);
            const status = remaining <= 0.009 ? "Quitada" : (settled > 0 ? "Parcial" : "Em aberto");
            rows.push({ invoice, installment, settled, remaining, status });
          });
        });

        rows.sort((a, b) => (a.installment.dueDate || "").localeCompare(b.installment.dueDate || ""));

        const term = (searchTerm || "").toLowerCase().trim();
        if (!term) {
          return rows;
        }

        return rows.filter((row) => {
          const supplier = getSupplierById(row.invoice.supplierId);
          const haystack = `${row.invoice.code} ${row.invoice.documentNumber || ""} ${row.invoice.type} ${supplier?.legalName || ""} ${row.installment.paymentMethod || ""}`.toLowerCase();
          return haystack.includes(term);
        });
      }

      function renderFinanceiroView() {
        const searchTerm = state.ui.search.financeiro;
        const rows = getAllInstallmentsWithStatus(searchTerm);
        const openCount = rows.filter((row) => row.status !== "Quitada").length;
        const totalOpen = roundCurrency(rows.reduce((sum, row) => sum + (row.status !== "Quitada" ? row.remaining : 0), 0));

        return `
          <section class="card">
            <div class="section-head">
              <div>
                <h3>Módulo financeiro</h3>
                <p>Acompanhe as parcelas geradas por notas fiscais e lançamentos e dê baixa informando data, conta e valor.</p>
              </div>
            </div>
            <div class="summary-grid">
              <article class="stats-card">
                <span class="table-muted">Parcelas em aberto</span>
                <strong>${escapeHtml(String(openCount))}</strong>
              </article>
              <article class="stats-card">
                <span class="table-muted">Saldo total em aberto</span>
                <strong>${escapeHtml(formatCurrency(totalOpen))}</strong>
              </article>
            </div>
          </section>
          <section class="table-card">
            <div class="table-toolbar">
              <div>
                <h4>Parcelas lançadas</h4>
                <p class="page-subtitle">Pesquise por documento, número, tipo ou fornecedor.</p>
              </div>
              <input class="search-input" data-search="financeiro" placeholder="Pesquisar parcelas" value="${escapeHtml(searchTerm)}">
            </div>
            ${rows.length ? `
              <div class="table-scroll">
                <table>
                  <thead>
                    <tr>
                      <th>Documento</th>
                      <th>Fornecedor</th>
                      <th>Parcela</th>
                      <th>Vencimento</th>
                      <th>Valor</th>
                      <th>Baixado</th>
                      <th>Saldo</th>
                      <th>Situação</th>
                      <th>Ações</th>
                    </tr>
                  </thead>
                  <tbody>
                    ${rows.map((row) => {
                      const supplier = getSupplierById(row.invoice.supplierId);
                      const statusClass = row.status === "Quitada" ? "positive" : (row.status === "Parcial" ? "warning" : "");
                      return `
                        <tr>
                          <td>
                            <strong class="mono">${escapeHtml(row.invoice.documentNumber || row.invoice.code)}</strong>
                            <div class="table-muted">${escapeHtml(row.invoice.type)}</div>
                          </td>
                          <td class="table-muted">${escapeHtml(supplier?.legalName || "Sem fornecedor")}</td>
                          <td class="mono">${escapeHtml(String(row.installment.installmentNumber))}</td>
                          <td>${escapeHtml(formatDate(row.installment.dueDate))}</td>
                          <td class="mono">${escapeHtml(formatCurrency(row.installment.amount))}</td>
                          <td class="mono">${escapeHtml(formatCurrency(row.settled))}</td>
                          <td class="mono">${escapeHtml(formatCurrency(row.remaining))}</td>
                          <td><span class="badge ${statusClass}">${escapeHtml(row.status)}</span></td>
                          <td>
                            <div class="table-actions">
                              <button class="action-chip" type="button" data-action="open-settlement-modal" data-invoice-id="${escapeHtml(row.invoice.id)}" data-installment-id="${escapeHtml(row.installment.id)}" ${row.status === "Quitada" ? "disabled" : ""}>Dar baixa</button>
                            </div>
                          </td>
                        </tr>
                      `;
                    }).join("")}
                  </tbody>
                </table>
              </div>
            ` : `
              <div class="empty-card">
                <strong>Nenhuma parcela encontrada.</strong>
                <p>Lance uma nota fiscal ou um lançamento no módulo fiscal para que as parcelas apareçam aqui.</p>
              </div>
            `}
          </section>
        `;
      }

      function renderFiscalView() {



        const searchTerm = state.ui.search.invoices;
        const selectableItems = getSelectableItems();
        const records = filterRecords(
          state.data.invoices,
          searchTerm,
          (record) => {
            const recordSupplier = getSupplierById(record.supplierId);
            return `${record.code} ${record.type} ${record.description} ${recordSupplier?.legalName || ""} ${record.issueDate}`;
          }
        );
        const canLaunch = state.data.suppliers.length > 0 && selectableItems.length > 0;

        return `
          ${!canLaunch ? `
            <section class="notice-card">
              <div class="notice-icon">PR</div>
              <div>
                <strong>Pré-requisitos para lançar notas fiscais</strong>
                <p>Você precisa ter pelo menos um fornecedor e um item vinculado a natureza financeira com conta contábil analítica ativa.</p>
              </div>
            </section>
          ` : ""}
          <section class="card">
            <div class="section-head">
              <div>
                <h3>Notas fiscais e lançamentos</h3>
                <p>Ao entrar no módulo fiscal, a tela mostra primeiro a listagem. O cadastro ou a edição abrem em modal, separados por abas.</p>
              </div>
              <div class="inline-actions">
                <button class="secondary-button" type="button" data-action="new-lancamento" ${canLaunch ? "" : "disabled"}>Novo lançamento</button>
                <button class="primary-button" type="button" data-action="new-invoice" ${canLaunch ? "" : "disabled"}>Nova nota fiscal</button>
              </div>
            </div>
            <div class="subtle-panel">
              <ul class="subtle-list">
                <li>Use a listagem para pesquisar, editar e excluir notas e lançamentos já registrados.</li>
                <li>"Nova nota fiscal" lança notas de serviço ou produto. "Novo lançamento" registra outros documentos cadastrados em Configurações.</li>
                <li>O salvamento continua validando a conciliação entre itens e parcelas.</li>
              </ul>
            </div>
          </section>
          <section class="table-card">
            <div class="table-toolbar">
              <div>
                <h4>Notas fiscais e lançamentos</h4>
                <p class="page-subtitle">Pesquise, edite ou exclua registros já lançados localmente.</p>
              </div>
              <input class="search-input" data-search="invoices" placeholder="Pesquisar notas e lançamentos" value="${escapeHtml(searchTerm)}">
            </div>
            ${records.length ? `
              <div class="table-scroll">
                <table>
                  <thead>
                    <tr>
                      <th>Código</th>
                      <th>Número</th>
                      <th>Tipo / fornecedor</th>
                      <th>Emissão</th>
                      <th>Descrição</th>
                      <th>Itens</th>
                      <th>Parcelas</th>
                      <th>Total</th>
                      <th>Ações</th>
                    </tr>
                  </thead>
                  <tbody>
                    ${records.map((record) => {
                      const supplierRecord = getSupplierById(record.supplierId);
                      const difference = roundCurrency(record.totalItemsAmount - record.totalInstallmentsAmount);
                      return `
                        <tr>
                          <td class="mono">${escapeHtml(record.code)}</td>
                          <td class="mono">${escapeHtml(record.documentNumber || "-")}</td>
                          <td>
                            <strong>${escapeHtml(record.type)}</strong>
                            <div class="table-muted">${supplierRecord ? escapeHtml(supplierRecord.legalName) : (record.kind === "lancamento" ? "Sem fornecedor" : "Fornecedor indisponível")}</div>
                            ${record.kind === "lancamento" ? `<span class="badge">Lançamento</span>` : ""}
                          </td>
                          <td>${escapeHtml(formatDate(record.issueDate))}</td>
                          <td class="table-muted">${escapeHtml(record.description || "Sem descrição")}</td>
                          <td class="mono">${escapeHtml(String(record.items.length))}</td>
                          <td>
                            <div class="mono">${escapeHtml(String(record.installments.length))}</div>
                            <div class="badge-row" style="margin-top:8px;">
                              <span class="badge ${Math.abs(difference) <= 0.009 ? "positive" : "warning"}">${Math.abs(difference) <= 0.009 ? "Conciliada" : "Divergente"}</span>
                            </div>
                          </td>
                          <td class="mono">${escapeHtml(formatCurrency(record.totalItemsAmount))}</td>
                          <td>
                            <div class="table-actions">
                              <button class="action-chip" type="button" data-action="edit-invoice" data-id="${escapeHtml(record.id)}">Editar</button>
                              <button class="action-chip danger" type="button" data-action="delete-invoice" data-id="${escapeHtml(record.id)}">Excluir</button>
                            </div>
                          </td>
                        </tr>
                      `;
                    }).join("")}
                  </tbody>
                </table>
              </div>
            ` : `
              <div class="empty-card">
                <strong>Nenhuma nota fiscal ou lançamento encontrado.</strong>
                <p>${searchTerm ? "Nenhum registro corresponde ao termo pesquisado." : "Depois de cadastrar fornecedores e itens, use os botões acima para lançar uma nota ou um lançamento avulso."}</p>
                <div class="inline-actions">
                  <button class="primary-button" type="button" data-action="new-invoice" ${canLaunch ? "" : "disabled"}>Nova nota fiscal</button>
                  <button class="secondary-button" type="button" data-action="new-lancamento" ${canLaunch ? "" : "disabled"}>Novo lançamento</button>
                </div>
              </div>
            `}
          </section>
        `;
      }

      initialize();

    })();
  </script>
</body>
</html>
