        return `<form class="card" data-form="payroll-provision-settings"><div class="section-head"><div><h3>Percentuais por empresa</h3><p>Os percentuais são gravados na competência calculada e podem ser ativados ou desativados.</p></div></div><div class="form-grid">${renderPayrollInput("companyName", "Empresa", draft.companyName, "Empresa Principal")}${renderPayrollInput("branchName", "Filial", draft.branchName, "Matriz")}${renderPayrollInput("inssCompanyRate", "INSS Empresa (%)", draft.inssCompanyRate, "20", "number")}${renderPayrollInput("thirdPartyRate", "Terceiros (%)", draft.thirdPartyRate, "5,8", "number")}${renderPayrollInput("ratRate", "RAT (%)", draft.ratRate, "2", "number")}${renderPayrollInput("fgtsRate", "FGTS (%)", draft.fgtsRate, "8", "number")}${renderPayrollSelect("costCenterRule", "Critério de centro de custo", draft.costCenterRule, [["current", "Centro de custo atual do funcionário"], ["payroll", "Centro de custo da folha"], ["default", "Centro de custo padrão da empresa"]])}${renderPayrollSelect("status", "Status", draft.status, [["Ativo", "Ativo"], ["Inativo", "Inativo"]])}</div><div class="split-grid" style="margin-top:14px;"><label class="badge"><input type="checkbox" name="inssCompanyEnabled" ${draft.inssCompanyEnabled ? "checked" : ""}> INSS Empresa ativo</label><label class="badge"><input type="checkbox" name="thirdPartyEnabled" ${draft.thirdPartyEnabled ? "checked" : ""}> Terceiros ativo</label><label class="badge"><input type="checkbox" name="ratEnabled" ${draft.ratEnabled ? "checked" : ""}> RAT ativo</label><label class="badge"><input type="checkbox" name="fgtsEnabled" ${draft.fgtsEnabled ? "checked" : ""}> FGTS ativo</label></div>${renderPayrollFormActions("reset-payroll-provision-settings")}</form>`;
      }

      function renderPayrollProvisionFiltersForm() {
        const filters = state.ui.payrollProvisionFilters;
        const companies = [...new Set(state.data.payrollProvisionSettings.map((item) => item.companyName).filter(Boolean))];
        const branches = [...new Set(state.data.payrollProvisionSettings.map((item) => item.branchName).filter(Boolean))];
        return `<form class="card" data-form="payroll-provision-filters"><div class="section-head"><div><h3>Operação mensal</h3><p>Escolha a competência e o universo de funcionários para calcular e conferir.</p></div></div><div class="form-grid">${renderPayrollSelect("companyName", "Empresa", filters.companyName, companies.map((item) => [item, item]))}${renderPayrollSelect("branchName", "Filial", filters.branchName, branches.map((item) => [item, item]))}${renderPayrollInput("competence", "Competência", filters.competence, "2026-07", "month")}${renderPayrollSelect("departmentId", "Departamento", filters.departmentId, [["all", "Todos"], ...state.data.payrollDepartments.map((item) => [item.id, `${item.code} - ${item.name}`])])}${renderPayrollSelect("costCenterId", "Centro de custo", filters.costCenterId, [["all", "Todos"], ...state.data.costCenters.map((item) => [item.id, `${item.code} - ${item.name}`])])}${renderPayrollSelect("employeeId", "Funcionário", filters.employeeId, [["all", "Todos"], ...state.data.payrollEmployees.map((item) => [item.id, `${item.registration || item.code} - ${item.name}`])])}${renderPayrollSelect("provisionType", "Tipo de provisão", filters.provisionType, PAYROLL_PROVISION_TYPES)}${renderPayrollSelect("employeeStatus", "Situação do funcionário", filters.employeeStatus, [["all", "Todas"], ...PAYROLL_EMPLOYEE_STATUS.map((item) => [item, item])])}</div></form>`;
      }

      function getPayrollProvisionVisualChecks(records, filters, competenceRecord) {
        const exactSettings = state.data.payrollProvisionSettings.find((item) => item.status !== "Inativo" && item.companyName === filters.companyName && item.branchName === filters.branchName);
        const missingSalary = records.filter((item) => toDecimal(item.salaryBase) <= 0);
        const missingCostCenter = records.filter((item) => !item.costCenterId || !getCostCenterById(item.costCenterId));
        const invalidValues = records.filter((item) => !Number.isFinite(toDecimal(item.totalGeneral)) || PAYROLL_PROVISION_COMPONENTS.some((component) => toDecimal(item.balances?.[component.key]) < -0.009));
        const missingAccountConfig = records.filter((record) => {
          const config = findPayrollProvisionAccountingConfig(record, filters.companyName, filters.branchName);
          if (!config) return true;
          return PAYROLL_PROVISION_COMPONENTS.some((component) => !config[component.debitField] || !config[component.creditField]);
        });
        const activeBatch = state.data.payrollProvisionAccountingBatches.find((item) => item.companyName === filters.companyName && item.branchName === filters.branchName && item.competence === filters.competence && item.status !== "Estornado");
        return [
          { key: "settings", level: exactSettings ? "ok" : "error", title: "Percentuais configurados", detail: exactSettings ? `${filters.companyName} / ${filters.branchName}` : "Cadastre os percentuais da empresa e filial." },
          { key: "records", level: records.length ? "ok" : "warn", title: "Funcionários calculados", detail: records.length ? `${records.length} funcionário(s) na competência.` : "Calcule as provisões para iniciar a conferência." },
          { key: "salary", level: missingSalary.length ? "error" : records.length ? "ok" : "warn", title: "Bases salariais", detail: missingSalary.length ? `${missingSalary.length} funcionário(s) sem salário válido.` : records.length ? "Todas as bases salariais são válidas." : "Aguardando cálculo." },
          { key: "costCenter", level: missingCostCenter.length ? "error" : records.length ? "ok" : "warn", title: "Centros de custo", detail: missingCostCenter.length ? `${missingCostCenter.length} funcionário(s) com pendência.` : records.length ? "Todos os centros de custo estão válidos." : "Aguardando cálculo." },
          { key: "values", level: invalidValues.length ? "error" : records.length ? "ok" : "warn", title: "Valores e saldos", detail: invalidValues.length ? `${invalidValues.length} registro(s) com valor inválido ou saldo negativo.` : records.length ? "Valores consistentes para fechamento." : "Aguardando cálculo." },
          { key: "accounts", level: missingAccountConfig.length ? "error" : records.length ? "ok" : "warn", title: "Configuração contábil", detail: missingAccountConfig.length ? `${missingAccountConfig.length} funcionário(s) sem contas completas.` : records.length ? "Contas de débito e crédito localizadas." : "Aguardando funcionários calculados." },
          { key: "status", level: ["Calculada", "Contabilizada"].includes(competenceRecord?.status) ? "ok" : records.length ? "warn" : "warn", title: "Conferência da competência", detail: competenceRecord?.status ? `Status atual: ${competenceRecord.status}.` : "Competência ainda não calculada." },
          { key: "duplicate", level: activeBatch ? "warn" : "ok", title: "Duplicidade contábil", detail: activeBatch ? `Lote ativo: ${activeBatch.batchNumber}.` : "Nenhum lote ativo conflitante." }
        ];
      }

      function renderPayrollProvisionChecklist(records, filters, competenceRecord) {
        const checks = getPayrollProvisionVisualChecks(records, filters, competenceRecord);
        const issues = checks.filter((item) => item.level !== "ok").length;
        return `<section class="checklist-card"><div class="checklist-head"><div><h3>Central de pendências</h3><p>Validações necessárias para fechar e contabilizar com segurança.</p></div><span class="badge ${issues ? "warning" : "positive"}">${issues ? `${issues} pendência(s)` : "Tudo validado"}</span></div><div class="checklist-grid">${checks.map((item) => `<div class="checklist-item ${item.level}"><span class="checklist-item-icon">${item.level === "ok" ? "✓" : item.level === "error" ? "!" : "•"}</span><div><strong>${escapeHtml(item.title)}</strong><p>${escapeHtml(item.detail)}</p></div></div>`).join("")}</div></section>`;
      }

      function renderPayrollProvisionWorkflow(records, filters, competenceRecord, preview = state.ui.payrollProvisionPreview) {
        const checks = getPayrollProvisionVisualChecks(records, filters, competenceRecord);
        const configurationOk = checks.filter((item) => ["settings", "accounts"].includes(item.key)).every((item) => item.level === "ok");
        const calculated = records.length > 0;
        const conferred = ["Calculada", "Contabilizada"].includes(competenceRecord?.status);
        const previewMatches = !!(preview && preview.draft?.companyName === filters.companyName && preview.draft?.branchName === filters.branchName && preview.draft?.competence === filters.competence);
        const accounted = competenceRecord?.status === "Contabilizada";
        const definitions = [
          ["Configurar", "Percentuais e contas", configurationOk],
          ["Calcular", "Valores por funcionário", calculated],
          ["Conferir", "Memória e pendências", conferred],
          ["Fechar", "Liberar contabilização", conferred],
          ["Prévia", "Validar lote contábil", previewMatches && !preview?.errors?.length],
          ["Contabilizar", "Gerar lançamentos", accounted]
        ];
        let firstPending = definitions.findIndex((item) => !item[2]);
        if (firstPending < 0) firstPending = definitions.length - 1;
        return `<section class="workflow-card"><div class="workflow-head"><div><h3>Fluxo da competência</h3><p>${escapeHtml(filters.companyName || "Empresa")} · ${escapeHtml(filters.branchName || "Filial")} · ${escapeHtml(filters.competence || "Competência")}</p></div>${renderStatusBadge(competenceRecord?.status || "Não calculada")}</div><div class="workflow-steps">${definitions.map((item, index) => { const cls = item[2] ? "done" : index === firstPending ? (configurationOk || index === 0 ? "current" : "warning") : "locked"; return `<div class="workflow-step ${cls}"><span class="workflow-step-number">${item[2] ? "✓" : index + 1}</span><strong>${item[0]}</strong><small>${item[1]}</small></div>`; }).join("")}</div></section>`;
      }

      function renderPayrollProvisionPrimaryAction(competenceRecord, records) {
        const status = competenceRecord?.status || "Não calculada";
        if (status === "Contabilizada") return `<button class="primary-button" type="button" data-action="switch-payroll-panel" data-panel="provisionAccounting">Consultar lote contábil</button>`;
        if (status === "Calculada") return `<button class="primary-button" type="button" data-action="switch-payroll-panel" data-panel="provisionAccounting">Ir para contabilização</button>`;
        if (records.length) return `<button class="primary-button" type="button" data-action="payroll-set-provision-calculated">Finalizar conferência</button>`;
        return `<button class="primary-button" type="button" data-action="payroll-calculate-provisions">Calcular provisões</button>`;
      }

      function renderPayrollProvisionOperationToolbar(competenceRecord, records) {
        const mode = state.ui.payrollProvisionTableMode || "summary";
        return `<div class="operation-toolbar"><div class="operation-toolbar-main"><div class="view-toggle" aria-label="Visualização da conferência"><button class="${mode === "summary" ? "active" : ""}" type="button" data-action="payroll-set-provision-table-mode" data-mode="summary">Resumida</button><button class="${mode === "detail" ? "active" : ""}" type="button" data-action="payroll-set-provision-table-mode" data-mode="detail">Detalhada</button></div><span class="table-muted">${records.length} funcionário(s)</span></div><div class="operation-toolbar-actions">${renderPayrollProvisionPrimaryAction(competenceRecord, records)}<details class="action-menu"><summary aria-label="Mais ações">•••</summary><div class="action-menu-popover"><button type="button" data-action="payroll-calculate-provisions">Calcular / recalcular</button><button type="button" data-action="export-payroll-provisions">Exportar conferência em CSV</button><button type="button" data-action="reset-payroll-provision-filters">Limpar filtros</button>${competenceRecord ? `<button class="danger" type="button" data-action="payroll-reopen-provision-competence">Reabrir competência</button>` : ""}</div></details></div></div>`;
      }

      function renderPayrollProvisionTable(records) {
        const detailed = state.ui.payrollProvisionTableMode === "detail";
        if (!detailed) {
          return `<div class="table-scroll"><table class="provision-table provision-summary-table"><thead><tr><th class="sticky-left">Funcionário</th><th>Departamento / Centro de custo</th><th>Salário</th><th>Férias</th><th>13º salário</th><th>Encargos</th><th>Total geral</th><th>Status</th><th class="sticky-right">Detalhes</th></tr></thead><tbody>${records.length ? records.map((item) => `<tr><td class="sticky-left"><strong>${escapeHtml(item.employeeName)}</strong><div class="table-muted">${escapeHtml(item.registration || item.employeeCode || "-")} · ${escapeHtml(item.employeeStatus || "-")}</div></td><td>${escapeHtml(item.departmentName || "-")}<div class="table-muted">${escapeHtml(item.costCenterName || "-")}</div></td><td class="mono">${formatCurrency(item.salaryBase)}</td><td><strong>${formatCurrency(item.totalVacation)}</strong><div class="table-muted">${item.vacationAvos}/12 avos</div></td><td><strong>${formatCurrency(item.totalThirteenth)}</strong><div class="table-muted">${item.thirteenthAvos}/12 avos</div></td><td>${formatCurrency(toDecimal(item.totalVacationCharges) + toDecimal(item.totalThirteenthCharges))}</td><td class="amount-strong">${formatCurrency(item.totalGeneral)}</td><td>${renderStatusBadge(item.status)}</td><td class="sticky-right"><button class="action-chip" type="button" data-action="payroll-view-provision" data-id="${item.id}">Abrir memória</button></td></tr>`).join("") : renderPayrollEmptyRow(9, "Nenhuma provisão calculada para os filtros selecionados.")}</tbody></table></div>`;
        }
        return `<div class="table-scroll"><table class="provision-table provision-detail-table"><thead><tr><th class="sticky-left">Funcionário</th><th>Código</th><th>Departamento</th><th>Centro de custo</th><th>Salário</th><th>Avos férias</th><th>Provisão férias</th><th>INSS férias</th><th>Terceiros férias</th><th>RAT férias</th><th>FGTS férias</th><th>Total férias</th><th>Avos 13º</th><th>Provisão 13º</th><th>INSS 13º</th><th>Terceiros 13º</th><th>RAT 13º</th><th>FGTS 13º</th><th>Total 13º</th><th>Total geral</th><th>Status</th><th class="sticky-right">Ações</th></tr></thead><tbody>${records.length ? records.map((item) => `<tr><td class="sticky-left"><strong>${escapeHtml(item.employeeName)}</strong><div class="table-muted">${escapeHtml(item.registration || "-")}</div></td><td class="mono">${escapeHtml(item.employeeCode || item.code)}</td><td>${escapeHtml(item.departmentName || "-")}</td><td>${escapeHtml(item.costCenterName || "-")}</td><td class="mono">${formatCurrency(item.salaryBase)}</td><td>${item.vacationAvos}/12</td><td>${formatCurrency(item.balances?.vacation)}</td><td>${formatCurrency(item.vacationInss)}</td><td>${formatCurrency(item.vacationThirdParty)}</td><td>${formatCurrency(item.vacationRat)}</td><td>${formatCurrency(item.vacationFgts)}</td><td><strong>${formatCurrency(item.totalVacation)}</strong></td><td>${item.thirteenthAvos}/12</td><td>${formatCurrency(item.balances?.thirteenth)}</td><td>${formatCurrency(item.thirteenthInss)}</td><td>${formatCurrency(item.thirteenthThirdParty)}</td><td>${formatCurrency(item.thirteenthRat)}</td><td>${formatCurrency(item.thirteenthFgts)}</td><td><strong>${formatCurrency(item.totalThirteenth)}</strong></td><td class="amount-strong">${formatCurrency(item.totalGeneral)}</td><td>${renderStatusBadge(item.status)}</td><td class="sticky-right"><button class="action-chip" type="button" data-action="payroll-view-provision" data-id="${item.id}">Memória</button></td></tr>`).join("") : renderPayrollEmptyRow(22, "Nenhuma provisão calculada para os filtros selecionados.")}</tbody></table></div>`;
      }

      function renderPayrollProvisionsPanel() {
        const filters = state.ui.payrollProvisionFilters;
        const records = getFilteredPayrollProvisions(filters);
        const summary = summarizePayrollProvisions(records, filters.provisionType);
        const competenceRecord = getPayrollProvisionCompetence(filters.companyName, filters.branchName, filters.competence);
        const selected = state.data.payrollProvisions.find((item) => item.id === state.ui.payrollSelectedProvisionId && item.schemaVersion === 2);
        const configOpen = state.ui.payrollProvisionConfigOpen;
        return `${renderPayrollProvisionWorkflow(records, filters, competenceRecord)}${renderPayrollProvisionFiltersForm()}${renderPayrollProvisionOperationToolbar(competenceRecord, records)}${renderPayrollProvisionChecklist(records, filters, competenceRecord)}<section class="card"><div class="section-head"><div><h3>Resumo da competência</h3><p>${escapeHtml(filters.companyName)} · ${escapeHtml(filters.branchName)} · ${escapeHtml(filters.competence)}</p></div><span class="status-highlight ${competenceRecord?.status === "Contabilizada" ? "ok" : "warn"}">${escapeHtml(competenceRecord?.status || "Não calculada")}</span></div><div class="stats-grid"><article class="stats-card"><small>Provisão de férias</small><strong>${formatCurrency(summary.vacation)}</strong><span>Saldo de férias com adicional de 1/3.</span></article><article class="stats-card"><small>Encargos sobre férias</small><strong>${formatCurrency(summary.vacationCharges)}</strong><span>INSS, Terceiros, RAT e FGTS.</span></article><article class="stats-card"><small>Provisão de 13º</small><strong>${formatCurrency(summary.thirteenth)}</strong><span>Saldo proporcional aos avos.</span></article><article class="stats-card"><small>Encargos sobre o 13º</small><strong>${formatCurrency(summary.thirteenthCharges)}</strong><span>Encargos registrados na memória.</span></article><article class="stats-card"><small>Total geral</small><strong>${formatCurrency(summary.total)}</strong><span>${records.length} funcionário(s) na conferência.</span></article></div></section><section class="table-card"><div class="table-toolbar"><div><h4>Conferência individual</h4><p class="page-subtitle">Use a visão resumida no dia a dia e abra a visão detalhada somente quando necessário.</p></div></div>${renderPayrollProvisionTable(records)}</section><section class="configuration-shell"><div class="configuration-intro"><div><h3>Configurações das provisões</h3><p>Percentuais e regras ficam separados da operação mensal.</p></div><button class="secondary-button" type="button" data-action="toggle-payroll-provision-config">${configOpen ? "Ocultar configurações" : "Abrir configurações"}</button></div>${configOpen ? `<div class="configuration-content">${renderPayrollProvisionSettingsForm()}<section class="table-card"><div class="table-toolbar"><h4>Percentuais cadastrados</h4></div><div class="table-scroll"><table><thead><tr><th>Empresa</th><th>Filial</th><th>INSS</th><th>Terceiros</th><th>RAT</th><th>FGTS</th><th>Status</th><th>Ações</th></tr></thead><tbody>${state.data.payrollProvisionSettings.length ? state.data.payrollProvisionSettings.map((item) => `<tr><td>${escapeHtml(item.companyName)}</td><td>${escapeHtml(item.branchName)}</td><td>${item.inssCompanyEnabled ? `${formatNumber(item.inssCompanyRate)}%` : "Inativo"}</td><td>${item.thirdPartyEnabled ? `${formatNumber(item.thirdPartyRate)}%` : "Inativo"}</td><td>${item.ratEnabled ? `${formatNumber(item.ratRate)}%` : "Inativo"}</td><td>${item.fgtsEnabled ? `${formatNumber(item.fgtsRate)}%` : "Inativo"}</td><td>${renderStatusBadge(item.status)}</td><td><div class="table-actions"><button class="action-chip" type="button" data-action="edit-payroll-provision-settings" data-id="${item.id}">Editar</button><button class="action-chip danger" type="button" data-action="delete-payroll-provision-settings" data-id="${item.id}">Excluir</button></div></td></tr>`).join("") : renderPayrollEmptyRow(8, "Nenhuma configuração de percentuais cadastrada.")}</tbody></table></div></section></div>` : ""}</section>${selected ? renderPayrollProvisionDetail(selected, records) : ""}`;
      }

      function renderPayrollProvisionDetail(record, records = []) {
        const editable = getPayrollProvisionCompetence(record.companyName, record.branchName, record.competence)?.status !== "Contabilizada";
        const orderedRecords = records.length ? records : getFilteredPayrollProvisions();
        const currentIndex = orderedRecords.findIndex((item) => item.id === record.id);
        const previous = currentIndex > 0 ? orderedRecords[currentIndex - 1] : null;
        const next = currentIndex >= 0 && currentIndex < orderedRecords.length - 1 ? orderedRecords[currentIndex + 1] : null;
        const movementRows = PAYROLL_PROVISION_COMPONENTS.map((component) => {
          const payment = component.key === "vacation" ? record.payments?.vacation : component.key === "thirteenth" ? record.payments?.thirteenth : 0;
          return `<tr><td>${escapeHtml(component.label)}</td><td>${formatCurrency(record.previousAccounted?.[component.key])}</td><td>${formatCurrency(record.movements?.[component.key])}</td><td>${formatCurrency(payment)}</td><td>${formatCurrency(record.netMovements?.[component.key] ?? record.movements?.[component.key])}</td><td><strong>${formatCurrency(record.balances?.[component.key])}</strong></td></tr>`;
        }).join("");
        return `<div class="provision-drawer-overlay"><button class="provision-drawer-backdrop" type="button" data-action="payroll-close-provision-detail" aria-label="Fechar memória"></button><aside class="provision-drawer" role="dialog" aria-modal="true" aria-label="Memória de cálculo"><div class="provision-drawer-header"><div><h3>${escapeHtml(record.employeeName)}</h3><p>${escapeHtml(record.registration || record.employeeCode)} · ${escapeHtml(record.competence)} · ${escapeHtml(record.companyName)} / ${escapeHtml(record.branchName)}</p></div><div class="drawer-nav"><button class="action-chip" type="button" data-action="payroll-previous-provision" data-id="${previous?.id || ""}" ${previous ? "" : "disabled"}>← Anterior</button><button class="action-chip" type="button" data-action="payroll-next-provision" data-id="${next?.id || ""}" ${next ? "" : "disabled"}>Próximo →</button><button class="ghost-button" type="button" data-action="payroll-close-provision-detail">Fechar</button></div></div><div class="provision-drawer-body"><div class="memory-value-grid"><div class="memory-value"><small>Salário-base</small><strong>${formatCurrency(record.salaryBase)}</strong></div><div class="memory-value"><small>Total de férias</small><strong>${formatCurrency(record.totalVacation)}</strong></div><div class="memory-value"><small>Total de 13º</small><strong>${formatCurrency(record.totalThirteenth)}</strong></div><div class="memory-value"><small>Total geral</small><strong>${formatCurrency(record.totalGeneral)}</strong></div></div><details class="calculation-section" open><summary>Resumo e bases</summary><div class="calculation-section-content"><div class="memory-value-grid"><div class="memory-value"><small>Avos de férias</small><strong>${record.vacationAvos}/12</strong></div><div class="memory-value"><small>Avos de 13º</small><strong>${record.thirteenthAvos}/12</strong></div><div class="memory-value"><small>Departamento</small><strong>${escapeHtml(record.departmentName || "-")}</strong></div><div class="memory-value"><small>Centro de custo</small><strong>${escapeHtml(record.costCenterName || "-")}</strong></div></div></div></details><details class="calculation-section" open><summary>Férias</summary><div class="calculation-section-content"><p class="page-subtitle"><strong>Fórmula:</strong> salário × avos ÷ 12 + adicional de 1/3.</p><div class="memory-value-grid"><div class="memory-value"><small>Valor de férias</small><strong>${formatCurrency(record.vacationValue)}</strong></div><div class="memory-value"><small>Adicional de 1/3</small><strong>${formatCurrency(record.vacationOneThird)}</strong></div><div class="memory-value"><small>Provisão antes de ajustes</small><strong>${formatCurrency(record.vacationProvision)}</strong></div><div class="memory-value"><small>Total com encargos</small><strong>${formatCurrency(record.totalVacation)}</strong></div></div></div></details><details class="calculation-section"><summary>13º salário</summary><div class="calculation-section-content"><p class="page-subtitle"><strong>Fórmula:</strong> salário × avos ÷ 12.</p><div class="memory-value-grid"><div class="memory-value"><small>Provisão antes de ajustes</small><strong>${formatCurrency(record.thirteenthProvision)}</strong></div><div class="memory-value"><small>Total com encargos</small><strong>${formatCurrency(record.totalThirteenth)}</strong></div></div></div></details><details class="calculation-section"><summary>Encargos utilizados</summary><div class="calculation-section-content"><div class="memory-value-grid"><div class="memory-value"><small>INSS Empresa</small><strong>${formatNumber(record.ratesSnapshot?.inssCompanyRate)}%</strong></div><div class="memory-value"><small>Terceiros</small><strong>${formatNumber(record.ratesSnapshot?.thirdPartyRate)}%</strong></div><div class="memory-value"><small>RAT</small><strong>${formatNumber(record.ratesSnapshot?.ratRate)}%</strong></div><div class="memory-value"><small>FGTS</small><strong>${formatNumber(record.ratesSnapshot?.fgtsRate)}%</strong></div></div></div></details><details class="calculation-section" open><summary>Movimentação e saldo final</summary><div class="calculation-section-content"><div class="table-scroll"><table style="min-width:850px"><thead><tr><th>Componente</th><th>Contabilizado anteriormente</th><th>Provisão/ajuste</th><th>Baixa</th><th>Variação líquida</th><th>Saldo final</th></tr></thead><tbody>${movementRows}</tbody></table></div></div></details><details class="calculation-section"><summary>Ajustes e baixas</summary><div class="calculation-section-content"><form data-form="payroll-provision-adjustment"><input type="hidden" name="id" value="${record.id}"><div class="form-grid">${renderPayrollInput("vacationAdjustment", "Ajuste de férias", record.adjustments?.vacation || "", "0,00", "number")}${renderPayrollInput("vacationPayment", "Baixa/pagamento de férias", record.payments?.vacation || "", "0,00", "number")}${renderPayrollInput("thirteenthAdjustment", "Ajuste de 13º", record.adjustments?.thirteenth || "", "0,00", "number")}${renderPayrollInput("thirteenthPayment", "Baixa/pagamento de 13º", record.payments?.thirteenth || "", "0,00", "number")}${renderPayrollTextarea("notes", "Observações da memória", record.notes || "", "Motivo do ajuste ou baixa")}</div><div class="form-actions"><button class="primary-button" type="submit" ${editable ? "" : "disabled"}>Salvar memória</button></div></form></div></details></div></aside></div>`;
      }

      function submitPayrollProvisionAccountingConfig(formData) {
        const id = state.ui.editing.payrollProvisionAccountingConfigId;
        const previous = getPayrollProvisionAccountingConfigById(id);
        const record = {
          ...createEmptyPayrollProvisionAccountingConfigDraft(previous),
          id: id || generateId(), code: previous?.code || generateCode("payrollProvisionAccountingConfigs"),
          companyName: clean(formData.get("companyName")), branchName: clean(formData.get("branchName")),
          departmentId: formData.get("departmentId") || "", costCenterId: formData.get("costCenterId") || "", status: formData.get("status") || "Ativo",
          createdAt: previous?.createdAt || payrollNow(), updatedAt: payrollNow()
        };
        [...PAYROLL_PROVISION_COMPONENTS.flatMap((item) => [item.debitField, item.creditField]), "vacationPaymentAccountId", "thirteenthPaymentAccountId"].forEach((field) => { record[field] = formData.get(field) || ""; });
        if (!record.companyName || !record.branchName) {
          notify("error", "Contas das provisões", "Informe empresa e filial.");
          return;
        }
        upsertRecord("payrollProvisionAccountingConfigs", record);
        state.ui.editing.payrollProvisionAccountingConfigId = null;
        state.ui.payrollProvisionAccountingConfigDraft = createEmptyPayrollProvisionAccountingConfigDraft();
        notify("success", "Contas das provisões", "Configuração contábil salva com sucesso.");
        renderApp();
      }

      function renderProvisionAccountSelect(name, value) {
        const options = getSelectableChartAccounts().map((item) => `<option value="${item.id}" ${value === item.id ? "selected" : ""}>${escapeHtml(item.code)} - ${escapeHtml(item.name)}</option>`).join("");
        return `<select name="${name}"><option value="">Selecione</option>${options}</select>`;
      }

      function renderPayrollProvisionAccountingConfigForm() {
        const draft = state.ui.payrollProvisionAccountingConfigDraft;
        const rows = PAYROLL_PROVISION_COMPONENTS.map((component) => `<tr><td><strong>${escapeHtml(component.label)}</strong></td><td>${renderProvisionAccountSelect(component.debitField, draft[component.debitField])}</td><td>${renderProvisionAccountSelect(component.creditField, draft[component.creditField])}</td></tr>`).join("");
        return `<form class="card" data-form="payroll-provision-account-config"><div class="section-head"><div><h3>Configuração das contas contábeis</h3><p>Uma configuração genérica pode ser refinada por departamento e centro de custo.</p></div></div><div class="form-grid">${renderPayrollInput("companyName", "Empresa", draft.companyName, "Empresa Principal")}${renderPayrollInput("branchName", "Filial", draft.branchName, "Matriz")}${renderPayrollSelect("departmentId", "Departamento", draft.departmentId, [["", "Todos"], ...state.data.payrollDepartments.map((item) => [item.id, `${item.code} - ${item.name}`])])}${renderPayrollSelect("costCenterId", "Centro de custo", draft.costCenterId, [["", "Todos"], ...state.data.costCenters.map((item) => [item.id, `${item.code} - ${item.name}`])])}${renderPayrollSelect("status", "Status", draft.status, [["Ativo", "Ativo"], ["Inativo", "Inativo"]])}</div><div class="table-card" style="margin-top:16px"><div class="table-scroll"><table><thead><tr><th>Componente</th><th>Conta de despesa (débito)</th><th>Conta da provisão/encargo (crédito)</th></tr></thead><tbody>${rows}</tbody></table></div></div><div class="form-grid" style="margin-top:14px">${renderPayrollSelect("vacationPaymentAccountId", "Conta de férias a pagar (baixa)", draft.vacationPaymentAccountId, getSelectableChartAccounts().map((item) => [item.id, `${item.code} - ${item.name}`]), "Opcional")}${renderPayrollSelect("thirteenthPaymentAccountId", "Conta de 13º a pagar (baixa)", draft.thirteenthPaymentAccountId, getSelectableChartAccounts().map((item) => [item.id, `${item.code} - ${item.name}`]), "Opcional")}</div>${renderPayrollFormActions("reset-payroll-provision-account-config")}</form>`;
      }

      function findPayrollProvisionAccountingConfig(record, companyName, branchName) {
        return state.data.payrollProvisionAccountingConfigs
          .filter((item) => item.status !== "Inativo" && item.companyName === companyName && item.branchName === branchName)
          .filter((item) => !item.departmentId || item.departmentId === record.departmentId)
          .filter((item) => !item.costCenterId || item.costCenterId === record.costCenterId)
          .sort((a, b) => (Number(!!b.departmentId) + Number(!!b.costCenterId)) - (Number(!!a.departmentId) + Number(!!a.costCenterId)))[0] || null;
      }

      function payrollProvisionTypesOverlap(left, right) {
        if (left === "all" || right === "all") return true;
        return left === right;
      }

      function getPayrollProvisionActiveBatch(companyName, branchName, competence, provisionType) {
        return state.data.payrollProvisionAccountingBatches.find((item) => item.companyName === companyName && item.branchName === branchName && item.competence === competence && item.status !== "Estornado" && payrollProvisionTypesOverlap(item.provisionType, provisionType));
      }

      function payrollProvisionGroupingKey(line, grouping) {
        if (grouping === "employee") return `${line.employeeIds[0]}|${line.componentKey}|${line.debitAccountId}|${line.creditAccountId}`;
        if (grouping === "department") return `${line.departmentId}|${line.componentKey}|${line.debitAccountId}|${line.creditAccountId}`;
        if (grouping === "costCenter") return `${line.costCenterId}|${line.componentKey}|${line.debitAccountId}|${line.creditAccountId}`;
        if (grouping === "branch") return `${line.branchName}|${line.componentKey}|${line.debitAccountId}|${line.creditAccountId}`;
        if (grouping === "account") return `${line.debitAccountId}|${line.creditAccountId}|${line.componentKey}`;
        return `${line.componentKey}|${line.debitAccountId}|${line.creditAccountId}`;
      }

      function buildPayrollProvisionAccountingPreview() {
        const draft = state.ui.payrollProvisionAccountingDraft;
        const competenceRecord = getPayrollProvisionCompetence(draft.companyName, draft.branchName, draft.competence);
        const errors = [];
        if (!competenceRecord || competenceRecord.status !== "Calculada") errors.push("A competência precisa estar com status Calculada.");
        if (getPayrollProvisionActiveBatch(draft.companyName, draft.branchName, draft.competence, draft.provisionType)) errors.push("Já existe contabilização ativa que se sobrepõe ao tipo selecionado.");
        const records = state.data.payrollProvisions.filter((item) => item.schemaVersion === 2 && item.companyName === draft.companyName && item.branchName === draft.branchName && item.competence === draft.competence);
        if (!records.length) errors.push("Não existem funcionários com provisões calculadas nesta competência.");
        const components = PAYROLL_PROVISION_COMPONENTS.filter((item) => draft.provisionType === "all" || item.group === draft.provisionType);
        const rawLines = [];
        records.forEach((record) => {
          if (!record.costCenterId || !getCostCenterById(record.costCenterId)) {
            errors.push(`${record.employeeName}: centro de custo não cadastrado.`);
            return;
          }
          const config = findPayrollProvisionAccountingConfig(record, draft.companyName, draft.branchName);
          if (!config) {
            errors.push(`${record.employeeName}: configuração contábil não encontrada.`);
            return;
          }
          components.forEach((component) => {
            const movement = roundCurrency(toDecimal(record.movements?.[component.key]));
            if (Math.abs(movement) < 0.005) return;
            const normalDebit = config[component.debitField];
            const normalCredit = config[component.creditField];
            const debitAccountId = movement >= 0 ? normalDebit : normalCredit;
            const creditAccountId = movement >= 0 ? normalCredit : normalDebit;
            if (!debitAccountId || !creditAccountId || !getChartAccountById(debitAccountId) || !getChartAccountById(creditAccountId)) {
              errors.push(`${record.employeeName}: contas ausentes para ${component.label}.`);
              return;
            }
            const reversal = movement < 0;
            const competenceLabel = String(draft.competence).split("-").reverse().join("/");
            const baseHistory = draft.history || `${component.label} – competência ${competenceLabel}`;
            rawLines.push({
              componentKey: component.key, provisionGroup: component.group, provisionLabel: component.label,
              debitAccountId, creditAccountId, amount: Math.abs(movement), costCenterId: record.costCenterId,
              departmentId: record.departmentId || "", branchName: record.branchName, employeeIds: [record.employeeId],
              history: `${reversal ? "Reversão de " : ""}${baseHistory}${draft.grouping === "employee" ? ` - ${record.registration || record.employeeName}` : ""}`,
              reversal
            });
          });
          const competenceLabel = String(draft.competence).split("-").reverse().join("/");
          const paymentDefinitions = [
            { enabled: draft.provisionType === "all" || draft.provisionType === "vacation", amount: toDecimal(record.payments?.vacation), key: "vacationPayment", group: "vacation", label: "Baixa da provisão de férias", liabilityAccountId: config.vacationLiabilityAccountId, paymentAccountId: config.vacationPaymentAccountId },
            { enabled: draft.provisionType === "all" || draft.provisionType === "thirteenth", amount: toDecimal(record.payments?.thirteenth), key: "thirteenthPayment", group: "thirteenth", label: "Baixa da provisão de 13º salário", liabilityAccountId: config.thirteenthLiabilityAccountId, paymentAccountId: config.thirteenthPaymentAccountId }
          ];
          paymentDefinitions.forEach((payment) => {
            if (!payment.enabled || payment.amount <= 0) return;
            if (!payment.liabilityAccountId || !payment.paymentAccountId || !getChartAccountById(payment.liabilityAccountId) || !getChartAccountById(payment.paymentAccountId)) {
              errors.push(`${record.employeeName}: contas de baixa ausentes para ${payment.label}.`);
              return;
            }
            rawLines.push({
              componentKey: payment.key, provisionGroup: payment.group, provisionLabel: payment.label,
              debitAccountId: payment.liabilityAccountId, creditAccountId: payment.paymentAccountId, amount: roundCurrency(payment.amount),
              costCenterId: record.costCenterId, departmentId: record.departmentId || "", branchName: record.branchName, employeeIds: [record.employeeId],
              history: `${payment.label} – competência ${competenceLabel}${draft.grouping === "employee" ? ` - ${record.registration || record.employeeName}` : ""}`,
              reversal: false
            });
          });
        });
        const grouped = new Map();
        rawLines.forEach((line) => {
          const key = payrollProvisionGroupingKey(line, draft.grouping);
          const current = grouped.get(key);
          if (!current) grouped.set(key, { ...line, employeeIds: [...line.employeeIds] });
          else {
            current.amount = roundCurrency(current.amount + line.amount);
            current.employeeIds = [...new Set([...current.employeeIds, ...line.employeeIds])];
            if (draft.grouping !== "employee") current.history = draft.history || `${line.reversal ? "Reversão de " : ""}${line.provisionLabel} – competência ${String(draft.competence).split("-").reverse().join("/")}`;
          }
        });
        const lines = [...grouped.values()].map((line, index) => ({ ...line, lineNumber: index + 1, amount: roundCurrency(line.amount) }));
        const totalDebit = roundCurrency(lines.reduce((sum, line) => sum + line.amount, 0));
        const totalCredit = roundCurrency(lines.reduce((sum, line) => sum + line.amount, 0));
        const difference = roundCurrency(totalDebit - totalCredit);
        if (!lines.length && !errors.length) errors.push("A movimentação da competência é zero para o tipo selecionado.");
        if (Math.abs(difference) > 0.009) errors.push("Os totais de débito e crédito estão diferentes.");
        state.ui.payrollProvisionPreview = { draft: { ...draft }, lines, errors: [...new Set(errors)], totalDebit, totalCredit, difference, generatedAt: payrollNow() };
        if (errors.length) notify("error", "Prévia contábil", `${[...new Set(errors)].length} validação(ões) precisam ser corrigidas.`);
        else notify("success", "Prévia contábil", `${lines.length} linha(s) gerada(s) e balanceada(s).`);
        renderApp();
      }

      function confirmPayrollProvisionAccounting() {
        const preview = state.ui.payrollProvisionPreview;
        if (!preview || preview.errors.length || !preview.lines.length || Math.abs(preview.difference) > 0.009) {
          notify("error", "Contabilização", "Gere uma prévia válida e balanceada antes de confirmar.");
          return;
        }
        const draft = preview.draft;
        const competenceRecord = getPayrollProvisionCompetence(draft.companyName, draft.branchName, draft.competence);
        if (!competenceRecord || competenceRecord.status !== "Calculada") {
          notify("error", "Contabilização", "A competência não está liberada para contabilização.");
          return;
        }
        if (getPayrollProvisionActiveBatch(draft.companyName, draft.branchName, draft.competence, draft.provisionType)) {
          notify("error", "Duplicidade", "A mesma provisão já foi contabilizada nesta competência.");
          return;
        }
        const batchId = generateId();
        const now = payrollNow();
        const batch = {
          id: batchId, code: generateCode("payrollProvisionAccountingBatches"), companyName: draft.companyName, branchName: draft.branchName,
          competence: draft.competence, provisionType: draft.provisionType, postingDate: draft.postingDate,
          history: draft.history, batchNumber: draft.batchNumber, grouping: draft.grouping,
          lines: preview.lines.map((line) => ({ ...line, id: generateId() })), totalDebit: preview.totalDebit, totalCredit: preview.totalCredit,
          status: "Contabilizada", userName: "Usuário local", generatedAt: now, createdAt: now, updatedAt: now
        };
        const moduleEntries = batch.lines.map((line, index) => ({
          id: `auto-payroll-provision-${batchId}-${index + 1}`, code: payrollCode("accountingEntries", index), entryDate: draft.postingDate,
          description: line.history, costCenterId: line.costCenterId, debitAccountId: line.debitAccountId, creditAccountId: line.creditAccountId,
          amount: line.amount, origin: "payroll-provision", batchName: draft.batchNumber, competence: draft.competence,
          sourcePayrollProvisionBatchId: batchId, sourcePayrollProvisionBatchCode: batch.code, sourceEmployeeIds: line.employeeIds,
          createdAt: now, updatedAt: now
        }));
        state.data.payrollProvisionAccountingBatches.push(batch);
        state.data.accountingEntries.push(...moduleEntries);
        const accountedTypes = new Set(competenceRecord.accountedTypes || []);
        if (draft.provisionType === "all") ["vacation", "vacationCharges", "thirteenth", "thirteenthCharges"].forEach((item) => accountedTypes.add(item));
        else accountedTypes.add(draft.provisionType);
        const fullyAccounted = ["vacation", "vacationCharges", "thirteenth", "thirteenthCharges"].every((item) => accountedTypes.has(item));
        competenceRecord.accountedTypes = [...accountedTypes];
        competenceRecord.accountingBatchIds = [...new Set([...(competenceRecord.accountingBatchIds || []), batchId])];
        competenceRecord.status = fullyAccounted ? "Contabilizada" : "Calculada";
        competenceRecord.accountedAt = now;
        competenceRecord.updatedAt = now;
        state.data.payrollProvisions.forEach((item) => {
          if (item.schemaVersion === 2 && item.companyName === draft.companyName && item.branchName === draft.branchName && item.competence === draft.competence) {
            item.status = fullyAccounted ? "Contabilizada" : "Calculada";
            item.accountedAt = now;
            item.accountingBatchIds = [...new Set([...(item.accountingBatchIds || []), batchId])];
            item.updatedAt = now;
          }
        });
        ["payrollProvisionAccountingBatches", "accountingEntries", "payrollProvisionCompetences", "payrollProvisions"].forEach(persistCollection);
        CLOUD.schedulePush(getDataSnapshot());
        state.ui.payrollProvisionPreview = null;
        notify("success", "Provisões contabilizadas", `Lote ${draft.batchNumber} integrado ao módulo contábil.`);
        renderApp();
      }

      function reversePayrollProvisionAccountingBatch(id) {
        const batch = state.data.payrollProvisionAccountingBatches.find((item) => item.id === id);
        if (!batch || batch.status === "Estornado") return;
        const reason = window.prompt("Informe o motivo do estorno:", "Correção da contabilização das provisões");
        if (!reason) return;
        const now = payrollNow();
        const reversalEntries = batch.lines.map((line, index) => ({
          id: `auto-payroll-provision-reversal-${batch.id}-${index + 1}`, code: payrollCode("accountingEntries", index), entryDate: new Date().toISOString().slice(0, 10),
          description: `Estorno: ${line.history} - ${reason}`, costCenterId: line.costCenterId,
          debitAccountId: line.creditAccountId, creditAccountId: line.debitAccountId, amount: line.amount,
          origin: "payroll-provision-reversal", batchName: `EST-${batch.batchNumber}`, competence: batch.competence,
          sourcePayrollProvisionBatchId: batch.id, sourcePayrollProvisionBatchCode: batch.code, sourceEmployeeIds: line.employeeIds,
          createdAt: now, updatedAt: now
        }));
        state.data.accountingEntries.push(...reversalEntries);
        batch.status = "Estornado";
        batch.reversedAt = now;
        batch.reversalReason = reason;
        batch.reversedBy = "Usuário local";
        batch.updatedAt = now;
        const competenceRecord = getPayrollProvisionCompetence(batch.companyName, batch.branchName, batch.competence);
        if (competenceRecord) {
          const remaining = state.data.payrollProvisionAccountingBatches.filter((item) => item.id !== batch.id && item.companyName === batch.companyName && item.branchName === batch.branchName && item.competence === batch.competence && item.status !== "Estornado");
          const types = new Set();
          remaining.forEach((item) => item.provisionType === "all" ? ["vacation", "vacationCharges", "thirteenth", "thirteenthCharges"].forEach((type) => types.add(type)) : types.add(item.provisionType));
          competenceRecord.accountedTypes = [...types];
          competenceRecord.status = "Reaberta";
          competenceRecord.updatedAt = now;
        }
        state.data.payrollProvisions.forEach((item) => {
          if (item.schemaVersion === 2 && item.companyName === batch.companyName && item.branchName === batch.branchName && item.competence === batch.competence) {
            item.status = "Reaberta";
            item.updatedAt = now;
          }
        });
        ["accountingEntries", "payrollProvisionAccountingBatches", "payrollProvisionCompetences", "payrollProvisions"].forEach(persistCollection);
        CLOUD.schedulePush(getDataSnapshot());
        notify("success", "Estorno concluído", `Foram gerados ${reversalEntries.length} lançamento(s) inverso(s).`);
        renderApp();
      }

d><strong>${escapeHtml(getChartAccountById(line.debitAccountId)?.code || "-")}</strong><div class="table-muted">${escapeHtml(getChartAccountById(line.debitAccountId)?.name || "-")}</div></td><td><strong>${escapeHtml(getChartAccountById(line.creditAccountId)?.code || "-")}</strong><div class="table-muted">${escapeHtml(getChartAccountById(line.creditAccountId)?.name || "-")}</div></td><td class="amount-strong">${formatCurrency(line.amount)}</td><td>${escapeHtml(getCostCenterById(line.costCenterId)?.name || "-")}</td><td>${escapeHtml(getPayrollDepartmentById(line.departmentId)?.name || "-")}</td><td>${escapeHtml(line.branchName)}</td><td>${escapeHtml(line.history)}</td><td>${escapeHtml(line.provisionLabel)}</td><td>${line.employeeIds.length}</td></tr>`).join("") : renderPayrollEmptyRow(10, "Nenhuma linha gerada.")}</tbody></table></div></section>`;
      }

      function payrollCsvCell(value) {
        const text = String(value ?? "").replace(/"/g, '""');
        return `"${text}"`;
      }

      function downloadPayrollCsv(filename, headers, rows) {
        const content = "\ufeff" + [headers, ...rows].map((row) => row.map(payrollCsvCell).join(";")).join("\r\n");
        const url = URL.createObjectURL(new Blob([content], { type: "text/csv;charset=utf-8" }));
        const link = document.createElement("a");
        link.href = url;
        link.download = filename;
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
      }

      function exportPayrollProvisionPreviewCsv() {

brica")}<div class="table-scroll"><table><thead><tr><th>Código</th><th>Rubrica</th><th>Tipo</th><th>Cálculo</th><th>Incidências</th><th>Status</th><th>Ações</th></tr></thead><tbody>${rows.length ? rows.map((item) => `<tr><td><strong>${escapeHtml(item.code)}</strong></td><td>${escapeHtml(item.name)}<div class="table-muted">${escapeHtml(item.nature)}</div></td><td>${renderStatusBadge(item.type)}</td><td>${escapeHtml(item.calculationType)}<div class="table-muted">${escapeHtml(item.formula || item.tableType || "Parametrizado")}</div></td><td><div class="badge-row">${[item.incidenceInss && "INSS", item.incidenceFgts && "FGTS", item.incidenceIrrf && "IRRF", item.incidenceVacation && "Férias", item.incidenceThirteenth && "13º"].filter(Boolean).map((x) => `<span class="badge">${x}</span>`).join("") || "-"}</div></td><td>${renderStatusBadge(item.active === false ? "Inativa" : "Ativa")}</td><td>${renderPayrollRowActions("payroll-event", item.id)}</td></tr>`).join("") : renderPayrollEmptyRow(7, "Nenhuma rubrica cadastrada.")}</tbody></table></div></section></div>`;
      }

      function renderPayrollParametersPanel() {
        const draft = state.ui.payrollParameterDraft;
